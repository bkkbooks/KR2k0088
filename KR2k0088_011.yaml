當磴道排雲上雨過苔㾗出石新天外三盤雲路接底須花發訪前津臣劉星煒溪聲山色迥無塵罨戶濃螺入望頻好樂獨參仁者靜祥和已遍物之春香林花雨當空散曲檻星文照夜新扈蹕尚多三日戀欲窺學海已迷津臣錢汝誠天闢靈區絶㸃塵能邀便道屬車頻盤盤逺挹神京秀靣靣全藏太古春到此宸襟清以鬯望中雲壑暖逾新小臣翹首搴帷處咫尺桃源不隔津恭和御製得概軒元韻蔣溥愛茲窗牖靜百物共陽春石古含斑淺松髙落翠新鳥言如贈答泉韻爽心神始信山堪樂由來仰至仁臣汪由敦好山看不盡融景况當春勝概觀非略清吟得每新隂晴皆愜趣泉石為傳神駘宕和風被同欣大造仁臣觀保華軒兼衆妙况復值晴春嵐靄隨時異雲容變態新枕流堪恱耳潄石更怡神茂對羣生育陽和氣轉仁臣國柱眺逺軒窗敞芳園巳仲春峰巒髙下接景物去來新石骨清如許山容淡有神花應連夜發煦育順皇仁臣梁國治别館臨青甸鳴鸞待曉春晴窗千樹列曙野衆峰新旦晚應殊氣風雲合有神天行紆勝賞萬象悉歸仁臣錢汝誠勝地多幽概開軒貯好春溪流能說偈峰影欲標新鐘磬傳天籟松䇸護谷神聖情欣攬結仁者謂之仁恭和御製暖元韻臣蔣溥春山淡冶春氣和春流乍緑緩且迤向陽花木生意動連朝春暖風光多紅樓翠閣搖晴波重重嵐勢排青螺皇情要使萬物遂省耕行聽田家歌烟生樹雲生谷㑹待桃花新漲曲恩澤寧教一方獨帝心合與天心屬臣汪由敦陽春二月東風和芳郊青隴行逶迤林扉忽與塵外逺烟景偏覺山中多石皴碧蘚泉揚波芙蓉靣靣烘翠螺松舒蒼顔勢欲舞鳥變新弄嬌成歌如登春臺回黍谷不隔隂崕深澗曲布德無私遍幽獨萬象熙熙惟所屬臣觀保陽春有腳東風和凌晨入望遵逶迤華蓋峰前玉屏列協氣巳覺山中多泉流碧澗生微波峨峨髙髻堆鈿螺迎人嵐翠烘欲滴干吕應奏青雲歌乍疑鄒律回寒谷釀紅醖緑崕之曲别館盤紆天使獨良辰美景欣交屬臣涂逢震法駕乘春布陽和蒼茫一徑何逶迤排雲映日勢未巳路轉溪回趣更多中有澄淵水不波層巒倒影如旋螺葱蘢但愛喬木古寂靜時聞野鳥歌萬乘探竒遍深谷聖藻新成韶濩曲低峰環拱髙峰獨聨綿逺近皆相屬臣王際華徐無山好風初和晴烘景物何逶迤原頭緑荑舒日麗枝上好鳥鳴春多泉流㶁㶁暖欲波烟磴盤盤翠聳螺繡塍一望饒生意時聽農人擊壤歌春衣扈從白雲谷遙望金根指山曲樂與人同豈惟獨聖情民物常相屬臣奉寬春明二月天融和馬穿石磴行逶迤寒氣巳消凍全解拂靣惟有輕風多風入溪流剪緑波波光蕩漾搖青螺澗邉芳草芽巳吐樵夫時唱踏青歌白雲冉冉生幽谷掩映烟嵐髙且曲潑眼韶華此間獨偶來駐輦皇心屬臣國柱溫暾旭日盎春和石泉風磴行逶迤蕩暄排霽衆峰出㟏岈窽曲晴烟多遙山湧浪淡不波春雲一展飛青螺林中時復啼幽鳥琅琅逸韻如嘯歌歌盤泉望盤谷每看精剎藏山曲泉香石秀茲山獨良辰逰屐相聨屬臣梁國治光風轉蕙噓陽和曦輪紆轡行逶迤流輝入戶漾瑶席㘣影漸耀中天多晴空浩蕩舒春波羣山浮翠明丸螺雪消氷净土膏發千門萬戶騰歡歌登髙山俯深谷卿雲糾縵虞廷曲依光願抱傾葵獨風風雨雨皇心屬臣劉星煒雲旓匼匝鳴鸞和十里五里行逶迤溫暾朱鳥見景色太素雪净山容多淙淙乳脉舂回波上浮霽靄凝丸螺敢告庶徴曰時燠挾纊遍聽耕農歌登髙邱下深谷扶笻如歷匡廬曲名山三百茲山獨太行之陽是焉屬臣錢汝誠槖筆隨輦方春和鞭絲駝影紛逶迤薊門煙樹不可辨入山但覺晴容多遙泉落澗淙微波暖風遲日烘千螺由庚萬物各得所山中人兮康衢歌陟崇椒憩芳谷來游泮奐盤之曲卷阿盛事千載獨誠也叨列從官屬恭和御製婉孌草堂元韻臣蔣溥庭除聚好景往往天機開幾餘試臨眺吟賞愜勝懷一石呈一態靜與詩境諧名畫懸雪壁㸃筆何竒哉即以畫名屋聖心妙取裁營邱古匠哲草堂預儲材臣汪由敦看山如讀書佳境以漸開奧密不終祕留之待竒懷固知仁者樂必與靜侣諧香光壁間圗得此萬一哉而俯同其名正以示雅裁譬之大鈞槖入冶皆良材臣觀保盤陽最佳處巨壑雲莊開麗日晞層阿冲融暢逺懷泉聲互贈答鳥語相和諧松牖納清濤臨風亦快哉草堂據其勝位置聖心裁天然入圗畫即景收詩材臣董邦逹泉石皆可恱佳處從天開春風掃苔徑婉孌愜靜懷合之舊圗畫真境適相諧一真一畫間兩得洵美哉香光重毫素如詩有别裁披圗得山名生物因其材臣涂逢震巉巗殊結搆天遣五丁開寒流綻飛雪竒觀恱聖懷山水具清音茲理庶可諧華亭擅墨妙披圗興悠哉借彼以名此婉孌錫睿裁雲翰昭來許董李詎稱材臣王際華盤中洵可樂幽懷無不開草堂最佳處雅宜山水懷峰頭嵐翠滴泉韻琴筑諧畫禪隨所寓㑹心不逺哉圗名以名堂取義妙化裁即景供睿賞應接紛詩材臣奉寬飛泉抱山石曲徑風雲開於中搆佳室瀟灑空塵懷烟霞咫尺間鳥韻松聲諧儼然肖圗畫此景良幽哉因以婉孌名品題仰天裁賡和誦宸章愧無錦囊材臣國柱名山富幽境岑搆層崕開悠然濠濮想逖矣智仁懷推窗延白雲靜者心自諧日夕對圗畫清味亦佳哉華亭筆墨精渲染多新裁欲賡瑶華章愧兹樗櫟材臣梁國治緣崕架山楹眼底風雲開飛泉更泠泠清響挹沖懷豈惟耳目改悅此萬象諧烟霞一來去舒卷何悠哉軒窗寄遐矚圗畫規親裁幽姿誠婉孌愜賞資天材臣劉星煒淩虛架軒楹萬古蒼崕開初疑擘巨靈結構從無懷泠泠笙鶴音靜與松濤諧卉歙乘長風俯視何雄哉華亭留妙墨位置資天裁山光呈婉孌拳石無凡材臣錢汝誠山莊信有美靈奧無不開草堂獨擅勝妙逹竹柏懷上方雲窈窕下界春和諧當年畫禪室托興何佳哉璇題㑹斯旨名義善化裁圗中想經營早構廣厦材恭和御製半天樓元韻臣蔣溥直上諸峰最上巔層樓半倚大羅天漫疑日月生松底只覺雲霞度檻前何處水光波灔瀲不分烟氣竹便娟卷簾一望青排闥睿句應從碧落傳臣汪由敦傑閣髙憑萬仞巔鬱蕭臺是大羅天丹梯直上重雲表翠幌平臨衆皴前吹袂寒生風浩蕩入簾靜對月嬋娟何須謝眺驚人句四壁奎章早共傳臣觀保層樓迥出白雲巔畫棟如鄰尺五天俯視羣峰羅戶外平窺碧漢落簷前參差松徑多清灑㶑灔溪流總淨娟登眺移時飛峻賞繽紛睿藻自天傳臣董邦逹千叠峰巒萬仞巔穹樓又見倚遙天回看青靄橫窗裏平接朱霞落檻前雪壁自來雲共潔風篁還與月同娟欣聞麗藻層霄下太古笙鏞象外傳臣涂逢震羽仗遙迎最上巔山腰髙已近青天川原歷歷晴雲外樓閣重重夕照前嵐氣縈風春浩渺竹光團露夜㛹娟山靈晉祝同京洛知有嵩呼盛事傳臣王際華層樓孤迥出崕巔坐倚窗櫺近碧天卷幔雲霞生戶外隔簾珠斗掛簷前五峰競秀如屏列萬樹含青弄影娟幾處精藍齊俯視時聞鐘磬下方傳臣奉寬直到三盤最上巔崔巍一閣起遙天舉頭明月來簷上回首白雲在目前石磴烟飛光淡淡疏林風動影娟娟怡人况是陽春節鳥語花香空外傳臣國柱飛珮凌雲躡石巔峥嶸樓閣勢參天好山恰值晴春候勝概都來曲檻前自有烟嵐增態度不須花木助嬋娟數言品目渾難得妙處全憑聖藻傳臣梁國治飛檐髙棟接層巔芝蓋蘭旌動九天鳥影乍穿羣木下雲容欲抱衆峰前風飄靜籟松篁轉氣近丹霄月露娟十二欄干春倚遍新裁鳳藻管絃傳臣劉星煒石梁懸度瞰層巔樓觀耽耽倚碧天九㸃齊州飛鳥外七星北斗晚峰前雲連梯棧排空濶露濕松篁結靜娟駐輦登臨逰賞遍隨風珠玉下方傳臣錢汝誠因迥為髙紫翠巔飛樓翼翼接諸天蕩胸合向烟雲外結想能參造化前鸞鶴定應隨嘯咏雲嵐偏與寄幽娟虛舟春水奚方此饒有松風萬壑傳恭和御製雲林石室元韻臣蔣溥依林雲有棲傍石室逾迥小憩愛境閒當春欣晝永忘機聽野禽因閏遲繁杏茂對有㑹心天開巗壑景臣汪由敦雲來林更幽石室室逾迥雲石互吞吐虛白相與永時復帷褰蘿何用梁裁杏興到輒摛毫肯負階前景臣觀保探竒取徑幽築室延清迥披拂曉風和舒遲春晝永窗匪網朱鳥梁不雕文杏悠然别一天靜對雲移景臣涂逢震曲折入修林石路幽且迥雲光淡蕩來老樹鶴巢永懸崕垂薜蘿遙村雜桃杏微臣叨扈從流連契清景臣王際華盤紆千磴竒層叠三霄迥梵唄諸天聞松濤清晝永底藉琢雲根無煩飾文杏恍逰太古初流連駐韶景臣奉寬雲氣靄深林徑轉層巒迥窗開御座清簾捲春風永緑重千巗松紅催萬樹杏石室暢宸懷樂此幽人景臣國柱石室闢單椒雲林寺清迥松風一披拂佳氣相與永寒露凋溪毛春意逗紅杏試倩倪迂來圗此山中景臣梁國治晴暉媚重巗深林祕幽迥盤空黛壑延靜睇丹岑永積石動新翠含荑佇芳杏悠然棟牖清契此雲松景臣劉星煒丹崕蟠空青别館祕虛迥犖確磴道紆駘宕雲光永春風問蘭蕙閏律占桃杏山椒企翠華鍥石願留景臣錢汝誠架巗築室幽依磴攀林迥仙源壺嶠寬樂味琴書永鬚睂接蒼叟消息遲紅杏好鳥時一鳴窗問度雲景欽定盤山志卷十一
