body:
  text: 藝文二恭和御製賦得山氣日夕佳元韻臣梁詩正山氣罨將夕清暉望轉佳蒼茫傳畫本丹翠㸃詩牌霞采峰峰别烟光樹樹皆淡添雲跡迥靜與古心諧佇月來蕭寺彈琴坐暝齊悠然無盡意俯仰愜秋懷臣彭啓豐翠微延爽氣向夕淡逾佳槲葉猿銜果松枝鹿挂牌烟凝爐靄見黛染畫圗皆靜寄心常寂澄觀性自諧愛臨清澗曲時憩白雲齊靖節悠然句方秋愜睿懷臣劉綸盤中山獨秀秋夕氣尤佳晚㸑初安竈晨郵緩遞牌凉雲歸岫乍暝翼入林皆深樹丹黃重幽泉琴筑諧村帘收夜市僧磬散清齊陶句慿誰㑹冲融鬯睿懷臣胡寶瑔山靜時時好山幽夕更佳微陽勻畫格晚興協詩牌寒為披雲近烟因補樹皆悠然深意愜能爾賞心諧秋蕊踈籬色暝鐘逺寺齊蘇家難和處正足寫天懷臣奉寬日夕望山氣青蒼景倍佳流光回石磴斜影入松牌杳靄千林合迷離萬壑皆峰隨雲態變籟與鳥聲諧曠覽舒仙境澄觀駐靜齊天然開畫幅深契聖人懷臣國柱落日看山好葱蘢氣最佳斜暉明石劍返照隱松牌暮色千巗共泉聲萬壑皆晚鐘詩思逺夕梵賞心諧嵐翠浮虛壁霞紅映小齊仙區能駐景長此洽天懷恭和御製夜雨元韻臣梁詩正秋老驕陽賈餘怒暝合浮嵐蒸巗樹征人苦熱不可支思沃流泉挹且注入夕凉絲乍解煩卧聽似打篷窗喧爽豁不嫌濕行幕潦退猶足資山田我皇百尺樓頭望白飛空際光搖漾應是山靈護豫逰一為清塵紆鬱悵夜半風收雨歇蟾影澄天心乃識頃者一㸃一滴皆甘霖臣彭啓豐豐隆乘雲霆擊怒冥濛忽暗前村樹野中燈火濕霏微山下畦塍勢奔注行殿招凉散鬱煩盤阿清景隔囂喧那知未雨先籌切早為三農貸薄田霓旌颭處輿人望除道成梁碧波漾王程千里指嵩伊望幸同時慰惆悵試看登封禱祀愜民心隂陽和㑹興作霖臣劉綸吹萬于喁土囊怒欲賦秋聲聲在樹宿頓宵來合洗塵山靈一霎為傾注帳外聽時未憚煩菰蘆如夢短篷喧晚凉净拭朝曦上正好長禾穫大田排闥晴巒開四望丹崕碧沜光搖漾對景應知詩骨清名區盡攬寧招悵此時深慮還縈乙夜心春膏已渥防秋霖臣鶴年雨聲兼挾風聲怒勢若傾盆振林樹淙淙瀉盡秋宵凉恍疑百川倐奔注暑退氣平襟滌煩聞聲最喜聲豗喧溉渠曲折稻陂滿奄觀利澤膏秋田平原更覺慰晴望明霞縷縷晨光漾築場納稼俄吹豳閭井歡多少惆悵猗歟聖人自朝至昃皆以民為心喜雨却復還愁霖臣胡寶瑔千峰夜暗轟聲怒半空潑墨迷巗樹風雨颯颯何飛翻萬壑響泉互淙注秋來帶暑藉滌煩盤中上下無囂喧方雨即晴雨亦好宸念猶復籌春田曉慿涼館殷勤望薊門烟景饒清漾髙原下隰一時登尚恐茒簷異欣悵猗歟天心即聖心㑹看五風十雨無愁霖臣奉寬雲隂低壓風咸怒蒼茫不辨三盤樹雷聲忽挾雨聲來萬壑千崕互奔注入耳琅琅聽不煩澗流琴韻松濤喧頓覺炎歊清御苑還欣渥澤資民田朝來攬袂髙巗望濕烟破處晴暉漾几重常是切籌咨乙夜何曾釋怊悵乃知至誠呼吸通天心自此我疆我理有雨皆甘霖臣國柱欲雨不雨風號怒雲滃山腰動山樹震雷翻幕聲鏗鍧驟雨移時如㦸注秋來藉此滌塵煩簷懸殘滴溪流喧烟鬟净沐真景出聖念乃在農夫田時巡洛邑行入望嵩嶽嶙峋河演漾欣聞豫省報豐收一方歉入猶懷悵佇看四海之內均調玉燭符天心曉晴夜雨為甘霖恭和御製池上居元韻臣沈德潛邱壑疑天成疏鑿豈人智奧如復曠如水木似相濟匹練下危峰圎鏡滙平地閒情堪鷗盟幽事兼魚計天光倒影入雲谷雜然備翠鳥不避人揚雨倐而至載詠靈沼詩豈徒濠濮意恭和御製登半天樓元韻臣沈德潛岌嶪飛樓次第登遙知睿想最超騰時巡豈以觀為美眺逺悠然興可乘北距滄溟瞻泱漭東連碣石露鋒稜小臣敢繼賡歌作天縱多能洵獨能恭和御製冷然閣元韻臣沈德潜層臺田盤東岡巒屢回復傑閣據全勝雲嵐蕩心目逺揖魚山青近接泃水緑冷然御風行塵􅙟足洗沐應知賈島佛願作仙人僕島詩訾為仙者僕側執御風幢恭和御製駐蹕靜寄山莊元韻乾隆壬申臣錢陳羣自昔真人數往還新規行殿啓重關分明一幅無心畫收拾千盤有骨山吟罷滌襟成獨賞政餘減從便幽攀朅來展謁回清蹕興寄青松紅杏間連朝攬勝應教住他日巡農㑹再來林鳥也能隔花語園門無不對山開松聲落澗琮琤合樵路穿雲屈曲回素壁古香清供外墨光添寫幾枝梅臣鄒一桂巒勢盤紆駕往還薊門雄鎮扼燕關巡旗一色坡前栁營帳天然屋後山勝地不虛供嘯咏微臣何幸得追攀兩行碧罕停留處仿佛仙都島嶼間巖居嵗月如懷葛龍馭逢春此又來屏翳灑風除道净女夷刻日報花開柏幢松蓋排成列澗筑泉琴去又回滿眼雲山堪靜寄底須放鶴與尋梅恭和御製得槩軒元韻臣錢陳羣肯教窟宅讓神仙得此方知勝概全怪樹半從雲際見逺嵐多入鏡中懸嵌空石竇流清韻澄霽琳宫發妙妍批覽封章時捲幔巗花迎暖見初然臣鄒一桂欲識雲中雞犬仙此中邱壑得天全蟠崕古柏潛虬色罥石新蘿綵索懸青送榻前書几净秀延窗外墨池妍吟情直揭山靈奧捧讀宸章意邈然恭和御製少林寺元韻臣錢陳羣暫駐花宫寫靜懷路從支徑得偏佳雲衣幡影空中悟鈴語迦音靜裏諧留詠自從停翠蓋題名誰敢汚丹崕皇情祗為能虛佇悟得清暉處處皆臣鄒一桂筆底烟霞亦放懷何如日夕望山佳巗花綻解迎鑾笑山鳥啼如度曲諧好訂秋蟾穿古樹定知夏瀑響層崕睿情愜處人同樂和煦春風萬物皆恭和御製春曉元韻臣錢陳羣林秀尚依巗禽聲已喧谷殘月挂微暉晴窗延清淑泉脉流清音花香散餘馥櫪馬思飛騰逰蜂自追逐愛吟續新編出沐試春服依然問夜心農功籌巳熟恭和御製天成寺元韻臣錢陳羣逶迤復嶂與重泉萬壑松聲灑靜便山水有緣皆本性虛空無礙是真禪翠屏亂叠輕隂裏素練髙懸落照前俯仰此中觀化始心逰太古獨超然臣鄒一桂天遣垂虹掛作泉更留盤石坐人便平分逺岫雙蛾翠獨立孤峰一指禪麀伏自來經座側鴿馴時下飯鐘前是非色相誰能辨繞澗山花爛欲然恭和御製古中盤放歌元韻臣錢陳羣乘籋雲盤之阻芝蓋童童皇之所青溝亂石不可煮皇攬轡兮為少佇回鸞舞鶴翺翔歸昌赤文緑檢羲軒柏蒼雲英粲粲潤且芳檀波伊蒲瓔珞裝何必空同逰乃叩廣成道不到中盤中那識中盤好石如插笏樹懸崕鳥語花香皆絶倒噫吁欷登古盤思無極惟天聰明惟聖則方行天下百神職呵護法駕奉驅役用能丕冒千萬億惟千萬億含生負性莫不咸若而各得臣鄒一桂慿危陟險通修阻攝衣更上疑無所石將墜兮猶懸雲欲飛兮仍佇豁然開昌天青壁蒼萬篸抽碧千芝布芳狂崿搆虛而怒挺巢宇貼翠而幽裝平時虎跡來鳥道為有鸞鳴百花好奔騰之水落中盤上盤浸影天光倒癡翁到此應取則筆筆斧皴神丁役雨來未許作全圗略貌山形梗概得恭和御製題鄒一桂盤山圗元韻臣鄒一桂大鈞播物開洪濛艮方斫壁差雷同三盤凸竅神斧工中膚外骨精氣通泉縈峰繞不可窮琳宫寶剎羅禪宗怒虎踞石龍拏松雲物變幻隂晴中此圗繪出卷阿風矢詩賡和追前蹤恭和御製初自田盤西谷取道達靜寄山莊元韻乾隆癸酉臣介福層巒髙處宿雲棲路轉三盤勢更西怪石迎人為俯仰叢枝夾道欲低迷馬從熟徑來新徑詩是初題異舊題試上定光髙處望蒼茫始覺萬峰低臣觀保靉靆雲光傍石棲巉巗磴道嶺東西人家依巘炊烟合蓮社凌虛樹影迷到處秋容皆畫稿盈眸山色總詩題玉鞭遙指離宫近舉目丹霄尺五低臣秦蕙田名山别館足幽棲宸蹕來逰至自西嶺路微茫雲際辨巗扉杳靄樹邉迷松枝偃蓋張新徑石壁磨崕拂舊題最是蹊間清絶處泉聲隨馬度髙低臣雙慶巉巗路迥接幽棲緩轡登臨日未西山石迎人成兀突野雲著樹轉凄迷叢林地僻留僧住别苑秋深待御題百尺虬松千尺瀑漫空蒼雪落簷低臣國柱危崕惟有鶴巢棲石路初開塔影西落葉滿山風自掃流雲繞樹鳥應迷盤中迥異人間世壁上新鐫御筆題掛月峰頭還躡景烟霞坐攬四天低恭和御製登雲罩定光塔元韻臣介福馬頭路入叢山裏盤屈千松萬松底聳身忽達衆山巔所欲攀躋未止此卓立浮圖巳現前振䇿登臨隨步履山容帶雨改舊觀佳處在茲還在彼依岫閒雲作片飛滃然嵐氣尤襂纚有定之山無定雲變幻峰巒藏岌㠖空中色相匪可摹俯仰不測類爾爾聖人遇物元無心覆蓋萬象無自起揮毫即境有餘思侍臣羣識天顔喜臣觀保誰藏舍利浮圗裏絶頂時看雲在底田盤聳峙帝京東仰之彌髙疇過此紆回磴道蟠層層躡險探幽慿杖履我皇䇿馬御天風取徑雙峰始陟彼山靈望幸呈竒觀郁郁紛紛光颯纚往來舒卷無常形為陵為谷驚﨑㠖須臾變幻萬千端藉非神力那能爾羲和整轡陽烏騰歸岫何須大風起突兀金輪現佛光宸懷靜寄生歡喜臣德保摩空絶頂層霄裏太行碣石落眼底上盤惟有茲峰峻俯視一切允推此尋常邱壑漫爭竒上下峰連如戴履崒嵂浮圗縹眇間登臨勝概無逾彼宸逰芝蓋穿雲行法界香幡隱飄纚髙處天風下泬寥回瞰重岡失岌㠖蘿磴花宫象外懸神功締構如斯爾真覺呼吸逼青天心空境寂鈴聲起林端微雨散重巗山靈預識天顔喜臣雙慶攬勝千峰萬峰裏清泉紅樹供眼底古盤絶頂矗浮圗欲窮幽異必登此秋深崕石倍蒼翠初地先聞親玉履山靈龍象皆獻竒聖皇眺賞超凡彼香風花雨散繽紛嵐氣巗光垂颯纚妙悟由來色相無不分坦迤與﨑㠖雲罩之名信未虛卷舒晴晦須臾爾蹕路回看塔自如幻形依舊摩空起臨風得意發髙吟揮毫想見天顔喜臣奉寬遙看山隱朝烟裏行盡長堤山麓底馬蹄步步踏層巒翹首仰攀忽至此自卑登髙心爽然勝境舊遊今復履四圍蒼翠咸俯視塔影崇嶐岸之彼拾級臨觀興有餘濕雲片片殊襂纚山容乍作雨氣䝉劃斷雲腰逶岌㠖山耶雲耶兩不測造物變幻聊爾爾野鳥歸飛倦入林林外炊烟一絲起天翰髙題雲罩詩皇情恱豫羣臣喜臣國柱竒峰突起烟霄裏衆山俯視沉雲底定光乃更踞其巔秋毫神妙無踰此盤山山髙不可極佳日春秋紛杖履聖皇攬勝足幽興拾級登峰徑造彼是日凝隂秋氣凄石骨蒼寒風纚纚㟏岈幽茂復玲瓏峭削巃嵸更崜嶬蒼茫萬象但一氣九㸃齊州真爾爾不見丹黃變滅中惟看逺近秋雲起針鋒粟顆成幻相澄觀聊復隨禪喜恭和御製駐蹕靜寄山莊元韻臣介福山莊髙敞倚岑峨侍從鑾輿一再過緑染松鱗紅葉出青搖石骨白雲多秋容未减山中色佳氣偏於雨後和遙望石林精舍外舊題宸藻滿巗阿臣觀保天開巗館倚􅜤峨攬勝今邀翠輦過瑞靄每從空外合慈雲常向苑邉多千村皥皥歸元化萬類熙熙飲太和扈從欣逢陽月好小春協氣遍山阿臣秦蕙田中天華闕冠嵯峨曲塢雲深翠輦過山色溪光行處足松濤水樂靜中多自然巗壑因天設宛爾幽岐覩俗和泮奐優遊聖人事梧桐萋菶愧陽阿臣德保重檐飛宇靣嵯峨勝地常延鳳輦過石牖開時松影亂雲窗近處水聲多金根駐蹕勤民事寶幄裁詩藴太和留得山光邀睿賞晴空佳氣遍巗阿臣雙慶層巒聳翠勢巍峨玉蹕端宜勝地過快意林泉塵迹少宜人花鳥化機多畫圗景接秋光迥茗鼎烟含雲氣和臨幸年來邀睿賞行看歌詠遍巗阿臣奉寬田盤峰影碧嵯峨天外閒雲逐鴈過仙館停鑾心倍豁名山侍輦興偏多霜深澗壑楓林赤香滿田原土脉和最是山靈邀睿賞霏霏細雨潤巗阿臣國柱田盤秀色逺嵯峨法駕行秋暫此過吳蜀山川應不啻荆關筆墨得無多泉飛銀瀑吟天籟風起松濤鼓太和碧殿朱旗映巗壑林霏斜日隱山阿恭和御製池上居元韻臣介福一泓真擬智仁