body:
  text: 藝文四詩於北平作唐太宗翠野駐戎軒盧龍轉征斾遥山麗如綺長流縈似帶海氣百重樓巗松千丈葢一作三尺大兹焉可游賞何必襄城外擬古詩晉陶潛辭家夙嚴駕當徃志一作至無終問君今何行非商復非戎聞有田子春一作泰節義為士雄斯人久巳死鄉里習其風生有髙士名既没傳無窮不學狂馳子直在百年中同吕貟外酬田著作幕門軍西宿盤山秋夜作唐髙適磧路天巳秋邊城夜應永遥傳戎旅作已報闗山冷上將頓盤阪諸軍徧泉井綢繆閫外書慷慨幕中請能使勲業髙動令氛霧屏逺途能自致短步終難騁羽翮時一看窮愁始三省人生感然諾何啻若形影白髪知苦心陽春見佳境星河連塞絡刁斗兼山靜憶君霜露時使我空引領答平禪師宋張商英吐舌耳聾君已曉搥胸祗得哭蒼天盤山㑹裏翻觔斗到此方知普化顛盤山招隠詩金劉迎谿山不難買所費千金儲不如數峰雲朝昏對吾廬交游豈無人轉盼傷離居不如吾兄弟相應如笙竽左侯薊名族温温器璠璵身雖市朝寄心與功名疎伯也亦可人文華炳於菟風神聳魁偉襟韻含冲虚平生一片心緣塵不闗渠相期有幽事嵗晚山林俱綵服照黄冠歡呼奉親輿大婦侍巾帨中婦供庖厨諸孫戯膝前翩然鳯將雛朝采南澗芹暮漉西溪魚煙霞入杖屨風月來窗疏觀竹上巢雲禮佛登香爐紅龍雪浪涌白墖蒼煙孤氷絃寫天籟茶甌泛雲腴快哉天下樂俯仰餘何須正恐左太冲招隠昔所無盤山招隠圖閻長言畫出中盤望隠歸鳴珂朝馬尚遲遲賦詩未敢輕相誚卻恐吾山也勒移盤居李氏元馬祖常京塵敝盡洛生貂髙隠盤居獨寂寥李愿固充唐士貴黄公還受漢家招山中白石飢來煮爐裏丹砂靜後燒夜讀五經同異處更嫌秋樹響風飇游盤山寺明薛瑄秋髙游古寺俯仰興悠悠塵土禪燈暗龍蛇畫壁幽草深埋古砌天濶蔽層丘欲問無生滅寒泉晝夜流登盤山儲瓘遠望遥岑散馬羣亂泉激石響穿雲萬山髙向層霄挿一水衺從兩寺分啄朩鳥飛平地見飯僧人語半空聞紫茰黄菊兼紅葉爛醉西風對落曛山居詩唐順之搶榆徙海鵬鳩笑續短截長鳬鶴悲山翁未解嵇生癖垢面蓬頭也自宜九日戚都督招集盤山寺劉應節祇林樓閣倚嵯峨風雨重陽載酒過絶塞山盤滄海盡九天秋入太行多出車今見周方叔題柱從聞漢伏波忽報羽書思猛士凭髙同和大風歌登盤山絶頂戚繼光霜角一聲草木哀雲頭對起石門開朔風邊酒不成醉落葉歸鴉無數來但使雕戈銷殺氣不妨白髪老邊才勒名峰上吾誰與故李將軍舞劍臺漁陽道中望盤山因寄于户部覺甫盧雍十年見説盤山勝馬上今看紫翠重乗興便須凌絶頂題名還擬記行蹤雲間可辨層層路風過時聞隠隠鐘東道相逢誰是主松間擕酒待司農偕覺甫登中盤有約尋山作勝游路回虚谷轉深幽塵纓聊向清泉濯詩句還從峭壁留隔崦疎鐘初落日懸厓老樹幾經秋煙霞肯許移家住願疏君王乞早休又次楊秉節韻林迴路轉失西東峰秀遙看面面同薄暮殘鐘催海月中宵清梵雜松風顛巗攀陟窮人力怪石安排屬畫工望望蓬萊渾不逺仙家時有鶴書通夜宿中峰次趙叔鳴壁間韻山房夜宿起徐徐物外身心巳泊如竹榻偶陪禪客語石圅還覔異人書雲林虚寂塵凡逺野服逍遙禮法疎莫訝登臨當嵗晚東風正是發生初次儲柴墟壁間韻亂石離離虎豹羣峰頭不雨亦生雲百千萬折路猶險上下中盤界自分歴陟豈辭窮日力竒觀真過徃時聞何當雪月看佳色尤勝朝霞與夕曛又次覺甫韻山前雞犬自成村山頂禪房不閉門游客欲隨僧共隠古松應與石常存行逢峻嶺還停騎坐看清流自洗樽煩惱欲除除未得塵中醉夢日昏昏何燕泉太僕嘗登是山僅及中盤而止因次柴墟韻奉寄鳳翅石龍巗俱在上盤何郎游興止中峰絶頂何緣一寄蹤短句多應被山惱長林光巳著雲封未看竒石如翔鳳豈識孤巗有卧龍他日可能追勝賞還須補屐逺相從中盤東麓有石壁竒峭上刻紅龍池水四時不涸脩篁古木掩映其間行過中盤再計程紅龍池水四時清疎篁自傍幽巗出古樹偏當絶澗横老衲休糧如有病好山與世本無情輿臺莫喝松間道險語先教鬼魅驚坐藏經閣遺址望絶頂邈不可即未從仙客借飇車絶頂遥看路轉賖廢閣有基荒草莽斷碑無字委塵沙也知此地堪逃世猶悔當年不出家見説開山僧悟道白猨時獻洞前花偶於敗葉間搜得斷碑四片剔蘚合而讀之有元人棲雲王楨題上方蘭若詩因次其韻石路轉復轉雲林深更深前峰團紫葢上刹布黄金苔蝕殘碑字風傳清磬音悠然坐終日銷盡利名心下山口占登臨力巳倦下嶺復盤迴好景看不足幽期許再來搜竒得古刻擇勝了餘盃欲去還留戀斜陽故故催和盧師邵望盤山王玹行臺胸次饒丘壑暇日尋幽不厭重煙樹每勞瞻望眼雲山多記去來蹤情髙孤嶺清秋月興逐叢林暮夜鐘問俗偶來成逺眺題詩到處寓憂農同于覺甫游盤山上方寺夜坐聯鑣不愧謝安游雲淡林巒景色幽飛鳥一聲山寺靜傍崕千樹曉雲留松花繞澗僧供茗竹葉盈壺客醉秋佳景幾人能共賞西風塵事總休休又有客促命駕乗興入山游野鶴迎人舞寒泉繞寺流老松蟠怪石落葉走空溝愛此忘歸去斜陽不暫留同楊秉節游上方寺于達真石磴巉巗恣逺游上方樓閣迥清幽雲山不逐髙僧没殿宇還為豪客留小徑黄花驚晚節深林紅葉動髙秋空堂坐共無生話悟卻塵緣萬事休坐看青煙上碧林空山氣候曉陰森哀猿夜聴禪僧偈好鳥時同游客吟惜景捫蘿登逺岫尋詩倚杖望遙岑諸峰尚有登臨處倦倚寒厓力不任同盧侍御游盤山小徑何堪引使車漁陽城外路非賖登餘峻嶺迷深谷落盡寒泉見淺沙寺近雲霄惟鳥道峰含煙火即仙家眀春凖作重游計擬上寒厓覔早花縱馬看山不計程殘冬煙火望來清泉聲落澗鳴還咽石磴攀雲縱復横白鶴階前如有約蒼松厓畔似含情追隨杖履題新句淺俗能勞過客驚輕輿小隊度荒村來扣禪僧月下門老樹槎􅒎枝巳盡殘碑剝落字猶存閒瞻素壁多留句共笑烏臺一倒樽欲徧諸峰最髙頂不堪斜日易黄昏奉和楊廉峰侍御暮春薊門校士畢同劉大夫子兵憲讌集中盤寺蛇盤山勢與天通虎踞幽燕今古雄不斷浮雲來薊北相邀春月上灤東清池波動桃花水細路風嘶御史驄自昔漁陽兵馬地幾多休暇坐論空答謝茂秦游盤山李攀龍愛爾躋攀處竒蹤滿報章山盤元氣出寺抱翠微藏拂石搖天影披花帶雨香千峰回白首萬壑步青霜鼓角闗榆墮旌旂塞草長陰風來大漠秋日下漁陽海色秦城外邊聲漢苑旁欲因臨望代遂得紀金湯登盤山王世貞禪主空祠恒嶽回誰憐盤嶺抱燕臺層巒不盡青天去亂瀑爭雄大壑來共指丹梯安薜荔還扶蠟屐破莓苔銀河只在微茫裏欲取寒杓作酒杯登盤山絶頂謁黄龍祠謝榛薊北來游第一山上連七十二禪闗人行巨壑泉聲裏馬度層崕雲氣間石徑蕭蕭風吹冷萬折千迴臨絶頂鐘響時傳下界遙鳥飛不到諸天迥無勞漢使泛槎心揮手銀河能幾尋歴歴邊城紛螘垤明明滄海一牛涔老僧笑指煙霞外此意沉㝠誰與㑹風生平地本無因雲㸃太清猶是礙弔古踟蹰空石堂黄龍西去杳茫茫珠林不見菩提影寶墖長含舎利光壁塵拂去獨留賦下嶺回看迷曉霧放浪人間那復來月明夢繞盤山路周刺史約游盤山不果于若瀛薄暮脂征輪沙起知天風茲來限于役倉皇𤣥洲東林端立危嶂蒼翠刺霜空杳靄不可即須臾㝠雲重况有同年友守兹芳譽叢殷勤約我游未及憩微躬徒為山靈笑躑躅嵗將窮寄言探竒者幽興終來同玉田縣憶盤山泉石生平頗有興廣川東去思紛紛山程窈窕風霜外小縣蕭條虎豹羣摇落闗河詩總廢支離懷抱酒能醺曲肱此夜嵗將暮何處天開盤谷雲夜發三河望盤山不見去年望山山色蒼今年夜行天雨霜飇捲飛沙暗巗樹天垂昏霧寒星芒陰陽明晦鳥雙逝今昔行藏人獨傷别山向予弄朝色回首盤峰空渺茫盤山同朱章夫對月傅光宅登臨暫得此身閒共醉芳樽宇宙間明月一輪天萬里數聲清嘯響空山游盤山王衡塞北山河百二重太行雲氣入提封泉爭亂壑時縈馬谷響虚巗半是松紫邏煙花當九月青天雷雨入雙龍朝來䇿杖中盤寺指㸃經行第幾峰孤笻短笠乍低昂翠壁丹楓引興長片石倒懸流水路斷厓髙掩薜蘿房諸天影裏沉西界斜月林中見上方繞盡寒空不知路㝠㝠鐘磬逺相將盤山絶頂王嘉謨雲上峰巒天上浮盤盤未便是山頭西看落月依三輔南望平蕪入九州繞徑翠開煙鳥道半空紅現火龍湫荒唐無限髙危意比似人間亦可愁送陸生從軍薊門湯顯祖盤山秋影挂盧龍别道烽煙入喜峰但得轅門能拜將邊牆何用兩三重入盤山袁宏道分明真山子的的有畫意風霜勻粉丹雲霞綴錦地一皴一百仞雕鏤入空際瘦骨間青脂蒼勁有餘媚天紳林頂垂仙蘂披襠被虯松百萬株黏石無根蒂峰峰有活石石石挾仙氣一石置一山一山一㸃翠散作諸巒巗分身可千計盤山頂摩天抽碧篸俯不見鳥背西日照墖輪影落重邊外峨髻瘦仙人玉冠蒼水佩貌古骨竒清見者肅而拜浮空日嬲雲足低呈光怪或聚或紛披或舞或澎湃千里聴風鈴飛花落遙塞一萍一青山一㸃一人界登盤山袁中道徧山難穏石數步即鳴泉絶壁有心仄野花無意妍笻前時著蘚衲破不藏煙若遂搜尋遍僧居畢此年盤山道中朱之蕃盤山盤泉盤厓壁百折猶難望嶺頭鳥樂菁林山果熟客停飛斾野雲流綠陰遮屋渾忘暑白叟歌田不解愁極目雄闗環帝闕可知竒奥在并幽送聶章羽游盤山劉榮嗣同有看山約妒君偶能遂逺樹漸有色暖日生巒翠相送出薊門我心先君至山即如朋友游亦有投契人跡所不經别具道眼視或當逢靜者一叩神仙事奉陪中丞楊公登盤山孫應元五原賓從逐髙軒山寺憑虚敞法筵空界雲霞瞻色相上方鐘鼓隔人天慧燈夜滿菩提樹菡萏晴開太液蓮勝地登臨能幾見塞垣烽火正無煙盤谷招游夏朩清天風呼雨過蓬瀛山藏蝀宇乾坤氣峽湧龍濤日月明飲折荷筒催彩筆歌翻紈扇浥金莖遲回好祝山靈䕶琪樹𤣥猿莫漫驚登盤山絶頂蕭應鳯聞説盤山勝當年是鬼工移將多怪石疊作一崆峒寺傍雲根聳人從鳥道通煙消闗氣紫日出海波紅萬壑爭飛瀑雙峰半倚空憑虚凌絶頂極目思無窮余從北道登絶頂沈太守襄髙㕘軍謙寜則南上中盤寺相候游覽既徧題咏頗多欲下山阻雨盤山世應少此㑹亦云稀攀陟岐林麓栖遲共翠微寺靈龍聴法谷靜鳥忘機千澗分還合孤雲去復歸選勝爭摛藻談空毎拂衣最憐山好客遣雨䕶禪扉薊州道中張永正匹馬漁陽道休嗟行路難霜林無定葉秋水有餘寒白雁飛初下眀霞落未殘盤山凝望裏煙外出層巒望盤山高承埏中盤雲氣下盤生紫葢峰髙晚獨晴安得時平解塵組白松樹底飯黄精登盤山絶頂李孔昭絶頂盤空際登臨近日華一峰隣造化四顧俯雲霞東海神仙宅西山帝子家連氛遮不見余意滿天涯山居夙昔志曠閒奮毅脱俗累日急食與眠餘若悉可巳澹極精神生隨意娱筆紙當暑卧南軒客至常不起忘謝送迎失坦然廢冠履捫心無是非何暇計譽毁白雲上岩來就我行復止好客懶貰酒清談願移晷去留皆自然交情信如水吾方學草木委形陰陽裏倘人快我真棄置同泥滓盤山天府廣記作失名唐人詩無名氏盤山髙巍峩半入青雲裏中間最上峰更向天邊起行行白石厓六月不知暑又見上方寺東鐫絶壁無名氏秋風黄葉危厓逺上盤山石磴斜君昔有言歸李愿山今無主只楞伽髙峰蔽日雲霄上古刹凌空嵗月賖倚欄老僧錫國朝盤山陳名夏藥苗猶在地山鶴不騎來吹破天門雪何人上博臺盤山宋權山水何竒絶髙秋快此行千層盤路轉萬壑暗泉爭天外懸松影雲根度鳥聲更憐紅樹色逺近向人明路入盤山書所見孫廷銓野曠煙千頃山迴黛一圍巳諳林下路懶作暑中歸急雨連滄海羣山赴薊門客懷無逺近嵐氣足朝昏山空一徑幽林外樵夫語驢跡印沙塍昨夜前村雨青嶂有劃合遙見中盤寺何處落清鐘臨風時一至石上蒼松古雲中碧寺深欲持調象力來制毒龍心憶盤山魏裔介盤山信靈異昔日我曽過流水鳴深澗竒峰矗斷阿喫茶消嵗月入定閉煙蘿莫問宗門語閒雲處處多盤山道中李霨雨餘嵐氣上征衣望裏盤山逸興飛岐路忽逢停轡問田家小犬吠柴扉登盤山作梁清標清曉發薊門盤山近在目引馬憑老僧迤邐迷磴曲山根亂石横澄泉瀉川麓古松勢虯蟠春鳥鳴灌朩窈窕開佛樓僧徒隠石屋下馬坐髙巗宛轉清陰覆俯首瞰平原蒼莽極遙矚桃李媚幽谿煙臯布新綠天風吹我裳拂拂來芳郁頓令塵慮消良覺幽懷足何事慕蓬丘采真徒僕僕徘徊不能歸長嘯振林谷盤山久識盤山勝今晨驅馬來僧攀青嶂出寺傍白雲開法相留陰壑茅堂閉舊苔心清聞午磬莫問騎頻催夙有登臨興寜辭車馬勞溪雲縈谷樹巗日醉山桃衣染煙嵐濕峰懸瀑布髙荆川曽有賦慘淡憶抽毫薊州道中聞盤山諸刹之勝不獲徃游悵然有賦聞道盤山路㡬重丹梯遥指最髙峰月明虎卧千年寺雪霽龍蟠百尺松半嶺燈寒方丈火諸天風送暮岩鐘振衣每欲探幽處初地何緣躡屐從讀盤山志有作寄青溝和尚張英我昔賦行役税駕盤山下髙峰逼塞門蒼岩横薊野黛色薄青㝠睇望彌秀冶今讀羣公詩煙霞共繪寫久知林壑佳益覺塵壒寡樹杪亂雲栖石罅飛泉灑松檜翳幽徑薜荔纒古瓦霜柿艷清秋風篁卻炎夏言念紫葢峰依然白蓮社我本邱樊人落落風塵者夙願在名山寄詩慙大雅倘許營一龕薌茅乞盈把望盤山横雲諸嶺峻東接薊門煙石色幽燕冷鐘聲古塞傳佛將燈作供僧藉果為田縱目勞延望曽無福地緣入盤山至中盤寺望絶頂諸竒勝顧念歸路不得徧游為詩寫懐陳廷敬我聞盤山七十二佛寺寺寺落花流水中古朩分徑延客入谷口徃徃聞微鐘稍喜怪石堆磊砢位置天巧煩神工飛巗百尺下澗水谿流時帶殘香紅山深日斜意惆悵車馬行色何怱怱中盤崚嶒倦登陟僧言竒絶焉能窮衛公舞劍臺最古磨厓勒石真豪雄天門中開飛鳥過巉巗削壁雙青銅絶頂墖輪照西日影落塞外隨長虹我行荒徼困鞍馬親按唐壘尋遺蹤春風血染邊花赤夜雨苔生戰骨空弩臺草木莽岑寂將軍片石青山崇此來探勝樂幽閴翻増惋歎愁心胸孤峰飄忽不可到還顧所歴煙濛濛歸途草草罷游覽他時蠟屐扶短笻懷盤山答拙公布穀響春城春山寄逺情紅泉過雨曉白鳥下煙明墖影飄長塞雲峰盡北平松門曽徃叩流浪想無生同張素存宗伯游盤山李天馥西風吹草作泉聲暖碧寒青畫裏行危徑多竒難選勝好山無限不知名頻年久負煙霞約此日聊舒薜荔情賴有燕公同志友蓮峰遙禮古先生中盤仰踞古中胸望裏香陀暮靄濃谷鳥禁寒爭向日山松染雪獨宜冬澄潭詫説乖龍伏叢薄驚看乳虎蹤聞道上方饒舎利佛燈猶在最髙峰途迷且逐野樵羣依約鐘聲隔嶺聞淺溜遶林俱赴壑低厓似堞亦生雲珠龕險壓蒼龍腹貝闕遙紆赤鳯文豈止石門多異石此中大有石將軍少陵東轉石梁斜步步泉聲激淺沙遍野重隂疑欲雪滿巗佳樹惜無花游仙徒憶青精飯倚嘯還憑綠乳茶卻念正平風雅地凄凉不復鼓摻撾尚書履疾渡溪頻濟勝輸君怯是真百疊驚泉難覔寺滿山落葉不逢人彌天虚白迷銀海湧地空青誤輭塵舞劍臺髙成獨徃倦偎翠嶂且逡巡泃陽南望接雍奴冷翠凝霄隠寺孤時物禪闗惟黍臛先賢遺砦感雞蘇奔湍怒走長紆練細瀑髙懸巧弄珠喜得闍黎同緩步指揮名勝禮文殊繫馬停輿直造巔周遭林壑望茫然題名峭壁千尋上躡足孤雲一片前峰頂翠澄嵐氣渺洞門紅蝕土花妍御風冉冉窮登眺疑近重霄尺五天古墖紅龍逼紫虚扶笻直抵逺公居空中傑閣聞仙梵天際祥雲擁御書老幹髙低皆過鳥小溪清淺亦生魚隨僧退院伊蒲饌露藿霜松頗自如振衣危磴踏雲根勝境蘢蔥草未髠半壁芙蓉遥上日一厓煙火自成村榆闗歴歴長城見霧塞濛濛大漠昏俯仰古今頻極目下方遥憩衛公墩遶麓溝塍接隴頭東來風景薊門優諸邊村落皆無雨此地人家獨有秋蒼翠滿山新月好牛羊徧野晚山稠蓮花亦擅棲雲勝卻憶朝霞故里游同洪昉思游盤山三十韻王澤宏盤山屢經過登陟蓄意久使節無停車悵望空搔首兹游慰宿願偕徃得良友新霽衝泥塗朝旭射林藪逺矚列翠屏始覺入山口是時仲春交風日况善誘繁紅花坼杏細碧葉垂栁幸攀弱蘿末畏眺絶壁後同人惜馬力舎騎坐且走百折歴山腰衆峰悉培塿巗峭松屈曲厓崩蘚深厚翠葢舞虬龍斑紋繡蝌蚪五峰聳太清嵯峨若襟肘八石環渫雲崎嶔若盤紐登頓坐霄漢延眺憑户牖下界列陰晴低檻宿牛斗􅏭嶪千丈石位置五丁手懸空屹不頽如有神靈守力疲至絶頂方廣不盈畆足畏罡風烈心悸厓壁陡朋好嘆竒絶僕御仍私詬野䔩對山僧林歌聴樵叟明星見長庚微陽漸没酉清梵震遥林素輝上崇阜萬壑號松風如聞虎鳴吼侵晨披衣坐鴻濛氣未剖雲霞倐開闔煙嵐遞紛糾幽思勝卜隣聲聞願離垢何為棄寶珠徒知矜敝帚終老栖三盤浮名復何有重入盤山至青溝迴頻年毎憶盤山勝今日重過亂石村梨栗成行圍草屋澗谿分響共泉源尋僧始涉青溝險别友迴看紫葢尊無那塵勞催我去平明衝雪到黄昏望盤山有感薊門首夏似凉秋重過盤山憶昔游疊嶂何心猶壁立孤蹤無著尚萍浮結茅擬入雙峰隠砥柱誰將八石留白首京華緣底事對人那敢説歸休寄盤山拙公王士禎聞師敷坐處地近古中盤煨芋爐灰冷懸燈雪屋寒六塵浮幻盡五字苦吟安楖栗横肩去空山問嬾殘答盤山拙公見懷一隖白雲新活計三間苑屋舊家風夜來夢踏琉璃境路指中盤更向東送宋牧仲之官通潞憶上盤山正暮春山中吟望苦逡巡而今持節京東路恰與盤山作主人謝拙公惠芝寄書巳十載見面一何遲忽有山中信來當嵗暮時欲尋清淨退更訪天人師不遇商顔叟無因茹紫芝題拙公寫真雲門像裏見春容紅杏千林一樹松何日從師聞寶鏡青溝蘭若子時鐘較盤山志竟賦寄拙老選佛場非逺青溝講席開常言行脚去何日打包來彌勒同龕處英雄舞劍臺薊門春樹裏東望興悠哉退朝雪中懷拙公東望盤山二百里年年結束負行幐偶逢金水橋頭雪忽憶梅花樹下僧鉢裏伊蒲常施鳥巗中瀑布幾成氷丈夫一事公無讓未許尋常將相能答拙老寄盤山圖三生支許最相闗未得相尋水石間應笑羼提舊居士祗從圖畫説盤山游古中盤拜觀御書留贈佛藏大師沈荃丹梯百折到中盤墖影崚嶒萬仞看石罅泉聲如玉戛庭陰松勢作龍蟠白雲深處留仙錫紫葢峰頭望翠鑾御墨淋漓霄漢上天香縹緲䕶栴檀又贈佛公門外千峰共一峰禪闗白日雨花重虎谿欲别還相問蓮社他年許暫容盤山詩六首宋犖冒雨訪名山既至雨忽霽巉巗盡刻露歸雲曉溶㵝五峰互低昂青翠落幽薊初途得感化碑紀保大嵗法像最凄凉遺構荆榛翳旭日照山椒石磴盤天際嘉游方自兹小向精廬憩發興窮林巒賴此孤笻拄威紆循澗濱曲折穿山隖礧礧亂石堆逺近無􅊏土時見巗穴中幾㸃桃含雨路旁晾甲石上有清泉吐遺跡恐荒唐姑聴樵夫語行經少林寺宗風𬗟初祖咫尺望中盤對啟青蓮宇微聞仙梵幽寂歴日停午墖院近可尋池愛紅龍古誰從峭壁間貌得錢塘怒想像香臺側震蕩風雷鼓淹留酌澄碧游鯈粲可數當春雄雉鳴似應丁丁斧髙矚凌晴空遥探偕法侣舒嘯振樷薄寜畏豺與虎兹山最佳處實維古中盤幽磴幾登頓怪石驚㠝岏或如屋宇疊或如象馬攅或拱如野叟或矯如翔鸞花宫忽仰覿琅璫響雲端精舎連邃洞詰曲施朱欄突兀五松樹正蔭説法壇長風一披拂白晝濤聲寒道人南國秀十載此盤桓至尊昔臨幸宸翰留層巒昭回倬雲漢豐碑宜雕剜皇矣聖人作欲和良獨難萱芽芼作蔬松花采作餅一飽不願餘衺陽掛西嶺左踏屋角梯萬松如列屏嵯峨紫葢峰望去不見頂石窟千年樹幹作三尺挺撫之詎忍去長歌扣其癭右尋談經石陂陀更幽迥虯枝少拘束老此無人境有句不能道嗟如喉有鯁嚶嚶谷鳥鳴徘徊步清影天外九華髙直擬驂螭騁空山正寂寥何處人語響遥見故人來臨風披鶴氅洪厓許拍肩一笑穿雲上聊啜僧厨粥旋策山隅杖看松訝作龍拜石呼為丈願結煙霞隣拾此栗與橡嗟余王事迫返駕意悵惘絶頂舎利墖崪嵂不得徃佛牙走樵牧聖燈驚魍魎勝跡匪自今逺望但合掌其餘栖隠地一一託遐想寄語青溝僧終期共幽賞朝望白雲來暮移青松歸石徑屢延佇余情實依依返景帶山杏夕磬響岩扉弄泉聊盥潄寒色上人衣道逢八十翁談笑共忘機此中事事佳豈獨娱清暉退尋入村舎燈下蝙蝠飛賦詩興不淺濁酒杯堪揮五更望殘月流光破煙扉倚馬語僮僕我心仍翠微秋日望盤山用黄山谷韻隨蝶作馬牛兒女鎖房闥朝來稍蕭散快值凉秋月庭槐垂陰濃不厭蟬響聒蔬畦聊支笻曠望𣺌城闕盤山排空來千巗迥秀發浩然游興生輒欲著布襪五峰儼芙蕖青蒼樹如髪徃者此林巒卧雲得怡悦栖遲古中盤飽餐僧厨蕨髙吟答松濤㟁幘擊銅鉢連篇鏤肝腎誰能狀毫末還經晾甲石愛聴泉活活今我莅此邦一俗直到骨吏事有程期曽不失圭撮埋頭簿書間風騷謝鞭撻何期行藥餘忽覿煙巒窟妙句佇英游庻無三獻刖薄宦雖漫爾終愧厠簪笏他時紫葢巔長歌采野葛藍谿道上憶盤山楸峪看雲過温泉策馬還依然趨潞水無計入盤山夢穏風濤外愁添簿領間新詩如束筍燈下手頻刪重游盤山七首盤山如盤龍舊名為四正幽燕之奥區百里勢竒横五峰插碧天羣岫如奔命我行越薊丘曠望迥生敬趨途隨山樵短策喜孤勁千像凌晨經樹石莽疎映矮墖儼衆僧導客來相競靈椿學虯松法界殊清淨澤鉢失淪漪摇石具情性登攀忘渇饑亦未暇吟詠俯首紫葢峰㑹當持其柄去去遵山麓谿谷何威遲芒鞵鬭石齒竚立宜輕颸天香穿老屋零落餘罘罳艾而張網羅禍機嗟虞師盤泉響珮環隔嶺聴愈竒既至得舊觀太息水之涯照影驚皴面仍不改漣洏中盤白墖院少林紅龍池停屐還振䇿胸巳無險巇山心探初地天藻仰穹碑道人知我來為我埽茅茨松石知我來為我發幽姿所恨春尚早杏萼閟華滋經壇沙淹汨東崦榛還披月明嘯髙閣願與山靈期萬壑激松濤空山黯將夕失道困䝉茸蒼耳時一摘谽谺勢搏人卻步憐局蹐稍循迮徑迂未怕層巒隔人語驚栖禽老鸛聲格格聞鐘投寶坊片月簷際白登臺撫長松天畔留㟁幘隣僧邂逅逢茶話意良適河漢手可摩猿挂看林隙靈境清心魂欲卧不安席頭陀催閉目云有虎行跡游山如噉蔗佳處得以漸崪嵂挂月峰磴道一何險孤墖入雲汀殿閣聳巗厂探竒並鳥飛耳畔罡風颭積雪明皚皚晴靄閒冉冉幽磵藏上方禪扉日夕掩老僧雖屢邀未去同回剡捫籐勞抗尻狂嘯等驚魘嶺脊得少休聖燈想光閃佛牙禮金棺捧視意還歉盈盤薦棗梨地僻僧厨儉嗟余擕㓜來非向金仙諂愛作八極游齊煙看九㸃昔余吟五字幽賞企青溝凌風越西嶺䦨入麋鹿游谷口訪邃洞門閉巨石留何時名將軍古蘚纒兜鍪異鳥靜相語聲比山呼優松䑕竄䆗窱豎尾招其儔顧盼出叢薄花宫臨荒陬苑屋八九間彈琴藏湯休新詩感祭酒奚啻珊瑚鈎黄精潤齒頰名畫清人眸幾年輯山志徃牒窮㝠搜遺世幸同調矢口談莊周誰謂白蓮社髙風獨千秋游興動枯禪偕我登疊嶂煙嵐清㝠濛斷續來樵唱幽處衛公庵松石訝殊狀位置造物工左右恍揖讓﨑嶇到寺門劍臺屹相向纔聆梵放幽旋策登髙杖嶄絶苔壁横徐緣石脈上篝火尋題名畫腹辨字様新月正如舟散髪一疎放人生螘旋磨今夕愜微尚四山響朩魚清切聞法藏風起海雲鋪從師聞真妄曉起問歸路天城經山隅如行鉄堂峽石氣侵肌膚嘉果不知數遑復問槐榆林端響啄朩顔色憐衣襦幾日夭桃開想見絶代姝峭壁壓臺殿詎與屏風殊松篁紛㸃綴摩詰當能圖涓涓山腳泉一寺皆沾濡折松作麈尾酌泉佇銅壺歸示華亭客定恨不並驅簿書行委坐楖栗何時扶答拙菴白雲流滿地黄葉向空飄似此道人句寜殊叢桂招聞鐘眠佛閣隨鹿過谿橋何限曽游處分明入夢遙欽定盤山志巻十三
