body:
  text: 方外二元祥邁字如意悟證出羣辯才無礙至元中奉皇帝敕撰辯譌録五巻附蔵流通圜悟賑不知何許人得法東山本無元公孤藤隻鉢至盤山修報國寺延祐五年戊午聞於朝賜號契宗禪師雲威號巢雲太谷侯氏子幼業儒有名譽及壯下髮㕘玉山達公承印證出住盤山法興寺圓讓北少林寺雲威禪師塔記李肇國史補曰崔趙公問徑山法指月録作道欽道人弟子出家得否欽曰出家乃大丈夫事非將相所能為也趙公歎賞其言余謂抗力雪霜平步雲霄興丈夫事鄙將相為威公禪師斯其人也原其里河東太谷戴邨人雲威名也侯其姓也幼業儒髙才博識有令譽方壯嵗一旦棄家舍業下髮被褐習最上乘了第一義工丐農賈不以為辱師範人天不以為榮嘗同羣公長老謹弟子禮朋遊講肆慧辯出倫聞玉山博達公講席之盛走謁依之為入室之列俾主堂司怡懲海衆光弼叢林有雲峰悦之規度中統間都總統少林大宗師事屆玉山一語相得驛負之燕一居萬壽職主藥蔵雖修鬻冗擾無日不㕘鉗錘日久重膺子印是時盤山法興虚席命師立僧接武明年新巢雲軒仍以巢雲自號宣政院使脱公為之外護具奏朝廷特旨慰祐更法興為北少林寺師嘗謂脱公曰知人惟難人實難知知其難者千中無一師開法主席居止無怠檀門徳仰寺政謹嚴至正戊子秋八月二十三日以微疾告終小師智感賫師行實乞余記余曰師之徳行學業家知户曉豈待余文哉牢辭弗果因直述之至正九年已丑四月日幸安初至靈石山參達光二老有得後謁本無元公於海山䝉付囑入滅偈曰昔年廓下萬縁空脱體忘依絶照功罷釣収絲歸去後桂輪孤朗任西東塔甘泉寺西永暉河間史邨人姓史氏禮幸安和尚出家升雲孫之堂又造木菴之室後出世住甘泉寺賜號圓照大師至正十四年甲午入滅有偈曰吾壽七十七今朝萬事畢推倒人我山十寸元一尺明理臨潼藺店王氏子依永暉和尚落髮謁寒翠滿公不契而去時西府慧公住真覺師往參承頓徹向上機鋒迅利慧曰今日得箇金毛獅子遂以衣拂付之奉旨住甘泉普濟寺後示寂説偈曰挂錫甘泉三十年殷勤常住似頭然而今撤手燕山外雲散長空月自圓時至正二十七年丁未田謙明理禪師塔銘者箇禪師真純道業秦地降生燕山示滅一㸃靈光大千照徹法嗣甘泉宗承先哲洞嶺法源嵩巗正訣水映長天蘆花帶雪皓月澄澄清風烈烈無縫塔成光明皎潔妙工其何大巧若拙一時拂卻更無可説明祖能字藴空號松軒道人三河孫氏子生於永樂壬午四月六日幼惡葷羶或戲以肉但合掌而巳九嵗出家師香林如菴翁後住京師依可堂善公又至汴洛香山禮洞宗二十一代天龍潭公傳付心法仍還香林重新殿宇後退居白巖自號白巖叟不與縉紳貴遊者交獨與太守姚公叔謙善一日謙往謁至峻峽步入石齒齧足躓而毁肩了無愠色師平生事恬退以道自任成化丙戌十月二十日示寂歸葬本寺西北隅可堂公骨塔東側徳聚號寶峰姓趙氏金陵人祖謫戍玉田為玉田人童丱時常於空中見樓閣隠隠之狀後於盤山少林寺出家㕘大雲興公正統丁已詣吳下具戒庚申回都内監劉公順捨私宅為梵刹英廟賜名法華命師主之天順壬午復上盤山修感化寺工竣聞於朝賜名廣濟成化已丑仍歸少林老焉柯濳寶峰徳聚禪師行實碑記禪師名徳聚號寶峰俗姓趙金陵世家祖謫戍順天府之玉田遂為玉田人永樂癸巳母夢黄光彌户遂生禪師人多異之及長有老衲見而指之曰此兒骨相不凡將來光大法門享安樂福未可限也甫五嵗時嘗於空中見樓閣隠隠之狀及十嵗父母捨送薊之盤山少林寺出家從母舅隨公宣徳戊申聞僧録右街大雲興公邃於道宣廟寵渥極盛璽書褒奬名重天下往師之參究公案講求宗㫖夙夜孜孜服勞不懈正統丁巳飛錫吳下受戒具而還庚申御馬監太監劉公順以私第請為梵刹英廟賜名法華命禪師主之禪師即以修舉為已任攻苦毄淡竭力為之不出堂室不謁權貴而殿堂廊廡煥然完具由是法益振教益流譽望益隆學徒益盛而老衲之言於斯始驗矣天順壬午遊盤山慨然歎曰吾少時於此往還今巳踰半百矣況感化為魏晉古刹燬於兵燹久不能復吾徒録録於世而無益於教也乃捐已資兼募衆縁以圖興建三年而崇臺廣殿巋焉煥焉庖湢廩庾髙明宏麗像設莊嚴咸臻精妙漁陽之人莫不舉手加額以為神助事聞於上賜名廣濟命同師弟白巖森禪師主之成化已丑復愛少林谿澗縈迴峰巒秀麗實早年發躬之地不忍忘其本源悉倒橐傾囊修其敝廓其規東作觀音堂西作明月堂中作方丈左右僧舍以備游憩旁因龍池作竹塢蔬圃以俟優老誠一方之壯觀也其徒文擴等求紀禪師之行勒石垂後嗟夫禪師瑰瑋踔絶刻厲勤篤通東魯之書傳西來之意縉紳大夫鉅緇老衲咸禮重之又能不忘其本汲汲致力於所發身之地其立志用意可謂宏且確矣宜乎起人之敬而成功之逺故余不徒紀其精修之行而又書其興作之盛以昭示後人成化八年辛夘十一月圓成平谷大王務黄氏子未出家時夢中見盤山聖境遶塔禮像合掌念佛後投金臺大慈恩寺落髮㕘大虗滿公立限三年脇不沾席尋受春谷苑公印證賜字大舟付一偈曰妙髙峰頂無根木刋作澄潭般若舟運轉往來生死海肯停櫓棹住中流𢎞治十七年至盤山絶頂大作佛事祖允字性空薊州吳氏子生有手疾七嵗不能語父母許出家禮靈隠勝公為師甫及寺見勝即語衆異之命名薙髮精勤進修勝公歾膺住持有年一日謂衆曰老僧與爾長别矣各守清規勿流庸下聴吾偈曰吾年七十本來無物末後一著青天白日偈畢而逝常慧字古燈未詳氏族住西甘澗淨土菴不事誦讀日惟危坐一榻人與之錢即辭大司馬劉公召與語心甚奇之贈以鏹帛卻不受萬厯戊寅十二月廿四日徧告於常所往來者曰擾勞衆信吾三日後行矣至廿七日無疾脱去享年八十徳清號憨山萬厯癸酉夏至盤山千像寺後石巗内見一隠者灰頭土面山作禮絶不顧問亦不應山知非常人亦同黙坐少頃隠者燒茶唯取一杯自飲山亦取一杯同飲飲茶竟隠者還茶具於原處端坐如故山亦如之少選隠者炊飯飯熟置坐前唯取一盌一箸自食山亦取一盌一箸同食飯罷又端坐如故山亦如之入夜隠者出巗外經行山亦隨之明日山知茶時烹茶飯時炊飯隠者同山飲啜經行亦爾如是一七隠者方問曰仁者何來山曰南方來隠者曰來此何為山曰特訪隠者隠者曰隠者面目如此别無奇特山曰進門早巳勘破了也隠者笑曰我住此巗三十餘年今日始遇一箇同風留山住山亦忘返一夜山經行忽然頂門響一聲轟如乍雷山河大地身心世界豁然頓空境非尋常歸巗中具陳所得隠者曰此色隂境耳非是本有我住此巗三十餘載除隂風雨雪夜夜經行此境但不著則不被他昧卻本有山深肯之作禮謝教一日山辭歸隠者把臂相送下山淚如噴珠入京向妙峰師述如上因縁汪司馬曰如是則吾師住山已竟山曰猶是途路邊境界耳明空字普照豐潤農家宋氏子值老僧教以修淨土業久之有得遂薙髮建圓通菴居之導人念佛依附曰衆旋為忌者所中繫獄三年事得白歸盤山卜居衛公庵未㡬奄化智朴普照大士行實碑記上人諱明空俗姓宋薊州豐潤人也明正徳十二年丁丑生稍長業農一日於田中值老僧授以念佛法門囑之曰但勿雜念即見道真自是致力不巳久之有所得遂不娶建圓通菴居之念四字彌陀導人為善指示頗多至是依附者衆或以為不利於鄉詆讕因之而起首之公府拘囹圄三載後聞於朝神宗命勘之明其無罪釋之賜清心二字札子一道聴其所止而休焉於是東歸盤山卜居衛公庵未旬日而告寂時年五十有七其徒闡本師之教人多信從遐邇老稚輻輳子來不數年開拓宏敞鐘鼓梵唄之聲六時不輟居然畿東一名刹也其孫來平恐先祖行實久而湮沒不傳乞余作塔記勒石請至再余不能辭爰即其言而序述之且係以銘曰山之青水之緑松之直棘之曲同拱衛窣堵波垂不朽此巗阿如芳字祕如宛平天橋人天啟丙寅春至盤山天成寺修古佛舍利塔感多瑞應詳載張元芳天成寺塔記至明號無暗參徧融憨山達觀於言下各有所得習靜於盤山之五盆溝者十五年後出住淨業庵徳行兼備參學者多所成就縁滿告衆説偈而逝智朴無暗律師行實碑記余嘗論夫人之情有同處而不相遭有異地而相慕焉有同時而不願見有千百年後而徒思焉於無暗大師之人之徳而深有感焉耳大師行實余以輯山志詰諸法侣詢諸耆舊頗得其梗概其孫元印乞塔銘於余余中心摇摇若有不同時之感故不獲以不文辭大師法名至明無暗其號也山西介休袁氏子生於某年月日出家千佛菴稟具五臺顯通寺初謁徧融大士次謁憨山大士山曰雖得多聞不成聖果乃指參達觀大士於三師言下各有所得天啟初入盤山五盆溝隠靜爾時魔魅甚夥師厯一十五年偶絶糧至第五日有神人見夢邦均王孝廉曰盤山五盆溝有修行人絶糧是汝師也質明孝廉見賣薪者問盤山五盆溝汝知之乎賣薪者曰知之然路險多魔魅孝廉俶裝直往寂無人聲扣門見師曰師絶糧耶曰何以知之孝廉以夢告因乞為弟子載拜乞師一言師曰平常心是道自是應孝廉請出住淨業庵闡毘尼演修多羅教時值饑嵗人多依師求度師見即允許老稚剃落者㡬千人庫無蓄租㕑中供具常豐饒學侣之來請益者巧引曲喻必悟解而後已人望之若景星慶雲光風霽月焉此方願滿他土縁興於崇禎十五年月日忽告衆曰吾不久行腳去矣衆未喻又越三日復謂門人演心曰吾去矣爾等為道自重門人乃悟倉猝哀請留末後句師曰幻身本無實真如本自然崐崘成粉碎生死不相關遂跏趺而化遺命塔全身於菴左側嗚呼大師處於此十五年中空乏坎壈至於絶糧五日不有神人見夢於孝廉卒至饑餓而死誰能知之余故重有所感焉而繫之以銘銘曰有大苾芻名曰至明行徳兼備遐邇聞聲降靈河汾出世盤嶺自西自東歴魔佛境抑以宏法抑以利生憧憧惕惕其道大行乃仰乃瞻乃精乃鋭於焉既從怛焉而逝圓窣堵波在此山阿水流風動淨業彌陀康熙三十年辛未冬月日徳意輓無暗大師詩白雲深處結精藍無限幽情祗自耽魔懾真風消幻障龍欽髙蹈徙澄潭精操不讓巗松古妙義猶如水月涵我欲詢師師已逝臨風空對薜蘿龕朗然寳坻人住林亭口之小菴根性愚鈍行止端方里人頗重之一日入盤山遇老僧授以念佛法門歸依教行之三年感内火自焚鍊身不壞若古銅鏗然有聲今供庵中智朴詩禪者舍衛歸備言邨中事有僧曰朗然根性乏聰利心心憶佛名只提六箇字誓願見彌陀晝夜無遷次堅行三載週果滿從前志智火自内燔六根光明熾頃之烟燄消端嚴良可視是非堅密身畢竟難思議末世精進幢小子勉而識腳跟下未明光隂莫虚棄須自㸃檢看生死非兒戯國朝養心耀州陳氏子謁博山無異和尚苦行力參久之乃北上遊歴燕京諸梵刹隠顯莫測居無常所順治辛丑至盤山重興法蔵寺行乾字大博達州人姓胡氏母夢神人送子入懐因而有娠生時白光彌室甫五嵗自稱和尚年十三祝髮西聖寺後入都門愍忠寺登戒復南詢參萬如微公於龍池機契乃付衣拂命北上至盤山建正法禪院上堂呵呵大笑云人人上盤山求道道在甚處箇箇向老僧覔佛佛在甚處復呵呵大笑云今曰既上來老僧與伊設箇方便若要求道向邦均路上驀直去若要覔佛向自己頂𩕳上摸取去若向老僧者裏求覔終不能得復呵呵大笑又上堂云若論佛法無處不是只是伸手拈不著開口道不著動足踏不著只許無舌人論説無手人拈提無足人履踐若也未㑹老僧更與你通箇消息卓拄杖下座又上堂云箇中一著最虚𤣥今古寥寥不變遷佛祖界中蔵不得拈來挂向碧巗前又上堂云言前薦得舉一明三句下承當拈頭作尾鐵草鞵一踏粉碎金剛圈觸著成灰直得百不減一不添猫兒睡狗子眠桑田變滄海滄海變桑田衲僧真祕訣千古許誰傳喝一喝又蔣虎臣太史請上堂云踏破從前一著不被聲色籠絡終朝蕩蕩悠悠長年灑灑落落搬運彌勒家私擺弄普化鈴鐸閙到日午三更師震聲一喝便下座僧問塵事茫茫如何識主師曰好牛不出欄僧曰出欄時如何師曰頭輕尾重居士問歴代祖師都在甚處師曰山南嶺北士曰為甚不出世師云築著磕著或問佛是大聖為甚不生中國師曰薄處先穿按師之垂手為人不存知解所以聲動王臣名飛燕薊有語録四巻見於世董誾大博禪師語録序秦漢以上窮道徳之原者惟尚儒宗晉魏而後表心性之微者每歸佛氏佛氏之教條目繁多而最勝最精無踰禪學葢禪以泯智絶縁苦參力究廓然證悟如寐忽甦其境界自爾迥别徐視未悟之人談心論道雖極精明祗成寱語故其教人也或直指或曲喻或格外提持或就中轉變或無言而可以理通或有句而難以意解或時棒喝或時機用無非欲警夫酣夢之人歸於大覺此唐宋以來諸鴻儒往往翺翔其門而不舍寧無謂哉然究厥根源則始自拈花微笑以至達摩氏遊梁歴魏化行東土由是衣傳六代燈演五宗五宗固各自樹立門庭而直捷雄偉無如臨濟初於鎮州建立黄檗宗㫖有普化克符二人成就之化之師寳積首開盤山按諸法係濟之從祖也順治丁酉大博禪師匡徒領衆斬棘披荆重興寳積道場建立臨濟宗㫖而師係濟𣲖三十二世孫本師龍池微微師天童悟悟師幻有傳𫝊師笑巗於勝國萬厯中偕徒三五人隠居燕邸寥落無聞自得傳南邁續燄分燈兒孫遂盛行於江浙今師又自南而北恢宏祖道信矣佛法之隠顯亦各有時也師之豎立法幢也實始於天津之地蔵禪院末乃應貴人之請大開爐鞴於𢎞善者凡三載先後坐道場一十四處説法十有七年葉落歸根終隠盤山其密行圓機煅聖煉凡王公尊敬士庶歸依與夫興建叢林傳續法嗣并末後遷化光明赫奕種種自有别記惟是開堂之語録尚未條貫門人超見等倣慶善之成規重為編集刪繁取要勒為四巻將以澤世余讀之喜曰此真所謂塗毒之鼓也返魂之香也無論緇之與素茍能留心於斯朝研夕究黙然契悟不獨臨濟之無位真人面目現在寶積之心月孤圓光吞萬象即吾儒修道育徳之方亦不外乎是矣百忍山東人結茅法蔵寺東偏鯁直少言笑日中作務惟勤夜則環山念佛康熙癸丑八月朔有樵子自菴門過乃召曰來爾將木椹置果樹下吾坐去矣樵子唯命遂跏趺椹上椹微小不能容趺乃命樵子以木段拄之怡然脱去樵子遽報隣菴僧僧至望之如生依法火化収骨入本寺之普同塔正眼字法蔵揚州人丁姓名自堅厭世無常去其家於港口極樂菴薙髮於五臺藴真和尚處圓具一日呈所解藴以偈示之曰佛蔵無心處法縁正眼時色空兩不住獨露一真如師聞之愈加精進數月身心輕安不可言喻後入都門時大博和尚開堂法通特往參承庚子上盤山住静丙午付法更名超正丁已住正法禪院上堂云大智離心識全機絶見聞金鍮容易辨煤墨最難分池隠魚吞月松藏鶴吐雲靈明元妙訣豁達便超羣超羣且止祗如靈明妙訣作麽生㑹卓拄杖云一莖眉毛重九觔又上堂云道無男女豈有僧俗物物自然頭頭具足所謂一切法不生一切法不滅若能如是解諸佛常現前豎拂子云若將者箇喚作拂子則不見諸佛若將者箇喚作諸佛則不見拂子既是相傾相奪為甚又道箇不生不滅以拂子揮一揮云有相相中蔵實相不空空裏顯真空喝一喝云寱語作麽其法語拈提例如此戊午九月聖祖駕幸此院賜扁及詩為禪林榮遇後示疾坐脱塔於正法墖院之前超見字了宗寳坻楊氏子母夢僧至其家云自南海來遂生師八嵗業儒十五嵗於諸篇章過目輒諳偶染疾父母以其前世僧也許出家病瘥於龍泉寺薙髮愍忠寺圓具聞天童雪竇二公名籍甚往謁之言下俱有得歸至都門時大博乾公開法盤山師不解包而至盤山博一見便問何處來師曰都中來博曰來為何事師曰親近和尚博曰將甚麽親近師便喝博曰落在甚處師劈胸一拳博曰是何意㫖師曰知恩報恩博曰㕘堂去即録為弟子每入室㕘請當機不讓後居盤山石窟中三載諸方聞之競請出山凡十坐道場如仁壽萬善放生等處居多洪益後復上盤山住古中盤上堂云盤山有一話頭徧滿四大部洲若將佛法商量猶是認影迷頭心外無法法外無心隨縁且度日到岸不迷津㑹麽一劈華山分兩路萬年流水不知春示衆云鐵樹開花磐石長藕虚空㸃頭佛殿倒走此四句中有一句有體有用有擒有縱向者裏緇素分明許汝㕘學事畢又示衆舉拂子云若識得者箇便知釋迦不在西天仲尼不居東魯不説趙州無不道雲門普象骨解輥毬禾山㑹打鼓從前絡索都丢卻斬新條令為君數九九八十一五九四十五㑹麽鼈鼻吞毒蛇大蟲齩殺虎康熙乙丑有信官卜公請至瀋陽闡法再嵗於丁卯十月十七日示疾告衆曰廿三日大衆送老僧上盤山衆不㑹師意復説一偈住世七十有餘秋只把金圈作釣鉤願滿度生無别事佛宫魔國任優游至廿三日復索筆書偈曰卻來游幻海箇中無變改欲識本來人遂擲筆而逝依法闍維其徒函骨歸葬盤山古中盤智朴字拙菴徐州人早㕘諸方隠匡廬東西二林間最後得法青龍百愚和尚實洞宗第三十世康熙辛亥游盤山結茅青溝漸成巨刹能詩時有佳句聖祖臨幸青溝蘭若應制口占承宸翰之賜山舊無志朴以數年之力隨地搜討又得諸名流助成之雖體例未備庶㡬草創矣雲恒字法天平谷人於萬松寺剃度後居西甘澗不下山者六十餘年外朴訥而内朗徹隨機開示不妄棒喝修白業者多敬仰之李鍇法天禪師生塔銘并序法天禪師名雲恒又自號藏山漁陽平谷人九嵗薙髮盤山萬松寺年二十餘修白業於西甘澗遂不出山與盤相終始五十年彼之徒以為固不顧也師貌枯貊訥語言北僧在山木彊而巳然而妙性内明行之以真隨機開示不妄棒喝諸一切無容心焉性喜詩無事即微吟藁成輒毁之世無得而傳者芾琴一明處士李孔昭之遺也不甚工嘗撫之以寄意與廣坐中言笑無間黙則睡相對無一奇而去輒令人思以故無忤於物而古處者樂與之接云人或問之曰師何以益人曰損之乎夫何益吁易所謂弗損益之之謂乎澗東有石屏師愛之為生蔵其下同好者襄厥事而為之銘曰無身無患損盡身全蔵真兹墖享彼大年物無成毁草木在山安所樂終乃完其天天不鑿師師完自然維屏之陽日月其便乾隆三年嵗在戊午春王正月道四人元邱處機字通密登州棲霞人年十九辭親學道師重陽真君王嚞重陽既逝乃游秦隴至元壬午元太祖自奈曼遣使求之與語雪山之陽處機毎言欲一天下必在於不嗜殺乃問為治之方則以敬天愛民為本問長生久視之道則以清心寡欲為要帝深然之至燕居長春宫丙戌其徒請至盤山建醮棲雲觀其明年留頌而逝年八十詔贈號長春演道主教真人姬翼雲山集云盤山紫葢峰之下爽塏明秀號曰中盤時膺隆興崇奉道教棲霞長春真人應召來燕門下有栖雲子飛舄擇地其徒張志格等搜及此山遂營卜築丙戌請長春真人建醮因題其額曰棲雲觀王粹長春真人贊猗歟長者不可復得三朝推尊才學功徳閔此兵戈逺涉西北九九乃終世人莫測王志謹從長春真人北游燕薊徜徉乎盤山西甘澗之石龕草衣木食若將終身焉籍貫未詳姬翼字輔之髙平人遇棲雲王真人執弟子禮賜名志真號知常子自是從遊盤山所著詩文曰雲山集及周易直解道徳經總章行於世張志格亦志謹弟子籍貫未詳欽定盤山志巻九
