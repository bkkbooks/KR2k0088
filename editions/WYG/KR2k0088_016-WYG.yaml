body:
  text: 雜綴古今志乗類有志餘外紀軼事一門以廣聞見錄瓌竒盤山風氣淳朴千百載中靈幻可駭之蹟依名附類以傳者視他山為少齊諧虞初之志怪此書幸無譏焉今取畸言僻事及蹟渉疑似人可出入者入雜綴中庶幾正編所列咸歸精核而披覽者亦無罣漏之誚爾宋犖筠廊二筆盤山佛燈每於除夕見之山之雲罩寺定光佛舍利墖與薊州獨樂寺觀音閣通州孤山破塔皆有燈出互相往來漏盡各返原處好事者恒裹糧候之阮旻錫燕山紀㳺盤山異蹟有除夜佛燈燈出通州孤山墖上分為數千百逺繞盤山諸寺至定光佛塔而止或曰墖中舍利光也薊州志載獨樂寺在薊州治西南中有傑閣設大士像相傳盤山舍利墖神燈自墖而下先獨樂而後及諸佛刹云朱彛尊日下舊聞引智朴志云盤山之頂有雲罩寺相傳為寶積禪師卓錫地一名降龍庵東嶺有舍利墖中藏戒珠六十顆佛牙一具又有彌勒殿黄龍殿每嵗除夕有神燈之異智朴佛燈紀異按宇内名勝僉有佛燈如五臺九華峨嵋普陀匡廬南嶽百花山人常言之即盤山之燈人亦常見之丙辰春二月張灣居士洪應廣及二客僧夜話見燈現於山西南樹杪狀如蓮花大如車輪燄色披敷下有練光數丈摇曵而西已未八月夜將半朴出戸甫啟簾見燈大如屋起澗中紅光燄燄照衣裾作赭色召諸禪侣共相瞻望壬戌二月見燈二現於屋角東南大小各一去人僅丈許若可攀􅄃久之而沒乙丑六月廿九日晚課畢見燈現於正南方初如斗忽大如山如烟如雲倐起倐堕遍山南面作雨後霞色其光中隠隠有大悲菩薩千手相光外重光東射莫可名狀禪者瞻禮歎未曾有戊辰四月夜厲風作王子千比部見紅光團圞如車輪横空而過要知佛燈之異不止除夜時時有之即厲風暴雨隆寒溽暑之夕亦常有之但人酣眠長夜苦不自覺耳謹按朱子嘗於廬山天池院見佛燈諸生或疑其妄曰僧言則妄而此光不可誣豈地氣之盛然耶盤山之藴靈毓秀不减諸嶽精氣所聚發為榮光理固宜然釋氏好為詭異之説必欲以竺乾靈蹟實之又烏知名山勝地乃古佛過化之所慧日法炬夫且照耀大千世界不必假此區區者震人耳目也智朴四正山居志云盤山一名東五臺自來峰北臺也先師臺南臺也紫盖峰中臺也九華峰東臺也舞劒臺西臺也晾甲石為下盤古中盤為中盤雲罩寺為上盤上盤之勝以松中盤以石下盤以水又云盤山清明榖雨時萬壑青松十里紅杏天然圖畫此時煮茗磐石上看白雲聽流水相對忘言覺五千四十八巻殊饒舌也盤山四處居人每望山頂起雲便知有雨諺云盤山戴帽又蔣福山龍潭起雲縹緲不散東行數十里至黒龍潭沒山後居人僉曰白龍過潭不日有雨雲罩寺康熙三十三年甲戌六月九日夜大雨暴作巗下水涌數十丈聲如萬馬蹴蹋徹夜不休樓房傾圮殿前石壩衝去數里或云出蛟或云龍鬭也寶坻縣南郭西方庵僧永如逰盤山至天成寺求佛舍利精誠繞墖禮拜三日夜忽見舎利數顆從空而下永如持歸建塔表焉祥邁元至元辯譌錄云盤山中盤法興寺亥子年間即宋徳祐年天兵始過罕有僧人甘泉本無元公之嗣振公首居上方橡栗充食以度朝夕後有全真之徒挾邱公之力謀占中盤法興寺迺就振公假言借住振允之居既久遂規永定王道政陳知觀等拆殿宇毁佛像冒奏太后立碑改額為棲雲觀寺内有古佛舍利墖髙二百尺及正殿山門一併拆毁至乙夘後上方長老雲公碎其碑奏告今上皇帝又那摩大師少林雪庭福裕禪師朝覲䝉哥皇帝具陳其事聖㫖委付今上皇帝改正其弊仍為僧院延祐戊午九月初四日也謹按姬翼雲山志所載棲雲卜築事巳見方外邱處機條下二氏之教迭為隆替出奴入主毁譽滋多舊志又述辯譌錄云道士李志常等謀占梵刹四百八十二所叩閽庭辯詞窮為僧者一十七人道士自此寖息此尤足徵互相傾奪之習存之以志寺觀興廢之始末云蟒石東石壁峭絶有盤山古跡四篆字刻最古雅旁書帶川題三字考帶川乃金大定時人徐昌祚燕山樷録云薊州甘泉寺有蛇曰小青龍虯之属也與人馴狎時盤宿僧榻禱之能致雨智朴按甘泉寺曾未聞小青禱雨之説惟西山潭柘寺舊傳潭龍舍宅於唐華嚴祖師衍公今殿角鴟吻潭所涌也龍子青蛇服日傍僧居又秘魔巗旁有潭大如鬴覆以巨石深窅莫測即當日大小青侍盧師行雨化龍處也茲因徐氏之譌故引辯於此蔣超字虎臣金壇人順治丁亥進士一甲第三人康熙乙已㕘大博和尚於放生池一日入朝聞喝道聲豁然醒悟詣𢎞善寺呈解博問曰喝久聲消居士作麽生㑹超曰非但某甲不㑹三世諸佛到者裏也須結舌博曰不許牽耶曵娘直須親道一句超以手指衆曰今日幸有大衆證明博大笑超禮拜博以拂子偈語付之偈曰百衲禪衣酬玉帶蘇公自落箭鋒機今朝白拂親相贈祖道還凴隻手支康熙庚戌予告歸上盤山辭博尋㳺蜀峨嵋山棄世前一日題寺壁詩曰翛然猿鶴自來親老衲無端堕孽塵妄意鑊湯來避熱那從大海去翻身功名傀儡場中事妻子髑髏隊裏人只有君親恩未報生生世世祝能仁次日謂衆曰我本峨嵋老僧耳故萬里歸骨於此􅉂目而逝王士禎夾江道中寄虎臣於峨嵋伏虎寺詩云絶域相逢感髩華幾行清淚落悲笳愁中巫峽暮雲合望裏峨眉秋月衺方丈一燈誰問疾孤帆萬里客還家故人咫尺不相見夣繞平羌江水涯又輓蔣詩云西清三十載九病一遷官晚憶蛾眉好真忘蜀道難法雲晴浩蕩春雪氣髙寒萬里堪埋骨天成白玉棺葉臣遇輓蔣詩云文星一夜落峨嵋仙佛因緣有夙期莫道生天非易事再來幻跡自神竒謹按蔣虎臣蹟甚竒而參大博在京師蜕化在峨嵋伏虎寺中僅一至盤山耳列流寓傳未免牽附故録其事於此僧慧喜字心悦滿城劉氏子萬厯已夘年十六聞盤山石室中有一老宿坐禪師裹糧往謁一見便問西來祖意從何處入老宿曰汝曾讀永嘉證道歌也未師曰嘗誦之但不知㨗徑入手底工夫老宿曰不思議解脱力妙用恒沙也無極師曰不思議便是㨗徑但思議屢興打叠不下時如何老宿曰但爾還不曾㑹得不思議倘若㑹得自然解脱不用打叠也師從此信入謹按舊志載嵩山僧海寛所作喜禪師傳載法語頗詳然喜繼無言主少林入汴行化歸骨少室皆與盤山無闗故僅節録石室老宿問答一事朱彛尊日下舊聞述盤山志云黄龍祖師殿在盤山絶頂六角以象天圓地方每方各濶一丈通髙二丈九尺層檐複栱皆以甎為之建於正統十四年至成化間鑄鐘一口重二千觔覆以樓黄龍祖師銅像髙三尺餘遼碑云嵗饑偷兒入山竊祖師像至澗中重不能舉欲碎之祖師大喝響震厓谷偷兒驚散翌日仍舁上山一無所毁秀峰庵側闗忠義祠前有石碣二左碣刻不謝東君意丹青獨立名右碣刻莫嫌孤葉淡終久不彫零云是忠義一筆書康熙二年立石意是箕筆也上方寺東石壁上刻菩薩相又刻悉怛哆怛羅又刻大方廣佛華嚴經又刻若欲人了知三世一切佛應觀法界性一切惟心造字畫俱古雅摩厓嵗月無考康熙已已夏盤山埜燒四起七日夜不熄松被焚死無算寺宇􅈋舍一無燬庚午偷兒盗松無虚日辛未春三月壬辰蟲災松松死者萬計如炬燔蟲似蠶黧黒毛身長四五寸堕地能躍起尺許或云天蠶秋七月霪雨四旬死者復生如故盤山豐於石而歉於土産薄僧貧牧茲土者每加優恤前明崇禎中有豁免雜差之碑立於雙峰寺國朝康熙中有蠲免柴需之碑立於少林寺又山中多數百年古樹屢申盗伐之禁故得長此鬰蔥行宫既建兵弁昏旦巡邏深岩景色更月異而嵗不同矣山中諸古刹月有念佛㑹盖始於智朴有張元起為規約跋云分身遍刹塵只為婆心切㑹得阿彌陀一摑一掌血至今僧侣能守清規亦他所罕見也明正統時千相寺僧行明善醫眼疾凡目翳瞳眚者聞風而至咸獲瘳後裔因習其術人謂盤山眼藥以此西溪樷語云聞有田子春節義為士雄漢書劉澤傳云髙后時齊人田生㳺乏資以書干澤澤大悦之用金二百斤為田生夀田生如長安説謁者張卿諷髙后立澤為瑯琊王晉灼楚漢春秋云田生字子春王士禎曰田疇傳疇字子泰或云子春陶詩聞有田子春節義為士雄宋姚寛西溪樷語引漢書劉澤傳云云按此詩上文云當往至無終無終正田疇所居若澤傳田生乃齊人其説謁者張卿乃㳺士説客之流安得稱節義此寛好竒之過而不自知其鑿也寛字令威南宋人所著書二百巻古今同異無不該括晚始召對殿中忽感風昡而卒出處見葉正則集唐于頔相公鎮襄陽偶閲觀音經有疑一日訪紫玉山道通禪師問曰如何是黒風吹起船舫漂堕羅刹鬼國玉咄曰于頔客作漢問恁麽事作麽于公失色玉指曰者個便是黒風吹起船舫漂堕羅刹鬼國蕭九峰靈巗寺碑記作藥山李翺事譌袁宏道答陶石簣書夏月入盤山東南無此竒觀西天目當退一舍弟自去年九月巳㫁作詩偶探竒勝不免見獵耳王澤𢎞與智朴書和尚飛錫來京塵以不得相見一問近况兼悉山中風景悵然者久之承寄兩絶句此司空表聖所謂得味外味也欲即奉和而侍者告以踏雨便歸容詩成再寄和尚舉楞嚴經語云賴有不遷變者在者個誰有遷變者乎直自見與不自見耳弟前詩尚未冩來至今抱歉阮亭云屢於盤山志搜得未收詩文奉寄可稱快事弟從溧陽相國集中見盤山五言絶一首今書上溧陽當世偉人得此二十字亦不少矣王士禎與智朴書再接山中書兼讀見酬之作正如五月松風人間無價恭誦駕幸青溝紀事足為樷林千古佳話不但作此山一段公案也小刻未較正舛迕頗多承吾師一一開示深感元人文集向有數十種都未擕來京邸竹垞太史日下舊聞蒐羅甚富當無遺珠也名山記名山勝概記諸書曾一檢否兹從列朝詩集中録得盤山石刻詩一首故相國孫文定公㳺記一首絶句格詩六首祈補入乂正切凝思忽來芳訊詠詩愛黄葉秋風之句披圖擬千巗萬壑之竒便如與吾師把臂入林忘其身之在京雒也口占一詩聊供捧腹竊意此山既以田疇得名則疇生平當詳著之今簡出三國志本傳及曹孟德表一令一并水經注二條田疇論一篇以備采擇外敝同年陳説巗大司冦北鎮集中有盤山長歌一首最佳特索一本奉寄又山居之妙莫過杏花紅葉兩時都為大師占盡書來云云塵中人引領東望何異畫地作餅不可啖耶一笑承再示圖志及拾遺辯譌退食之暇反復細較數過鄙見所及輒乙其處碑版文字亦間有刪正要以馴雅為歸不識吾師以為然否爵里書法詳略或未畫一皆已改訂此畨繙閲商㩁似無遺憾矣特從敝鄉取到元好問中州集又搜得劉迎閻長言詩二首皆金源人也何鏜慎䝉二公名山記搜得李元陽舞劍臺記一篇雪夜挑燈每得古人片語隻字輒為狂喜真書生結習然亦不敢負吾師諉諈耳又山志久已訂完又搜得明人記一首金人詩二首封緘寄上而侍者適巳還山暫留篋笥今馳奉法座刻様確以十行為古雅前札巳詳之如刻成一巻先佇惠教怱怱附候動止又接手教兼得山志新刻不勝忻快刻手古雅較訂精審名山有靈大師顯㣲闡幽修此墜典雲嵐草木皆開生靣而弟亦附以不朽歡喜讃歎何可名言士大夫頗有詢此書者便中再寄數部以應其求何如近又搜得故相國李文勤公與今大宗伯張敦老盤山詩數篇録上可入補遺尊製普照上人碑文極簡質元稿附還唯付典記朱彞尊與智朴書勝逰中輟近復逐隊趨朝恐紅杏青松無緣領要山靈定攅譏竦誚矣捧讀手箋恍如覿面上方石壁詩豹斑龍甲雖殘缺亦可寶但李愿所棲迺在濟源故昌黎又謂太行之陽有盤谷也然山以盤名谷亦宜然以青溝定作盤谷正無不可不必援李愿以為重大師棲此足以千古耳又側身東望勝逰終不能果青松紅杏未免笑人不休矣忽接手䟽如領談麈深慰黄先生汝亨字貞父吾鄉錢塘人萬厯中最擅文名著有寓林集李元陽盤山記向曾見之以其不工不録也容留心覔之得則郵寄何時北來劇談以開䝉滯跂余望之髙士竒與智朴書弟性同鱗羽愛止邱壑早嬰物務未遂斯懷徒有神往名山時勞夣想疇昔兩度賜㳺簮筆悤悤未敢肆所登歴思於請休南歸時紆途入山就訪青溝與大師一話無生不意寒日束裝出彰義門遂弗獲了此夙願馬首低徊為之悵結田居五春多病閉戸無異禁足枯禪毎念盤山佳勝雖未暢逰猶喜得窺半靣山光樹色時時誇向山農畦友頃者天鑑大師過訪􅈋堂詢知大師道履冲和青溝禪院日已開闢成大道場更示山志三復讀之正見大師一畨苦心指人道路固不在語言文字中而嚴核精考體例佳善使未得身至盤山之人讀之心生歡喜敝鄉徑山天台亦是浙中名境近取閲其志鄙陋謬錯急思擲去并不知其山之佳安得大師撰述為之表彰固知山川之美必藉典籍以傳良不虚也因便問候起居小詩奉懐不堪棒喝舊逰詩記自愧未工既荷采入復徴小序謹附數言希為教削宋犖與智朴書七月下澣遞中得手書具悉法體清佳旋剪燭展山志閲之終巻簡而該核而不蕪是書之傳無疑山靈有知亦當讃歎大師功德矣弟清苦如故吾而此間事多悶悶意况殊不能佳來教云韶光宻移念念遷變要知更有不變者存足見大師婆心為鈍根人棒喝弟輩七尺幻軀正如一葉舟在大海風浪中聽其掀簸未知歸著何所恐所謂不變者亦不免流浪飄泊為可念耳何時一瓢一笠從和尚於青松白石間相對話無生耶念至􅌶然神飛矣頃撰志序一首附兩王先生後敬呈法座小刻附正即日天氣漸寒千萬為道自愛披奉窅未有期臨池邑邑謹按舊志多載往來簡牘芟薙略盡間有名流短翰有闗志乗者聊存數則於巻末盖今日蒐討漸富而經始之勤勞固不可沒耳欽定盤山志巻十六
