body:
  text: 藝文三賦游盤山賦明唐順之惟隂陽之陶治冥顛倒乎兩儀天星隕而為石駭滿山之置棋搜萬象以效珍何殊狀而相亞或藉草而羊眠諒仙術之幻詐或負嵎而虎蹲詫飲羽之神射或臲臲而欲走𩔖靈鞭之叱咤或屹立而不動豈思婦之所化既簇隊以縱橫亦纍卵而髙下紆十步而九曲迺枉矢乎石罅逮磈礧之歴盡忽拔起乎孤峰俯子孫之千億儼髙峙而稱宗倚禪宫而凝睇曠天宇之澄空向之紛紛怪石忽若懷寶而藏弓但見萬朩蓊翳而青蔥一勺之泉大旱而不竭兮人言其下潛乎蛟龍女蘿薜茘紛披而交映兮七十二寺隠見森羅乎其中疑有悲歌慨慷之士不得志而自隠與夫仙靈逸客徃來而相從欲叩之而無路兮時見一二野僧啟巗扉而鳴鐘侈佛廬之繁夥歴嵗久而不蕪饒萬樹之梨栗以衣食乎其徒何樷朩之岑鬱無一鳥之孤棲餘邊城之殺氣警羽鏃而遐躋泉觸石而鳴箏松受風而響濤時琤琮而乍噎倐悲吟而怒號憶連旬之巡歴饜金鼔之嘈嘈審聞性之不異任羣籟之相遭適戃恍而延佇忽四山之暝色謝耳目於送迎向僧齋而偃息恍夢境之如醒覺餘興之未極晨起歴乎上盤境愈竒而路愈棘方蹐躬而俯穿又縮足而仰捫驚半趾之在外愁欲度之猱猿得平柯於髙頂接雲間之飛翼山童秃而無朩響草蟲之唧唧岫逺拱而㦸森岡近繞而弧彎廼下瞰乎城郭曾不盈於一環類黄鵠之再舉見紆曲而覩圓方悲人生之局促恒豐蔀以自藏晀溟渤之南滙孑碣石之中巉轉秔稻於東吳駛萬里之雲帆笑卅鐘而石致曽不及乎凌波之艬連岡北矚天設梐枑列營分戍隔限戎虜把都打來孰敢予侮嗤熟夷之桀黠乞哨卒之餘爼雖烽火之暫虞嶷金城之永固惟山勢之既極俄湧墖之天造顯佛牙之光怪騰麗空之硨碯覽小道其若斯信精神之為寶胡俯仰而成陳忽徬徨而迴步悵中心之有違足屢卻而返顧與流泉以偕逝睠巗阿而長憶豈淹留之無心畏簡書之偪仄記游盤山舞劍臺記明李元陽嘉靖甲申有三河縣張欽者見訪談孫吳之術語次因問盤山道路渠對甚悉遂偕之行出京東一程至三河宿南禪寺明日至山之西麓時十月朢雪紛紛下急投村舎不能前逆旅主人相留十六日冒雪騎行三十里至一寺樵枯枝炊黍酌酒醉擁落葉而卧曉見日出千峰玉立銀色世界絶無纎塵心甚樂之迺舎馬策杖媻跚以躋從人引繩牽布助予之不逮路遶東北折而南見掀背如白龜者愕然凝視久之迺知其為大石也行逼石下見其地潔如埽度其中有人俯首而入則空洞如夏屋中坐一頭陀人問之不答旁無炊跡以乾餱貽之揮手不受然後知其為避穀隠淪也予因榻其次夜中捫其鼻無息撫其肌㣲煗衲衣不厚而鬢間津津有汗予謂張曰不食而能生又何求於世乎歎羨而别十八日遍訪巗壑思有若人者竟亦不見暮宿靈墖寺有十餘僧安禪見客皆起予以禪機投之應不酬問遂過草庵宿欲題名墖石凍不受墨留詩乃去上至一寺去頂不逺一老僧曝背補衲予問舞劍臺安在曰不知問僧臘幾何曰住此三十年矣予驚曰劍臺豈虛傳乎薄暮圍火不寐初旭即欲登頂莽無人跡張乃腰䥥握斧與從者二三人斬剔竟日始通一綫之逕迺得登頂頂上無土磐石徑四丈許有大字刻云唐李從簡游李靖舞劍臺葢此石即靖舞劍處也字約八寸許予亦隨攜石工鐫題有頃曰此石名白筋蝦蟆背此時凍久鐵筆不入是日千山消雪四望清瑩東指遼海在微茫之間南則泰山鄒嶧隠隠如培塿與黄河一線相為映帶西北則太行蜿蜒自雲間而下環拱京畿令人有挾羽翰游八極之意從人篝火煗酒以大觥酌予天風吹衣暝色遥至下未至寺已昏黒不辨人矣召僧問曰舞劍果有臺胡云不知曰自出家以來未嘗登頂雖有游人亦不知舞劍古蹟在也明日題詩壁間迤邐而下劍臺在望令人五步一囘首十步一消息游盤山記王衡周季良自東來急邀我游盤山曰我且出而里人武生以是贈我武生韻中人也當不誤余曰然則徃諸裝既辦而㑹余友張汝增余姑夫曹懋錫續至遂不解鞍而之盤山盤山離京師百八十里出公樂十許里而山髻見若黛染赬山頭晡乃至廣濟寺拉寺僧為導走大石澗中水泉寒沁盥濯已而後行崕西一古松頂稠結受日光若絺衣方顧而樂之從東崕得松似更竒朱題曰蒼龍迺折中盤下而觀所謂蒼龍者破石罅中出駢起而中擢怒枝南傾如渇虯之欲攫遶北而西抵環翠亭亭面山松屏之并東西崕者為三望而第其伯仲焉質明復縁石澗下三里許稍上而羣峰相拱揖又上則圍山而帶林莫可辨其隅面其一峰稍逺對松立者九華峰也峰勢峭欲摩天意氣漸上而紺宮翠邏又自下以秀色留之杖策竦然不能即行良久穿蔡氏巷西折而陟北岡長城蜿蜒界山半如綫白沙浩浩際以濃雲猛風意色慘然越數嶺倐陡下俯瞰巨谷窅然深黮百谷之縷紛出而繆聚於此又里許而為上方自盤山而至上方下下上上㡬百千折行者相望於石根朩杪有相去數程而望不盈咫者計山形殆蛇縈而瓣襲山故名盤谷當不虚抑聞太行發脈於此此其為小羊腸耶飯於上方之臺覽别巘甚勝度松棧而出皆連嶂鬱律巨石無根著磽然懸其巔仙人清無影曽巗棲焉就其前亭之曰懸石亭亭立四虚空明崇翠彎環而鬬勝余謂季良此致佳處恨無泉耳而仰視諸山壁間石膚瑩白若頽墮而下赴者迺真泉形也惋惜者久之自此上益陡絶石壁左昂而外削顧身出懸石上巳逺足趻趻自戰更百尋而至舎利塔塔標峰首其峰肩而隨焉葢盤山絶頂也疲甚解衣卧巳迺繞而捫墖巔石磴纔容足罡風横搏至厲以兩手據石坐而行歸甚悔之其西峰為無梁殿殿後稍有餘地可縱立覩層沙疊巒回曲縈抱葢盤山之外有若大盤山焉三河寶坻甘泉長城俱在望而泱漭無墟煙井陌薫日被磧上黄雲鬱然既晚下及僧寮僧數輩唄誦甚精嚴客有攜火爆來者㸃墖腰光明滿山林壑撼動僧驚顧余曰咄舎利放光矣僧不契而罷晨起飯脱粟歴長岡下石阪石齧足甚强輿而至法藏寺翠壁若扆庵前松隂恰施一庭䕃而休焉又數里雙峰墖額隠映樹樾如白鳥踏碧浪中登陟既憊對兩峰頭鼯嗁鸛坐劃然長嘯而巳是日為端陽所挈酒鎗巳空則破囊中雄黄粉糝苦酒中縮鼻而飲之自雙峰下走旱麓忽東轉望見沈碧冉冉者曰百草窪至則棗栗蘿茘羅蒼石而成紋若鱗比然正烈日中頓作朝來爽氣想自兹而東愈入薈蔚其稍下而最深者為天城寺寺當谷口巗壑肩背皆蔚藍紺綠相與因依余謂此乃山之曲室悄然殆非人間使當春泉漲興有一二龎翁少女弄鷄雛犬子於湍薄之下豈必遜桃花源耶自寺上之三里許為李靖菴又二里許為舞劍臺倦不可復陟則東走為東甘澗又西折而為西甘澗巨石縱横偃立泉澀澀附之又五六里許至先師臺而止焉臺絶無竒而自臺東視中盤近不過十里螘之附桔橰上也如登天然庸知其尚在寰中耶因相與品盤山之勝松為最泉當次之而不相遭峻則言上方舎利幽則言天城計兩日之程不下二百也且步九而輿一使非山靈不愛寶余兩足不與易也論者謂天窮於大漠故收靈鬱秀於此理或其然且非獨於游眺足也乃其陵谷多紆委阨塞健馬愞不敢試而又髙不據風峻不露骨鋤花蒔果盡足以易農然而李愿以後未聞有隠君子也豈其有之而不吾見歟抑其去長安也近風漸於朝市而是盤中者非所狎歟余慨然有感焉漫次其勝列之山史游盤山記唐時升萬厯癸已余客太原公邸中日與辰玉讀古人書如三日新婦足不出户殘暑既退風日清朗思一登眺以抒其凝滯意在盤山辰玉適有幽憂之疾謂余言為然乃以重陽前三日集車馬戒僮僕出海岱門過通州周覽形勝以騐水田之可行否塞外之水從東北來薊州諸山之泉亦縱横草莽間若疏其溝洫何必不宜稻獨患早霜耳未審江南早稻六七月熟者可播種於此否恨無好事者為國家嘗試數頃如成非小補也相與東西指顧為之太息九日至廣濟寺寺在山麓其東有一頻婆樹大合抱居人云此樹嵗可得錢二十千江南橘柚五十樹不能及也隠者結廬其下可以卒嵗矣旁有古松盤屈蓊鬱昔人題於石曰蒼龍方為僧人所伐可惜也從此而北以西道旁皆小栗酸棗行人擷而食之不盡有亭曰環翠其前羣峰拱立九華峰在焉又上為上方臺紆青疊碧獨占此山之勝自此益峻則所謂閻王鼻矣既在絶壁凸處復臨千丈之壑石角僅容趾捫石而度為之心悸自悔以身試險無謂也再上禮舎利塔至無梁殿殿有僧跪誦大藏經期三年乃遍是夕宿僧舎望長城蜿蜒如白龍明旦至法藏寺稍下至天城寺望見衛公舞劍臺而不及至東西各有甘澗或云李愿歸盤谷在此地也又五六里有仙師臺巖壑竒秀頗𩔖太山其色紺綠而潤是時秋暮崕間樹色絢爛如雞冠如翠羽如蒸栗吳羅越綿不足為麗也塞外諸山若在几下山僧亦不能名然長松離立一一可辨是夕歸宿廣濟寺葢留山中三日矣遊盤山記袁宏道盤山外骨而中膚外骨故峭石危立望之若劍㦸羆虎之林中膚故果朩繁而松之抉石罅出者􅏟嶔虯曲與石爭怒其幹壓雪霜不得伸故旁行側偃每十餘丈其面削不受足其背坦故游者可紆而達其石皆鋭下而豐上故多飛動其疊而上者漸髙則漸出髙者屢數十尋則其出必半仄焉若半圯之橋故登者慄其下皆奔泉夭矯曲折觸巨細石皆鬬故鳴聲徹晝夜不休其山髙古幽竒無所不極述其最者初入得盤泉次曰懸空石最髙者盤頂也泉莽莽行至是落為小潭白石巻而出底皆金沙纎魚數頭尾鬛可數落花漾而過影徹底忽與之亂游者樂釋衣稍以足沁水忽大呼曰竒快則皆躍入没胸稍泝而上踰三四石水益譁語不得達間或取梨李擲以觀漩折奔舞而巳懸空石數峰一壁青削到地石黏空而立如有神氣性情者亭負壁臨絶澗澗聲上徹與松韻答其旁為上方精舎盤之絶勝處也盤頂如初抽筍鋭而規上為窣堵波日光横射影落塞外奔嵐忽來翻雲抹海住足不得久迺下迂而僻且無石級者曰天門開從髻石取道濶似掌山石礙右臂左履虚不見底大石中絶者數先與導僧約遇絶險處當大笑每聞笑聲皆膽落捫蘿探棘更上下僅得度兩巖秀削立太古雲嵐蝕壁皆翠下得秤石云廣可几筵撫松下瞰驚定迺嘆世上無判命人惡得有此竒觀也面有洞瞰絶壁不甚濶一衲攀而登如獼猴余不能徃謂導僧曰山上險在背肘行可達下則目不謀足殆巳將奈何僧指其凸曰有微徑但一壁峭而滑不受履過此雖險可攀至脊迂之即山行道也僧乃跣蛇矯而登下布以縋健兒以手送余足腹貼石石膩且外欹至半體僵良久足縮健兒努以手從遂上迨至脊始咋指相賀且相戒也峰名不甚雅不盡載其洞壑初不名而新其目者曰石雨洞曰慧石亭洞在下盤道聴澗聲覓之可得石距上方百步纎瘦豐妍不一態生動如欲語下臨飛澗松鬛覆之如亭寐可憑坐可茵閒可侣故慧之也其石泉竒僻而蛇足之者曰紅龍池其洞天成可菴者曰瑞雲菴之前洞次則中盤之後嶺也其山壁窈窕秀出而寺廢者曰九華頂不果上其刹宇多不錄竒拔者曰千像曰中盤曰上方曰墖院也其日為七月朔得數人偕游者曰蘇潛夫小修僧死心寶方寂子也其官於斯而以舊雅來者曰鍾刺史君威也其不能來而以書訊且以蔬品至者曰李郎中酉卿也盤山記劉侗山有不可登盤而登之曰盤山盤山豐石而歉於土石也土同澤焉樹坼石罅生者根僨棰瘇身載斗癭柯輪搏而輻引歴錄如也山固石矣而石羣起於山者又戴石焉層纍之而逾出上若墮不墮下若仆未仆徑出其下人至今慄焉其下又多奔泉泉動而觸乎石濺鳴日夜與石之鋭下而廣額者勢相摇傾所為盤泉也泉延十里金沙其底石所潔也魚魚影影不可匿亦不可捉石為之竇塞也峰危壁削嵐氣到地苔濕到天千古一翠有石欲飛欲墜凭空而久住所為懸空石也兩巗久立相肅光潤相及者天門開也門開得徑門容臂徑容掌巗肘其右壑虚其左大石阻絶屢縋而登僧所詡傳戚將軍繼光袁吏部宏道登焉凡登天門開者至上方寺望而止則舎之西上二十里登焉所為盤頂也頂為筍為椎又立墖以為之纎穎日過之影落塞外風過之鈴振空中雨過之雷奔趾下欲少佇不可得故雲罩寺高潔而僧肅如盤有三下盤泉上盤墖中盤寺少林寺也寺旁紅龍池水鮮厓老膚寸可惜乃鑿龍於壁而朱之因以為譌非所由名也踰四嶺而西者李靖菴有峰髙二里頂廣四丈而平李靖舞劍臺靖徃伐髙麗過此臺也臺石特堅後之人不可得鑿有唐李從簡來遊數字刻焉字各徑五寸嶺上一石如人著幞頭坐而义腰土人嘲之曰石尉遲東過十里雙峰寺有李仙腳跡石則又因形以譌非所由形也而記盤山者曰李愿盤谷也薊之山矣豫之谷耶益譌矣盤谷在懷慶府之濟源縣薊門記節文曹學佺從三河行五十里至盤山之麓仰望其巔青氣迥異浮圖樹石溢於目前既入山有長泉一道從夾壁飛下囓石鳴㶁㶁不巳壁上劖盤泉二字沿泉而上至中盤寺東折里許左右峰勢拱抱中有亭亭旁松夭矯如虯龍石谽谺磈礧飛走蹲伏坐卧負立樹多巻曲至地差衍松勢得稍舒者上盤寺也負厓面岡夾以峻壁西有懸石亭其陰巗百仞之上有石懸空勢壓亭表折而東北躡嶺以登嶺將半有石若巨人仰天而卧登嶺始見長城又上始見墖山有三盤而此據其上墖前有小圓殿累甎為之國朝游盤山千相寺記孫廷銓游盤山者陟其東麓有寺曰千相阻九華峰而居前則大壑臨之古祐唐寺也初上二三里漸入松石森森􅐀􅐀蒼人心目稍進石澗之水隔樹逺聞側籟凄清半嶺而下其過人逺落者松樹漸稠不知聲在何處尚咨咨未巳過此盤折而行乍上乍下足前卻之目左右之身俯仰之森森􅐀􅐀百狀於前仰視聳若樓觀下視空谷寂歴林下若有人居視之則屋察之則石凡不可以上不可以足之地松石輒益爭之寺縁峻阪而升旁逼中深麄具威儀寺僧之闢地而居者磴道四懸茶煙磬響出於蒼崕翠壁之上牽引徐進輒歴碌於巨石若驚若伏若引若拒立者跂跂攅者錯錯墜者慄慄抗者棱棱時時有藤幕之松覆之客至此者猿升鵠立拊其背而下窺或枕藉之遙相語也其曰摇動石者兩石相戴大於車輪試單臂徐引則左右動摇若多人共牽則不復得試刻日驗之其動則影為之移不動則刻如故此又何理也按佛氏之説心生種種法生心滅種種法滅豈其動者是心非石耶若是則影曷移豈其見移者亦是心非眼耶抑薰聞動説留於意根將不動而動不移而移者又皆是耳非心耶莊生有云同我異我誰使正之此不可以儒理測明矣賜游盤山記髙士竒康熈二十年三月二十日鑾輿東巡臣士竒以職在禁近得從屬車越明日道經薊野盤山翠色落人衣裾上念臣性耽林壑命徃游焉凌晨策馬由平谷登大嶺緣仄徑過雙峰寺至李靖菴觀舞劍臺歴青楊峪猿攀螘附凌髙降深二十餘里至峰頂登彌勒殿及舎利墖俯視盧龍古塞黄花白狼三千里外烽臺濠塹瞭然目中真大觀也憩雲罩寺僧指淨業上方白猿洞天門開諸勝人蹤稀絶悵然久之循山徑游古中盤十餘里中巗谷深隠積石趾錯泉琤琮流石罅離離蔚蔚屢引清興入正法院仰瞻御製盤山詩雄渾髙華増輝巗穴夫盤山屹立薊門逺望之渾然一峰入山則竒峰疊出而九華雙峰紫葢挂月自來為尤著盤桓起伏百有餘里水石潺潺古松萬株鬱鬱蒼蒼然山之所以獨擅其勝耶至其土人所言除夜聖燈為山中靈跡則臣未之信也臣少懷微尚分當隠約窮岫知遇以來待詔金馬門者七年出入於紫宸者又五年早夜兢兢不敢自佚雖遙想靈山有愛嘉名無由欣對豈期豹尾之下遂有閒游之人登臨永日亦足以融養淳淑遂其所適之性耶雖遐心之可託實君恩之難忘執筆賦詩明其澹泊之志而已游盤山記王煐戊辰四月扈從山陵事畢十九日返轡薊門宿疾委頓因路近盤山約同人一登覽焉是夜微雨明晨從瓌紫峪投祐唐寺看摇動石經感化寺至亂石村入山一路雲横半嶺松盤澗濱山鳥亂啼野花芳馥騎行而前小憩晾甲石敲石煮茗挹松風聴流泉心曠神逸不復知有塵世矣午餘飯古中盤之五松堂仍過少林中盤二寺至淨業菴宿焉晨起由菴前陟嶺而西旭光初上掩映林巒青紫萬狀生氣鬰蔥對此胷中覺有竒趣未易以語言道也自松樹峪下白雲隖踰峻嶺雲罩浮圖漸入望矣轉盼之際濃霧四塞數步之外目無所見衆人或步或騎皆有懼色寺僧延入飯登浮圖霧氣愈重一望茫茫如蓬萊頂上觀滄海真絶世竒景也北眺長城杳不可得下至桃園洞看石筍雙峙若巨人即俗所傳將軍石也復度數嶺至青溝禪院訪拙菴和尚話久雨作供素饌欲留宿衆不果住冒雨而行山險路滑雖引騎不能乗也至衛公菴登舞劍臺天氣漸晴回望絶頂浮圖歴歴如畫南下抵天城寺共宿僧寮又明日衆友歸余以疾未愈兼與葛簡之有約在山候之復至青溝談詩説禪至夜半有紅光閃閃大如車輪横空而過山僧云是佛燈也余驚訝歎異久之就寢又明日偕僧香巗氷魁自嶺北東折過紫葢峰又東抵西架􅈋堂數椽荆扉半啟仰望峰巔有天門開三字隠現樹影中因迂迴登陟至其下字徑五尺旁書北海劉應節五字筆畫矯健硃色宛然遙想前人風流如在用布索縋下探白猿洞幽竒險峭莫可名狀上復折而西再登雲罩寺金鷄嶺此盤之絶頂處也舒目四望逺察纎毫非復前日溟濛之象寺僧留午飯下歴青楊法藏雙峰諸寺皆梵宇欹傾金碧凋落曲徑苔封禪闗塵鎖不能駐足時巳向暮遵山麓騎行再宿天城寺又明日病小愈歸省拜掃隴墓至廿九日偕簡之入山登中盤階前芍藥甚盛留連片刻至古中盤坐五松堂上虯松盤曲庭除盡綠微風披拂與茶竈雜作濤聲茶罷殿前曕御書碑復踰後山嶺峻路窄怪石嵯峨或危立如羣象或綿亘如巨蟒或如老蚌之向月或如蹲獅之瞰雲與簡之留覽興嘆晡至青溝拙菴一見而笑曰五日三游山水之情何深耶老僧居此幾廿年固未見第二人也夜飯後步中庭聞梵聲有異詢之乃天竺僧相見而笑約與明日游晨起自西陂踰北嶺復東折過紫葢峰小憩古雲根登戚少保凌雲臺故趾遙瞻嶕嶢峰緬想當年鐃吹清歌華筵舞袖賓從如雲旌旂映日真壯游也今則蔓艸荒煙杳無人跡徒深憑弔之感不覺長嘯響震山川命僕斂松墖掃敗葉堆石為竈烹茗共飲飲罷至上方寺沿路尋古碑殘碣回首天門竒拔聳峭迥異羣峰雖摩詰雲林未能以筆墨彷彿也復踰嶺至白雲隖接引菴平岡百餘畆徧植梨棗杏栗濃隂被阜席地如氍毹庵僧炊飯飽餐鼔勇游黒龍潭是游也余與簡之拙菴香巗不退及梵僧三人從者六人野老一人共十五人迤邐而前行六七里則兩山崪嵂髙挿雲漢亂石嶙峋平堆澗底或一二里一轉或百餘步一折前望似無去路回顧不見來路行者皆蚓伸螘附猿躍熊攀或奮臂而爭趨或倚笻而待力前後參差各不相及時為呼嘯以代鼓行一路竒峰怪石野獸山禽異草濃花流泉渟潦應接不暇而望所謂龍潭者杳不可至又數里忽見巨石虹亘清流練垂苔紋蘚跡映日生輝如濯疋錦江邊也下有潭狀若鬴澄碧鑑須睂而深不見底四圍石浪旋生如蚶㲉真神工鬼斧疏鑿而成非有靈物安能如此余謂梵僧曰西天亦有此乎僧搖手而笑衆皆咋指瞪目驚怪悚慄咸請歸焉余聞尚有三潭倍稱竒異因强簡之暨二僧從石稜上蹲伏而過餘悉返舊路三梵僧亦翩然失所在矣時日影斜映山勢逾逼突兀險怪與前山竒拔聳峭之勢又别盤旋曲折約七八里忽聞人聲就而詢之指云三潭在即迺令牧䜿引至俯瞰潭中水色深黑蝸涎苔蘚積滿峭壁間氣象陰森腥風忽起令人毛髪盡豎足不能留下坐石上少頃取路投龍泉寺寺外青流環繞果朩盈岡樵牧相呼鳴禽投樹恍如仙源乍返人世也借榻僧房與簡之訂次日出山游水峪寺盤山記阮旻錫盤山壁立薊門逺而望之四正如一渾然一峰耳入山中則竒峰疊出盤桓起伏百有餘里故又名盤龍峰皆累石而成石磊磊然泉穿石罅而出水淙淙然介泉石間者古松羅列鬱鬱蒼蒼然夫山有石矣未必千峰皆石無膚寸土也泉矣未必萬壑皆泉隨處可挹也松矣未必萬松偃葢中鮮雜樹也斯則山之獨擅其勝者乎嵗乙夘秋仲余同逺公諸君路出三河取側徑踰數嶺至衛公庵顧瞻泉石而歎有似吾島中山也登舞劍臺攷唐史公為定襄道行軍總管豈當日或登此峰歟晨歴青楊峪猿攀螘附可二十里至上盤禮定光佛舎利墖右一峰黄龍祖師殿也俯視八垠如觀掌果最竒絶者是日秋清氣爽望盧龍古塞黄花白狼三千里内烽臺濠塹瞭然睫中而塞外山特高峻屹立萬仞横絶北紀始知大荒之外别有五嶽三山而甕底醯鷄井中鼃蛤為見小也暮宿雲罩寺望上方靄靄蒼厓間僧言九華峰最艷麗寺曰千像唐開元寺也天門開兩巗相揖厓懸壑絶必縋而後可登戚繼光袁宏道而後無繼者若夫懸空摇動諸石及潭洞有黒龍白猿之勝竟以人蹤稀絶悵然者久之次日從山腰下古中盤詢寶積大師道塲則荒蕪久矣山中靈跡有除夜佛燈之異燈出自通州孤山墖上中分為數千百朶逺繞盤山諸寺至定光佛墖而止或曰墖中舎利光也噫世人終嵗勞攘廹除之夜方將與妻孥團圓杯酒間孰肯向空山寂靜冷然借僧牀一覺哉而余久客燕山亦終未能一覩可慨也夫盤山記鄭纉祖背盧龍而俯漁陽有山磅礴髙挿雲霄者為盤山山巔下視邊防諸塞延袤數千里若環堵然塞外層巒疊巘環雲堆翠若培塿然屯絮然蒼茫一望氣壓大漠而州邑之繡錯川原之繚繞靡不歴歴可數宛在股掌間此真天府之雄觀矣而山故饒竒松怪石水則或瀉厓端或穿石罅吰噌曲折亡慮數十百道絶𩔖吾閩中而自燕以東則未嘗或有也余以乙夘仲秋來游此山夜宿峰頂翫月時維秋中澹雲不染河漢無聲仰睇一輪俯察羣𩔖無不可以指顧得者而夜氣迴合流光上下微風摇曳墖鈴時響余不能寐主僧言山為唐寶積大師卓錫地最高為挂月峰定光佛墖累其上每嵗除夜佛燈放自孤山初出一燈憩樹上倐分為二為四以至千百億經百餘里絡繹而前繞墖而止逺近畢見亦佛刹一竒觀也余惟佛以法身能作千百億身之衆則以一燈而現千百億燈之多也然余雖不及見佛於燈猶獲見佛與燈於月清輝濯空一碧萬里自謂此景更不易得而私喜其有薄縁於山靈矣明日抵古中盤登李衛公舞劍臺東望九華天門悵然而返而余因有所感焉肩背單薄之憂自都燕巳然矣其東則遼海管㓜安之所棲也北出盧龍魏武之所以破烏桓也屹然隼雉之堅金城猶昨徐中山戚少伯之遺烈猶有存焉者乎而獨是山兵燹不經梵響時聞歴唐宋以迨今兹巍然雄峙豈升沈得失治亂興衰固在乎髙厓斷谷野水閒雲之外耶則一登眺間而感慨係之余又不知其何心矣訂游盤山衛公菴記孫才衡薊城之北皆山也石頑而土燥逺近無樹植獨西北一面望之鬱然蒼秀者曰盤山聞之山中景甚竒刹亦甚衆非久居者莫能游非善游者亦莫能盡也求其地之勝而游之易者則衛公菴菴四維皆石石皆怪皆松松皆夭矯屈曲莫可名狀其他桃李棗栗蘋梨之𩔖産厓壑間者尤不可指計遇春之時秋之日花葉芳美果實繁茂青紅交錯儼若錦繡蟠結康熈壬申秋余客薊心竊慕之不果徃次年冬得廣福寺住持絳璞者盤山舊住僧也叩其所見較余之所聞尤詳余益懷思之友人何子仲仁顧子振美亦抱斯志願與偕徃且推璞為導師璞雖首肯猶以不及春秋二時為缺然者余以為不然山之佳者歴四時而各獻其巧春華秋實非不娱目怡情然不可久也茍不可久則非山之真面目矣曷若竒峰怪石古朩流泉參差互映不改於嚴寒積雪中頑青冷翠别具真賞葢所游之時不同則所取之景亦各有異也咸曰善於是相與訂游而次其語以為記游之日在癸酉十二月十四日也游盤山記龍震余總角時即有樂山癖家居津海濱無山可樂壬戌嵗附客去江南徃返九月然諸名勝未一到葢所附者非樂山人也後又謀游登萊青濟諸山皆不得其人而止三十年來深歎山水緣慳甚於功名萬萬也甲戌内弟胡子致中助游山資因攜香林道士王野鶴作西山遊西山無高峰大壑時當初春青緑未發歴歴多煤土氣凡名菴勝地率皆聲利所通游僅數日而興巳敗同人曰京之東有田盤山盍徃觀乎乃與出長安渡潞水過三河至薊州州去盤山二十里而村煙相接雞犬之聲相聞宛在桃花源内但少漁人相導耳遵溪而西至亂石村得入山路且行且憩不覺抵暮忽於泉聲松影中見青溝禪院歸投其處而止焉院甚幽僧衆甚雅問及開山主則有拙菴老人在也實洞宗第三十世為百愚禪師之嗣與之語風韻可掬遂出其平生著作數十種皆雄文妙㫖賞閲竞夜不成寐次日偕至仙人橋命野鶴道士鼔琴拂拭鏗然松風澗水互相答頃之過李靖菴主人以茗果相候余作詩付之旋登舞劍臺捫翠屏山一路詠嘯而歸次日老人謂余曰疇昔之游樂乎更當靜養全力以徧事覽觀也遂不出迺論道終日詰晨蒸豆苗煮杏粥食之僧慧珠思聖導余上毘盧頂東折過桃園洞登挂月自來諸峰繞舎利墖下至天門開探白猿洞洞不知其所自但身出雲端雲生足底御風而行杳不知其身於雲於足為何物也悵然者久之山有三盤皆竒絶是日上盤雪中盤雨下盤衺陽紫氣彌滿亂松間變幻幽竒不可名狀忽微雨從西北來紛紛灑灑遂朗誦沾衣欲濕杏花雨之句天色向暮冒雨而歸入夜倐復霽月明如洗萬里一碧老人向余而言曰葢人間此月不可多得而山中能如今夜我輩相遭者亦更不可多得也乃相與立石壁間看千峰動蕩如在波影中漙漙露下令人肝腸俱冷次日坐青溝為佛事又次日方欲游九華五盆諸勝而山下車騎已至不復留矣嗟乎好山難遇好友難逢不惟拙菴老人惜别情殷而其弟子輩亦莫不把袂難分余獨何心能不眷眷於衷乎故作是記非記游也記盤山之中有斯人也不有斯人余烏得而知盤山之勝也耶嗚呼游山不難也游山而得其人難也甲戌三月既朢廌青山堂記李鍇奮起乎馮翊之區龍翔而馬逸者盤之山也其陽衷虚而骨露其勢竦其氣遒其名亦頗著至其陰岡嶺巗壑則奔放而委蛇焉勢固少殺而其氣若有所激如暮年烈士矍鑠未肯下人者以其在陰也名亦遂不著一山也而顯晦異矣枕北山之麓者曰蘿村其西南石齒崰嶷吐納雲日者曰廌峰北俯小溪數里清泚溪左則雙阜疊峙長松匝焉舉夭矯欲飛町疃小壤錯其間山氓耕之大抵皆磽确也村之北有廢陸荒絶虚無人朩盛草隨亂石阸塞側肩俛首迺可入入數十武一坡隆起陟而望之中坦幅削如風臺百尺聳立塵表予曰卜地樹堂誰能舎此遂與二三傖把鋤握斧共宣乃力拔茸剔繁旬有餘日頑石徙矣菑朩作矣羣陰辟矣廓然清明日月照灼於是山環水縈雲行霞起沙之粼粼石之齒齒山鳥之啁啾山花之靡靡莫不獻色呈聲畢効其下而吾堂亦適成予睇視久之喟然嘆曰嗟乎小人斥而君子立穢私去而神明出有如是夫客過而落之曰悠哉此堂也顧何以名之予曰名者實之著也兹山之不著何予堂之有客曰雖然幸卒畀之曰蒼然而業業者非廌峰乎適帶吾堂南請畀之以此時辛丑秋九月朢日也序盤山語錄序明焦竑老子古史官也聞先聖之遺言閔其廢墜著五千言以存之古謂之道家道也者清虚而不毁萬物上古南面臨民之術也而豈異端者哉古道不傳世儒顧以老子為異多詘其書而不講至為方士所託於是黄白男女之説皆以傅㑹之葢學者之不幸而亦道之辱也近世七真者始壹意清淨之説擯棄有為以復還太上之舊其功甚偉顧世人耽玩小術未能從之為可歎耳一日晤張希陽子於金陵言與余合謂盤山語錄在修真十書學者多未之見欲刻傳之而屬余一言余少喜是書不必鉛汞龍虎别安名目與化金御女自墮旁門孶孳然獨治心養性之為務此七真正派也希陽子能知而表章之其識逺矣夫方士言長生者徃徃穿鑿於性命之外不知養性之即為長生世儒言性命而斥養生不知養其性者同乎天道而不亡嗚呼得是編而讀之其皆有瘳也夫國朝盤谷集序葉臣遇余家天台鴈宕間走京師三千里至則假榻禪房扃户不出一日暮鐘初罷明月在天住僧若水出拙菴大師盤谷集見示余讀未卒業覺長安十斛塵拂拂從紙上卻埽遂欲杖䇿薊門尋寶公道塲認盤山面目值師飛錫五臺未果口占以代瓣香無何其徒圖南來若水急扣余扉呼居士知和尚返盤山乎余輒攜圖南手趺坐蒲團訊其所由圖南為余述師生自彭門髫年薙染足徧大江南北鋭意參訪繼授燈於百愚斯和尚實洞宗第三十世後隠匡廬崆峒今則結􅈋盤山為終老計盤山片石舊為牛哀窟宅來徃望而卻走當師篝燈露坐每掉尾而去人共神之遂成蘭若檀波伊蒲始向白雲是問師甘澹泊不事攀緣同衆作務一寄吟咏徃徃㑹心都無思議比聴圖南言兼誦其詩真有隠山大梅之操其得句也皆從光明藏中流出清而竒婉而多風髙深而閎肆余殫思竭力莫能讃一詞旦晚南歸又不得虎溪一笑輒著語巻尾圖南歸請以質之和尚電光錄序翁叔元電光錄者盤山拙菴大師所著也大師得法青龍追宗曹洞擴無碍慧辨空有之精微豎大法幢體生滅之機要空王在在法性如如直證三禪啟元關之幽鍵善超諸有酌彼㟁之洪波象教未夷正門斯闢爾迺垂慈塵刼高唱宗風轉雙樹之法輪禪枝自振盡十方為佛土性水長流法無中邊徧歴大千之界悟由文字總歸不二之門升堂入室之徒皈依化佛散花獻果之衆唱歎經筵弟子徳舉廣舌宣音方瞳識字敷揚師訓流布人間以言語為津梁借齒牙為寶筏將使摩尼異彩出塵沙中迦陵仙音滿虚空界微塵國土望宇下以知歸無漏諸天盡刹中而函葢雖借梯於言語實超箸於思維皇矣能仁瓣香攸託卓哉道力慧日常懸盤山志序王士禎青溝拙菴大師撰盤山志閲九寒暑至是書成而俾予序之予卒業三復歎曰古稱贊寜釋氏董狐覺範僧中遷固若大師者非其人與天官書言中國山川東北流尾没於渤碣葢北戒之山自終南惇物中條太行蜿蜒磅礴二千餘里跨有幽并二州之境屏蔽京師控扼九塞而放乎遼西盤山突起薊門無所附麗單椒隻壑自擅雄尊海内言名山者五嶽之外若黄山匡廬天台雁宕武夷羅浮峨嵋青城之屬率離立傲睨莫能相下盤山片石乃能與之伯仲甲乙豈無故而然歟自唐文皇駐蹕斯山遼金諸帝莅止不一迨於本朝翠華臨幸至再御書宸藻照耀山谷諸名岳莫敢望焉田疇報命劉幽州埽地入山寶積受記馬祖普化贊助臨濟自時厥後尊宿比肩鬱為禪窟凡此皆兹山之所獨擅非惟明流秀嶂與他山爭竒勝已也大師早參諸方嘗謁南華憩佛日峰住五老東西二林間最後得法青龍百愚和尚遂卜莵裘於青溝老焉邈然繼二古徳於千載之上機緣契合葢非偶然師嘗歎山志闕如毅然思剏為之逖稽史傳廣蒐釋典山經海錄靡不漁獵以至豐碑斷碣名泉怪石芒鞵所及悉齎油素籍記之其志可謂勤矣發凡起例簡而嚴核而有體有史氏之義焉其書必傳於後而足備名山之掌故無疑也大師於詩最工夙有清晝靈一之目嘗屬予序而未暇以為昔劉賓客論僧詩有之曰因定而得境故翛然以清由慧而遣詞故粹然以麗晁伯以嘗述其言以題黄龍諸老之詩而推本於學士大夫之助以為靈一學阮謝而又得李華張繼皇甫冉輩與之游清晝為康樂之裔其相從則顔魯公韋蘇州也然則予以法味幸交於師而究無毫末之助寜無逺愧諸公乎哉盤山志序王澤宏盤山為畿東古名勝尚矣然未有山志有之自拙菴大師始拙公之初至青溝也其地為虎豹巢穴刈荆棘結草屋以居而虎不敢害且徙去今巳成一梵刹矣逺近之居民以及樵夫牧豎莫不化之拙公念盤山之名勝其人物詩文建置物産無所紀載則久而湮没不傳因自剏一稿家阮亭少司農朱竹垞太史從而討論考訂廣搜博采備極精核而其書始成余披閲再四竊歎山志雖多未有如此之嚴潔者予因思歴代諸史不具論至郡州縣志郡州縣之史也修之不得其人或改竄舊本稍事増補或訪聞失實遂入登記甚有發凡起例剽奪冗率并體裁而亦失之者此可以言志乎惟兹山志成於拙菴一人之手而阮亭竹垞兩君子學有根柢詞無枝葉如耕之有畔織之有幅畫然而不可紊故其書必傳然又思拙公既巳悟道埽除文字復留心於此不幾於文人結習蹈綺語之戒乎然而此拙公之功行也夫盤山終古不壞而登此山與住此山者有時而壞不有以志之則其人不傳然登此山與住此山者雖壞而終不絶於世不有以志之則其作詩文者之用意與建置之苦心亦等於草朩朽腐巳耳此拙公之功行為不可及也不然佛家視山河大地一切如幻何有於盤山即五山十刹亦比之逆旅傳舎又何有於人物詩文及建置物産乎拙公遣弟子索序者再余不暇然不敢辭而惟論其大畧後人游盤山者其必持此以問津矣盤山志序高士竒燕京諸山發自太行絡繹起伏巍峨雄偉衛於皇都以壯萬邦之瞻盤山獨離立兀峙窈窕崚嶒别開生面公安袁中郎謂其外骨中膚故石峭而木茂亟稱為竒觀余早客輦下屢欲襆被裹糧探窮林壑久而未果康熙辛酉扈蹕出古松亭闗春徃夏歸兩荷賜游時在鈎陳豹尾間雖登眺永日未遑以芒鞵竹杖從事偶紀數詩詩亦未佳迄今思之有若不能忘者歸田以來寓居平湖地皆淺洲曲渚無崇山大嶺可以陟覽舒嘯思發興一游浙東天台雁宕金華諸竒勝迺自山荆亡後奉母無人依依膝下不忍逺離且筋力衰懶日惟手一編坐檻牖下即郊園野圃經月不一二過焉於戲生平名山之願於兹巳矣拙公忽以盤山志寄示追念舊游忽忽十四年慨然興嘆余嘗與人言盤山自外望之無殊衆山一入其境則聳嶂怪壑竒石刻露若奔若蹲若鬭若墮不可名狀長松美蔭帶阜嬰巒南中諸山不少巉厓衝湍未有如此之幽邃者皇上鑾輿上陵寢道所經由時來臨憩泉聲松韻每洽宸襟御藻留題輝映山谷顧可無志乘以示永久乎拙公所撰簡當典善又得阮亭侍郎竹垞檢討共相訂正搜討無遺使讀者不必身歴其境巳有㑹心矣拙公有道力能詩經始青溝為卓錫地詳宋牧仲中丞碑記中其與兹山不朽云盤山志序宋犖盤山在京城東二百里而近一曰盤龍山蜿蜒盤薄故名一曰四正山山特立無倚蠭窠蓮瓣四面如一故名一曰田盤山三國時田疇所盤桓去田從盤俗省也今感化寺古碑猶載田氏事云其山多怪石其樹多松石之昂者欲翔欹者欲墜欲壓綿谷亘巗松生石罅臃腫蜷蹙怒而不得逞則徃徃作蛟虯挐攫之勢其水皆奔泉從髙處下酈道元所稱望山上水可髙二十餘里素湍浩然其間梵宇窣堵之勝神燈鬼火譎詭幻怪之觀與夫龍蛇之神虎豹鼪狸之窟穴髙僧隠士墨客之所鐫鑱山皆擅而有之其與江南之匡阜黄海閩之武夷越之台宕粤之羅浮巴蜀之峨嵋諸名山爭雄長於域内宜也然而亘千百年來山志亡有探竒之士每以為憾詎非闕畧與抑山之靈有所待如釋氏之所謂緣與拙公來自江右卓錫兹山既闢青溝禪院居之毅然以山志自任而少司農阮亭王公太史竹垞朱公實佽助之凡屢削稿閲九寒暑而志成然後山之深水之秀樹石之幽竒與夫梵刹窣堵之勝神燈鬼火詭譎幻怪之觀龍蛇之神虎豹鼪狸之窟穴髙僧隠士墨客之鐫鑱一旦若抉剔洗濯而出而獻竒効靈於兹山以與江南之匡阜黄海閩之武夷越之台宕粤之羅浮巴蜀之峨嵋爭雄長而盤無愧色則志之功顧不偉哉曩余觀察通永與拙公為方外交每欲助成斯志㑹遷去不果今樂觀其成為之序所以幸兹山之緣也拙公名智朴受記莂於百愚斯和尚為曹洞宗尤工詩阮亭以清晝靈一方之論者以為然盤山志序智朴康熙辛亥秋朴結茅盤谷為終老計日與二三子遊見此山蔥蔥鬱鬱秀色摩霄怪石嵯峨飛蹲舞掉清泉古朩隨人上下而其中隠士髙流今古疊出賦詩題字徧滿厓壁因思夫名勝必得志乗以傳然後山川之英華人文之粹美與夫建置之沿革物産之豐饒因之以見不則汗漫無聞而巳甲子春宋牧仲觀察過訪山中以此謀之牧仲欣然喜朴因偕法侶佛藏相與搜討未幾而牧仲開府江右佛藏云亡事遂不果戊辰夏王子千郎中入山復商畧之謂必襄此舉於是涉竒歴險考古驗今竊謂天假其緣以相成也不謂子千出守惠州逺去天末又不果嗚呼好事難成一至於此此心耿耿欲罷不能庚午夏攜弟子德意詳觀形勢繪之為圖更尋舊典増益其所未備稿成質之阮亭竹垞二公二公慨然首肯互為較定遂付雕鐫因述其顛末如此亦以見經始之不易云爾欽定盤山志巻十二
