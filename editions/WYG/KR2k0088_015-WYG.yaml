body:
  text: 物産凡名山精脉融聚處生殖繁昌况昇平既久太和之氣日新月盛人力又加勤焉其物産固非耳目易窮哉田盤骨峻而膚潤霑近天之膏澤山禽野卉自若天機宛如上林苑囿中物今茲籍記雖有愧於郭璞之注陸璣之疏而著食用别品𩔖差足資多識矣果木松盤山之松以百萬計而其竒絶者多生罅中擁腫巻曲其勢不得伸枝多旁抽如怒龍之攫又有陂陀土壤而生者大數十圍龍鱗斑駁或挺聳直上或青蔥垂下明王衡所品松為最良非虚語如古中盤之以盤龍抱子卧雲名者東甘澗之以斗笠名者劔臺之以支離广名者其𩔖殆不可枚舉也李鍇咏法藏寺古松詩造物無餘力孤生此物竒鈎盤容一騁局促殆相持骨聳青麟角斑樷赤豹皮雷聲如解作龍戰不披麗勢薄秋空黒根盤大壑危長風有時下萬里為之吹孔盖邀天歩金幢助佛儀介龜終解甲靈怪亦何為又支離叟二松歌在劍臺東物有竒偉每絶倫意想所及猶非真乾坤迺有此松樹被髪狂虯驚天閽何時於此詭託根皴皮斑駁蒼龍鱗千年偪側忽怒伸媧石迸裂青天痕風雷倒激鐡幹偃日月低盪秋隂昬下有一株不盈尺連蜷夭矯蟠龍孫二者化身夫誰是伸縮大小真有神諸松鵷鶱復鳳翥視此一切非其羣形神直追古蒼頡冠劍儼對荆靈均隂森不敢久相逼鬼物呵䕶如欲嗔委蛇卻下恣太息回首一峰沉亂雲檜天成寺墖下一少林寺一香水寺殿後三龍泉寺殿前一皆千年物也椿有二種菜椿香椿香者較勝楸樹似核桃榖雨前山下居民采輭皮售之曰楸皮一名山核桃橡遍山有之上方寺者最古欂欏以其葉包果味更香伏日采之蟲不炷木蘭芽六七月間采之可染皂荆爾雅翼云凡朩心圓荆心方七月間山家伐輭條編器盛糧曰荆囤山葡萄一名燕薁紫黒色粒小味酸七八月間山家采之欵客椒有二家椒野椒野椒出五盆溝與小盤山七月間居人采之醃菜味同小茴香杏田盤峰㘭澗側有土壤處皆植杏春時萬樹齊發花光炫耀與鄧尉西溪之梅各擅標格仁皆苦有一種甘者名巴旦杏李盤山李見客燕雜記桃有八種是處宜值花時穠豔盈矚栗史記貨殖傳燕秦千樹栗草朩蟲魚䟽五方皆有栗惟漁陽范陽栗甜美長味金史地理薊州産栗今山中所樹落實頗豐棗多植平岡小阜神異經北方大棗味有殊既可益氣又安軀柿小曰火柿大曰盖柿山中最繁盛實熟時葉赤如燒點染蒼黛不若楓桕之待霜也蘋婆果為燕地果中佳品盤山之麓一樹大可合抱居人云此樹嵗可得錢二十千江南橘柚五十樹不能及也見唐時升三易齋集檳子品亞於蘋婆果色赤而㣲酢花紅俗名甜果即林檎羌桃北方多種之以殻薄仁肥為佳俗名核桃梨有多種曰錦湯曰香水曰紅綃曰棠梨山中是處有之其品亦不减河間廣平所産智朴甘棠辯譌爾雅云杜甘棠郭璞注云今之杜梨杜梨即甘棠也花純白樷開最繁結實黄黒大如指酸澀不可食朱注謂白者為棠赤者為杜盖本樊光之説非是赤者為棠或有之鐡梗木𤓰是也因有赤白之説故人以蘋果檳子實之夫蘋大如拳其色紅白相兼而甘檳大如卵其色紫而酸皆清香可食為果實之尤者珍惜寶䕶之不暇豈有翦伐之理乎惟其酸澀無所用故人多翦伐詩云勿翦勿伐意有在焉棠杜二名本一種無煩曲解謹按日下舊聞引陸璣及通志廣志定甘棠紅白二種為蘋果㯽子較智朴所辯為核實山荆子形似杜梨其果大如胡椒殷紅霜後可食其木用接蘋婆甘香有色㯽子林檎海棠木𤓰俱用此接之他樹接之則不活竹髙止尋丈宜於巗隂水際查為仁涓涓泉畔見竹詩脩脩岩下竹經冬翠如是最愛兩三枝出石斜暎水藥草山中藥草未能詳考僅錄數種黄精博物志云藥物有大毒不可入口鼻耳目者即殺人一曰鉤吻盧氏注云黄精不相連根苖獨生者是也按黄精與鉤吻本屬二種本草黄精味甘平無毒鉤吻味辛温有大毒黄精一名重樓一名菟竹一名雞格一名救窮一名鹿竹鉤吻一名野葛折之青煙出者名固活黄精葉似竹毎葉旁生二黒子鉤吻葉似杏而小原不相同孫氏千金翼方謂黄精於二月采根隂乾不若秋後之為愈也智朴按黄精盤山最多居人未敢為食自辛亥朴結茒青溝日采製以欵客人皆效之不數年中遍山殆盡百合亦然洪昇謝寄黄精詩短髪秋來白漸生虚勞開士寄黄精草根難與人愁敵朝見三莖暮五莖百合産澗中根大如卵莖髙三尺餘花𩔖萱草而色紫其中有黒點結子純黒如豆纍纍黏莖上秋冬斸之甘香可食非時斸之則味苦烏藥産澗中藍花樷生味苦毒人康熙初山水暴漲悉為水削去傳聞終南南嶽多烏藥山家種之充道糧然炮製不法者亦毒人石花産峭壁性寒無毒暑天采之代茶洪昇采石花寄王昊廬詩千年石上花日月積光氣寄與玉堂人山中有此味木靈芝孫興公天台賦云五芝含英而晨敷神農經云六芝之延年耳目紀云赤城山頂有青芝盤山所産者惟紫芝或云煎湯服之能已心疼智朴山行獲紫芝寄阮亭侍郎詩二十年來只自知平懐一種最相宜不因偶向松邉去那解深山有紫芝王士禎謝拙庵禪師惠芝詩寄我靈芝車馬形萬年松下斸青㝠菟絲聞道垂千尺更欲從師乞茯苓知母盤山最多采藥者遇之不顧术按吳氏本草云术一名山連一名山介一名天蘇一名山薑有蒼白二種神農經云必欲長生當服山精異術記云术草者山之精也結隂陽之精氣服之令人長生絶穀致神仙無盡燈云术有蒼白二種皆可服餌蒼术味苦而效速白术味甘而效遲盤山祗産蒼术服术方斸术若干斤泉水洗為之净清泔漬三五日濾出竹刀去皮忌鐡曬乾均以小黒豆碾極細末籭過加紅棗肉千杵為丸桐子大每滚湯下五六十丸至百丸止久服為妙野蔬山豆苖樷生似薇二三月生溪澗側出土輒垂首向下山家采之作羮極鮮美廬山亦有豆苖産豆葉坪宋犖答拙菴以豆苗菜見寄詩杏白松青地幽巗豆有苖盤餐足風味采擷訝迢遥烟葉㸔仍脆香莖芼未消因之憶廬阜佳話記清宵王式丹和韻詩土膏春應候山隴豆抽苖以此嘗新好相思餉客遥飯香良可佐酒渇亦凴消㣲物成追憶廬山似隔宵喬崇烈和韻詩不荷金鴉久南山想舊苖闌干看寸寸荒穢付遥遥撐拄應無負方岳豆苖詩逺莫致之長負腹膏肓定未消東坡書生説食真膏肓春羮添故實髙唱玉堂宵劉輝祖和韻詩不是南山種東風暗助苖提擕烟露滿寄贈水雲遥至味如人淡嘗新使意消周顒愛佳句咀嚼坐深宵杏葉菜形似杏葉味甘可食智朴掇埜蔬寄牧仲觀察詩冉冉輕烟閃閃黄飯餘嶺上弄春光豆苖競茁紅侵歩杏葉才開綠滿筐偶摘最憐人不見小鮮偏喜我初嘗非君古道誰堪寄只許山家作道糧宋犖依韻答詩柔莖􅊏葉碧參黄春磵幽姿泫露光小摘雲林扶短杖逺馳瑶草侑盈筐種宜上苑花時見菹憶廬山雨夜嘗榆肉楮鷄誰得似殷勤真費道人糧宋至和韻詩沙栁輕盈弄淺黄盤山二月好風光犬牙鵝管苖穿土鼠耳牛脣翠落筐錦字裁成香共逺雲厨分至味初嘗只緣蘭蕙同幽契費卻青溝十日糧黄花菜一名綠蔥盤山溝澗中處處有之筆管菜即黄精苖初生四五寸如筆管諸葛菜即山芥菜埜蔬之最早者産上方寺及桃園溝龍鬚菜即知母苖虎爪出土三五寸拳攣如虎爪苦益菜似野菊葉有浮毛樷生溝澗中三月間采之煠去水醃烝三五次作黴乾菜頗佳智朴酬施梅菴寄苦益菜詩寄我山蔬名苦益得來不覺興飛揚無人不道肥甘好誰信此中滋味長橡斗子莊子狙公賦芧即此實可為粉中秋前後熟即堕地居人拾之以水漬數日曬乾去殻復漬數日磨濾去滓水渟成粉不澀為度或云可愈痢蕨産九華峰後夷齊歌云登彼西山兮采其􅅔矣􅅔不堪食􅅔與蕨有辯􅅔樷生蕨獨生􅅔莖細蕨莖麄􅅔有刺蕨無刺􅅔味苦蕨味甘似所采者非薇是蕨歌迺稱􅅔詩又曰􅅔亦剛止不知何説俟博物者再考之菌北人呼菌為蘑有多種松蘑黄色延夀蘑紫色土人呼為猪臟蘑京蘑白色出蔣福山一帶大者如盤雜蘑有青黄赤白色者有毒戒不可食智朴偕净衆雨後尋菌弗得詩昨嵗秋雨後擕籃歩荒陬去去適我意所獲皆中馗歸來呼作羮輭玉浮湯頭一飽忘百慮外此復何求今嵗仍秋雨還同昨嵗謀所至不獲一踏遍林與邱山花金雀花黄色樷生有刺開最繁形𩔖金雀巻丹花根𩔖百合而小作花殷紅可愛杜鵑花一名映山紅遍山有之較南方者色㣲紫金銀花一名忍冬蔓生初白色將萎色轉黄或謂黄白並開者非香清烈園中植之可作架先師臺黒墖峪最多紫􅅔花酉陽雜組云北地樹絶大有環數夫臂者今山家亦植盆盎中牡丹芍藥僧廬欄砌間多種之李鍇招同藏公過萬松寺㸔牡丹作詩春草弄芳色相思欲何言孤琴不成調脱身尋邱園新新無已時遲莫將誰援火傳薪指窮茲理如所宣輭吹起客心問彼塵外緣阿以契道懐棼雜或不牽行歌入沕穆杖笠任後前真境匪逺趣隈隩金繩懸寶華湛琉璃白日麗輕烟翠鳥試翾飛威鳳稍低鶱諸相固紛糅繄誰得其原妙香粹無著暢悟無生前小繡毬樷生石罅中其花攅簇如毬白可愛但不能移移之即枯玫瑰花紫色樷生有刺極馥作膏食之亦佳丁香花産五盆溝一帶花繁香烈首夏盛開纍纍石罅中如繡甘菊黄色産澗邉花小而繁氣最馥九日采之置枕中能明目敷地錦俗名飯花髙尺許樷生花紅紫色味甘可食四月中盛開徧地如錦白蓼産青溝髙五六尺花純白性喜水煎湯濯足能止痢蓼有三種其紅者生窪下處髙丈許詩隰有㳺龍是也又有小者味辛其子生采可食禽火燕雄者黒紅色雌者黄色巢石孔中或簷下沙鷄羣飛多鳴盤山春初最多爾雅釋鳥云鵽鳩冦雉是也土人呼為沙鷄一曰半翅然鵽鳩沙鷄本属二種鵽大如鴿岐尾毛腳無後指沙鷄似雌雉而小短尾紅腳無後指爾雅混而為一故辯之畫眉鳥較南方者㣲小亦善鳴桃雀張華禽經云桃雀狀𩔖黄雀而小燕人謂之巧婦亦謂之女匠善營巢獸神虎昔老僧慈慧住法藏寺墖院持法華經二十年不下山有偷兒屢竊道糧虎即遍山叫嘯響震崕谷偷兒自此寖息凡盤山之獨處者仗此無虞故名神虎好啖犬故山中諸庵無犬鹿盤山處處有之丙辰春青溝西嶺有黒鹿二大如贏其毛𩔖山羊長六七寸羣鹿随之東西不敢逆隠現月餘後不復見松䑕有二種小者不過三寸通身豹紋最靈黠名松鼠大者灰色善盗果蓏園圃以此為患俗名臊䑕野貍能食貓故山中之貓難畜臊狗狀似貍黒黄色走峭壁迅疾如飛鱗蛟龍属無角有足能變化康熙庚午夏五月霖雨十日盤山水涌數丈抉石裂山出蛟百餘廬山志云蛇雉蚯蚓之𩔖穴山而伏三十年則化而為蛟常以夏月乗雷雨去之江湖善蛇有黄黒二種性馴長六七尺不毒人相傳盤山有五百善蛇潛天成寺墖下甞來僧座下聴法亦時沿屋壁啖雀雛布雲虎蛇属尖頭長尾四足有二種一淺黄色長三四寸一黒花色脊有金暈尾如媆翠毛天將雨能吐雲俗呼四足蛇砂石金砂盤山地多有之雨後晶光耀目昔有人患貧入山拾之得數合夸示於人尋以分金爐煆之愈煆愈不成乃曰我窮人爾窮金也棄之而去玉石産盧家峪一帶周數十里郭璞山海經注云燕山多嬰石有符采嬰帶所謂燕石也闞子云宋之愚人得燕石歸而藏之以為寶豆查石大數十丈或方或圓如鑿如削千竒百怪莫可名狀能益樹木凡依石之樹倍大白土産盧家峪東細滑膏潤可以塗飾欽定盤山志巻十五
