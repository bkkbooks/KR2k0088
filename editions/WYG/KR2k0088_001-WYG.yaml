body:
  text: 圖上盤山總圖行宫全圖御定内八景静寄山莊太古雲嵐層巖飛翠清虛玉宇鏡圓常照衆音松吹四靣芙蓉貞觀遺踪御定外八景天成寺萬松寺舞劍臺盤谷寺雲罩寺紫葢峯千相寺浮石舫欽定四庫全書欽定盤山志巻一圖考周官職方氏大司徒掌土訓之地圖天下險要阨塞具焉後世工畫者􅉨􅉨模寫山水及宫宇之制非僅備觀覽而巳將以辨脈絡正方位也盤山舊有圖舉大勢於尺幅簡率已甚今兹繪事有總有分以行宫為標凖而内外諸景暨峯巖寺觀之著名者以次布列復為說以考證之清華水木造物閟此奥區蒸蔚雲霞盛世彰其嘉應諸臣幸際承平共肆蒐討拜手登諸秘府於前代所傳圖籍稍足增益其未備矣盤山全圖易曰艮為山又曰艮東北之卦也故崑崙墟之􅎃北出而極於東蜿蜒旁薄萬有餘里迺藴靈鍾秀於長白諸山為國家肇基王迹之地其在河湟以内者自岍岐至於太行如脊隆起而放乎遼海神京億萬年之屏衞於是乎在盤山固發脈於太行而畿左之名勝也古名四正山或曰徐無山髙二千餘仞周百餘里遥望之渾然如一峯壁立薊門蒼翠插漢而雄厚博大首尾結蟠陟其絶頂長城若環堵然北紀諸山緜亘天際咸瞭然指掌中中有三盤五峯諸勝如蛇縈如蠭攢如層華吐萼怪石林立不可名狀古松迸其罅幽草繚其趾泉淙淙穿竇出循谿歴澗注為潭瀦為池窅然深曲迥出塵界昔為田盤先生田疇所棲隠今則多演佛說之廬晨鐘夕梵遍滿丹崖翠岫間遊者延縁石磴上下䝉樷轉入轉深不辨所出其能窮極險峻繞其腹而躋其巔者鮮焉粤自金根屢賁靈境日開特發内帑營建别館山水得位置之宜土木無雕飾之費天章炳煥雲物為之改觀諸景之天成地設若見若隠於向時者今皆收諸几席之下毫素之間矣考自昔圖經自五嶽十二鎮之外茍非耳目所及雖有神異聳㧞可與嶽鎮競秀者止存髣髴莫悉形容况兹山之幽靚深藏最為後出哉兹標舉大凡為總圖髙列雲峰旁分泉壑陰陽向背盤旋曲折之體勢略如聚米畫沙不特以備選勝者之披覽亦以見兹山之獻竒呈秀於太平有道之世而與宇内諸名山相照耀者其靈氣足以興雲雨其形勝足以資拱䕶云爾行宫全圗盤山之有行宫經始於乾隆九年先是臣工上言薊之盤山為鑾輿由山海上陵寢之道聖祖仁皇帝四次臨幸睿藻留題樹石蔚然増秀比来山農野叟莫不額手傾心就瞻雲日宜創築殿宇以為歲時駐蹕之所皇上俞其請飭將作庀材鳩工告成不日地居山之午方前岡如屏後嶂如扆自玉石莊迤邐東達於繚垣之南偏垣壘以文石周遭十餘里隨山逕髙下為紆直澗泉數道流垣内雪濤濺躍自髙處奔注山下設牐以時啟閉林開麓斷地勢髙敞宏闊直廬環翼中崇閎飛甍正位而向明則行宫在焉歴門數重循磴上盤旋往復以抵山之深處碧瓦鱗鱗然與懸崖削壁相間御題八景洵足舉其勝概矣兹山峯巖之嶻嶫澗壑之淸幽林木之蒼鬱秀出北戒而勝蹟遺踪往往在煙雲變滅中數千百年來祗以供遺世之士與夫衲子道流之閒居而静觀固疑乾坤靈淑所融結發之不盡鬱積而有所待也自帝居特起燦日月而輔風雲望兹山者幾如三島閬苑可望而不可即而宸遊所届松雲棟牖間自足陶冶元化抒寫太和彼甘泉之賦九成之頌徒侈一時之盛事者烏知林聲山色可以作笙簧錦繡觀而仁知之樂又有㑹心不逺者耶静寄山荘行宫以静寄山荘名崇儉徳也皇祖時築山荘於熱河以避暑不雕不繪得天然之勝今兹縱廣不及其半而朴畧如之於山前平敞處建殿庭為班朝聴政之位御題曰知仁樂處其東喬林交䕃希見曦景有齋曰松巗寒翠羣臣燕見處也又東為鏡瀾亭臨大澗澗中水石盪激常作殷雷聲虹梁跨其上踰橋東北折舉歩漸髙登山之路於此始焉山以静為體人心亦以静為體聖人首出庶物主静立極時廵餘暇寄意林泉猶兢兢以此自持此中境界宏深足令大地河山都歸涵照不獨山間雲物依然具太古氣象已也太古雲嵐觸石膚寸之雲杳靄極於霄際瞬息之聚散昕夕之吐納四時之氣象自鴻濛以迄今兹變幻靡盡而處乎静以觀至變而有不變者存焉山椒拾級而上地曠而見逺為穹宇複閣御題曰太古雲嵐幾暇澄觀若琉璃巨海光照一切矣西有軒曰引勝齋曰暢逺樓曰接要樓後又有軒曰韻松迴廊四周檐牙相接皆宸逰常御處也其東結構宏敞曰夀萱堂為奉聖母臨幸憩息之所晨昏問視跬步可達啟牖而佳氣入捲幄而暖翠浮宫庭樂事悉見歌咏當有五色雲光遍滿擁䕶與兹山並夀億萬禩矣層巖飛翠盤之為山外斂而中舒巒重嶂複歩歩入勝讀昔人諸游記大都以奉使乗傳延緣濃翠間未移寸晷輒驅馬去之所得不過十一二洵乎乾坤靈窟不欲作人間耳目近玩矣文囿初闢於山之額疏剔得異境焉營殿宇亭榭以時游觀諸巖岫之層疊而上際青㝠者如雲之垂如濤之湧如騏驥之馳驟而勒其首離離蔚蔚窮姸極態而丹葩碧􅅋復䝉羃於嵐光煙靄中以佐其幽致御題其所曰層巖飛翠而無窮景色於是包舉焉中有澹懷堂堂之西有樓曰擷翠閣曰雲起皆髙夐可臨眺繞荔垣之後石徑相接緑縟亭石林精舎各因境得名藴竒延秀固淸都之曲室也清虛玉宇天為積氣地之上皆天也况山之峻極㧞塵土而逼穹霄昔人所云呼吸可通帝座者不其然歟行宫東少北為清虛玉宇有門有廡正中搆傑閣體勢正圓以示崇效之義道家之言天語渉元妙而天帝之號著於禮經儒者類能詳究之其理自非妄託惟兹凌虛縹緲之境日月朗照萬象在下佳氣氤氲出納於珠網綺疏間常有羣真環衞絳節來朝中天積翠之賦固不足方兹宏麗矣鏡圓常照盤山昔多隠淪自唐以後遂為大德道塲智燈法鼓流傳日盛巖凹澗側皆建寶坊皇上性體圓覺貫徹人天謂釋氏之教可以振㧞羣迷利濟衆生與治道有所佑助爰於山莊之西得概軒之前整飾梵宇門榜曰笠招提殿額曰鏡圓常照以奉覺皇非區區福田利益所可同日語也夫昔之讚般若者以雲霞為供養以巖石為徒侣以水月天雲為法相則此晨鐘夕唄直可作祇園鷲嶺觀矣心鏡交光悉知悉見游於方之内者烏足語此中境地也耶衆音松吹盤泉之水演迤而下趨其南為小石城婉孌草堂適介其間堂之東亭宇翼然實先堂而築以當諸景之㑹曰衆音松吹葢石無聲也泉觸之而聲怒則雷霆砰擊震動山谷及其滙為平池瀦為曲渚泠泠然如八音之繁會而松之樷生於巖巔澗底者風過之輒作幽韻與清流相和答昔人所稱盤山三勝於此可盡得之宸遊怡暢屢見吟咏正如酈善長所謂竹柏之懷與神心妙逺仁智之性共山水效深也與此景相毗連者曰翠帀亭曰清嘯亭曰松湍流韻皆在喬林深蔭中别具幽靚之致四面芙蓉山之幽絶處一澗一石皆足濯盥坐卧流連永日要其體勢方正􅎃絡迴環諸巨峯自中央而達四維與清凉五臺争雄長其間岡巒起伏蒼翠相屬升髙望之無不奮迅騰湧而出靡所隠蔽此四靣芙蓉之所以名亭也亭與霞標亭相望崇敞洞達當林霏乍開景物澄霽羣峯如華萼之敷光景溢目應接不暇天藻丕宣能令山開生面初日芙蓉之喻固未足以盡其妙已貞觀遺踪有石在南澗濱色潤而質瑩縱可五六尋衡倍之實一石以凹凸分為三於平坦處結亭蔭喬木而倚巨巖境最幽寂相傳唐文皇東征晾甲於此御題曰貞觀遺踪千載上雄心逺略此石所以志也石迤下欲盡處横亘若檻然萬壑奔赴之水至檻内勢益怒則踊躍砰擊而出跳珠噴玉下注深潭宸遊作記比之寒山千尺雪遂以為名天翰並摹刻崖壁築宇於泉上相靣勢為髙下雲窻霧寮宛轉相屬水聲潺潺與虛濤清籟旦夕入聽山中泉石相遭之勝莫與此絜矣天成寺盤山諸寺大半以險得幽游者必披樷莽或崖懸壑絶縋而可至其路稍坦而境絶勝者為天成寺沿歴坡間行者忘疲峯轉境拓飛甍出於樹杪為寺門之樓顔曰江山一覽可登眺凡巖岫之羅列林麓之映帶於山之陽者纎悉靡不呈露内為佛殿金碧煥耀背負翠屏旁臨澗泉歩歩引人入勝矣輦路由蓮花池而上可三里許每駐蹕兹山率先至寺故御製詩篇視他刹尤富焉萬松寺盈山皆松也松之性得土而恱得石而竒土石相錯則蒼茂夭矯兼擅其美矧泉流之激蕩煙雲之繚繞嵗月滋久靈氣盤鬱其體幹又非擾龍偃蓋諸名状所能盡耶寺在舞劍臺之東本名衛公菴後拓而新之聖祖屢幸賜顔萬松盖紀其實且以標一山之勝也石甃數成崇櫩四注宏麗中饒清幽之觀循磴入寺寒翠侵衣竽籟交作恍置身清凉佛境泰山之所植天都之所長又不可同年語矣舞劍臺盤山五峯昔稱五臺其西臺即唐李靖舞劍處也衞公以雄才偉略佐唐家有天下嘗登此臺臺髙平無所蔽天風吹衣白日朗照塞垣遼海之形勝歴歴在指掌間宜當時擊劍長歌慨當以慷盡露英雄本色千百年後石色泉聲凛然作風雲氣翠華莅止披圖道古想見頗牧之為人斯亦異代之知遇也盤谷寺以盤名山而谷居盤之中尤稱幽阻盖昔隠士之所棲止也人往而路茀國朝僧始闢地以建寺聖祖錫額曰盤谷以復舊稱寺從石門入蹊徑縈繞花朩疎扶諸泉㶁㶁俱流入青溝溝之側有巗有㘭有阪而阪尤勝植杏萬樹春花齊發望之若紅雪寺中有堂有軒與磴道為髙下六龍乗令來游來觀向之松崖蘚壁俱煥天章懷髙隠之清風撫遺踪於耕釣恍若其人在焉呼之欲出矣雲罩寺游田盤而不至舎利塔不足以盡山之勝墖峙挂月峰路由雲罩殿左磴縁壁如棧老松出嵌巖其竒者迺如青鸞之舒翼登其巔俯視四極蒼然一色山川雜陳細𤨏莫辨世外巨觀也寺中景物幽靚魚板清肅古德之所過化髙僧於焉習静時有雲氣生檐宇間遥望之若萬疊波濤滚滚無際雖岱之雲臺黄之雲海無以踰此况數十年來翠輦時臨天章疊賁更足令山色嵐光益增氣象耶寺後有峰曰自來與挂月接舊有無梁殿址其所見與挂月葢相類云紫葢峰名勝志稱盤山之竒特首標紫葢葢薊門諸山以雄厚勝而不足於秀澤兹山獨立一格外若韜晦入其中疏峰列崿繞翠縈青如菡萏之敷榮而紫葢為之菂也圓峭矗峙旁無附麗不必與諸峰争竒競巧而體勢尊嚴儼然華葢之中天諸峯帖帖若衞若朝矣居人又稱為中臺且云為盤諸刹龍脈所發信然千相寺華首觀化應真著蹟是處有之而此寺獨以千相名者相傳有尊者於巖下澄泉見千僧洗鉢因構精舎旋刻崖石具儀相略如所見之數事雖渉幻異而奔走瞻仰者遍十方界恍若伽􅃚石窟中留影光亮矣寺去麓可三里許縁嶔﨑而上長松夾道作虬龍形殿宇整潔明僧憨山曾遇隠士於寺後之石室今稱契真洞旁近巖岫俱嵌空䆗窱固皆當時晨夕經行地耶摇動石亦竒然他處間有之以為敬信所致則𩔖假託矣浮石舫圖經稱四正山葢言山形迴合如城郭也其中竒峰怪石如刻如塑或以形體或以禽獸或以卉木或以器物屋宇隨象立名不勝圖繪矣浮石舫在上甘澗東北峯頂石勢如萬斛巨艦雲氣晨夕出山腹浮浮欲動有乘風駕濤之勢意有太古神人凌灝氣游太空而來集於此乎靈幻成象造物何心世之庸夫俗子輒相與傅㑹假山靈姓氏以迷惑視聽者所在多有兹地以稍僻故不受矯誣夫亦山靈之厚幸歟欽定盤山志卷一
