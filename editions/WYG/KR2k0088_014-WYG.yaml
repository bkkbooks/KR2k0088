body:
  text: 藝文五詩自雙峰寺望上盤山髙士竒崪嵂雙峰日巳西空山寂寂鳥頻啼依稀樵徑無人跡只有花香送馬蹄松下禪扉報午鐘溪橋路斷白雲封山僧指㸃遥岑寺猶隔巑岏四十峰下盤山作撲靣紅塵暗客衣年來蠟事全稀卻從仗外看山色一路題詩歴翠微㳺盤山昔讀寰中記茲山勞夢想十年思一逰塵事日鞅掌扈蹕過薊門承恩恣觀賞馳馬踰崔巍趨途漸深廣縈廻石徑紆盤旋下復上山勢兀嶙峋奔厓盡骯髒緩䇿登危峰煩襟為一爽嚶嚶野鳥鳴汨汨山谿響暮春天氣佳小憩在林莽松泉臣所須性志本踈朗茫茫属車塵時曳青藤杖從來箕潁心對此聊俯仰上盤絶頂千仞聳危岫孤髙數上盤扶笻㸔更險捫葛步仍難天外松風落厓邊草色寒塵襟一以滌獨立感無端冄遊盤山暮春陟崇阿山靈謝客久廻車重逡廵倐復中夏首取徑異疇昔彷彿尋谷口緒風從南來泉聲清且瀏繁英過眼新宻䕃解襟受感此節物遷行行歴岡阜石人坐藤蘿招我若舊友四山空翠來盤礴豁兩肘對之萬慮澄身世渺何有側足天地間煙雲結櫺牖頋茲塵外游屢許鞅掌後飛躍任羽鱗睠焉撫髙厚題黄鶴山樵樂志圖兼憶盤山元人四大家王叔明畫尤不易得余昔㳺盤山見其巗石磊磊松枝落落以為絶似叔明禾中李九疑嘗云古人繪事如佛説法縱口極談所拈往劫因果竒詭出沒超然意表而總不越實際理地所以人天悚聽無非議者繪事不必求竒不必循格要在胸中實有自與現境相合此樂志圖巻竹樹蓊欎樓屋映帶自是叔明極得意筆跋語不知何時為人割去人聞叔明有會稽書屋圖南村圖他時當一遇也山意殊秀聳結構隠林壑美䕃環竹樹芳香翳芷葯田疇既已耕畦苑游可樂妻孥情熙熙弋釣恣旁礴相與數良辰朋來事杯酌斯境本不難幾人成遐託披圖有真想妙筆况黄鶴我曾登盤山攢峰石交錯髙下被長松澗水繞巗脚意者山樵翁粉本收囊槖忽忽十餘年佳遊尚如昨山居志未遂孤懐付寥廓讀盤山志賦詩四首寄懐拙菴大師平生丘壑未能忘蠟屐抛來住水鄉記得盤山三月暮馬蹄行處野花香恨少竒書廣見聞開緘十巻水山文呼童摘取薔薇露盥手輕繙到夜分萬株松影千峰石一度經過半世思忙裏壯年悲裏老昔時夙夜在公流光易邁兩年悼亡頓成哀老蒲團藥竈閉門時梅天幽夢繞青溝妙緒清言讀未休林澤即今誰可共徃還書札慕司州兼懐阮亭侍郎盤山拙菴大師書來奉報朱彛尊三盤勝地稱絶衆嶺何峰最尊别後時勞夢寐書來興轉飛翻青松十里巗磴紅杏千株寺門好雇犢車一兩輭塵碾到山根送宋僉事犖之官通潞中盤曾聽佛樓鐘按部重登紫盖峰料得使君吟興發塞門百道走紅龍寄别拙菴大師青溝雲木晝參覃夢想巗栖燕子龕惆悵花時仍不到滿衣春雨返江南盤山汪晉徴昔觀薊丘志兹山勞夢想今來侍鑾輿松石遥俛仰自襄大禮還便道愜尋訪入山徑紆折泉淙耳邉響初地得感化遺構落荒莽藤蘿坐石人見招如拄杖林巒最幽秀净業標名曩傑閣瞰虚空踈櫺樹梢上緣石勇躋攀晾甲臺倜儻行經少林寺宗風猶軒朗老衲慣將迎肅客供栗橡咫尺中盤山仙梵清勞攘更上古中盤怪石争竒賞正法禪院開戸外一峰榜聖人題詩句豐碑炳天壤髙渾追正始山靈增輝晃我來在初冬輕寒氣猶盎秋花一已謝鳥語聲逾爽絶頂雲罩峰遥瞻氣蒼茫信宿翠微游黄山夢來徃寄贈青溝和尚孫岳頒拙公盤谷隠古佛峙花宫止静千峰月髙吟萬壑風懐人憑尺素閲世等飄蓬何日聞清論山窓茗盌同長安雪後寄懐拙菴大師二首孔尚任馬蹄蹀躞御河濱頃刻春泥踏作塵翻笑盤山松寂寞百年曾見幾㳺人博士由來最冷官思山有夢去仍難空勞㸔雪遥相憶獨埽晴峰上下盤寄青溝和尚馮朂結茒驅虎住青溝裂石天開闢境幽會得禪心自蕭寂一輪明月萬峰頭由􅅛紫谷至玉石莊入山王煐雨霽殘雲半嶺横平沙細路馬蹄輕松風謖謖聞天籟澗水泠泠雜梵聲山鳥頻呼如有意野花相笑不知名同㳺盡是塵勞侣偷得餘閒快此生盤山道中四月盤山草木深七年曾此一登臨杏花楊栁來時路好共黄鸝續舊吟曲曲谿流逐徑衺馬蹄騰踏入烟霞碧桃知我重來晚春盡猶留一樹花歴天門諸勝上雲罩寺天門孤聳映清暉苔蘚重重瑣翠㣲神物古池開一鑑仙靈幽洞閉雙扉撲巗危石鵰初落挿漢竒峰鶴欲飛鈴語逺聞山徑轉短笻扶我竟忘歸游黒龍潭投宿暗峪寺欲探黒龍潭先憩白雲隖努力勸飽餐無畏登陟苦㣲徑識竒樹異草隠榛楛怪石幻萬狀偃仰復傴僂或如虯龍盤或如獅豸怒或如黿鼉伏或如鸞鶴舞近睇每彷徨遥瞻還愕憮騰躍效猿猱有笻不暇拄漸聽亂泉鳴喜色溢眉嫵渇甚競抔飲味甘勝醴醹力竭依危石屈伸撫雙股前途正險􅇖况復多蛇虎躡足履巉巗恨不生雙羽横亘眠石虹皎潔無纎土懸流挂疋練蒼翠苔紋古映日發光華微茫辨絲縷噴瀉注洪潭颯颯生風雨清澄鏡面平鬚睂擬可數環凹若鬴錡欲濟無檣艣週遭石浪生疏鑿疑鬼斧深杳不可測傳是神龍府賓從暨僧伽相視舌各吐云更有三潭聨珠嵌巗滸倦者先告歸進退分歩武夕陽亂人影相頋倍踽踽突兀兩山逼蠻壑肖天姥三潭水深㳷厓峭削雙堵積蘚襯藤蘿蝸涎汙綸組頋此肌骨寒悚慄不自主悤悤轉林麓隠隠聞鐘鼓倚杖叩僧扉振衣登梵宇老衲餉果茗山厨炊秔稌飯罷尋㫁碑零落字形腐放腳卧禪牀清歡洽肺腑黙數此日㳺昔賢孰堪伍擬徧告同人先須秃筆譜入盤山衛台瑺滿村棃葉帶霜紅最愛名山風雪中儼若峨冠不可見三盤頂上白雲封出盤山口號蓮花池小一雙灣亂石霜林谷口還比部何當游興足馬頭指㸃説盤山晚歩隣菴訪盤山和尚共話何五雲緇塵無地愜幽尋何處㣲風度梵音素盌茶香分菊色空天月冷入松隂十年勞吏還家早四正髙僧避俗深相送柴門成一笑霜枝驚起暮棲禽到上盤登挂月峰晚眺阮旻錫客子御風來峰巔己挂月月上薊門山邊笳静不發薊門秋塞晚無烟塞外髙峰欲挿天週逥亭障三千里東臨碣石滄海邊滄海眼中一勺小塞北江南青杳杳不知天地幾何年但見隂陽疾雙鳥古人寂寞已塵埃山川留待後人開玉闗西入班超老磧中更有李陵臺出下盤萬壑松聲萬壑泉芒鞵踏破五峰烟驚魂猶向巗間墜快意無如洞裏眠弹指徧開彌勒閣分身却下大羅天唐碑宋碣曾何有愁閉空山六百年題盤山圖三十年前曾閲此而今垂老得親游昨宵一覺青山夢試問圖中可似不游盤山歸蒼林上人有詩見訊依韻答之老去漁陽俠客心青霜匣底冷龍鐔五更誰打鼕鼕鼓百嵗空為數數吟曉夣無端雲易散秋燈有燄月先沉近來不用參方去會得盤山賣肉碪將㳺盤山柬諸同志鄭纉祖風塵苦羈束邈焉思逺眺况值此清秋烟霞有同調憶昨上方游山水仰髙蹈如何夜來夢親覩盤山貎巍然雄朔方不與上方肖偃仰羅羣動襟期豁衆妙㣲茫杳難分約畧覧其要尤愛孤峰竒輕身淩絶峭坐觀千岫低卧聽孤猿叫醒來心魂幽猶聞巗谷嘯何當與君期白晝窮㣲奥登盤山六十韻皇天閟華滋驅山作屏列遂令此峰髙靈氣於焉結混沌判何年登臨快此日蜿蜒塞外來突兀空中出迴伏衆岡環欎紆㣲輕折千尋拔地軸一柱撑天闕髙可凌虚無逺能鑒毫髪初登猶堛塞數轉漸超豁層層凌絶頂了了見澄徹竒非神鼎鑄峭豈昆吾切不假藕絲穿寧藉螺穴軋自覺石泉幽羣推林麓鬰三盤曲有餘四望端如一有如竒偉人視髙歩還濶有如貞静姿澹寫無􅂗抹又如古鴻文體正而詞括不落小蹊徑渾然大手筆迺知帝王區逺與郡國别流峙合而鍾神竒蓄不洩三山或比隣五嶽孰優劣洞壑相崩峭岡巒互出沒山容幻紫青石狀逞危突老樹鱗槎枒枯藤虯曲屈晦窺猿洞暝曉映龍潭澈髙墖落雲霄奔流倒溟渤橋疑石梁逥瀑向廬山割陟覽盡丹梯徘徊多寶刹聲傳清磬連翠匝蒼松宻轉瞬淡濃分移時向背失神工迥不倫至化杳難詰以彼雲中竒幸茲逰覽决别來骨肉踈興到親朋挈歩兵兼小咸封胡並遏末陶公意特豪惠逺禪堪悦不用籃輿隨自把桃杖伐將毋山靈觸亟遣神丁奪選勝期先登耽幽每後歇意中各有属佳處誰能恝歴級身頻髙迎眸眼一瞥石囷棗梨封天厨豆􅏨實采摘怡性情噉食慰飢渇歡賞及稚童追呼踐履襪傾欹驚渉險超忽欣初脱古跡半陸沉導僧費指説留連竟夕晨信宿擁裘褐幽夢浩無涯孤懐勃難遏起窺澗底雲欲掇峰頭月夜氣何㣲茫商飇乍凛冽每苦出門艱頗虞行路窒斯㳺偶然遂勝事焉可必維昔漁陽亂紛然戎馬逸風塵昏頃刻干戈競倉卒是山畜逋逃所全十七八天心應有在民命賴以活誰言桃源洞迥與人間絶桃源信可求苦為塵世聒褰裳最髙峰東望遼海潏緬懐管㓜安皂帽髙自潔欲往從之㳺青天騎虹蜺歎息斯人徂清風千里發盤山絶頂次戚少保韻木落風髙旅鴈哀天空雲㫁戍烟開三千餘里盧龍在七十二菴寶積來塵世幾番悲浩刼清時何處見邉才英雄事業身難遇少保曾登舞劎臺三河道中望盤山絶頂䇿蹇東臯欲暮天上盤髙出萬峰巔逰人指㸃如曾到一抹浮圖盡碧烟登盤山絶頂上盤突起鬰崔巍卓立孤峰何壯哉古戍烟中千堞出漁陽樹裏一城開翩翻鳥背髙低見錯落雲根松石徧僧言寶墖時放光嵗嵗佛燈除夕見重逰盤山呈青溝大師拙菴憶昔尋逰到此間五峰相對一開顔東甘澗隔西甘澗西架山連東架山雲寺罩餘常帶濕天門開早不須闗吾師若問重逰興曾向仙人橋往還留别拙公洪昇我避囂塵到幽境一住渾忘旬日永春風三月山不寒飽㸔青松與紅杏半生詞賦何所求結社思陪惠逺逰清泉白石信可戀妻兒待米難淹留勞生汨汨終何極一夢百年如晷刻明日風塵下界行迴頭只見青山色陪王昊廬先生游盤山問訊盤山路乗春竝馬來髙低空翠合㫁續野花開斑鹿穿林導黄鸝隔嶺催人言扶杖客先到白雲隈㣲聞鐘杳杳漸近水淙淙倒影穿雲塔横枝迸石松峰危欹紫盖池古瀉紅龍更上前山去相將䇿短笻老僧解留客隨意共園蔬布席憐松䕃看山愛雨餘林深頻竄䑕池冷不生魚同是忘機者探幽縱所如澗㫁垂藤接林迴狹路分五峰争捧日八石各生雲僧與豺狼狎人將鹿豕羣閒來剔蒼蘚細讀古碑文絶頂此躋攀蒼茫曉日殷一身飛鳥上雙足亂雲間大漠連滄海長城補㫁山遥㸔古北口天險舊秦關幽尋未云竟驅馬忽言歸惆悵攀芳樹低徊戀翠㣲出山雲逺送留客鳥遲飛多少塵勞事誰能便息機將逰盤山寄拙菴大師殘臘與師期髙松㸔雪欹杜鵑花欲盡真悔入山遲山色潞河東朝朝憶逺公青溝望不見只在白雲中冄入盤山憶與昊廬先生同逰口占寄之重尋白雲來獨入青山去青山笑問余故人在何處由青溝越山至雲罩寺登舍利墖眺望策杖凌西巗捫葛踰北嶺厓㫁徑轉危林深路逾永㣲窺白日光亂踏青松影巍峩啟佛宇閒寂隔人境千尋舍利墖獨踞最髙頂鐸響天風翻雲深石氣冷指點古長城連山作門屛幽薊與青齊㣲茫辨烟景絶磴倦躋攀禪房息俄頃夢覺聞疎鐘翛然道心静山中寄朱若始壯嵗飄然辭紱冕衰年勉爾傍風塵鹿門居士安禪久栗里先生乞食貧江上鴈稀書隔嵗山中花發病經春餘生漸悔浮華誤近向蓮宫叩净因山中夜坐和王右丞韻松風千萬樹松月二三更惟對一僧坐詎聞羣鳥鳴形神都已敝身世竟無成不學空門法真為負此生山中雜題踏徧紅塵十載贏來白髪千莖决計深山獨徃喧囂怕殺浮名八石餘多怪石五峰外有竒峰始信古今髙士超然不列儒宗泉聲三里五里松影千層萬層紅杏山山迎客白雲寺寺尋僧别盤山歩歩出烟