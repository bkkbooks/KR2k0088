還當省穿出層雲便到家盤之石一山竒石累千峰峰頂雲頭盡是松愛煞嵯峨靈且秀應教憶念米南宫盤山吕齊端三盤崒嵂環畿東􅑀空削出青芙蓉怪石作膚土為骨千溪萬壑蟠虯龍嵐烟樹色倐更變天地於此開生靣蓮花紫盖列翠屏古寺氤氲時隠見晨鐘暮鼓欎相望瀉瀑鳴湍自激昻百尺晴虹跨幽澗浮圖挿漢生光芒亭軒接趾誰經拓閴洞隂森鬼斧鑿渤碣滄溟指頋間長城蜿蜒連沙漠肥遯常懐田子春只今駐節亦髙人傳燈屢著神僧蹟靈巗秀嶂增精神年來蠟屐真踈嬾晞髪科頭任蕭散白雲舒巻若招尋遥對無終弄霜管青溝贈拙公梁洪此中有開士猿鶴結同心對月石門敞著書花雨深翠㣲澹鬚鬢緇土空衣襟無語坐春澗有時携素琴相將談勝概不覺發㣲吟更指上盤好詰朝雲外尋溪亭桃花爛漫水潺湲獨坐溪亭心最閒天上春雲晴萬叠層層望去到盤山秋日望盤山莫夣微茫烟樹薊門空翠削芙蓉望不窮螺髻盤迴青嶂外黛眉宛轉碧雲中林髙泉響驚秋雨壁絶烟生起暮風但得身閒能濟勝道心何必向崆峒入山值杏花未謝喜作孫才衡可怪東風樹能消幾日開竟留花未落似待客遲來帶雨浮紅雪臨風點綠苔山林春自好何必曲江栽逰盤山一徑入層巔﨑嶇路轉偏馬蹄天上落人影日邉懸殘雪消春澗荒松帶夕烟招提何處是隔岫有鐘傳盤山張霔四正山頭策短笻亂雲危石踏重重地天人籟千巗水上下中盤萬樹松古寺琴僧空自老荒臺劍士有誰逢蕭蕭只恐風雷起飛出深潭五百龍寄青溝老人我憶青溝老世情久屏絶裹足翠㣲間松雲一簾閉流覽西方書巻巻古氷雪慧業望文人每每辱髙潔不聞戒律弛反苦禮法設始信寒山詩即是真禪悦一别池上蓮三年想芳烈山中自朝暮人間變時節述作豈無志心勞日成拙安得負塵笈巗窓就區别題盤山圖寄贈拙菴和尚龎塏我夣盤山己十年披圖如在萬峰巔何時拄杖尋師去再証龎家居士禪盤山巗壑冩來真馬老重來住後身他日相逢好相識笑余還是牧牛人題盤山圖兼寄拙菴大師何百鈞盤山如盤龍祇園當龍背雲生香爐中龍吟亂雲内境險人跡稀卓錫拙菴在禪定發深悟辯才了無礙心由教外傳道與名山配清净余所耽披圖恍身逮何當逺從逰超然去闤闠盤山和徳松如韻塞爾赫涓涓石髓㵼空青謖謖厓松列翠屏記得中盤西北望九華峰勢對孤亭環翠亭遥對九華峰王衡緱山集亦及之霞烘亂石帶山村惠逺東林飯菜根三十五年一彈指不知巗竹幾生孫寒青暖翠五雲中石磴千盤鳥道通一徑香生不知處古松花落下山風晚春山僧收松花作餅甚佳遲則隨風散去砂嶺泉邉行䇿杖宿猿嶺畔擬移家就中佳境渾難忘坐倚長松㸔綺霞水曹佳句近如何十斛珠璣㵼澗阿老去把吟三歎息輸君滿眼賸烟蘿辛酉暮春薄㳺盤山徳齡似盖巗雲散薄隂餘春天氣稱幽尋出城纔放㸔山眼已作逍遥世外人踈籬茒屋亂山青處處人家映翠屏回首薊門西去路軟紅飛撲短長亭隂隂桑柘鳥聲幽渺渺平灘漾綠疇誰傍名山成小築枳花門巷嶺西頭峡裏柴荆别有村交柯新緑䕃雲根詩人舊識桃源客今日來㸔四代孫諸天樓閣畫圖中亂石幽泉一徑通知是僧厨燒槲葉紅簷烟颺落花風㕘天松柏影縱横占岫嬌雲放午晴小坐僧窓証聞見萬株寒翠木魚聲選勝登臨憶昔時盤雲深處徧題詩卅年重倚巗前樹猿鳥誰能認髩絲雲封藥竈仙人洞月照香臺佛子家羽駕飇輪無返轍重來清恨滿烟霞移居盤山詩永寧卜宅依山麓從容亦茍完編籬三徑曲鑿牖一天寛鼓腹煨鴟芋章身製鶡冠舉家清且健隨在可盤桓山僻招提古人閒話易深鶯花騷客興泉石老僧心杯泛東村酒絃調西澗琴相歌復相笑世眼任升沉田廬山名巗徑好處處建招提飛棟接天險盤松卧地竒風雲時變幻水石自紛披居近前峰下開尊醉所宜抱疾停農日捐書小坐時分花刪病葉脩竹得新枝徃事多歸夣幽懐盡入詩一樽聊獨酌空谷更誰期蒼茫羣動息岑寂小樓空逺水猶將月孤雲不近風衣霑秋露白窓闔夜燈紅此際酣髙枕清尊幾處同臨流偶適興石上坐忘歸野㟁花多致山泉魚不肥幽栖人事簡髙蹈古情㣲任達無拘束從誰問是非煙蘿籠古寺亂石出人寰家在山隅下僧來樹杪間桑麻秋段段鷄犬日閒閒祗説羲皇世於今見一班賜㳺盤山恭紀蔣溥太行鍾淑清連綿壓平谷田盤舊隠地千載留芳躅泃水放碣石酈注詳記録形勝推漁陽屹峙鎮畿服直欲凌崑閬何須訪嶽瀆年年望翠華㳺豫耀川陸别院敞蕭疎法宫森肅穆縹緲裛流雲曈曨映初旭怪石蟠蛟螭奔泉駭麋鹿野花處處紅巗蘚層層綠幾暇時澄觀仁智樂具足名山賴傳記特勅校天禄舊乗多舛誤或陋或繁縟摛辭歸雅馴宸章謹三復詔許探幽竒庶不限耳目勝㳺昔企慕殊恩今幸沐蠟屐整籃輿問途指林麓春風正潭沲山光金碧煜三盤欎相望迥合勢奔逐烟嵐倐變幻振衣恣遐曯清磬出伽藍㣲聞栴檀馥小憩亦復佳禪房隠花木摩挱古碑碣文字半可讀絶壁挿瓊霄藤花風簌簌頓疑窈窕峰飛來古天竺炊烟一縷斜巗畔露茒屋周匝樹檎杏㕘差藝葵菽耕鑿盡熙皥穿雲引黄犢方知春事深林間鳴布穀何處泉聲幽琤琮戛寒玉石路相激盪勢不異飛瀑盈科地漸寛縠紋澹洄洑從容數㳺儵閒逸愛浮鶩坐覺怡我情清澈似可掬丁丁樵斧傳喁于㫁還續石磴翠㣲開山腰細如束古松千萬樹盖偃空青簇清風天際來湓涌海濤蹙龍鱗何斑斕攫拏虬枝秃老根長茯苓往往山僧斸洒然心神曠遭逢良自朂頻年扈屬車宸翰屢諷讀山靈荷寵榮迭開真靣目異數及㣲臣周覽往而復蒐羅重文獻珥筆摛巻軸佛地播嘉名仙山紀清福靈蹟發耆闍真形傳圖籙永言名山藏文彩煥彬郁㑹㸔出器車神凝年穀熟敬紬石室文敢效岡陵祝賜逰盤山恭紀錢陳羣扈從橋山歸馬䇿向西指行宫規田盤攬勝集衆美春山邀宸賞花栁何旖旎未明即求衣幾務各待理侵曉閲封章批答馳萬里少焉徹尚食天房駕騄駬名刹證重來流覽標大㫖翠䍐或穿雲回轡未移晷樂山見本性得詩盈剡紙傳宣盥手讀賡和慚鄙俚謂是當卧㳺刻劃想像裏何期召對間餘論及山水曰盤當勝處靣目靈鷲似爾生靈鷲鄉爾曷不逰此今者風日佳暫假庶可以出趨行幄中用敢白相揆同志五六人聞者各歡喜上馬取道西瞥眼驚芳誰栽仙人杏千樹爛霞綺紅者紅於桃白者白於李馬前有鳴泉泉側石齒齒俛首上石梯磴折竦岌㠖有寺名天成紺宇巗半倚其上小平處石壁堅如壘緣徑陟北岡一歩一殊軌或如馴象蹲或如圍棋累或突而欲墜或張而如哆蘭若結其間萬松䕶其址登樓仰御題海天同一視松濤無根源隨風自起止布席在松下茗飲就石几嵌空安禪室如匭亦如雉欲上足知疲中輟心仍企笑與山僧言願借住一紀捆書一千巻讀竟出還仕題詩留石罅萬松老居士山僧為我言去道或倍蓰盤中七十二幽絶略可比天留此枯寂化人實所委山厨無一物蔬菜逺城市虎狼日磨牙食人如􅐒豕日落即闗門厥患庶可弭昨聞萬乗來曵尾各他徙秋官掌邦禁官在道可履守道而廢官茫茫更何恃遭逢堯舜君行與䕫契擬豈學田疇軰槁項飫糠粃再拜謝山僧我言實戯耳扶童行彳亍低頭黙自惴須臾日將昃一抹暮烟紫雖有他勝處不敢復請矣我昔持使節六渡灤河涘屢經盤山下相望尺與咫昔也對靣失今也把臂始遇合有定分飲啄惟所使要於緣慳時珍重慎一跬援筆記同逰各各詳姓氏其嵗辰在申其日為上己題盤山行宫門外雙杏五絶句此日宫門倚作衙常時麄服稱山家居人云是百年物老樹猶能著萬花也許山容近玉除恰過寒食嫩晴初端莊婀娜仙人服看徧千林總不如肯教桃李占春風雨綻霞蒸暈薄紅樹下最宜天仗馬鵞黄絲勒玉花驄一枝夭嬌更盤拏得地天然擁白沙開向中書省中客故應題作紫薇花東偏一枝開特盛閣部行帳直廬即設其下分付東風莫漫催好花未要盡情開明早别爾當歸去散直斜陽立一回賜逰盤山恭紀四十韻鄒一桂環畿抱重峰艮位起􅏭嵲幽光儲精竒元氣苞藴結來逰肅扈從眺望引領切剡藤披欲圖卭竹倚未出帝曰汝往哉豈可覿靣失揚鞭入花塢結伴尋仙窟陟岡藐三盤下阪輕九折怪石滿林麓棋布而星列大者如車舟小者若𤓰瓞懸者如欲墜動者如欲活眈目虓虎蹲昻首狂兕突境静色奔駭心曠神凛冽馬乏換籃輿松聲亂溪舌山譁人語喑樹黯禪燈㓕飛虹架危卵斑蘚生鏽鐵跳珠落襟懐蟄蠖伸洞穴争流無俗湍鬭枝有竒奪蓬蓬雲盖張紺宇撑阢陧跨虚接藤蘿激竅噴滃渤山僧來睢旴問言苦詰屈冠者五六人中途已抛撇倒榻息吁嘻索飲救枯渇壁詩欽御題篋志嗤可抹愿歸誠妄附田隠亦牽説盤澗自成薖盤阿自羅刹盤石自磊砢盤松秀孤孑盤空且盤固盤繞亦盤欝以此得盤名穿鑿正不必我來此盤桓為盤冩凹凸就泉作硯池燒松為朽筆盤意會心胸盤皴非倉卒天成萬松圍甘澗東西别少林蔚中盤鈎勒遍殘碣梵宫七十二過訪僅什一雲罩天門開遥望絶頂末目貪足力疲山黝日光沒訝茲鞭血羣深恐履尾咥晚風乾汗水佳境且回轍留待他年登靈奥忌盡抉長歌記勝逰恩貺己忝竊登盤山沈德潛漁陽重鎮削芙蓉紫盖攀躋第一峰亂石雲中蹲虎豹寒泉松頂走蛟龍㣲茫海氣環無外層叠邉城繞幾重身在栖猿㝡髙處擬將白日挂孤笻天窮漠北欝崔嵬佛海龍池獨往來纔上半山無鳥雀早知下界起雲雷隠居為指田盤谷舞劍還尋李靖臺到此并忘身世感茫茫大地總浮埃逰盤山自天成登萬松寺邀陳紫山張鏡壑同作裘曰脩十年騎馬京華客對靣西山曾未識田疇先生舊隠場夣魂往往徒相憶快哉茲來夙願酬一笑欣然動顔色紅塵漸逺山漸深聨轡翩翻理行䇿髙處全遮佛子宫隘時幾絶逰人跡寺前劒石撐孤青寺後琴泉漾寒碧峰迴徑曲幽復幽衆籟空空鐘磬寂忽然天風海濤相御行長松萬竅同一鳴颼颼謖謖不暫停老龍天半聞吼聲驟雨乍掩春晝晴激揚震盪立欲傾何必鼓枻尋連成到此已足移我情掉頭便謝青㝠去歴險捫竒行且住萬幕沉沉隔暮烟依㣲不辨來時路此逰鄭重非等閒放朝特荷君恩寛平生寂寞苦愛山誰識坐致輪蹏間百年一瞬竟焉是但當歡樂無憂煎下有清泠百尺之深淵上有蔚藍萬里之髙天縱目直過飛鳥前白雲千頃何茫然爽如鷹脱鞲上紲曠如馬出泥中韀人生固取適意耳以我自視寧非仙明晨隨輦驅車發重來亦是經年别石上題詩誌不磨丁夘之年仲春月賜逰盤山恭紀董邦達田盤山色天下秀真人樓觀開雲岫每從朝退望翠㣲飛來復見此靈鷲平生結習耽林泉况得竒觀邇文囿披圖覽勝久神往結願何時始得副丙寅九月秋景佳承㫖遂得凌髙崕霜林㸃染紛繡繪千巗叠玉層雲排穿雲漸入最深處似登閬苑升瑶階躊躇滿志歸自慶君恩曠蕩真靡涯數年以來勞夣想時對三盤憶蕭爽花外烟霞鎮巻舒松間風月森虚敞神馳益覺登眺美躬歴曾諳名勝廣從教吟望心徘徊祗瞻彩翠依仙仗今春正值三月時花磚日永趨彤墀天語傳宣勅授簡山經輯綴探幽竒舊志一編未醇備比邱蠡測還傳疑今茲蒐羅務詳慎廣擇博訪宏辭摛有詔更許蠟㳺屐洞天真景恣尋索驚逢異數出螭坳喜隨仙侣過鸞掖四靣蓮葩拔地攢千章松樹㕘天劃蒼玉劈殘巨靈斧黄金布滿能仁宅盤泉伏地琴筝幽白石齒齒噴清流洒然似映氷壺立頓疑萬壑澄髙秋是時山花將吐萼瓊枝敷暢環丹邱金碧照耀人天界神秀一一歸雙眸五岳真形圖未易况是壺天清景閟親切應須得縱觀仙逰更沐君王賜雲霏松棟瀑聲喧日麗芝房峰影邃經營粉本備規模粗識堯禹恭儉意茲山造化精英鍾烟嵐岞崿青芙蓉聖祖宸翰耀珠璧我皇御製鏘笙鏞髙逸己垂田盤跡古德直開臨濟宗二酉可三三神四崑崘縣圃相追從㣲臣此日懐油素記取清華得殊遇豪吟欲繼龍池篇縷述思摹上林賦蔚藍瑶碧撲襟袖氤氲不辨天上路相期搜討紬秘文石渠天禄附傳注茲逰三度恩屢邀春光秋色均逍遥致身福地良不偶典籍特重同文朝巗穴幽人慕貞吉帝庸作歌隠可招願將崆峒訪道志譜入金簡期松喬盤山道上薩哈岱遼廓風烟古薊州盤中清景近深秋低坡蔓草眠黄犢逺渚平沙下白鷗日轉千峰開鳥道雲横雙墖見僧樓等閒恐被山靈笑馬上題詩紀勝逰秋日扈從盤山天成寺因憶昔逰不到田盤二十年又隨清蹕一攀緣雲含蒼翠山髙下霜絢丹黄樹㫁連雙墖影懸峰外寺萬松響雜澗中泉天成舊是題詩處指點烟霞滿目前讀徳松如盤山倡和詩追次原韻沈青崕聞道天成寺最幽山藏曲室少平疇衛公遺蹟千秋壮劃破罡風到上頭烟霞層叠薊門村特為聽泉憩樹根行過青溝登舍利巒頭俯瞰見諸孫磴危泉怒亂雲横鉢内龍歸法雨晴夜宿上方諸品静倚牀猶聴逺鐘聲超登雲海望天涯甘澗東西好住家挂月峰前迴客屨補衣剪得赤城霞登盤山符曾石壁挿天起三盤踏翠登中藏隠士宅蘿徑挂脩藤暮與歸雲宿朝㸔曉日升居人不識我喚作入山僧攬勝集遥秀紛然滿眼來春風下殘照松壑散清哀山湧翠螺旋石分青峽開思將衣上垢一濯澗邉回明月清無際言尋石徑㣲濕分松葉露凉滴水田衣懸瀑垂如練崩崕勢欲飛陽阿如可即余髪殆將晞行到萬松境恰當亭午時上盤浩雲海下界净琉璃潭影窺天小經聲度壑遲由來清絶景塵外幾人知宿東竺菴曉起山門看雪陳臯海水夜剪馮夷宫八萬四千驅天龍我佛要施鉢花滿冷飛戱白迷璇穹朝來披裘出門立天地溟濛糊一色亂擲空中皛不分小者如拳大如笠四山不見青蓮趺春意散入枯林枯我疑昨來塵境改不然翻身跳入仙人壺耳邉有響不知處澗底幽泉作人語為語諸公莫浪猜此段竒觀殆留與須臾日耀扶桑隈一鳥不飛天鏡開素華倒射銀漢白上下直接千樓臺舉頭舞掌屢叫絶大聲欲讋山靈回今年偶趁逰山轍不意看山兼看雪看山雪裏山更佳滿目清機杳難説我生與山頗為緣青鞿布襪無時閒天公恐我太寂寞故教神力鋪綴乎其間一覽己覺凡艶陋道人休約紅杏然自蓮花池捨車步至天成寺捨車理簦屫石路盤谽谺朝暾在溪門㫁崕露削𤓰氷底啼幽瀨宛轉行修􅉬兩山環肘腋徑轉開衙衙翠屏駕香界萬萼青蓮花平生泉石心於此興更賖禮足向白佛幡影揚寶珈晚自歡喜嶺取道西峰樵徑而下松風吼潮音澹日西嶺帖山僧導我行取徑何㠎嶫側身穿石門荒榛齧衣衱崩崕鬼靣皴暗雨莓苔浹下臨勢不留有似氷帶屧查子濟勝强騰身自誇㨗同人怖無言予亦屢回怯稍見祇樹林禪燈出香葉仰靣千仞巔翠色與天接不加一枝藤雙足何由躡自上方寺踏雪至少林寺觀多寶墖朱岷山腰積雪白層層掃徑偏憐擁帚僧指點少林雲外寺尚留餘興踏春氷宿東竺菴曉起山門看雪查為仁晨鐘警夣破殘燈耿菽粒斂息趺匡牀靈籟延虚入初驚蟹爬沙旋訝蠶食葉振衣先衆起迺知雪霰集近山銀闕封逺山璚臺立大哉造化功寒光萬里吸我欲扳松行松松玉龍蟄語客且収笻地爐傾米汁望盤山戈濤長嘯出都門翹首望盤崿逺景明村墟浮雲澹寥廓褰裳渉通津春水半欲涸是時㣲雨零夾㟁桃花落烟郊入馬蹄平沙净如削岡巒稍蔽虧雲樹互旁礴竒峰决眥來蒼烟滿林樾耳目頓靈異心神坐超忽停鞭倚夕陽迴首想城闕日入争餘光往來猶奔蹶咫尺􅃡靈區忍向塵埃沒山僧早閉門寂寥晚鐘歇自玉石莊達天成寺五首歩歩泉聲急層層石色分入天無寸土横路有孤雲野䑕時驚客林猿各覔羣鬰然深處望嵐氣曉氤氲稍緣一徑仄漸逼萬峰齊曲折藏幽處人家過澗西數驚石欲堕回訝路全迷幾日桃含蕋殘紅流滿溪餘寒猶中客知是入山深躑躅花迎路栗留聲出林偶隨漁者去或負釣竿吟小坐蓮池北蕭然净我心蓮花池在天成寺南雲壑都迴轉峰巒互帶纓於山為曲室有寺號天成絶壁宸章迴髙峰佛塔聲老僧諳舊跡指點澗泉名樹影沉沉合山光簇簇濃蒼烟來絶壑落日在髙峰晚飯抄雲子香泉芼鹿茸菜名耽吟殊不寐卧聽上方鐘由石門歴萬松寺至盤谷禪院疾行取山勢緩歩覔山趣琤琮辨風泉窈窕測烟霧石門割竒秀怪石森相聚蒼骨間青脂一一狀刻露人言始皇帝長驅競海渡憤不受鞭箠逋逃散此處虯松萬萬株長根黏石固下鋭而上豐斯語信不誤林端杳鐘磬花宫恣㳺寓突兀壓頽峰穹碑最髙踞云是舞劔臺英雄於茲駐至今風壑松時作蛟龍怒翻然更東下披榛尋㣲路磴石相陵臨塘坳幾回互山光變更竒夕陽亂烟樹野獸紛鳴嘷鳶禽各歸騖前林覷深黒寸心多恐怖盤谷方丈地踟蹰一迴歩逰盤山張模􅄬晚山前宿凌晨上翠㣲花香時入袖雲氣自沾衣緑樹千重合清泉一道飛采來薇蕨美曉露未全晞為愛山光净招携愜素心留詩題石壁把酒坐花隂野鳥能窺客林風乍滌襟未能長住此翻悔俗情深山居詩釋徳清獨坐長松下悠然太古心髙山流水意誰復是知音松下數椽茒屋眼前四靣青山日月升沉不住白雲來去常閒静夜鐘聲不住石牀夢想俱空開眼不知何處但聴滿耳松風春深雨過落花飛冉冉天香上衲衣一片閒心無處著峰頭倚仗㸔雲歸青山不動自如如朝暮雲霞任巻舒縱有紅塵深萬丈曾無一點到茒廬依巗結構草為菴乍可容身止一龕但得心源歸湛寂任從世事付癡憨三竿日上還髙卧丈室雲封不放㕘佛祖直教踪跡㫁何須前後列三三盤山行乾形無定向勢如龍古樹扶踈嘯晚風靣靣烟霞浮幻景層層蒼翠露真空寶圖卓立千峰上金刹横開萬壑中舉世丹青描不得白雲常繞梵王宫山居詩􅑀空一片山玲瓏無背靣巗下有龍吟可聞不可見春深崕際草萋萋牧豎擕籃過澗西試問於今何處去白蓮池畔采青藜夏日雨後望盤山寄青溝和尚智暹炎炎盛夏當初伏汗下如漿髪如沐驟雨驚雷何自來倒甕翻盆經信宿曉起潞河忽放晴燕山薊嶺來心目飛翠浮青指頋間卻憶師凡住盤谷幽人永矢自弗諼卧枕松根一坦腹慚愧而今老大身濫厠法門空鹿鹿他時决計賦歸來料得茒庵不須卜盤山超見盤山怪石攢聳出碧雲端磵氣侵人冷松聲徹斗寒盤山漫興超正大象本無形名山突兀起虯松堪盤桓古洞可棲止師昔此談禪余今斯論理言前顯正因句裏明宗㫖五峰鉢囊間八石衫袖裏於斯悟靈機是得真如髓盤山即目智韜曉日空林似晚霞晴光遥映住山家一聲清磬雲邉出幽鳥時銜樹裏花四正山居詩超常耳觀多清净流泉響若琴鍾期歸去後無復問知音一灣流水碧滿地落花紅不道春歸去惟言昨夜風逰盤山超然勝概畿東第一峰烟雲影裏碧重重烏藤不怕蒼苔滑數遍厓巒萬樹松登盤山智楷多年懐此山今日到山間豈獨山幽静更忻僧意閒是非人不至松石戸常闗登陟無仙骨雲巔未易攀盤山元玉聞得盤山數十年孤笻今日到山巔松崕四處濤聲發疑是匡廬瀑布泉盤山雜詩智朴盤峰勢䃳􅼇似帶癡頑意於中具大觀存神别有致雲霞時吐納中虚外特奰掩勝潛幽竒處處恣逰戱洞壑屈曲深萬松藹蒼翠四圍鐘鼓聲饒多苾蒭寄山川祕英華草木生文字惟我信宿緣住年十有四招隠寂無人虚存招隠志盤龍作住宅茹養寄吟哦豆苖充午供既飽資天和彼茁者黄精春深遍陂陀采之必以時食之不厭多夫豈取遐夀抑以療飢疴時乎忘逺近曳杖躡嵯峨山泉清瀾漪山樹老婆娑居停無回互禮法不我苛洵非人間世韶光一刹那石古雲根竒崕懸樵徑仄老僧不耐閒放眼㸔秋色遥峰一望迥難齊烟靄空濛落照西二月春風無事事山前山後聽黄鸝上方寺東有前人詩鐫絶壁上字半湮沒洗苔讀之得君昔有言歸李愿之句有作寄朱竹垞檢討君昔有言歸李愿我今無語憶田疇為尋二妙閒踪跡遍踏巗巒未肯休同洪昉思逰衛公菴至天成寺作幽谷迥禪房跏趺忘嵗月門徑恒蕭條春深草亂發勝㳺久不萌髙興今勃勃出門失後先蹂踐松鍼滑過山復過山險隘遭顛蹶下上歴招提丹雘耀林樾老僧注意殷留客飯薇蕨日午向天成逢隂樹底歇快哉到寺門胸臆自超越過净土菴細路荒寒照眼迷山花滿院見幽棲老僧對客無言説笑指南軒作畫題題盤山圖三首點出三盤最上盤浮圖髙挿碧雲端想知夜半鐘聲發應有神燈繞佛壇千峰萬壑冷森森飛翠浮青入望深七十二庵人不見黒龍潭底老龍吟千株萬株青松樹十里五里紅杏花㸔到田疇舊隠處梵宫影亂夕陽衺龍文雷王埜鶴逰盤山訖卻返津門作此送之山水有情人始獲山水妙領􅄃㫖趣深不假目力照君契山水情塵鞅俱抛掉來此汗漫逰芒鞵易輿轎刻畫山之神似與山靈約山水嘿無言我作山水調送君返津門崕壑發光耀歸示社中人啞然同一笑入盤山德意真見盤山勝巍然壯薊門竒峰齊日靣怪樹挿雲根未過中盤寺先經亂石村臨流貪濯足不覺已黄昏山中口占路險疑天近峰髙覺日低金臺望不極猶在潞河西盤山再過雲中寺悠然興更濃崚嶒千仞墖蓊翳萬株松上下分三澗髙低列五峰澄潭人不到决定有神龍冬日陪楊雨田登盤山絶頂青山不我慳因得山中住住山來故人登陟饒幽趣趣幽次第㸔冷萃如烟霧忽爾朔風來巗壑松濤怒擬同萬馬奔令人生恐佈攀陟歴層崕石滑蹜其歩紺宇嵌絶巔孤墖雲中露舒徐到寺門主僧欣再晤登塔禮佛牙舍利金城固山水有竒觀領畧在所遇不是箇中人幾多成虚度山居小窓開向緑隂中夣覺翛然絶異同到此不知山色好人間無處買松風山中口占山秀石多怪林深路轉竒三盤無限意幽絶少人知山中依松結個小茒亭四靣青山列畫屏最是道人消遣處一爐柏子一甬經同洪昉思遍歴盤山之勝德風先生自悔入山遲正是春光向暮時策杖尋芳紅爛漫捫蘿踏翠緑㕘差厓邉雲氣晴偏好樹裏鐘聲晚更宜此日相擕同眺望幽懐猶約後來期逰盤山呈拙庵和尚常鑑四正磅礴京之東嶔巗邃峪開洪濛五峰八石嵌雲表異狀竒形信鬼工聞昔田疇肥遯此此山得名良有以人聞寶積住其中龍象奔馳非偶爾迄今列刹如星分齋魚粥鼓驚相聞浮圖直矗層霄上神燈静夜出松雲中有幽人忘寵辱二十年來逺塵俗道行孤清感至尊青溝片席流芳躅我來瓢笠偶經行怪石蒼松倍有情何當卜得三椽地嘯月吟風了此生盤山德靖翠叠烟巒望去幽化人宫闕在峰頭丹青妙筆難為冩只許凌空道者逰盤中清閒一味譲僧家除却焚香便煮茶物外幽情山内境四圍繞處是烟霞青溝對月憶草堂諸友道王聰好是青溝月能開衆壑烟晴輝照素壁冷露濕氷絃鳥宿三盤樹鴻歸萬里天春山雖有句誰寄草堂前贈盤山道者無名氏鬚髪蒼然氣若霞朝朝吟咏是生涯閒來趿石長松下獨對山前萬樹花帝京之東盤山之中十里五里千峰萬峰青松紅杏與此一翁更誰管領竟日春風欽定盤山志巻十四
