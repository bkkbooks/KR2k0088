body:
  text: 方外一昔人稱山中草木藂茂居民鮮少故非肥遁不悔與一瓢一鉢寄迹方外者不能久兹岑寂諒矣夫闡拈花之真諦衍面壁之宗風法燈智炬久與佛日並照自寶積以下或把茅久住或飛錫行化道風髙峻者歷舉得若干人黃冠寥落僅足傳白雲一派至若空巗枯坐灰頭土面之倫名迹淪晦不敢傅會以傳也釋四十人唐寶積生緣姓氏未詳參馬祖因於市肆行見一客人買豬肉語屠家曰精底割一斤來屠家放下刀義手曰長史那箇不是精底師於是有省一日出門見人舁喪歌郎振鈴曰紅輪決定沈西去未審靈魂往那方幕下孝子哭曰哀哀師身心踊躍歸舉似馬祖祖印可之後住盤山寶積寺上堂云心若無事萬法不生意絶玄機纎塵何立道本無體因體而立名道本無名因名而得號若言即心即佛今時未入玄微若言非心非佛猶是指蹤極則向上一路千聖不傳學者勞形如猿捉影又上堂云心月孤圓光吞萬象光非照境境亦非存光境俱忘復是何物禪德譬如擲劒揮空莫論及之不及斯乃空輪無迹劒刃無虧若能如是心心無知全心即佛全佛即人人佛無異始為道矣又上堂云禪德可中學道似地擎山不知山之孤峻如石函玉不知玉之無瑕若如此者是名出家故導師云法本不相礙三際亦復然無為無事人猶是金鎖難所以靈源獨耀道絶無生大智非明真空無迹真如凡聖皆是夢言佛及涅槃並為增語禪德直須自看無人替代又上堂云三界無法何處求心四大本空佛依何住璿璣不動寂爾無言覿面相呈更無餘事珍重師將順世告衆曰有人貌得吾真否衆將所寫真呈皆不契師意普化出曰某甲貌得師曰何不呈似老僧化乃打斤斗而出師曰者漢向後掣風顛去在乃奄化僧掩室開寶積頌山舍無塵分外清石榴花發透簾明槐隂滿地日卓午夢覺流鶯時一聲愚谷囦頌依依楊栁欲藏鴉社後東風捲落花理策邀朋何處好山南山北看桑麻妙峰善寶積見屠家割肉有省頌江邊送客上扁舟相對漁翁暗擲鈎一掣錦鱗隨手上逺山疊疊水悠悠海印信寶積聞歌聲悟道頌哀哀聲裏便承當畢竟靈魂往那方踊躍自然全體現始知遍界不曾藏北澗簡又頌薤露淒涼亦可憐白楊丹旐去翩翩哀哀聲裏無消息打著南邊動北邊師範又頌紅輪決定沉西去未審靈魂往那方哭慟一聲無處避擡頭親見本耶娘宗杲寶積向上一路頌不傳不然海口難宣須彌頂上駕起鐵船智暹又頌千聖不傳向上路擬思舉步隔天淵雨催山色來眉際風送溪聲到耳邊彥充心月孤圓頌光非照境境非存光境俱忘復是痕滿地落花風掃盡依前流水繞孤村松源嶽又頌描不成兮畫不成卧龍長怖碧潭清擬心湊泊終難會達者應須暗裏驚文禮寶積似地擎山頌山忘孤峻玉忘瑕到處仙源是我家堪笑葛洪曾未悟逺從勾漏問丹砂重顯三界無法頌三界無法何處求心白雲為蓋流泉作琴一曲兩曲無人會雨過夜塘秋水深慧勤又頌青青入座當軒竹黯黯遮門對面山更有一般堪羡處夜深流水響潺潺本覺一又頌三界無法何處求心日明夜暗山髙水深三界本因心所現無心三界自平沉智暹又頌沼碧楓紅山翠輕隆冬天氣寐難成怕寒正坐燒松火隔樹啼鴉三兩聲雪菴瑾普化貌真頌徹底氷壺無影像倒翻斤斗模難成千峰雨歇黃梅後桂魄還從海上生寶葉源又頌清竒古怪娘生面妙筆丹青作麼施者厮十分傳得似依然畫虎只成貍普化不知何許人師事寶積密受記莂而佯狂出言無度暨寶積順世乃於北地行化或城市或冡間振一鐸曰明頭來明頭打暗頭來暗頭打四方八面來旋風打虛空來連架打一日臨濟令僧捉住曰總不恁麼來時如何化拓開曰來日大悲院裏有齋僧回舉似濟濟曰吾從來疑著者漢凡見人無髙下皆振鐸一聲或將鐸就人耳邊振之或拊其背有回顧者即展手曰乞我一文錢嘗於闤闠間搖鐸唱曰覔箇去處不可得時道吾遇之把住問曰汝擬去甚麼處化曰汝從甚麼處來吾無語化掣手便去濟初開堂化首􅉨贊佐一日同濟赴施主齋次濟問毛吞巨海芥納須彌為復是神通妙用是法爾如然化躍倒飯牀濟曰太粗生化曰者裏是甚麼所在説粗説細次日又同赴齋濟復問曰今日供養何似昨日化又躍倒飯牀濟曰得即得太粗生化喝曰瞎漢佛法説甚麼粗細濟乃吐舌咸通初將示滅乃入市謂人曰乞我一箇直裰人或與披襖或與布裘皆不受振鐸而去濟令人送與一棺化笑曰臨濟厮兒饒舌便受之乃辭衆曰普化明日去東門死也郡人相率送出城化厲聲曰今日葬不合青烏乃曰明日南門遷化人亦隨之又曰明日出西門方吉人出漸稀出已還返人意稍怠第四日舁棺出北門外振鐸入棺而逝郡人奔走出城揭棺視之已不見惟聞空中鐸聲漸逺善昭普化明頭來明頭打頌老倒分明兩路差箭鋒相拄勿歪邪龍蛇混雜人難辨烈日長空下雪花佛智裕又頌髙堂公子醉雙陸亂撒明珠發異光一擲輸贏誰辨得滿盤骰子不成雙文禮又頌以此振鈴伸召請旋風連架打將來大悲院裏邏齋去肘露皮穿可怪哉東山源普化乞直裰頌撮得虛空作近鄰便於北斗裏藏身者掠虗漢何多事猶把空棺誑後人道宗俗姓田千牛將軍賓庭之後元和九年甲午於燕庭金閣寺受戒聞盤山寶積大師往詣參承後嗣永泰大師太和二年戊申屆盤山峰頂居焉咸通七年丙戌三月化緣時畢説偈靈脫知宗上方寺道宗大師遺行碑記師諱道宗俗姓田唐千牛將軍賓庭之後元和九載師年弱冠於燕庭金閣寺受戒禮志敬寺如琳為師聞盤山寶積大師直指心要往詣參承後至永泰大師所與師契合謂師曰薊門舊里田盤靈山可構淨居師蒙指教驚喜難名太和二年屆盤山峰頂多逢獸迹莫面人蹤境類虎溪地蟠龍腹師止棲處所如在四禪柏茶半斤稻米數斗二年所食一半猶存皎月銀河借為燈燭松風石溜指作笙簧息煩焰於塵塗瑩戒珠於巗岫曾遊絶嶽墜地無傷山現蓮池龍降香水猛虎每蹲於坐側巨蛇長繞於階前一上雲嶺兩更嵗華偶因樵采之夫始見住持之迹初傳鄉里漸達州邦千里風聞四衆雲集方伯太尉相國清河張公仲武遙瞻道德渴想音徽專飛簡草特有招辟師以松蘿誓節雲水堅懷三十九年不下棲隱侍中清河張公允伸大闡釋風逺欽道行頻馳清奉纍降尺書命建豐碑以崇盛德咸通七年暮春之月師化緣時畢説偈整衣悄然靈脫至咸通九年茶毗於靈壇獲舍利數千塔於寺之東南隅常實繼道宗住上方感化稱伏虎禪師今有伏虎塔在上方塔院曉方常熟人從五泄山靈默大師剃髮不言姓氏結茅甘泉山咸通十一年三月十日告寂塔寺之西南隅郎肅甘泉普濟禪院靈塔記性相湛然是無來去光隂飄忽故有悲哀無常必見於有常生滅期歸於寂滅遺光尚在過隙難追則有躬侍梵筵心傳法寶極追攀於痛悼盡愛敬於師資鏤字支提用彰先覺故甘泉禪院大師諱曉方蘇州常熟縣人也師事五泄山靈默大師姓氏經遊未之嘗言故莫詳悉其於慈悲以濟物勇猛以化人橫身塞河決之波舉手正山崩之勢碎裂魔網髙張法雲得岸拋舟不師文字上天燒尾别創風雷方嶽公侯連城守宰偃風渴道靡不歸依牽迷手於正歸破石心於難舍三獸極淺深之渡百草滋甘露之芽皇哉巍乎則置院之碑詳矣咸通十一年三月十日遷神於此山報齡七十七僧夏五十八嗟乎歷陽陷兮柏梁爇九鼎沉兮缺山坼乃千乃百哭盈庭山慘雲愁淚成血缺日兮人失目椎臆頓頭皆慟絶世尊當歾缺羅空有闍維禮容設余即聞風企仰臨紙缺以師之形則遷流委順矣以師之神則圓明清淨矣以師之法則一燈然百千燈矣故門人法順等悉心勤力肇建靈龕於院西南一百步盤龍山首焉以明年缺月日遷神坐於是山日往月來懼移髙岸人亡地在是紀色絲比金玉而彌貞擬蘭蓀而可久後之人觀斯文而知其行則姬公諡法得其一端者耶唐咸通十二年嵗次辛卯閏八月十三日存奬俗姓孔本鄒魯闕里之裔孫也以祖父官𨽻於薊籍薊州師七嵗於盤山甘泉院依止禪大德曉方剃落大中五年具戒尋參臨濟為侍者既而遍歷諸方至三聖為首座又至大覺為院主備載諸禪録中乾符二年乙未幽州節度使董廓請師北歸盤山未果乃於魏府南甎門外創江西禪院開法演化於文德元年七月十二日告寂享齡五十九僧臘四十一弟子藏暉行簡奉遺命於龍紀元年八月二十二日就本院闍維得舍利千餘粒建塔於府南貴鄉縣薰風里公乘億撰師塔碑公乘億魏州故禪大德奬公塔碑蓋聞妙諦惟玄不可以一理測真詮至奧不可以諸相求隨萬化而泯色空故不生不滅超三界而越塵垢故無去無來此乃不思議者其惟西方釋迦牟尼佛之謂乎伏自教傳西域化被中原漢明推入夢之祥梁武顯施身之願語其大也外不見須彌之廣言其小也內不知芥子之微斯乃梵璽褒然代代相付肇自摩訶迦葉迄於師子尊者統為二十四代而後菩提逹摩降於漢土至能秀分之為六而後苞披葉附派别脈分其真宗不泯不滅者則我大覺大師固有係焉和尚姓孔字存奬家本鄒魯即闕里之裔孫也乃祖乃父因官𨽻於薊門歷祀既深籍因編入和尚以無量劫中修菩薩行及兹降世豈同凡倫當衣采之妙齡蓄披緇之大志未踰七嵗即悟三乘啓白所親懇求剃落遂於薊州盤山甘泉院依止禪大德曉方乃親杖履就侍瓶盂豈顧全身惟思半偈大中五年伏遇盧龍軍節度使張公奏致壇場和尚是時戒相方具而後大中九年再遇侍中張公重啓戒壇於涿郡衆請和尚以六踰星紀三統講筵宣金石之微言示玉毫之真相禪大德元公者即臨濟大師也和尚一申禮謁得奉指歸傳黃檗之真詮授白雲之祕訣所謂醍醐味爽乍灌頂以皆醒薝蔔花香才經手而分馥一旦旋辭舊剎願歷諸方西自京華南經水國至於攀蘿冒險踏石眠雲經吳會興廢之都盡梁武莊嚴之地無不追窮聖迹探討禪宗後過鍾陵伏遇仰山大師方開法宇大啓禪扃赴地主之邀迎會人天之供施面陳奧義衆莫能分和尚立以剖之如刀解物仰山目眙擊指稱歎再三遽聞臨濟大師巳受蒲相蔣公之請才擬侍飛錫而遽及中條尋參隨致林疑作置杯而將渡白馬當道先太尉中令何公專發使人迎請臨濟大師和尚翼行不信宿而至於府下乃命止於觀音寺簮裾繼踵道俗連肩曾未期年時至遷化斯蓋和尚服勤道至展敬情深無乖靈堵之儀克盡茶毗之禮云乾符二年有幽州節度押兩蕃副使檢校祕書御史中丞賜紫金魚袋董廓及幽州臨壇律大德沙門僧惟信并涿州石經寺監寺律大德𢎞聚等咸欲指陳盤嶺祈請北歸和尚欲徇羣情將之薊部晨詣衙庭啓述行邁先時中丞韓公之叔曰贊中遽聞告去撫掌大驚乃曰南北兩地有何異也魏人何薄燕人何厚如來之教豈如是耶和尚辭不獲巳許立精舍韓公之叔常侍及諸檀信鳩集財貨卜得勝槩在於南甎門外通衢之左成江西禪院規制一如化城松柟將杞柏俱來文石與碔砆薦至重廊復道竹翠松青四户八窗風輕月朗和尚樂兹幽致用化羣迷開解脫門演無量法致使天花散地水月澄空嘗與四衆人天皆臻法要六州士庶盡結勝因豈因一念俱尸奄從物化斯乃文德元年七月十二日也享齡五十九僧臘四十一有親信弟子藏暉行簡一以主喪一以𢎞法大德奉先師之遺命於龍紀元年八月二十二日於本院焚我真身用觀法相闔城禪律繼踵爭來四達簪裾連肩悉至於是幡花蔽日螺唄喧天火才發而雲自愁薪不加而風助勢三日三夜號禮如斯於香燼之中得舍利一千餘粒諸大德各各作禮請分供養焉嗚呼雪㲲如故真儀宛然捧一履以徒悲仰雙林而莫見遂建塔於府南貴鄉縣薰風里附於先師之塔志也億到職之初曾獲瞻禮法主大德藏暉不以億才業庸淺具聞我公相請撰文億秉筆惕然得盡蕪鄙銘曰傳如來教厥惟大雄百千劫外方丈室中慈悲是念色相皆空端然不動豈染塵蒙其一矯迹三界安心四禪身雖是假道本無邊璞內有玉火中生蓮傳法何處隨其有緣其二越絶支遁匡廬逺公髙情逺致迹異心同既離邪縛肯處凡籠松軒竹徑空悲夜風其三我性不動我心就然果得舍利粒粒珠圓幡花豔閃螺唄交連唱偈作禮聲徹梵天其四寶剎新建招提舊蹤蓮芳不見蔥嶺誰逢響亮朝磬清泠夜鐘歷千萬祀傳我禪宗其五瞿汝稷指月録云後唐莊宗車駕幸河北回至魏府行宫詔師問曰朕收中原獲得一寶未曽有人酬價師曰請陛下寶看帝以兩手舒幞頭腳師曰君王之寶誰敢酬價帝大悅賜紫衣師號師皆不受乃賜馬師乘馬忽驚墜傷足師喚院主與我做箇木拐子主做了將來師接得繞院行問僧曰汝等還識老僧麼僧曰爭得不識和尚師曰腳法師説得行不得又至法堂令維那聲鐘集衆師曰還識老僧麼衆無對師擲下拐子端然而逝天童覺君王之寶頌中原之寶呈興化一段光明難定價帝業堪為萬世師金輪影御四天下間極雲又頌君王寶自難酬價興化何曽敢借看天地既無私蓋覆至今留得鎮中原智朴按師生於唐文宗太和四年庚戌出家於開成元年丙辰圓具於宣宗大中五年辛未入滅於僖宗文德元年戊申指月録載後唐莊宗詔對等語逆數莊宗同光元年癸未至文德戊申師去世巳三十六年矣豈復有詔對之説詔對之説恐是僖宗典籍紀載之訛耳故正之志間濳修盤山黑塔峪久之參臨濟濟驀胸搊住間曰領領濟拓開曰且放你一頓又參末山尼了然禪師問如何是末山山曰不露頂間曰如何是末山主山曰非男女相間喝曰何不變去山曰不是神不是鬼變箇甚麼間乃服膺作園頭三年後出世住鄂州灌溪僧問久嚮灌溪到來只見漚麻池間曰汝只見漚麻池要且不見灌溪僧曰如何是灌溪間曰劈箭急秀巗瑞灌溪領領頌雨散雲收後崔嵬數十峰倚闌頻顧望回首與誰同克文灌溪末山主頌末山不露淩雲頂今古岧嶤在目前又道本無男女相非君莫辨火中蓮遼非覺俗姓劉氏析津良鄉人有大名聞車駕幸燕重師道德詔入內説法特賜紫衣併賜號儀範大師春秋七十二僧臘四十七示化大昊天寺歸葬甘泉普濟寺非濁字貞照號純慧俗姓張氏范陽人嬰足疾遁迹盤山敷課於大白傘蓋每宴坐誦持常有山神部從敬侍尋克痊復遂於重熙八年召赴闕真延佛頂尊勝陀羅尼幢記京師奉福寺懴悔主崇祿大夫檢校太尉純慧大師之息化也附靈塔之巽位樹佛頂尊勝陀羅尼幢廣丈有尺門弟子狀師實行以記為請大師諱非濁字貞照俗姓張氏其先范陽人重熙初禮故守大師兼侍中圓融國師為師居無何嬰足疾乃遁匿盤山敷課大白傘蓋每宴坐誦持常有山神敬侍尋克痊八年冬有詔赴闕興宗皇帝賜以紫衣十八年敕授上京管內都僧録秩滿授燕京管內左街僧録屬鼎湖上仙驛徵赴闕今上以師受眷先朝乃恩加崇祿大夫檢校太保次年加檢校太傅太尉師搜訪闕章聿修睿典撰往生集二十卷進呈上嘉贊久之親為序引尋命龕次入藏清寧六年春鑾輿幸燕回次花林師侍坐於殿面受燕京管內懴悔主菩薩戒師明年二月設壇於本寺懴受之徒不可勝紀九年四月示疾告終於竹林寺即以其年五月移窆於昌平縣司空豳國公仰師髙躅建立寺塔并營是幢庶陵壑有遷而音塵不泯清寧九年五月日等偉俗姓李氏析津龎村人太康元年剃落禮儀範大師為師從師住慧濟寺受戒宣充三學殿主賜號嚴慧後示疾而終茶毗舌根不燼如青蓮色南抃甘泉普濟寺嚴慧大德塔記銘乾統七年春燕京三學寺殿主嚴慧大德賜紫沙門等偉痼疾作始夏疾有加徙居右街福田寺卧於西廡之一室余往問焉師以不起語余且有事付託四月旬七日遷逝余又往弔焉後二日茶毗於京北原及收骨舌根不燼如青蓮色其徒京西慧濟寺僧敬詮等願以㲲灰分葬因析少分與之餘盡歸於薊州盤山甘泉普濟寺從其本教以五月十一日附於先師塋所而塔焉是月初本寺都知僧敬度持首座大衆三綱等狀具師遺行來謁余曰故殿主大德平生交好縉紳間無最厚者師之行迹知者蓋少公與師平生交好最厚師之行迹信之久矣又於師寢疾時親來問及有所付託是敢以文請余既與師有舊又逼嚮之所請不克以事辭因以實而志之師俗姓李氏燕京析津縣龎村人太康元年師年二十有五始剃落禮甘泉普濟寺右街僧録判官儀範大師非覺為師後從師住慧濟寺即受戒具既而肄習經律二學咸推之大安中住福田寺暨薊之香林蘭若衆請住持師至則歷典寺任事因克濟壽昌三年宣毗尼諸部於慧濟寺京師義學輩亦以律主許之會明年三學寺奉命慎擇主寺事者以師勤幹塞其選尋授善濟大德師力整頽弊宏益居多在寺三載供費之外有錢五千餘貫乾統初有司以課最聞朝廷嘉之特賜紫方袍加號慈辨三年宣充三學殿主易其號曰嚴慧六年秋染疾至是而終俗壽五十七僧臘三十夏夫人之舍家入於浮圖氏而汨其法者往往懈惰以墮事宴安以敗名未見力行自任而有所立者若師者勤以集事幹以著名與夫懈惰宴安以坐取墮敗者逺矣嗚呼其力行自任而有所立也歟既為之記又繫之以銘云塋有地葬有時全而歸之曰嚴慧師師哉師哉勤幹有立勉諸後學無怠承襲乾統七年丁亥五月金廣溫髙安人姓韓氏幼童超卓不甘處俗丱嵗出家受經於習法師時夜有小寇竊物師聞之堅卧不動翼日習責之曰物為他人所盜寧無悔耶師曰我人也彼亦人也物有所歸又何憾焉習竒之後參同昌英公英弗納廬於巗谷間草衣木食者三年英異之乃許問道又參雲門晦堂及竹林廣慧慧曰據從來明暗兩岐依他作解須當棄卻我者裏有箇鐵酸豏從頭一一咬嚼看師頓首謝曰既往不咎乃取篋笥中祕文火之一日頓悟如桶底脫法性圓通無不了然慧印許之出住盤山雙峰寺大定戊子夏示疾而化圓新范陽六城村人得法於龍泉英公大定壬午住盤山報國寺次住天成次住法興後示疾感化謂逺侍者曰吾當翼日行腳去索浴淨髮至夜分復謂逺曰黎明西北有聲須當報吾至時果符其語聲類鐘磬方報師師巳脫去茶毗後舌齒不灰行通姓張氏雲中天德人出家近泉寺遇恩具戒後參雲孫辨公蒙印證出住仰山又住甘泉未幾而逝圓照甘泉普濟寺通和尚塔記洞山垂範冢範肅齊遞代相承不容忝竊必待其極可者方許以嗣續焉雲孫辨公先參鹿門覺和尚許為吾宗再來人次侍芙蓉潮楷老後方領衆青社天寧時會本朝撫定來都城所居奉恩華嚴萬壽等寺皆為成就從來遊師之門學師之道何啻百千其間得堪傳授者止八人師其一也師法諱行通俗姓張氏雲中天德人甫五嵗不茹葷腥匪妄言笑常遊寺宇見聖像一一作禮父母憐之俾依同里近泉寺雲懿耆德為徒遇恩具戒護持愈勤一日本師緣有所忤欲行捶責以手舉杖移時不能下人咸異之至年十八乃自奮曰迅速光隂何當得悟見性成佛之理未幾辭師遍參知識天會中聞辨老唱法燕都特來參侍後從辨老至仰山言下透脫尋印證為洞宗第十一世皇統中辨老入滅師繼住持數十載凡事無巨細悉依佛制至大定四年六月師以年老謝事雲遊道經三河何公道院次年甘泉寺疏請住持一日忽謂衆曰人生百嵗七十還稀吾巳六十有九矣忝續祖道至於今時宜當順世以示無常怡然而化茶毗日頗多異相何公仰山洎本寺析骨為三分各建塔藏之甘泉塔在寺之正北髙阜去寺僅三十步大定五年八月望日述法律薊州安固人姓張氏出家普濟寺年十七試經圓具皇統中奉宣開普度壇度僧尼十萬餘衆屢承天眷欽賜紫衣號嚴肅大師大定六年辭衆而逝沙成之甘泉普濟寺賜紫嚴肅大師塔銘師諱法律薊州醴泉鄉安固人也幼出家於甘泉普濟寺禮均上人為師於天慶七年十七嵗試經受具足戒厥後聽習戒律為宗逮天眷三年官定充燕京左街淨垢寺遂授善慶大德牒皇統二年奉宣開啓普度壇度僧尼二衆約十萬餘人八年又奉宣赴本宗上試十題所答無不中理選定充平州三學律主改授精正大德牒官講滿特賜紫嚴肅大師牒本寺大衆共議署狀請為提點供濟衆僧不避寒暑六時行道未嘗或闕方十載餘令聞四溢請住寺者五中都駐蹕福田福勝香河勝福當山香水迄大定二年宫中復差請充都下暖湯院提點設濟飢民三年已備於六年六月十五日告寂世壽六十八僧臘五十二是時雖暑氣煩溽其尸安然若石之不轉比茶毗四衆千餘人弔送無不哀慟洎終燌之際有五色雲團繞於上齒舌不煨視之如故蓋師生平住持力也門人宗律比丘善隆等奉遺骨葬於寺西敘始末屬余作銘義不可辭銘曰性資上智宗律為風清髙厲行紫牒庇躬傳戒十萬僧尼溥蒙宣題奉試理無不通化辦濟衆久而愈恭燌之祥見齒舌弗鎔勒銘幽石聊記芳蹤大定七年三月日圓覆住翁同西院時有異僧授佛牙二具鮮白如珂月覆承事二十餘年後示寂遺命建塔藏佛牙而瘞骨於塔下孫設翁同山院舍利塔記竊聞舍利者佛之真骨也雖烈焰百煉不能成灰汚津久湮不能掩彩至堅至確動有殊異者何也蓋以佛之功德法力所熏故也迄今仍有存者覆公法師靈塔是也師法諱圓覆俗姓李氏燕都渤海人也方剛時作守門綱官至保義校尉遂住漁陽之西逮大會中豫告歸沈濳故里問道於翁同西院削髮衣褐隨緣化導乾統二年二月間遇恩具戒給得度牒恭禮香林西堂柔光為師後住翁同西院重修上院府君祠并觀音殿金碧宏麗甲於幽薊一日有數僧不知何來手授佛牙二顆炫明鮮潔璣珠流溢而師朝暮設敬數僧倐然而沒於是珍藏二十餘載大定甲午四月初九日謂門弟子曰白駒易過幻化匪堅一切有為終歸寂滅又曰余宿珍藏佛牙及般若金經當於上寺之西誅蕪構塔以安其上余骨即置其下又曰生死無常各宜珍重語訖就枕奄然而逝春秋八十有五僧夏三十有三其弟溫公素與僕善祝之再四不能辭據實而書之大定九年三月十五日等俊薊州河村人少慕僧門懶居俗室父母察其志確攜赴甘泉寺禮儀範大師覺公為師後為燕京管內左街僧録大夫賜號圓肅大師加清簡二字半載告寂天會十四年建塔甘泉普濟寺澄方香河孫氏子幼好靜默出家於隆安寺十八登具遍歷講肆於諸經論無不了然講演之名籍甚後棄教歸宗悟明心地尋有本山尊宿請住上方蘭若修感化寺又修絶頂浮圖嘗示衆曰涅槃經云避役出家無心志道我當罷令還俗為王策使慚恥之服是為上服不知慚愧非佛弟子後示疾而終門人士隆建塔上方寺東麓淨榮德州張氏子精勤好道利生為懷住中盤法興寺諸山請為提點逺近聞風靡不歸依一日謂衆曰光隂有限慎勿怠墮語畢而逝知玲雲中范氏子九嵗剃髮二十圓具參嵩山少林英公悟總持法得他心通皇統中出世萬壽寺後住盤山感化寺宏揚密教大定十七年説偈告寂欽定盤山志卷八
