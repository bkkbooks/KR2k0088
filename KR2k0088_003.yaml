body:
  text: 名勝一靈奧之區大半在荒陬絶徼游者必裹數月糧伐木取道而後至盤山去京都百餘里驛路往來蒼翠在目勝處乃不減羅浮台宕諸山而記載漏略豈清淑之氣待時而顯哉其有昔在榛蕪今始疏剔者有昔稱凡俗今定主名者按其方位舉其形勢俾山水有靈無久韜晦焉若橋梁村里游覽所必由亦摉考以備山師之籍山盤山在薊州城北二十五里本名四正山相傳古有田盤先生自齊來棲遲於此魏志載田疇入徐無山中躬耕以養父母即此山也故更名田盤今省稱盤山其山脈絡雄渾首太行而尾碣石為畿左巨障高二千餘仞周百餘里五峰三盤秀甲寰宇佛廬仙窟遍布諸勝地數十年來鑾輿屢駐標異搜奇而樹石雲泉别開生面矣酈道元水經注云泃水又東在合盤山水水出山上山峻嶮人跡罕交去山三十里望山上水可髙二十餘里素湍浩然頽波歷溪沿流而下自西北轉注於泃水圖經云盤山南距滄溟西盡泃水東放碣石自遠望之層巒疊嶂崒嵂排空真為雄勝曹學佺名勝志云盤山一名盤龍山在州西北二十五里髙二千仞周百餘里山北數峰林立如削曰紫蓋曰宿猿尤為奇特最髙者曰上盤頂有巨石以指搖之輒動上有二龍潭下有潮井又有澤鉢泉稍下者曰中盤東行十餘里蔚然深秀怪石突起曰白巖日暮山光嵐氣濛濛如雨上有古寺山南有小嶺陡絶難行曰砂嶺髙二百餘仞周六里泉水沿石竇下為砂河東流合五里河洪升駁名勝志云庚午春余游盤山歸取曹能始名勝志讀之云上盤頂有巨石以指搖之輒動今搖動石在千相寺後與上盤無涉又云上有二龍潭偕僧石林由松樹峪入盤折亂山幾十餘里先得小龍潭一復行見巨石兩旁潭形若釜為舊龍潭又深入數里歷鷹嶺豸峰諸勝抵山後將盡處有三潭蟬聨不遠中一潭最深黑云龍濳處其去上盤幾二十里又云山南有砂嶺髙二百餘仞陡絶難行今砂嶺為入山孔道亦不甚髙按能始有盤山詩似曾親游歷者何以多謬若此顧祖禹方輿紀要云泃水在薊州北四十里一名廣漢川俗名黃崖川發源黃崖口一支西南流經盤山之隂入平谷為泃河一支東南流經盤山之陽過三義口入寶坻縣之白龍港宋廣川郡之名以此王士禎曰據酈注鮑丘水條下有盤山又有徐無山徐無山下有田子泰避難居之之文田所居或在盤山或在徐無更一考證方確朱彞尊曰姬志真云古有田盤先生自齊而來棲遲此山則田盤是人名非田疇居此盤桓而名之也宜詳考智朴山水人物辨訛盤山舊名四正山一名徐無山以田疇隱居於此又名田盤山酈注中多舛誤按鮑丘水云其水自雍奴縣故城西北舊分笥溝水東出合笥溝斷衆川東注混同一瀆東徑其縣北又東與泃河合水出右北平無終縣西山白楊谷西北流徑平谷縣屈西南流獨樂水入焉水出北抱犢固南徑平谷縣故城東其水南流入於泃泃水又東左合盤山水今以盤山之形勝論之盤山東南四十里為薊州百二十里為玉田即古無終縣疇故里也西南七十里為三河即古臨泃縣也西北四十里為平谷疑疇導道破烏丸之平岡界也然護山之水其源出自黃崖口一名廣漢川黃崖去薊北四十里水分為二一派西南流徑盤山之隂為獨樂河􅑴流之平谷靈山泉水注之入三河為泃水過草橋河古鮑丘河一名白河匯盤山左去之水至三義口入寶坻縣之白龍港方與紀要此處亦訛一派東南流徑薊南五里橋匯盤山右去之水入溵流河二水皆自北而南屈而東無終適當其東南而酈注以為無終西山之水流徑平谷按平谷至無終相去百六十里中有盤山間隔豈有無終東南之水而反流入平谷之西北邪況無終之西無山田疇傳云濱海汙下濘滯不通指此地也又平谷縣屈西南流獨樂水入焉然獨樂之水在縣之東盤之北俗呼獨漏河以其水至此伏流里許復涌出故名而酈注反以為在其西南何歟又方輿紀要云泃河在平谷縣東南自薊州流入界又南入三河按平谷在盤山西北四周皆山古名盤隂去薊東南八十里盤嶺間之豈有薊水而反流入平谷邪此皆支離漫引幾不可考再按田疇率宗族他附從數百人入徐無山中營深險平敞地而居躬耕以養父母今感化寺是其遺址寺碑戴魏太和中無終縣民田氏兹焉營辦其地背負髙山面瞰平原中有土阜如城郭周數里清流茂樹堪為都邑而遵化北亦有徐無山或謂田疇避難於此二者併存薊州為是至於姬志真田盤先生之說則又誕妄無稽按雲山集云漁陽西北之山本名四正古有田盤先生自齊而來棲遲此山因名盤山又祥邁辨訛録云張志格姬志真等於至元壬午至盤山借居法興寺丙戌春請長春真人建醮因規永定王道政奏請太后樹碑易額為棲雲觀諦觀二說田盤先生之確屬何代自齊而來是何郡邑必有本末見於傳記如焦山之於焦先匡山之於匡俗乃可以山當之豈有突然而出泛然而遇以烏有子虛之人而輒以山當之者乎竊意以人名山必歸子泰田盤先生之有無正自不須深辨耳嗚呼凡天下事物之跡必親見而詳審之乃可無疑於衷若以耳食得之鮮有不紕繆者即以盤山一區之山水人物考之概可見矣智朴又云砂嶺曹能始名勝志謂髙二百餘仞洪升昉思非之按砂嶺自昔稱險峭萬厯中僧明澄募資鳩工去其磽確鑿為坦途昉思未見昔日之險峭能始抑焉知今日之坦途邪謹按姬翼雲山集田盤先生之說舊志疑為鑿空傅㑹域中名山如吳支硎閩武夷之屬俱以荒遠不可稽之姓氏得名千載若概以為不可信則廬君匡俗事殊時異耳傳之談見譏道元久矣存而不論亦記載之良法也智朴援据史冊以山屬之子泰似矣而必指田盤先生為子虗烏有之人且以辨訛録道流樹碑易額之故並其傳語痛斥之抑何所見之不廣耶智朴按盤山舊名無終山徐無山乃無終山之訛耳始於陳壽作田疇列傳後人沿襲不復辨别曹操表論田疇云疇率宗人避難於無終山又陶濳擬古詩云辭家夙嚴駕當往至無終又劉之推九州要略云古漁陽北有無終山山上有燕昭王冢冢去千像寺東南不數里而人無知之者遵化城北有徐無山亦繆傳耳謹按太平寰宇記無終山一名翁同山又名隂山在漁陽縣西北四里又考水經注載陽翁伯碑文云居於縣北六十里翁同之山後路徙於西山之下陽公又遷焉而受玉田之賜今畿輔通志玉田縣東北三十里薊州城北五里俱有無終山意昔時漁陽南北諸山皆號無終山境所跨甚廣後漸隨境標異僅有一二處未更舊稱故彼此互見今觀翁同附於田盤則知田盤舊統於無終矣燕昭王冢通志在玉田縣並述明志在府西清河縣保定府志在易州東南錯互不可置辨劉之推作九州要略時張雷伐木照狸之跡尚可稽訪所言宜較確鑿耳再考通志遵化州下亦不載徐無山蓮花山怪石攢簇如千葉蓮花在雙峰寺西南為盤之支山小盤山在盤山東北亦盤之支山漁山在盤山東南二十里山多泉冬夏噴涌成湖居民因之開為稻田菰蒲荇藻宛似江鄉昔有豪家作别墅極其宏敞廢基存焉圖經云漁山在城西北三里髙百餘丈周五里郡在此山之南故曰漁陽水繞山下故曰漁水崆峒山一名翁同山薊州城北五里上有崔府君祠又名府君山按州志舊有日照寺朱彞尊日下舊聞云按岷州原州肅州汝州薊州贑州皆有空同山史黃帝本紀西至於空同登雞頭世以為隴右之山無致疑者左傳哀公二十六年宋景公游於空澤卒於連中大尹興空澤之士千甲奉公自空桐入則汝州之山也山下有廣成城廣成澤上有廣成觀宋宣和中汝守林時請於朝建立說者謂襄城具茨壤地相接疑軒皇問道當於此地然稽之爾雅北戴斗極為空桐空桐之人武司馬彪注莊子亦云空桐當斗之山則空桐宜在北矣且問道之文載於莊子其初往見廣成子謂帝不足以語至道退而築特室席白茆間居三月復往要之廣成子南首而卧帝順下風膝行而進當日帝邑於涿鹿之阿去薊甚邇故不難復要之又寰宇記薊縣有雞頭山空桐雞頭相去不遠而陳子昂薊丘覽古詩云尚思廣成子遺跡白雲隈然則薊之空桐未可定其非黃帝問道之所也陳子昂薊丘覽古詩北登薊丘望求古軒轅臺應龍已不見牧馬空塵埃尚思廣成子遺蹟白雲隈甘泉山一名石獒山山頂有石獒中有寺曰普濟五名山一名興隆頂在盤山東南十五里上有道觀蔣福山在甘泉山後有龍潭謹按畿輔通志漁山崆峒山甘泉山五名山特標主名薊志如之並别載蔣福山固不與蓮花小盤之包絡聨屬於田盤者為類也蓋田盤自白巖寺以右砂嶺以東崕石巉削凌厲不戴寸土迥異諸山諸山去盤遠止十餘里近不四五里度其形勢僅足稱兹山之附庸舊志載之猶太行連亘數十郡邑因地立名而總謂之太行也今附列於後諸山中泉石寺觀亦從此例庶幾不漏不紊云峰挂月峰鋭上削下定光佛塔在其巔數十里外即望見之歷千百盤乃得至俯視諸峰帖帖然如處肘腋下矣洪升登挂月峰寄朱竹垞檢討詩五峰各各競秀挂月一峰獨尊仰視浮圖天近俯窺下界塵翻薊遼故國東鎮山海中原北門恨不攜君共眺臨風長嘯雲根自來峰與挂月峰相連髙亦相亞一名北臺舊有遼時無梁殿中供黃龍祖師銅像正統十四年重修旋圮今遺址存焉德意登自來峰望薊門詩髙步自來峰逌然清興永雲侵塔影寒松映山光冷隱顯見孤城髙低環翠嶺箇中絶勝觀迥出塵勞境紫蓋峰居盤山之中故名中臺體勢周圓無所依倚諸剎龍脈多發於此衛台瑺望紫蓋峰詩朝上青溝山石滑路亦險披霞雪未消滿地葉如染亭亭紫蓋峰蒼烟餘一點蓮花峰一名東臺一名削玉峰一名九華峰聖祖御製詩有中盤遙望蓮花峰之句蓋峰勢離奇詭瓌自遠望之則層層內向宛然華菂之相輔也因定今名焉智朴九華峰詩盤龍結聚奇轉處開生面歷歷九華峰烟雲時隱現雙峰在舞劒臺北三里兩峰並峙如角一名玉峰峰背有塘産玉石蔣溥雙峰詩斜日淡秋林飛雲何莽坱矯首望雙峰對峙層霄朗屹若蹲虎豹森如搏獅象誰施斧鑿功毋乃巨靈掌舞劒懷昔人英風來颯爽嶕嶢峰在上方寺之西蒼壁卓立千疊萬重石勢皆直裂至巔屴崱凌虛不可繪狀盤之最奇絶處董邦達游嶕嶢峰詩撥雲窮千峰峰勢益青峭劒鋩劃髙空天紳引衆竅鑱刻神所為詭瓌意非料木末見鶻盤洞底聽猿噭一步一徙倚轉入轉䆗窱細路秋氣涼樵子下夕照指余石門間天窄回兩曜右壑俯窅深左巖跨蜩蟉嵐光動浮浮恍惚託海嶠心怡乃忘疲境險皆入妙方知平生游徒貽柳州譙少住縹眇中破暝振長嘯翠屛峰在天成寺後古木千章悉從石罅中逬出層層鱗砌紅碧交映王衡云乃山之曲室殆非人間良不虛語蔣溥翠屛峰詩天成山寺後幽絶翠屛峰紺碧攢奇石雲烟攫古松乍留游客屐不隔梵王鐘招隱如堪賦薪歌或一逢錐峰在紫蓋峰北過峽處峰小而鋭如錐董邦達錐峰詩巨靈引神錐何年此地卓脫穎凌霄漢其巔不盈握蒼然偃蓋中紫翠忽如削乃知造物幻翻笑五丁鑿雲過一線開澗清倒影落萬古厲廉隅特立鎮巖壑毗盧峰亦以形似得名在古中盤上蔣溥毗盧峰詩一峰突兀敞雲端蓮瓣層層寶髻攢若使髙僧為說法點頭應見動花冠獬豸峰在黑龍潭東南三里碎玉峰在鷹兒嶺北石晾甲石御題貞觀遺踪在行宫西偏千尺雪上石勢排連瑩潔如砥迤邐下趨泉流潺潺齧其趾相傳唐太宗東征晾甲於此摩崖篆書唐文皇晾甲石六字丹梯石御題丹梯勝處由晾甲石陟山磴道斜轉繡壁丹崕森倚相向洵稱偉觀蛾緑石御題蛾緑二字古苔䝉羃黛色冉冉欲流山中石皆爾特標此以例其餘石近翠幄亭翥鳯石御題翥鳯二字未至半天樓路側巑岏萬態一石尤聳突如長離之將飛而振其翮也仙掌石御題仙掌二字纈林掩映片雲孤撐是為泠然閣之後障翠腴石御題翠腴二字石色純碧出飛檐層宇上一房山得名以此濯烟霏石御題濯烟霏三字罨翠亭左右萬笏離立象極詭異此更擅蒼潤之勝青牛石御題青牛二字蹲踞道左形色逼肖在擷翠樓後藉琴石御題藉琴二字近琴峽亭於此撫絃動操則萬澗泉聲應之小石城在婉孌草堂前奇石攢簇屹然壁立山有天然城郭之稱此具其勝矣蘿屛石御題蘿屛二字在宫垣外西北山腰髙數百尋薜荔叢蔓以丹碧渲染之入山者瞻宸翰焉董邦達蘿屏石詩翠蘿裊空際石屛髙入雲萬山青不盡卓立明斜曛懸空石在西架靜室後廣數尋縱更倍蓰綴絶壁間大半覆出空外其前陡峻不容趾游者或紆道出其背惴惴然不能竚足蔣葵長安客話云盤山之石皆鋭下而豐上故多飛動崕前有懸空石粘空而立青削倒地蔣溥懸空石詩奇石嵌空俯絶壁欲墮不墮勢欹側游人扶杖不敢過仰視目瞀心怵惕疑是夸蛾挾以來小憩懸崕如運甓松風謖謖天半搖時透返景蒼苔色搖動石在千相寺北林木茂密中大若夏屋體圓正承以方石微撼之輒動劉侗帝京景物略云千像寺唐開元中寺也寺後半里一石縱二丈廣丈有五尺一人推之則動衆人推則不動王煐搖動石詩頑石若含靈所處良亦險不必待生公逢人頭便㸃天門開在白猿洞上摩崖三字徑五尺明北海劉應節書兩峰對立雲表若雙闕左礙巨巖右臨絶壑徑路危阻必捫蘿附葛以登故至者恆鮮袁宏道游天門開詩發足自髻石彎環可四里一步一驚魂路荒不容跐黏背行刀脊下視深無底狂崿搆虛空癡石綴瘢痏其沙生以墳其骨汗而泚其草油以絲其樹糟而圮忽然磽確巖忽然奔騰水忽而沒九天忽而九淵起健夫引長繩半日一移趾四肢互相用臂行足以視或如鴨折身或如丁旋尾或如鷇出㲉或如蟹引跪又如研古繪蟲蠧蝕絲理又如讀殷盤聱牙飣奧詭當其快心意虛空躍繩伎少焉筋力疲蚊虻撼犀兕須髮生烟嵐肌膚碎荆杞百苦到天門相對惟口哆雙壁削青銅飛鳥不能止一匣銜古光方空如水洗隂陽工刻轢霜雪恣摩砥萬古貯雲霞石紋繡青紫敗桐蛇腹段古鈕蠐螬蠡詰曲史籀畫斑駁硃砂蘂僧言三十年兹石未沾履往時戚將軍架空一遊此長老傳白猿今來猿亦死是時七月初寒肌生粟子引指人人危回家面面鬼歸來問僮僕髭鬚白餘幾破網取珊瑚拚命競奇傀鄭纘祖游天門開詩峰巔盤幾里發足難支拄一步一兢兢目眩敢回覩烟嵐曉漸分溪壑深無數長繩勇可縋移時進尺許或似蟹橫行或似穴緣鼠百苦與千辛才到天門所幸我筋力堅全是山靈祜兩壁夾天開相對揖而怒怪石簇竒花色映寒松古深洞探白猿懸崕瞰吼虎游客欲歸來雲深迷出處將軍石在舍利塔下二里帳房石在少林寺前四角有孔相傳唐太宗駐蹕處菱角石在少林寺前大數丈形似菱角蟒石在少林寺前長二丈餘橫松下上有孔東石壁刻盤山古蹟四篆字旁書帶川題帶川金大定時人白峪亦有蟒石長三丈餘燕子石在報國寺東形如燕巢一名燕子石溝蔣溥燕子石詩何時石燕壘巢成似聽呢喃下上聲紅杏滿山春雨過好穿翠靄試身輕仙臺石在上方寺東南路旁金馬石一名龍馬石在先師臺後俗呼金馬石溝仙人石先師臺東半里上有人影經久不沒望之如生董邦達仙人石詩飛仙鍊形自太古影照空山欲起舞丹成藏在石壇邊靈藥神芝不可數髻石見袁宏道詩槖他石在萬松寺山門西南鳯翅石見盧雍詩法船石在法藏寺門前上刻法船石三字蔣溥法船石詩法船蕩雲海藤蘿牽錦纜筏喻證真如山風時淡淡談禪石在古中盤南古松棚下大博和尚嘗談禪於此上刻談禪石三字又有小搖動石在五松堂前探海石在觀音洞上天門石及茆菴石在毗盧峰下抱子石在西南山口麵筋石在西山頂壽星石在南嶺古中盤所稱八石也宋宗元談禪石詩不見談禪人談禪石猶在落葉響空山無言常獨對蒲團石在東甘澗觀音庵門前廣八尺面坦無棱礪古松䕃之如覆笠龍震松下卧蒲團石詩東岡頂上卧懸崖身被虬松緑氣埋一枕濤聲萬壑冷此間誰復有形骸浮石舫在上甘澗東北峰頂狀如海舶烟雨晦冥時望之浮浮欲動擁背石與浮石舫相連古雲根在紫蓋峰東北澗中敧邪而立髙數丈石紋皴斑如豹李鍇古雲根石詩兀兀倚天門莊嚴氣象尊龍騰應變化鶴立不飛翻秋色寒人面青天濕雨痕野樵頻指㸃云是古雲根清涼石青溝前半里兩山夾持一石周十三丈平如几案下有文殊洞雲箋石青溝西南二里縱橫數十丈苔蘚斑駁若繪蔣溥雲箋石詩名山摉勝蹟怪石倚斜曛雁影留奇字苔痕蝕古文毫抽峰翠滴墨蘸露華紛玉檢何年閟孤根插白雲燕剪石在東竺庵外髙數丈如雙燕並翅洗心石在天池上周五丈面如砥其後峰矗立如屛巖白巖在蓮花峰有上中下三巖其上巖即蓮花峰龍巖在上盤見盧雍詩餐氣巖在舍利塔下有石刻字俗呼喘氣巖神工巖俗名斧鑿巖在龍鳯庵西南路北大小髙低形如斧鑿碎玉巖在獬豸峰北二里懸石磊磊無數上即碎玉峰董邦達碎玉巖詩萬玉聚層巖峻嶒粲林立時穿白雲過不覺衣霑濕飛翠巖在上甘澗後蔣溥飛翠巖詩天風吹空濛泉聲乍幽澀路出上甘澗靈巖相拱揖黛掃逺峰橫翠滴山花濕澄懷淡清暉愛此輕隂襲龍首巖在青溝主山上似龍昂首滴水巖在少林寺東北城口澗側山削路絶必臂行肘接而下臺五臺即山之五峰舊有此稱所以辨方正位也其二頂平坦如臺故名臺其三仍峰名中臺即紫蓋峰東臺即蓮花峰北臺即自來峰先師臺為南臺突兀軒豁其上砥平臺外石峭如削登之可盡見山陽數百里形勝相傳為黃龍尊師趺坐處董邦達先師臺詩崇臺踞峰巔縱目了無礙樹色明漁陽雲光延紫塞蒼茫六幕中巨海浮積塊緬昔宴坐人青山日相對說法法真空斷碣事鮮載至今講座前頑石羅幾輩古井猶寒泉野卉無凡熊支笻淡忘言斜日孤鳥背舞劒臺為西臺唐李靖舞劒處由萬松寺取徑歷泉竇林坳乃躋其巔天風浩浩四望無極昔人游記言之詳矣李靖舞劒歌陟崇岡兮望四圍閃兮斷虹飛嗟嗟三軍唱凱歸劉侗帝京景物略云李靖舞劒臺石最堅不可鑿有唐李從簡來游數字刻石字徑五寸李仙根舞劒臺碑記薊北多山山之勝盤為最陟山五六里路益折境益幽有梵剎巍然倚於天中者曰衛公庵循菴而上於木石嶙峋間得小徑至孤峰之巔曰舞劒臺即唐李衛公靖舞劒處也壬子春金華戴汝兆與同人探奇觴飲於此慨然曰斯臺與庵皆英雄故蹟也僉欲勒石記之徵文於余余思衛公抱奇才大略仗劒起蒿萊輔太原真人龍戰而有天下意氣辟易古今考貞觀十九年上征髙麗公以元老扈從流覽形勝抒其曩昔行師之略遂建剎於兹山若李節度之創平等閣靈根佛性英雄同轍未可知也西望燕山東眺遼海拔劒起舞公固有所托乎迄於今雲霞絢采天風嘯號儼如當日劒影淩虛流虹激電相為上下云康熙十二年癸丑冬日張弼舞劒臺送客詩舞劒臺前木葉飛蕭蕭涼思欲侵衣天涯萬里孤鴻逺且對黃花醉落暉智鼎冬日登舞劒臺詩萬松雪後見冷翠襲人衣磴道隨笻轉髙巖逐鳥飛古今能放曠天地總依稀小立層臺上烟光淡落暉洪升舞劒臺歌衛公東征返幽薊頭白依然氣精鋭酒酣拔劒舞髙臺左盤右旋出奇勢青萍光射戰袍赤白日黃砂暗荒磧掣電流虹若有神百道金蛇散空碧至今片石盤山頭長城坐扼如防秋千嵗蒼松三兩樹天風怒起聲颼颼凌烟圖畫銷沉矣建剎飯僧傳故址自是功名末路心英雄末路多歸此袁松秋日同梁漢玉登舞劒臺詩不倦登山興來尋舞劒臺雁行邊戍近秋色薊門開片石摩還古英魂老未摧何當重過此樽酒共徘徊龍震登舞劒臺詩朝登舞劒臺不止思衛公人生重意氣出處總相同我雖不好武到此心亦雄西望西山西東觀東海東白雲無盡時萬樹多英風神龍不見尾何必待成功米大翰舞劒臺詩藥師雄氣動山隈千古猶存舞劒臺今日登臨空嘯傲腰間蘭葉未攜來查曦登李衛公舞劒臺詩髙臺下望朔雲馳往事猶傳李藥師今我來觀長劒跡卻從天外立多時謹按舊唐書李靖傳太宗將伐遼東召靖入閣賜坐御前謂曰公南平吳㑹北破沙漠西定慕容惟東有髙麗未服公意如何對曰臣往者憑藉天威薄展微效今殘年朽骨惟擬此行陛下不棄老臣病斯瘳矣太宗憫其羸老不許則靖固未嘗扈從也或又云靖為定襄道行軍總管曾登此臺史載靖率兵自馬邑直趨惡陽嶺以逼突利地越千里亦未聞建旗鼓出此則指東征北伐之時為仗劒悲歌之日舛矣當其壯年英奮西嶽誓神安知爾時不一策馬薊門歌辭所云别有寄託惜世遠無從考證耳或又疑李績於貞觀總章兩帥遼東以靖績聲近而誤則又不然唐興名將英衛齊稱而身後論定賢否徑庭慕其人而傳其蹟其屬之藥師無疑矣嶺大嶺雙峰寺西五里其山南折忽斷如巷萬厯中開盤路有佛剎茶亭碑版留題頗多今廢孫承宗過大嶺寄王司馬岵雲詩帝座雯華散紫宸風烟千里護征輪於今社稷勞明主自昔安危寄大臣插羽當關驚伏虎借籌開閣幾圖麟側身東望榆山近似說旌旗氣色新砂嶺大嶺南去十里有小阜曰砂嶺萬厯中僧明澄募資鳩工去其磽確遂為坦途長嶺在史家莊南入山道鷹兒嶺在黑龍潭南二里形如鶻立宋宗元鷹兒嶺詩決雲勢欲騰長斂摩天翮空際立霜拳驚回鷙鳥百吁嗟兹嶺世所稀􅑷身側目骨權奇㑹看風髙毛羽振紛紛燕雀爾何知歡喜嶺在萬松寺東浮青嶺天成寺西上青浮翠涌至舞劒臺宋宗元浮青嶺詩策杖天成西空中疊蔥翠林烟互變滅羃䍥紛如繪吁嗟兹嶺足幽尋舞劒臺髙嵐氣侵風雲猶作龍蛇勢磴道斜穿松檜林盤嶺甘露庵西北十五里有盤谷寺金雞嶺舍利塔後最險峭俯視長城蜿蜒在揖授間欽定盤山志卷三
