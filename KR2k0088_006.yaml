body:
  text: 欽定四庫全書欽定盤山志卷六寺宇萬松寺舊名衛公菴菴西上舞劒臺乃唐李藥師靖舞劒處也菴不知建於何時萬厯四年僧普照卓錫於此導人修净業神宗御書清心二字存菴中崇禎中僧勝雲重修國朝康熙四十四年僧祥慶又新之聖祖駕幸御書樂天真三字懸殿中央敕改萬松寺乾隆十年賜金繕葺寺左有仙人橋右有槖他石石上刻御製詩前峙浮青歡喜二嶺吕升凱重修衛公庵碑記往官閒曹休沐暇嘗偕客縱游西山四顧巗壑聳秀夭矯幽竒撫掌大笑曰近畿勝槩觀止矣客曰未也畿之東為漁陽郡郡之西北三十里為盤山勢回旋而磅礴左碣石右泃水滄溟匯其南崖嶺環其北層巒疊嶂接日干霄飛瀑奔泉噴松鬭石中有古剎七十餘此乃近畿一巨觀也時恍然神游其際頃之不自意拜度支郎命來董薊儲竊幸天假勝緣比值羽書旁午日疲於會計未踐夙盟適家弟升時至覽興鬱勃挾侣作小試遊循趾及腰捫蘿躡磴層纍而登是為盤山危峰陡絶鳥道猿攀最髙者曰上盤跡未及到已駴目動心嗒然而返歸休於衛公菴菴之住持勝公供茗出與語雅有宗風相將登眺祗見拓基宏敞構宇崇隆不知廢幾許工力步至庭際有豐碑夾峙已鐫其一諦視之則少林寺嵩麓上人以重建落成為大師普照祖若孫志其勤也其一尚濯濯叩之勝公對曰是役也肇自神宗初年嘉賴十方微普照祖大願力不及此遞及孫雲輩廣募益摰飽茹苦辛歷數十􅑤乃觀厥成懼代逺績湮勒之貞珉以昭示後人然一切功德主無量福田豈可令其泯泯無聞用是虛石以待家弟曰有是舉盍圎是事勝公進曰曩嘗丐之名公大人矣未荷許可今之使君介弟得無意乎倘徼惠于部使君不靳𤣥屑於以並垂不朽幸甚家弟逡巡不能卻輒唯唯歸以語余余瞿然自失曰盤山為海內游覽地騷人宗匠往來如織吾雖少讀父書長而不文豈以名碩所避席者而為我漫嘗之顧家弟業謬諾之矣且奈何况兹勝概余屐齒未到又菴以衛公得名亦未遑詳考余何言姑就勝公之語次其顛末為諸檀越志功德云爾繫之以銘銘曰維山崒嵂懸削林立維水潺湲紆回環碧翠微鬱蓊爰敞梵宫厥標伊何唐勳衛公疇則開宗實繄普照疇則繼志雲孫克紹輪奐有煒鳥革翬飛廣募纍勩式廓丕基林總檀那聚沙成米令德昭垂千秋曷已崇禎十三年庚辰九月程文彛重修李靖菴記盤山畿東勝地也去神京百八十里與翠屏山相接龍山環匝鳳水縈紆有龍游鳳覽之勢緣崕攀磴而上雲氣嵐光青紫萬狀左有仙人橋青溝飛流激湍磅礴於蒼松古柏間恍惚不可端倪至澗道盤鬱一似太行之山之谷故又號盤谷右仄徑而下乃舞劔臺相沿為唐李靖學劔處再迤邐而後有六王寨說者謂七國時燕太子丹㑹六王故名風日晴好振衣登其巔則舍利塔在焉塔中舍利為漢金仙所遺事寖久不可考旁有挂月峰相對為自來峰法華洞五峰八石三洞芝草錯雜其間此洞天福地也遊仙往往過之明普照大師名明空豐潤人宋姓棄家安禪神宗知之賜清心二字劄一道歸盤山未幾徒道安嗣其法今上御極之十有四年嵗次已卯十月駐蹕訪盤山之勝住僧祥慶嗣孫來平隨駕登山䝉上顧問賜金戊午秋已未春更䝉賜金及宸翰樂天真三字丙寅冬駕再臨卒未秋僧來平接理法席甲申春駕復巡幸恩賜敕改萬松寺及御書金經等誠亘古之竒逢不世之異數祇樹園中獲此墨寶與盤山並峙乾坤彪炳日星昭灼嶽瀆久而彌昌逺而彌光又豈千百代易得之遇耶揣知拈花時無詞可贊請以秀色滿天東一語作頌然猶恐彰美傳盛之未詳也爰托數語勒之石以垂不朽云康熙四十四年歲次乙酉四月阮旻錫宿衛公菴詩乍到翻疑夢如登故國山路盤千嶂入人在萬松間夜雨泉邊至秋聲塞外還英雄空說劔何似老僧閒鄭纘祖宿衛公菴詩庵從昔賢名客自今秋至流覽值新晴山容分外翠崕懸松子落壁斷鼯鼪戲簷際影蕭踈輕飈揚薜荔躋攀信忘疲深坐猶如跂髙閣俯層巒一一當忩視名象紛難齊邪暉晚滋媚林昏忽已暝月出景逾異棲鳥時一鳴山空人未睡有懷成獨往幽通小徑邃閴寂澗香生空虛巗響墜寒泉兼落葉靜聽聲不二夜迥佛燈涼孤光耿宵寐髙士竒衛公菴詩夾天開小徑岝峉隱諸峰黛色千崕石濤聲萬壑松林深微見寺谷靜逺聞鐘虛閣何年藉聊清塵外蹤袁松衛公庵詩此地真堪隱山忩晚更幽月移松磴出風定石泉流覔句慚髙適摩碑憶李侯還期登絶頂千里望中收梁洪入盤山宿衛公庵詩盤盤石路到髙峰繞寺蒼蒼萬樹松杖底泉虛青草遍鳥邉崖斷白雲封塵襟逺隔如千里山色才看第一重獨念今宵禪榻穩不眠先聽上方鐘張朝琮衛公菴詩昔賢久云沒勳業在青史如何巗穴間英名尚留此嵯峨梵宇深怪樹虯龍徙髙閣俯嶙峋幽潔無塵滓猿攀鳥道紆崇臺亘聳峙突兀矗層霄雲霞接步履精爽應不昧中夜練光起竒才曠逺猷根性非凡鄙誰云當暮年烈士心未已登臨懷古今俯仰思所以其然豈其然千載存疑似法藏寺舊名茶子菴成化中修國朝康熙中僧飬心又修乾隆十九年奉敕修殿左有古松為盤山第一住僧實乎擬建東廂欲去此樹夜夢一碩士揖而告曰吾住此山久矣師奈何促吾行僧覺其異遂不敢伐前有法船石門東有楞嚴臺石王嘉謨法藏寺詩折阪殿懸崖悠然縱鞍韅綿綿谷口雲飄墮白如練峰巒忽相冒竒石還驚眩大者數十尋小或等冠辨峰巔有紺宇歷歷皆可見水懷僧栖樂倍覺塵情倦稀逢采芝侣獨立幾回眄李鍇法藏寺詩至味伏餘甘修塗引紆步沙石犬牙嚙人遵虎行路壑隂塞叢莽亹荒立枯樹野風來蕭蕭若與山鬼逆道心不自鎮白日生恐怖㟹嶆諒終古中乃具百度古瓦栖圎榱丹華脫桓柱龕燈久無蕊遂為靈狐据生滅信更事此理長不住大地接慈航寺前有法船石風波卒誰渡智朴法藏寺詩排列峰巒似弟昆周回四顧總無門竒松虯結龍蛇鬬怪石斕斑虎豹蹲僧老巗頭驚俗客花開洞口護仙源卜居喜近三椽地日日來游不憚煩青峰寺舊名青峰菴在青陽峪明正德丙子僧德果修萬厯丙子僧常淨葺之國朝康熙中僧隆寶又葺之聖祖賜青峰寺額乾隆十九年飭有司相度營繕焉寺內有聖水井無名氏青峰菴題壁詩隂隂泉脈出僧房煮茗松煙隔舍香自對雙峰看宿黛石橋槲葉午風涼偶因休沐乞身閒除目鄉書更不關試問使君新事業日游一寺遍盤山洪升青峰庵詩幾日杏花春色盡半山松影夕陽穨難忘惠逺留題處重到青峰寺裏來雙峰寺在雙峰下舊名重巒禪院有石碣載貞觀中尉遲敬德監造萬厯三十年慈聖皇太后出內帑重建賜龍藏及供用之物歲久堊黝剝落皇上御極之十有九年巡幸過此命有司修治以還舊觀唐文皇詔有隋失道九脈沸騰朕親總元戎致兹明罰恐九泉之下尚淪鼎鑊八難之間永纒冰炭所以樹立福田濟其魂魄可於建義以來交兵之處為義士凶徒殯身滅陳者各建寺剎招延勝侣望法鼓所震變炎火於青蓮清梵所聞易苦海於甘露所司量定處所並立寺宇具為事條以聞稱朕矜哀之意王嘉謨雙峰寺詩逺眺翠微近雲朩淡清􅐾石華浮半空飛泉激流澌其陽饒怪石小大紛參差萬嶺鬱相錯孤雲停不移中峰構翠龕一一能仁祠山僧衣蘿薜雜以松蘚皮導我摩蒼崖覽古生遐思又登雙峰寺閣詩雙門開闔重神州四塞煙沙感壯游日色不暄花異候雲雷在下瀑無休僧鐘祗報窺階鳥客隊難驚飲澗猴醉欲題峰依古寺苔封蘚護使人愁金山寺一名四門塔光啓二年七月建有石碣存稱薊州大夫張公修造又有國子監祭酒張峒題詩勒石薊州大夫峒之仲孫也下有五盆溝招提寺在先師臺上相傳黃龍禪師熏修處萬厯庚寅蔡如蕙重建殿宇以奉大士後有漁陽獨控四字陶有學書前有古塔疑為黃龍塔然無據西有說法臺東有仙人石下有井深三丈餘塊石鑿成旁有瀑泉二字月空書再下有先師臺三字蔡如芝書再下有竒觀二字李茂時書再下有東五臺三字字俱鐫石壁徑二三尺許此盤山之最髙敞處也陶望齡先師臺建寺碑記余讀諸君子游盤山詩輒恍然神游也既而歎曰安得與山靈期一往游目乎比余叔氏日觀游兹山歸為余道其勝甚悉余益懷思之而有所謂先師臺者相傳黃龍禪師所熏修處也適當山之陽漕河繞其南漁陽環其左下瞰衆壑吸欱雲霧上有峭石瀑泉靈氣時時覆之兹臺蓋獨踞盤之最勝而鴻臚蔡仲子盤泉今以栖大士像者也仲子之先人來峰素奉大士教甚謹嘗渡遼海涉江淮瀕死者數矣而輒賴大士力以全乃創精藍於盤之隂曰淨業庵鑄金像其中逮蔡君既逝而庵以僻逺峻絶故車馬罕至日漸圮今年春蔡仲子與季子盤巗壻鳴沖張子挈余叔氏游於斯徘徊慨嘆者久之傷其以僻故廢隳先人之緒乃因此臺舊址益莊嚴其居以徙大士像訪比丘真悟者主之蓋下控通衢往來游觀者甚便其登臺遐矚則又迥隔塵境矣嗟乎兹臺為先師修也後數百年乃以栖大士焉知其後來不有如先師者興乎而又焉知先師以前非古佛道場也大抵仙巗佛石在在有之恆沙諸佛出以應世𢎞化遞去遞來塵劫變幻如泡影露電何常之有雖然其真常不變者自有在也儻即以真常者真無常不變也閲至變天地且相為終焉而況兹臺乎今喜乃無替先人之志也且以旌先人之歷試艱難而不忘所報也遂因其請而為之記蔡仲子名如蕙好施與利物蓋有古燕趙感慨之遺風云萬厯十八年庚寅九日李鍇招提寺詩荒絶招提寺淒涼賸佛尊穴穿山鼠鬭壁坼女蘿翻苔繡懸燈石人煙報水村遍岩甃石寺盛時懸燈其上燦如列星寺南有石井穿巨石三丈餘而得水山下有報水村此心初不住往者復何言白巗寺在盤山東盡處建自唐代遼天顯十一年重修有元僧恆志碑記又有慶夀提㸃裕公塔銘金大定中重修明天順中香林藴空禪師退隱於此號白巗叟董邦逹白巗寺詩十里山南策瘦笻祇園一徑蔽䝉茸密林礙帽垂丹柿虗牖敷牀列翠峰荒蘚未埋前代碣晚風時送上方鐘道人莫訝心神逸路入煙嵐幾萬重瑞雲菴向在千相寺西始建嵗月無考金大安中重修今移建於山麓齊堂禪室具焉董邦逹瑞雲菴詩此中猶太古煙火幾人家樵路逢新霽禪房落晚花青山堪獨往白業問三車證處無言說林端聞噪鴉水月菴萬厯癸丑建庵南有泉自石龍口出涓涓不涸袁和水月菴碑記余以壬子冬秉憲薊鎮未幾而兼攝密鎮於是往來盤山之麓盤山固畿東一大觀也層巒聳翠泉甘土肥其間松柏之叢茂果實之繁盛種種色色未易僂指枚數山行里許有崇崕峻嶺土人以砂嶺呼之道側有菴曰水月甫入門有澄泉一區甃石為池似偃月狀泉出觱沸庵以得名去池少許梵宇四楹中奉觀音大士像問所自創則司徒殷公布施也殷公督密餉嘗過其地見其山徑嶮巇因募僧而構之菴時或茇憩其中於是薊門成大司成復為苾芻永賴地指山形而畫地捐焉擇釋子明澄為住持蓋其行有足多云諸釋子以其得之檀那者日鳩匠石鑿其巉巗平其磽確險夷庳實幾一里登假者便之塗成有次乞余言為記余曰夫南海西天曇華貝葉法談空幻儒者不之道也然而見性明心慈悲方便與儒者之格致誠正濟人利物實相須而為用者也余故因明澄之請嘉殷成二君子之造福無量而誦觀音大士之方便第一也次其語以授之萬厯癸丑季夏李象葵過水月菴感懷詩叠翠􅑀虗暑氣消登臨直上碧山椒雲橫峻嶺迷青嶂路接丹梯傍玉霄古柏森森鳴爽籟清泉冷冷寄簞瓢宦心遇此灰應盡慵逐征途萬里遙大慈庵一名五峰庵萬厯中僧常增建菴前有津津亭忠義祠孫承宗新建漢前將軍祠碑記余以天啓壬戌之六月奉上命閲邊務於山海過白檀經平谷之野既易輿陟大嶺其山腰固巳壁立峽崥而一登絶巔遂覺煩襟為爽蓋俯視羣峰羅列在揖授間西望矞雲渺靄覺長安日近而東望如㦸如矛者殆榆關之劔氣乎隨行鹿職方善繼宋校書獻不陟其巔而過余與兒輩四五人剖瓜其上老僧指盤山故道令人想昌黎茹山漁溪之致低佪久之側有豐碑矗矗讀其文則借余館職姓名也余為囅然曰知文之冒余名也寧知名之冒爾文也因進老僧名常增遂說真常諦蓋不真不常即如此文之冒余名也深山大谷中誰辨真贋况余待罪翰林幾草年不復作塞游而帷幄近臣又鮮馳驅乎黃沙白草之間則此文在異時安知不疑余之真為此文而余偶過乃悉其非真然則真乃常也真常之諦可以作事可以籌邊漢忠義關將軍論人之丹誠如日丹在心中日在天上夫日萬古常懸而萬古常新惟其真耳假令初終易操通約易盟貌衷易向炎冷易趨讀余真常之說寧不抱慚於忠義而况秉鉞登壇受主上隆恩忍於虗冒而不以丹誠報國者其敢酹酒忠義乎太行北上折而東又折而東復南以護陵京而一支一轉遂開郡邑總之嶽稱真烈名有恆極則真常之諦天地若為開之而生人其忍負之以抱慚將軍哉時僧徴余為真文余諾而過既以七月既望過黃崖平谷尉繆伯芳持贋者來徴余真余次其語以授凡陟絶巔而憩忠義祠下體真常於丹日是為忠義非必龍旗火馬赭面㦸髯者忠義也天啓二年癸亥七月十九日劉鴻訓修盤路碑記京師之東二百里許是為盤山蜿蜒西南下勢探泃水谷平谷於其中限薊門於其外列中有小徑可逹山海遵化及喜峰諸門轉而密雲居庸及石吉曹墻諸路凡烽火之警諸司㑹計羽書交馳必由之便其捷也不則必出三河里道之回逺不可計矣但石磴﨑嶇澗崕滑隘行者苦之升薊州知州戚君延齡始仕兹土履而歎曰此路可通乘輿似非吾民之利萬一邊防有急傳檄稍緩為害可勝道乎吾其撫循吾民而啓闢斯路不兩得乎適有本道張君朴行部過平谷亦以為言捐金若干而戚君遂量工命日分財用具餱糧起工於三十八年春三月至四十一年秋九月工竣寬二丈長四里餘﨑嶇者平滑隘者展行者謳歌祝頌斯民日益繁庶繼任平谷知縣丁君士慶下車後其所以撫循斯民加意斯路者若合符節猶不欲沒二公之髙托余立石以垂不朽余謂夫事不論巨細所關何如今修者止一路而生君子愛人之心豫小人生飬之利息戎馬陸梁之門舒聖天子東顧之憂三公之功一轍也詩云周道如砥其直如矢君子所履小人所視其斯之謂歟故喜為之記萬厯四十三年春二月報國寺元至元中圜悟賑禪師重修前有黑龍池白峪寺在萬松寺西南八里報恩寺在千相寺東明正統四年戊午重修萬厯四十五年丁已尼宏存再葺米萬鍾重修報恩寺碑記天地間凡事有廢有興時也天且不違時而况他也乎哉當其興即有廢之之機伏其後當其廢即有興之之機乘其間興而廢廢而興孰主張是謂地有靈而佛亦有靈也勝境常存胡然積廢金光常住胡然久頽謂地無靈而佛亦無靈也積廢成壞久頽不起胡然廢者興頽者又舉蓋炎炎隆隆勢之所不能終保也而星星涓涓又數之所不敢算拘也總之時為之也城西北二十里許盤山之麓塔院莊建有報恩寺東枕泃巗西通千像而北則控西方庵鼎足三方號稱古剎所由來素矣蒼翠蘢蔥借盤之秀香火綿衍徼盤之靈殿宇輝煌摹盤之勝不知其創自何時第於正統四年重修復於萬厯八年再新迄今又三十年矣蘢蔥者如故也而香火視昔則微有間也殿宇之輝煌者又非昔之時也方且雨注方且星穿方且金身日射而風披與露宿者微異耳嗟乎哉藉佛以之保國庇民者幾不自保自庇矣雖不至極廢大壞亦可謂漸頽難起向之炎炎隆隆者至此而星星而涓涓亦時之一厄也哉寺有尼僧宏存者惻然傷赧然不勝憤毅然中起向檀越極力募化日奔走於薊於平谷於三河更不逺二百里至都下跋涉之履幾穿矣以得金百兩搜材鳩工日經營而補葺之由是正殿兩廊頽者畢起突焉改觀靡不整也靡不麗也輝輝金碧愰心映目曷啻初創然豈特無風雨之患而且昭日星之炳卓哉為盤山入步第一勝概將與白巗千像比肩並峙雷音境界於是乎在一報恩寺也向也廢而今也興又何其炎炎隆隆也哉語云天節不逺五年復返言時也此寺歷三十年之久不終厄而復返其初者謂非時為之耶僧乞言於余余何言第惟以佛在人心人心之不泯即天時之有在人乘乎時時乘乎人兩相藉也非徒地靈之說也世之澌滅人心者佛法日逺西方日隔墮沉淪而遭業障不知以何者為福田為結果恆沙迷津慈航誰渡無怪乎福國庇民之勝境日頽日壞而莫為之振起也此又不可諉之時而一概論也此為記萬厯丁已春三月觀音庵有二一在瓌紫峪又一在鋪黼峪僧性艮重修報國庵在雲净寺西南二里華嚴庵在黑塔峪朝陽峪在盤嶺南俗呼紫背康熙中僧通道建秀峰庵在盧家峪東正德丁卯僧想通建有守真洞法常寺在玉石村西惟石幢古井在焉定慧寺在小盤山一名瓦茶寺今圮接引庵在版鋪今圮翠雲庵白峪前石壁刻翠雲庵三大字菴無考聖泉菴在山後昔為羅總兵所壞作别墅未幾羅罹禍廢至今呼為羅家城白巗菴九華峰前崇禎中建久圮淨土庵在塔院莊北三里今圮劉家菴在上甘澗內庵西南三十步有洞最髙爽崇禎甲申居人避亂於此後頽壞惟洞中石柱存焉菴東北有石舫擁背石後有飛翠巗龍泉庵基存碑刻正德九年僧真義重修菴右有池深不可測繼靖菴俗呼旱店在雲淨寺東久圮西方菴在塔院莊北三里今圮大悲菴千相寺東北上二里故址無考康熙中僧通道結茅居焉龍鳳菴始建歲月無考在上方寺西南塊石為基基濶二丈五尺髙一丈五尺刻大方廣三字字徑八尺王澤𢎞龍鳳菴詩層巗壁立嵌茒庵中有髙僧坐石龕久判一身如朽朩返觀百念巳澄潭青知列岫雲光護紅見孤花露氣含悵望勞勞車馬路抽簪吾欲伴瞿曇甘露菴少林寺前入山道康熙二十七年溟波和尚建草房五楹稱十方院今圮龍震甘露寺詩泉石爭竒處三間孤草堂老僧指鳥道倦客借繩牀水為出山咽雲因作雨忙閒中一眺聽冰雪入肝腸右感化寺以下諸剎皆屬本山稍以大小興廢為次龍泉寺一名暗峪寺元至正中僧順結茅明成化六年已丑僧悟興開建正德五年庚午重修殿前古樹皆千年物香水寺南二里亦有龍泉寺基金純龍泉寺修造碑記龍泉寺至京師百八十里寺故庵式中有暗峪乃薊州盤山佳處山甚秀東首綿亘以西隆起有脊甚揚而尾與首顧暗谷實脈其間寺內山谷為居人以山龍狀命谷為龍泉緣以名寺寺之初創故老無述後生亦無聞其徒世守不知其詳以跡襲授受知為元至正遺址兵燹後入國朝逾百年山谷僅秀香火僅延屋宇僅支亦時為之既有力者不列諸徒而無力者非徒自靳成化初鄉雋景公鐸者憫山川淪秀且念燈焰之弱毅不自解遍告耆舊以力藉衆以謀自私倍故址宏為寺推四門塔寺僧悟興者一衆務其徒本源出所長為規畫羽翼百費具周羣策畢舉落成後規模甚廓有門有垣有壇場有殿宇有鐘鼓懸室有講堂禪庭左右列僧舍若干間丹雘塗堊與雲霞爭妍與山水爭碧樓臺出沒於煙霏空翠間潭影天光徘徊上下山川之麗一旦改觀逺近來游靡不唶唶稱歎寺成於正德庚午遡其經始幾四十餘年衍之者非一僧成之者非一日可謂大且艱矣鐸與羣師先後淪沒鐸之子曰祚讓之徒曰常善恐其功遂泯泯無聞徴余為記余惟山川之勝必得其人而後可鳴當龍泉兵燹之餘巒光水色頗失故態栖栖於林薄榛莽間殆與凡流衆垤等耳今緇流一鼓而幻成寶坊暮鼓晨鐘酬恩駐貴則山川秀麗與有光輝孰其使之然哉昔緗山非自鳴也以無量鳴崑崘非自鳴也以靜庵鳴他日龍泉為東盤第一山者又安知不以悟興鳴也耶是為記正德五年歲次庚午香水寺唐建有頭陀大師靈塔實行碑金正隆六年中都寶塔寺沙門知心撰文曰師諱行及海東新羅常興人覽兹香水偶然挂錫創石頭庵山精自竄拓靈源脈巗虎他之於廣明元年仲夏無疾而終門人惠超等塑以真像塔而藏之其後塔龕盡阤恆淨等重修巨塔表焉康熙中德心禪師重修寺後有香泉古柏盧綸重修香水寺碑記薊之西北有盤山延袤起伏數十里西折而左顧有寺曰香水者蓋古剎也中有泉清澄瑩徹異馥襲人寺因以名緣闕記石創建無考金海東新羅頭陀大師行腳至此重為開拓逮明天啓中復就傾圮寺僧慧明及劉君良爵劉君居正共發善心再葺治之煥然巋然過者無不稱歎閲歲既久風雨飄搖法相漸爾摧頽鐘鼓將淪蕭艾向之煥然者幾丘墟矣巋然者幾瓦礫矣爵之孫之俊正之孫若瑗見而憂之以為有其舉之莫敢廢禮也爰邀鄉善於康熙十五年春聘德心禪師主之禪師乃大博和尚之門弟子也甘淡泊事勤苦精操有年宗風逺播四方衲子踵接肩摩而至者如細流之歸巨浸也講讚有人瞻禮無地乃建善㑹用謀重修而諸弟子躬親勤勞以勷厥事殿堂垣墉門廡庖湢凡所有者依次修治莊嚴妙好大倍於昔禪師之功多且茂矣而延師以興者則二劉倡衆之力可少乎哉是舉也鳩工於十六年春落成於二十四年秋主者慮事之不傳無以啓後來者之相繼也丐余言以記之特為述其梗概如此康熙二十六年丁卯月日普濟寺一名甘泉寺相傳昔為毒龍湫唐太和中有曉方禪師結茅於此龍讓之徙山後迄今三潭為龍居也遼金元重修碑記殘缺難考又傳古有王子出家故寺中伽藍神女像宫糚在佛殿西北隅最髙隘處曩寺廢人欲坼毁不能上上輒墜故得存國朝康熙中僧明德住此次第移伽藍於殿左前有三塔列如鼎足後有小甎洞依山甃成極精雅聖祖駐蹕中盤題詩勒石寺中沈荃重修甘泉寺碑記盤山在薊州羣峰陡絶行者盤旋而上故曰盤其中有龍池天門劔臺懸空石諸勝前賢志之備矣皇上有事園陵嘗駐蹕於彼題詩中盤因勒石於殿左山中佛寺甚多最勝者曰甘泉創自唐代盛於宋元至明初燬於火琳宫紺殿竟為荒煙蔓草已三百年矣雨石和尚過之曰嘻余責也乃結茅募修備列辛苦久之大殿告成禪堂厨庫以次畢具緇素來者日衆梵聲鐘磬時出白雲中間盛事也自甘泉而下十餘里為段家嶺乃山海孔道復葺茶庵以飲渴者和尚囑余作記次其本末余惟盤為京東名山翠華臨幸名賢題咏與尋常勝地不同余嘗備兵通薊副使兹山實在境內數欲杖策一游困於簿書願卒未遂後奉命恭詣孝陵道出薊州始得登覽拜讀御製詩償宿志焉比時與和尚相識考其舊碑臨濟第二代興化奬禪師初依開山曉方大士實芟剃於斯焉因念和尚慨傷祖苑刻志經營又能扇逺風以歸禪學廣善緣以益生民俾其事以傳於後誠不可已也康熙二十二年癸亥月日靈巗寺在甘泉寺西南蕭九峰重修靈巗寺碑記盤龍山靈巗寺始立久不可考舊碣謂自唐宋以來七百餘歲或古剎也寺雖𨽻薊州然去三河十里而近余嘗往游焉有林居之樂無俗鞅之擾蒼翠環繞絶壁如城東巗有水自上滴滴漏下鏗然有聲歷久旱不竭而僧衆咸賴寺之得名蓋以是也舊設長老主寺事今僧人常現適當其任現幼師僧人真愷而事其親以孝聞戒律之嚴經典之熟靡不出類且苦心髙行傾動逺邇每歲於寺說法立㑹安禪施齊來皈者幾千人固有道者流也寺日廢墜現乃邀鄉善信趙文昻輩盡出已資協力衆募掄材鳩工拓其地宏其規中修大雄殿三間以事佛左建堂以事護法右建堂以事祖師天王殿峙於前觀音庵拱於後其他山門甬路鐘樓庫室凡法所宜有者無不具備由是山若增而髙境若闢而新昔之傾圮者堅緻矣昔之荒穢者精潔矣殆可與名山盛地貴戚創建者爭雄焉事竣托儒生牛西剛徵豫為之記豫亦業儒者也安可談佛事蓋佛之道出於孔子之後故學孔子者必斥之以為不如是不足以名儒者雖然如使佛出孔子之世則孔子之所以處佛者何如哉將怒而斥之耶抑矜而進之耶孟子曰仲尼不為已甚夫其不為已甚則佛之斥與進誠有未易言者且佛也者出於周末而生於西域耳無聞目無見也吾意其俗必古野而其人之情未甚鑿佛又其甚焉者見春秋之世臣弒其君子弒其父兵戈日尋於中國而頽敗之風大作於鄭衛齊陳王化所遵及之境於是有憤世嫉邪之心思欲絶類離倫而立於獨者此佛之志也惡天下之貪則以一切事故為虛幻惡天下之淫則并妻子而去之惡天下之酗則斷葷茹菜以為賢惡天下之僣則雖已有南面王之樂而不一朝居之也惡天下之爭則人有患難捐驅以救而不恤推此意也則佛所謂賢智者也其為孔子之所進蓋未可知矣彼學佛者其善惡固與齊民相等善者存之不善者去之法之正也今天下之人其為不善者不少輕於自恕而一切歸咎於佛雖大儒君子亦往往原心於渺忽析理於毫芒而與學佛者角勝負無乃不考之過歟余非知佛者特以佛氏之本旨易知者述而明之又聞昔宗頤禪師有頌云天生三武禍吾宗釋子還家塔寺空應是當年崇奉日不能清儉守真風夫沙門法者不住資生行乞取足日中受供林下托宿故趙州以斷薪續牀藥山以三篾繞腹概可見矣又唐李文公問藥山禪師曰如何是黑風吹船飄落鬼國師曰李翶小子問此何為文公佛然怒於色師笑曰此便是黑風吹船飄落鬼國也以此推之則知利欲熾然即是火坑貪愛沈溺便為苦海茍一念清净則烈焰成池矣茍一念警覺則船到彼岸矣災患纒身隨遇而安我無怖畏如械自脫也惡人侵凌待以橫逆我無忿嫉如獸自奔也作如是觀則普陀大士真實為人非浪語矣嗚呼學佛者茍以宗頤之心為心則佛之徒亦斯世之所不可少論佛者茍以藥山之言為言則佛之法亦吾儒之所不可斥敢以是為記萬厯十六年嵗次戊子秋香林寺盤山東二十里翁同鵝泉流峙左右薊亭之勝概也明天順中藴空禪師重修萬厯七年已卯又葺康熙中僧心安再新馬有經重修香林寺大悲菩薩殿碑記夫寺稱古剎佛號觀音而曰大悲者仁慈之德也而其千手者圓化之象也何以知其然耶蓋聞魯隕恆星佛體始降漢傳吉夢大道昉殷故摩騰天竺白馬䭾經釋迦祇園黃金布地於是梵宫精舍星列於人寰紺宇緇廬雲興於華夏此寺之所由始而剎之所以稱古也觀音妙義誠非蠡測而知耳餐膚談敢贅管窺之見夫音維聽而非觀也色維觀而非聽也可聽則有聲可觀則有色今不言觀世色而曰觀世音不言聽世音而曰音可觀豈非兩目不見物五蘊悉皆空觀為妙觀音為妙音以為佛號不亦然乎慈航泛海度一切之苦厄楊枝淨水脫萬劫之灾危隨緣應質百億化身雖滅度而歸空又垂儀而覺世語其大則虛空遍滿語其小則絲髮難容謂為仁慈之德圎化之象也非歟乃兹香林亦創自漢繕自唐宋逮於我明正統之間常為葺焉相距漁陽約二里許東則鐵嶺龍蟠西則漁山鳳翥後則巍峰直矗南望則平臯超忽每至太昊司令勾芒御辰嘉朩蓊鬱茝蘭郁芬而有綺紈翠飾結駟聨珮禮旃檀而丐福向法筵而祈利簇曇花翻貝葉掩映般若之前誦揭諦諷薩埵婆娑浮屠之側蓋突兀於岡陽為隨喜之勝地邈不知其若干歲也值今上之三十四載又將百數十年矣奈何日月易邁殿宇漸爾傾頽風雨迭侵榱椽由是毁棄菩提兜率惟餘挂月之藤蘿淨土化城空對摧霜之蒿棘沙門閴其無人香積塵封檀那蕭然絶跡禪關雲扃噫寺幾廢矣誰能興之董君懋修浙人京産以從事於司農故僑寓於是郡銓期尚逺暇日旋登周覽惕𠂻遂發重修之願捐資倡首亟邀同志之朋是以陳君忠蕭君應兆等各有所施共扶勝舉因基就制揆日鳩傭經始於丙午之二月落成於戊申之四月曾不二歷於璣衡頓復三千之金界丹青絢綵煥自在之慈容珠璧輝煌現原來之寶相繡幢飄而嵐影齊飛玉磬響而谷聲相接琉璃燈燦夜分皎月之光翠篆香浮曉雜祥雲之色於是乎靈剎更新沙門載盛涅槃妥侑永保聖夀之無疆善信歸依將錫福祿於何限然而衆既勞止安可無記用鐫貞珉以垂永世萬厯三十九年歲次辛亥季春月王中漢游香林寺詩塞北山髙月上低月當明處與山齊漁陽城外香林寺映月排山水半溪靜安寺在白巗寺東十里舊名醴泉院遼道宗賜額淨名寺金大定中改今名日照寺金大定九年進士孫設撰記舊名翁同山院有地藏殿圎覆法師塔上藏佛牙二具正德中道士盧永康居之更為修葺今名府君山靈隱寺在崆峒山東北今圮右龍泉寺以下諸剎舊志所有皆係附近盤山不應並列故别載於後靜室五盆靜室在五盆溝北今圮西架靜室在上方寺西康熙中通起重修東架靜室在上方寺東今圮黑石塔靜室在方寺東南一里今圮茶子菴東靜室康熙中僧百忍建今圯中盤西靜室凡三處少林東靜室在少林寺東南一里九兒峪靜室在雲淨寺南二里廟關帝廟有四一在盧家峪村中一在田家峪西一在塔院莊一在瓌紫峪藥王廟在瓌紫峪今圯五道廟在玉石莊東山神廟有三一在玉石塘北一在田家峪東一在暗峪龍泉寺側李鍇山神廟碑記天地生物率有靈明而山澤之氣禀隂陽於乾坤其靈尤昭然宅幽履虛不可以質取不可以形求先王慮民聽之滋惑也故為之叢以聚之所以教精白一民志也盤山之北暗峪有龍泉寺寺東故有山神廟莫知其創始嵗久垂敗工部員外郎右瞻西君董督石工數數往來顧而心動曰神護此山隂左右我聖祖山陵之役靈至昭也不新之無以報神貺於是重葺治之殿陛堂亷一如初創於戲是役也昭神之貺一民之志所以承先王之教也嘉其事是用紀之而勒諸貞珉云乾隆十三年夏五月欽定盤山志卷六
