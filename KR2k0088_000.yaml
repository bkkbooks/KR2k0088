樓近雲匡小憩聊復善卻指向歷處林路依微辨將毋志近荒陳編一開卷春曉西魄未隱峰東暘剛出谷居山曉尚寒問景春巳淑花沐露濛濛草霏風馥馥倚楹旦氣清游踪漫追逐虛已敕萬幾厪心籌五服雲罩鐘遲鳴山僧想眠熟天成寺澗道繁聲隱石泉寺樓據勝坐來便千行峰樹全標畫幾個山僧不識禪入目景光渾似舊得心興會每殊前題崕緑字烟蘿蔓此日拈吟復偶然西甘澗雲棧下石門風寒衣袂凜精舍縛茆為闍黎任髙枕莊嚴無餘物貝葉置諸品是為本色禪隨喜意愜甚地僻泉亦甘可以酌而飲東甘澗座席飄來花雨香偶參白業憩雲房春翹饒有芳菲好卻愛松隂滿院涼古中盤放歌穿石徑造盤之阻宜誰居兮化人所初極狹而中宏遂暢觀而延佇春卉昌昌春山蒼蒼卉依山古山含卉芳鉛華洗盡饒本色南國猶嫌時世糚去嵗華山躋鳥道一與田盤較媸好怪豫到此又云云惟喜目前堪絶倒嵐態峰姿無定則神心謀靜翻為役有時落筆數十章有時一句渾艱得雲鶴雲鶴盤髙空聲落半天中可聞不可見時或山中逢本無稻粱求豈有矰繳攻馴鶴爾胡為鎩羽入檻籠飢飽繫主人侮弄任奚童仰首望雲鶴何從較窮通志未慎其始境安保厥終竹作友巖松靜且深因風戛玉復摐金數竿瀟灑意彌足千畝何須憶武林泠然閣石詭松益奇山峻風偏峭披襟坐虛閣天籟動萬竅偶此方外方究其妙中妙雨花室雜詠石磴攀蘿步入深精廬瀟灑晝沉沉不因詰屈徑千轉那識髙閒一晌心抱石孤松若箇栽翻濤謖謖掃香臺興豪擬問維摩詰滿室天花何處來搆築無多足暢情一窗山翠映人清濛濛常自沾衣潤又見春雲傍嶺生虛齊四座靜無塵迭與名山作主賓箇裏參禪真恰當笑豫不是得閒人暖清暉氣向融景淑古盤中染遍楊絲緑催齊杏蕊紅嵐光方淡蕩雲影忽西東欲換春衫未還防松下風千相寺言入翠微峰遂造初禪地山深無不佳草廬亦可憩幽芳吐瓶花古篆消香穗指揮開窗户颯然清風至萬景紛向參一惟領以意夜雨山雲向晚生藹藹萬峰競入夜枕上寒淅􅅹隔窗聽幽響曲澗增潤意連林凝清切且無眠遙為三農慶曉晴曉晴山有態楚楚冶糚新巳是明如畫猶然迥出塵潤含林露重香遞埭風頻花騁春雲夢飛卿句果神萬松寺明發事清游石磴盤玉馬始出峭蒨顛原自青蔥下田盤到處佳萬松我心寫寺樓坐空翠天籟披瀟灑揚馬不能從回顧和者寡盤谷寺雲罩猶天半鐘聲落澗遲稍留清蹕憩得句便前移登雲罩寺定光塔作歌雲山有神助會者得其宗團團瑪瑙盤中有一朵青芙蓉無量壽佛卍字胸坐蓮花鬚者其壽盡與無量壽佛同今日登臨亦如是稍涉言象究竟未離去聲凡夫踪歌畢天風吹我馬隱有山靈謂我者何必更與六和報恩較髙下上方寺雲罩威紆石路盤上方始到愜清歡一龕古佛鐘魚寂半榻天風衣袂寒奇句不期當境得好山常似逆人看苾芻六度知初品道左殷勤冀悉檀梵典施舍云悉檀般若六度中為第一品也題鄒一桂盤山圖春雲欲出山濛濛山乎雲乎將無同變態萬狀難為工若人意會神以通烟嵐莫遁冥搜窮妙解要在得其宗奚問邱壑石與松五日清游一覽中扈蹕不孤冒春風王洽潑墨應齊蹤池上居崇椒得稍平有水一池清坐領滄浪意遠祛塵俗情烟嵐朝暮出荇藻短長橫飲鶴翩來去游魚結友生靜寄山莊返蹕之作田盤五日暢清游餘興猶賒賞已酬古有名言戒忘返我無他善勉先憂前旌髙下徐盤騎回首青葱尚注眸遇便重來緣路近武林不比要詩留西嶺西嶺盤之西問景曾未經由兹至蟠龍山名有行宫云近草里程羊腸雖紆巇跋馬由堪登拂曙披烟蘿露濃花木馨雲罩莫衡髙巖松辨層青須臾海日出玉柱標銅鉦放眼得奇觀萬象俱光明駐蹕靜寄山莊題句蕆事别吉宫紆蹕駐仙境尋幽藉散懷即目聊探景今年來兩度前度夢幻等可以悟空空何必猶耿耿冬山露本色雪瀑垂峭冷謖謖聞松濤萬慮一以屛屬詠亦巳多兹遊欲靜領欽定盤山志卷首四欽定四庫全書欽定盤山志卷首五天章四初自田盤西谷取道達靜寄山莊癸酉塞搜餘興託巖栖捷徑聊從西谷西怪石吹風驚欲墜精藍寫霧忽如迷施檀空切居僧望路過雙峰法藏諸寺率頽廢山僧頗望鼎新云列嶂新迎駐馬題疑是山靈酬始遇千峰晴晦幻髙低登雲罩定光塔鳴鞭西谷入雲裏行行雲盡居足底窣堵猶在最髙峰進步竿頭應似此我來每度必親登拾級不知勞屐履春山淡冶秋山蒼所逢今日都過彼滃滃靄靄復凄凄薈蔚氤氲更襂纚隱現樹色錯翠丹變幻巒形紛岌㠖世界真似乾闥城雲海黃山兒戲爾我聞佛說如是法譬之乃如大雲起孰獅吼孰野牛鳴調御默然天龍喜駐蹕靜寄山莊羣峰疊背玉嵯峨閲嵗巖扉偶一過明月清風無盡藏奇松怪石此間多村旁廩積覘農慶幾暇游觀樂物和扈蹕詞臣漫呈頌矢音惟覺愧卷阿對瀑山罅亂泉多引之即成瀑愛此雲間聲築成石裏屋訇湱近窗牖形容小珠玉濺冬豈知凝網月那可掬消此片時閒孰不云清福池上居砌石為池上搆居一泓襟袖攬如如石湍響答松湍靜水鏡澄含月鏡虛舒卷天真任嵐靄飛沉自得樂禽魚絲竿烟舫都無藉耐可空明意泛諸晴雲腳亂絲霏風吹散若飛千山開畫障一谷暖陽暉黛色濃松磴泉聲壯石磯憑窗别生慰被隴麥滋肥雲林石室摶壁出蠶叢林齊有路通石當人面翠楓落樹頭紅惟介方宜靜因虛益不窮昨朝凝望處原在白雲中千尺雪飛泉落萬山巨石當其垠匯池可半畝風過生漣淪白屋架池上視聽皆絶塵名之千尺雪遐心企隱人分卷復合藏在一三來賓寒山田盤熱河西苑皆有千尺雪各繪為四卷合藏而分貯其所每坐一處則三景皆在目中也境佳泉必佳竹爐亦可陳俯清酌甘冽忘味乃契神披圖謂彼三天一何疏親得概軒因迥為精舍賅奇入曠觀真花暫風落畫樹久霜丹勝概信稱得環山故曰盤一窗明日嫩靜坐不知寒半天樓崇椒延閣迥步步上丹梯月牖千奇入霞標萬象低吸噓接皓氣視聽合天倪隱隱聞笙鶴常來此處栖對月盤中曾對月冬月今對初小春了不寒朗映襟懷虛山木盡桂枝輪囷復扶疏㶑㶑石泉光魄影上下俱右丞之所會昔見招裴書俯臨大野寬萬帳燈竿殊清光不孤人爝火何為乎天成寺盤澗千回嵐翠重到來古剎據芙蓉江山一覽仍憑閣風日初晴正柏冬泉似祛塵常掛箔松如聽法擬降龍小俄延復催歸轡清戀惟留雲外鐘西甘澗峰回路轉澗泉潺山寺蕭條只數間隨分枕甘還潄介便宜白足是髙閒東甘澗一谷小春暖循西便至東野廬不成寺變相示真空登閣聊乘興開窗不礙風誰家生色畫松翠復楓紅古中盤石磊千仞岡林疏一線天是中有佳處單騎相沿緣既窮外狹得中宏紅牆才見羅花宫初地未許容易到尚步丹梯百十重調御對我無一語拈花似示真宗所旁有精舍可周旋憑窗萬象紛來侣海氣蓊匼襟袖間因之飛興蓬萊山安期羡門至今在未改鶴髮青童顔劉郎脫屣真癡情後來仙者何無名點筆欲辨滄桑事田盤先生笑失聲盤山回蹕之作五日少延留言旋啓蹕騶柏冬厪省嵗忘返戒從流背指雲峰寺遙循霜路郵前旬甘雨足麥隴緑針抽靜寄山莊甲戌松塢雲莊迥絶塵無妨紆路駐鑾頻嵐飛生翠常疑雨峰有真姿不藉春花未胎含因閏遲去聲蕪才芽紐向陽新圖書靜好當清暇汲古心知未逮津韻松軒風樹皆作聲四時兹不改何處而乏松名山松所在佳會不常遇是吾所以乃謖謖雖無心落落若有待山中今亦古人間春似海對瀑擘窠扁石鐫垂紳聲色不動惟天真分明晝錦記內語中心藏之如此人千尺雪倚巖架白屋開牖臨清泉春半雪巳消垂流尺計千一二二而一圓方方復圓寓物陳至理隨會含神詮茗碗不必試吾方意油然得概軒敞軒稱得概勝日欲賅春松色迎人翠峰容入户新不須花爛漫雅愛石精神與物欣芳節矧吾志體仁暖入山景物渾融和昌昌春緒來逶迤緋桃緑柳縱遲待峰色泉聲漸巳多封中出雲輕似波其上遙空矗黛螺何當為雨潤新隴叱牛應聽農人歌盤之中盤之谷窈窕而深繚而曲樂以天下憂以獨春風風人吾意屬小石城磊磊拳石無央數攢簇纍積堅城固屹然壁立開闢來世人安得知其故荆凡得失紛經營埤堄攖守終誰成烟霞乾闥此示幻飛泉為塹松為旌松籟泉聲相激越楚南偶似非豪敓子厚離憂何有哉石城同一滄桑閲婉孌草堂是處面臨石城背枕雪瀑烟霞薈蔚之狀與泉石相問答山莊最佳處蓋不一二數屋中適張董其昌婉孌草堂圖真蹟輒以名之奇境每奧祕時為幽人開我雖憂勞者亦有烟霞懷枕潄寄遐託溪山期靜諧香光圖婉孌同然先得哉名相天下公㑹者任取裁識此慕藺心企彼希李材其昌識語有希李營邱之意半天樓肩輿徐陟衆峰巔恰得橫樓號半天不盡崇懷期太古自然迥句會當前松稱無改春偏態竹不多情月亦娟卉歙仙風吹萬慮祇饒鐘韻隔雲傳雲林石室石出壺天寬林開精舍迥嵐靄朝暮變松石今古永依階有緑苔問樹無紅杏春遲故自可聞之惜分景天成寺雙峰闢天關一徑入雲路尋奇紛彼新據座原吾故澄思㑹理趣即境摛藻句開窗寒料峭眺景春流露無為憶向來恍可欣始遇惜松歌萬松寺以松得名去嵗蠧蝕松葉頓非昔觀詩以惜之兩年不到萬松寺曉春乘興今來偶盤龍踞虎縱好在鬱翠流腴較昔醜僧云去嵗即生蠧所以蒼株半枯朽佛泯生滅付不知山無愛憎誰任咎咄哉成形壞亦隨榮譽已當毁應受不然山靈厭客來示盡枯禪以寂守木本先腐蟲生之疑增詎在碎玉斗植中壽客乃如斯不如斯者今知否盤谷寺隔嶂便欣松逭劫萬松與盤谷只隔一嶺過嶺而松翠如昔蓋地氣使然云得門還禮佛留真一窗碧岫經年古四野油雲釀雨新目色耳聲無盡藏退之李願兩前人更瞻聖藻輝巖穴石火流隂五十春是寺鐫康熙四十四年皇祖賜寺僧詩登雲罩定光塔作平陵絶頂栖花宫詰曲雲徑盤巖松金輪月相此常住似說法華垂真宗五體投地大樂說忽瞻寶塔湧出層霄中十方如來乃恆河沙數彈指來聚一朵青芙蓉佛云開塔事如是塔中如來為分半座同我時忽忘登臨凡幾度惟聞梵網寶鐸錚錚落落鳴天風上方寺路便思清憩禪房倚石幽松端寒籟泛澗底嫩泉流雲幻晴兮晦山常春復秋回瞻定光塔真擬碧霄游山行即景泉帶東西自髙下山分向背變寒暄田盤四面皆方正拱極都環紫蓋峯名尊但看松姿皆入繢不須花發始吟春侍臣攜有清華侣詩畫兼能為寫生攜董邦逹來令為田盤全圖兼欲修新志也奇峰不礙玲瓏影古寺真如委宛藏也覺吟懷無乃放大都熟處未能忘飛泉似掛古松梢雪練寒濤自磕敲釀作春雲剛滿谷頓希為雨潤東郊晴雲容才作勢風力與之乖也識東郊潤終惟時雨懷昌昌露春腳謖謖響松叉若論看山色晴明自是佳曉遠墅聞雞鳴淡蕩春山曉西宇掛銀蟾東巒吐朱鳥盎然一谷暖山禽啅疏篠物華縱未酣韶意惟斯好契理待萬幾運神籌四表池上居漫作宛在一泓春水新樂天先我得其津長篇妥貼都言盡率易由來未易臻莫道山中無緑舫臨池也有受宜居米家書畫相衡較嵐靄烟波未此如千相寺八韻蒼巖路轉東初地翠雲叢既狹始開豁當前悟塞通逃禪孰龍象訪道豈崆峒自是乘春興聊因識化工鍾靈山有獨資治物惟同最愛苔皴緑未須花放紅遐思碩人軸且憩梵王宫相好雖千億根源蔽色空偃松歌飛空忽見垂蒼龍其上無雲惟碧峰之而押擖弄光怪李老子兮黃石翁根不土胎性不屈盤盤插㙷滃蔥鬱譬如商顔肥遁流老而益腴卷緑髮春風秋月田盤山鶴鳴鹿旅太古間大椿扶桑此其侣大夫受號嗟赧顔東坡偃松斯鼻祖成形疑是元黃剖今日應作如是觀公孫大娘劒器舞翠匝亭六絶句偨池列林扉拍漗鳴石激是宜引思紛而益令神寂笠亭才四柱萬概參於前小坐衣袂冷仙風下緑天陡壁不可登吾意與之上白雲阿那邊佺喬期來往嵐靄無定態松石乃益奇箇當忘言詮䛁䛁復奚為土斷石壁立磊磊雉堞橫問從誰假借柳州小石城山莊駐五日林亭登一度卜築亦何為自問不解故山莊西崦人家茆屋髙低外植援田收餘粒育雞豚惟勤耕績終年計不解詩書涉世論束帛蒲輪羞隱逸瓦盆柿酒長兒孫經過每為輕輿駐質朴風猶太古存千尺雪再成前朝含凍雪猶白今日舒絲柳漸青了識如斯在川上流隂未肯為人停訇湱流離瀉復渟聲難為狀色難形三間板閣虛窗靜只合忘言注水經熱河西苑及東吳到處風華具四圖試問得無紛色相宧光應道豈妨乎再疊前韻題唐寅品茶圖非關陸羽癖分茶偶試原欣沃道芽瓷碗筠爐值兹暇田盤春色正和嘉題董其昌婉孌草堂圖草堂本自寫崑山真跡誰教落此間名相由來無定著婉孌恰喜一般閒仲醇元宰交情厚李氏郭家設色艱我獨曹風憶彼美楚騷一例詠叢菅命蔣溥汪由敦董邦逹修盤山新志即令入山游訪既畢事詩以示之親切名山全體圖舊乘檢校正乖誣名賢勝蹟思傳志其不傳能志取無石林精舍春松翠欲翻古石飛疑墜允宜風月佳未許桃李厠欹案讀典墳羲皇興企思雲淨寺尋春喜晴和入山窮窈窕陽巘已緑縟隂雪猶白皛雲淨佛所都青蓮色相表盈盈功德泉身心一以澡載登度經閣萬慮澄三藐回望向來途深雲不可討東竺菴見杏花始開日日盼花開花開乃在此不藉女夷權應是天龍喜竺菴谷向陽條風掞昌蕊爛漫亦底須瀟灑真佳矣佛笑物皆春當前悟妙旨少林寺精藍盤谷口縱望納徐無萬里太行麓千年雙檜株寺中兩檜最古蓋千年物也稍停參淨業隨意作清娛得句還前進名山寧可孤古中盤盤之中造盤之阻緑嶕嶢隱青蓮宇到來精舍據其巔春靄山雲互吞吐老僧面比瘦石枯南宗棒喝全茫乎住山卻是本來相何用䛁䛁辨有無松籟澗琴皆淨致一窗延得千峰翠巖花放不入時姸由來物各從其類仙風謖謖吹我裳便尋歸徑我馬黃乘興應留興不盡偶游亦厪游無荒泠然閣巖樓倚半空月宇納天風攬景真無盡㑹心迥不同石泉銀瀉峽蕙草緑抽叢壺裏年常靜人間春漸融雨花室三春臨靜寄五日作清娛每到吟將遍兹來興復殊交窗嵐影翠入座柏隂孤試問維摩詰斯還著也無盤山啓蹕之作言旋清蹕别山莊五日春游毋乃長知爾何須亟來往於斯未可久徜徉回瞻雲罩中天直取近西盤十里强詩緒紛投吟不盡名山二酉暫教藏欽定盤山志卷首五
