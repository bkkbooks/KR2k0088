body:
  text: 欽定四庫全書御製盤山志序向於雍正年間奉命敬謁景陵往來薊野田盤山色宜人蓋蓄於目且沃於心矣而以程期惟謹訖未登臨因索智朴志書讀之嗤其意求博而辭失冗夫耕問僕織問婢山經地志文士之事彼方外流拘名象而濫碔砆者何為哉踐阼以後勑幾勤政日不暇給閲四年而後一往遊焉及一遊則峯之秀泉之清松之蒼石之詭日往來於吾懷是猶未見君子惄如調飢亦既見止我心則夷矣嗣是規地建園施金葺寺蹟之廢者日以舉境之幽者日以出上陵回鑾每憩止焉夫山川顯晦時有定數而必待人以彰不數年之間使田盤改觀者余也而顧兹寰宇風未臻乎唐虞嵗未餘乎三九恧焉抱愧者亦余也志盤山而請序者其亦同余此心也耶乾隆二十年嵗在乙亥春正月朔之四日御製並書經筵講官字位過密無法顯示臣蔣溥等上言臣等奉敕纂修盤山志告竣恭呈睿鑒臣等謹奉表恭進者伏以璿圖協運清都啓羣玉之書寶籙凝庥冊府播名山之籍惟興雲降雨千古鍾奇遂范水模山一編志勝樂宸遊于靈囿第嘉頌于卷阿竹素垂光林泉煥采竊惟奠六子之位艮以成言宣萬物之功山為積德七十有二詳其世祗傳玉檢金泥五千三百紀其名何處璿房瓊室圖稱益地貢自瑶池嶽有真形攜來漢殿稚川之志幕阜世仰淵微景式之記廬山語徴典則洵乎含氣布澤之所端賴纂言紀事之篇峻兮田盤顯由魏史溯田子春之髙蹈塞近盧龍讀酈善長之遺書水垂素練千巖堆翠昔年曾士馬屯雲一壁凌空今世則烟霞近日補山師之籍志乘虛傳備祕府之藏編摩敢後欽惟皇帝陛下德符濬哲運啓文明法健順于乾坤合靜動于山水翠華遙涖則翕河喬嶽悉入懷柔雲罕近臨而陟巘在原適諧情性謂山名四正饒嶺岫之鬱盤地本徐無望烟嵐而修阻躔度上臨乎箕尾版圖舊𨽻于幽燕二千仞塔影雲光勢臨大野百餘里泉聲樹色脈隱太行雖磴道苔封古蹟久存髣佛而山容黛展傳聞可任乖誣爰命諸臣俾修新志崇階拜手承睿訓之矞皇小閣濡毫綜羣言以商榷時逾數月體具十門夫其境接空同祖武曾希于軒后壤通遼海皇猷乃邁于唐宗結棟牖之松雲時承慈豫瞻巖崖之丹翠齊煥宸章宜冠簡編以存體要于是擬嘉陵之畫壁景各為圖摹輞水之標題圖皆有說其他繪事所未及悉歸名勝為旁羅日耀璇題建置則梵宫尤備名書金管流寓與方外偕登有美藝文首先賡頌香分蠧簡雲霞之思依然雨洗苔碑金石之聲猶在譜升平之景象物且滋豐紀嵗月之綿長事存雜俎亦稍陳其大概聊有禆于多聞薈以成編庶乎克備發凡起例曾經乙夜之觀援古證今用賁酉山之籍力加㸃竄去舊本之繁蕪共事校讐掃傳聞之疑似溯深山千百載上朝曦夕靄皆承聖世之光華計寰宇億萬里中福地洞天㑹見山靈之踴躍臣等藝托操觚職承槖筆階前聚米精詳遜三輔黃圖掌上觀紋淹博非九州要略夙陪豹尾得縱觀于花香鳥語之間幸傍龍墀敢抽思于赤管隃麋之次恭䝉聖鑒得罄愚衷伏願道尚觀文心存無逸仁敷于周原禹服如璇樞之運乎八方治洽于夏諺豳風得金鏡以臨乎千䙫將見出器車得銀甕蓬山之佳氣彌新探玉策陳寶符宛委之藏書日出矣謹將新纂盤山志卷首五卷一十有六繕寫裝成二函謹奉表隨進以聞乾隆十九年十二月經筵講官字位過密無法顯示臣蔣溥經筵講官太子太傅工部尚書加一級軍功加二級臣汪由敦工部右侍郎臣董邦逹欽定四庫全書史部十一欽定盤山志目録地理類六山水之屬卷首一巡典卷首二天章一卷首三天章二卷首四天章三卷首五天章四卷之一圖考一卷之二圖考二卷之三名勝一卷之四名勝二卷之五寺宇一卷之六寺宇二卷之七流寓卷之八方外一卷之九方外二卷之十藝文一御製恭和詩卷之十一藝文二卷之十二藝文三卷之十三藝文四卷之十四藝文五卷之十五物産卷之十六雜綴臣等謹案盤山志二十一卷大學士蔣溥等奉敕撰盤山在薊州城北二十五里為漢末田疇隱居之地五峰三盤林壑幽邃單椒秀澤雄甲畿東自聖祖仁皇帝四度臨幸宸章題咏照燦巗阿然舊無山志青溝釋智朴始草創成編詞㫖冗蔓體例尚多未備我皇上宸遊蒞止靈境日開乾隆九年始命發內帑建靜寄山莊於山之陽天闢名區全攬勝概嵗春秋有事於諸陵每駐蹕行宫幾餘靜憩智仁樂趣暢洽宸襟山水效靈益增神秀乾隆十九年二月上行幸山莊爰命蔣溥汪由敦董邦逹纂修新志溥等承詔屬稿詳加裒輯分圖考名勝寺宇流寓方外藝文物産雜綴八門釐為十六卷首冠以巡典天章五卷至十二月書成奉表恭進焉臣等敬繹睿製旁考舊聞惟兹山之靚潤深奧足與嶽鎮競秀而其名不大顯於前世以是知天地清淑之氣扶輿磅礴固必待時而出以奉大聖人泮奐之娛而天筆昭回鏤巗耀谷品題甲乙榮幸無涯尤自古所未有敬録斯編亦以慶兹山之遭也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定盤山志凡例十六則一盤山巨麗甲於畿輔歷代巡幸史冊志之我朝為盛京山海經由之道嵗上陵寢駐蹕攬奇金榜璇題照耀於崇巖邃谷間宇內名嶽得未曾有兹焉纂述首舉行宫以統名勝視舊志僅以梵剎為主迥不侔矣一名山標勝尤重篇章兹山自聖祖屢臨大文炳煥皇上御製富有日新真足苞藴元精超越萬古敬謹編載寵耀山靈而臣下扈從賡揚及山人墨客長吟短咏有可採者並載入藝文至蒼崖蘚壁之留題佛廬古塔之遺碣言茍雅馴時無今昔舊志所編是正是補刪繁滌陋允備大觀一卷首備登宸章凡摩崖勒石於各景及寺宇中者不復重見惟賜額對聯則分志於各類並垂永久一圖志並稱所以備省覽也行宫地居最勝模寫宜詳而山中一峯一水之奇務期刻畫無取髣佛凡得圖四十幅圖各為之說不惟為搜奇剔隱之資亦足為考古證今之助云一田疇掃地入山風節炳朗第地處幽僻豈無髙人托跡行事不著載籍者如田盤先生之屬舊志直斥為誕妄過矣至近時人物或有足未履乎巖穴名偶涉於傅㑹者又不得不於博取中寓謹嚴也一地名或彼此互見或今昔殊稱豪傑隱淪之蹟或時遠而論異皆當證諸史冊旁采記載以一參差臣等不揣固陋時附管見於各條下以謹按二字别之一紺宇精藍同是山中福地舊志於寺院及菴分門區類亦屬支離今彚歸為一惟今昔異名則特標今名分注舊名某寺若古中盤改為正法禪院賜額仍書古中盤之類則以從今為復古至院宇改移舊地者亦標明新址仍綴舊地以存考據一寺院建置確有碑志可据者詳記源流其或山僧野老耳食口傳他無徵信寧從疑闕一盤山舊傳七十二名菴歷年久遠興廢不常其間碑碣無存遺址莫訪正不必强求符合舊志舉傍近諸山寺院悉行收入殊為牽混宜從分别以求徵實一有稱名鄙俚者悉行請旨改正使幽崖古洞一洗塵凡一諸古剎豐碑林立其有義無乖誣言稍典雅者俱為載入以標舉源流考證時代一著作之專屬某寺某景者附於其下以便尋覽若游歷題詠不專主一地者統載藝文此舊志例也仍之一山中松石怪偉絶特域中罕覯舊志列名類叙多嫌簡略兹於最奇秀數種各加形容疏剔將靈姿詭貌開卷躍如俾曾遊者頓還舊觀未至者恍同身歷一山中物産舊志頗為詳備然聖世地産滋豐有昔日所無而於今蕃殖者敬為補入一舊志意廣卷帙翰簡畢登兹編體從紀勝務汰龎雜惟有關編纂者附數則於雜綴中一志乘例載星土尾箕析木津也分野為幽燕漢以後天官家言紀度或異占宿不殊但所屬闊遠千里而遙非田盤一山所能專故不别立一門欽定四庫全書欽定盤山志卷首一巡典軒轅氏訪道以還數千百年間師征行狩涖止崇椒史冊猶可考見盛朝時邁之典動遵古義域中喬嶽巨鎮昔王肆覲㑹計之地臨幸幾遍況盤山尤近屬畿甸哉考諸前代惟唐太宗一駐其地遼㑹同統和金大定間曾兩至焉然貞觀以師行偶憩未有勝事可傳遼金雖遞經流覽而風雅闕如林壑之美抑而弗彰國朝定鼎北平盤山為上陵寢經由之道聖祖仁皇帝嘉其山色秀潤始命闢路以登御筆宸章昭回雲漢我皇上崇孝法祖嵗春秋有事於諸陵懷巖阿之遺製覽雲物之呈奇減衛輕輿至止尤數臣等伏念造化清淑之氣蜿蜒扶輿磅礴鬱積必待至人而始畢露其奇盤山為畿輔奧區自本朝聖聖相承來遊來歌而瓌偉絶特之觀遂甲於天下誠不世之殊榮前古所未有也澗草巖花悉承雨露山樵野衲親覩光華隆軌昭於省方名山呈其靈秀扈從臣僚職當執簡濡毫以志嵗月康熙十四年十月十三日幸盤山諸寺皆賜金康熙十七年九月二十四日幸盤山古中盤御製詩一章復賜匾額雲罩寺萬松寺咸䝉聖藻題榜康熙二十五年十二月一日幸盤山盤谷寺賜詩及御書並勒石建亭康熙四十三年三月十日幸盤山盤谷寺有用智朴韻詩二首乾隆四年九月十七日幸盤山天成寺乾隆七年九月十六日幸盤山天成萬松盤谷雲罩諸寺乾隆九年始命建靜寄山莊於山之陽御筆標題各景中有邃宇曰壽萱堂以為皇太后臨幸憩息之所十月二十日奉慈輦駐行宫遍覽諸勝二十一日駕至天香天成萬松盤谷東竺雲罩少林諸寺先是發帑修建雲罩感化天香諸剎次第告竣乾隆十年二月十九日駐蹕行宫二十日駕至千相寺二十一日至天成寺萬松寺敕修千相少林盤谷諸梵宇乾隆十二年二月十四日駐蹕行宫十五日駕至感化天成萬松盤谷東竺雲罩等寺十六日至千相寺十七日至古中盤少林寺是日賜諸王大臣等宴侍臣能繪者被旨圖寫內外各景至是成卷進呈乙覽乾隆十三年閏七月十九日駐蹕行宫二十日駕至天成寺千相寺二十二日至東竺菴少林等寺乾隆十四年九月十七日塞上行圍旋蹕奉皇太后幸行宫駕至天成萬松盤谷雲罩東竺雲淨少林等寺二十一日至東甘澗古中盤乾隆十五年八月二十二日奉皇太后幸行宫駕至天成寺西甘澗東甘澗古中盤先後敕修萬松中盤上方諸剎乾隆十七年二月二十一日駐蹕行宫駕至東竺雲淨少林等寺十月二十八日幸盤山行宫乾隆十八年十月初五日塞上行圍旋蹕奉皇太后幸行宫駕至雲罩寺初八日至古中盤東甘澗西甘澗天成等寺乾隆十九年二月十八日駐蹕行宫命臣蔣溥汪由敦董邦逹等纂修盤山新志臣等仰見天筆詠題日星並耀宸遊伴奐嵗月無疆幸常從左右史後槖筆以紀盛事焉欽定盤山志卷首一欽定四庫全書欽定盤山志卷首二天章一徐無山色雄秀絶倫而紀勝標奇罕稱巨麗自聖祖再三臨幸皇上頻年駐蹕作為詩文精深博大足以涵納羣有陶鑄萬象不斤斤為此山闢未有之奇而山之真面目呈焉敬謹編緝冠首一書卿雲爛而虞絃陳岡鳯鳴而周詩盛名山榮幸藝苑增光矣聖祖仁皇帝御製詩清晨入盤山二首日出入盤山宸遊草木閒村莊人盡望處處水潺潺當年乘輦到今日復來游山水不同色泉聲還細流盤山絶頂三首上盤絶頂俯神京九日登山積翠晴荒寺日髙人少至野林烟靜鳥無聲道中勒馬觀風景澗下留鑾愛水清縱目徘徊猶不盡氤氲縹眇海雲輕四顧清標髙逼天風雲塞上斂寒烟遙觀沙漠宣威遠近控州城作鎮懸紫蓋山中獨奇秀雙峰嶺外更綿聨九秋朗耀幾千里落葉蕭條滿目前薄暮東風來返照游心怡曠動揮毫題詩數句林光晚作賦初聨雁陳髙盤道崚嶒難步躡危巖嶻嵲恐身勞欲歸帳殿還傳語引路山僧度遠皋晚過李靖菴二首兩崖石壁出秋雲野草寒林有鹿羣古剎斜陽人寂寂香烟飄處雜紛紜蒼茫絶頂樹參差落日還營過竹籬念及凌烟留姓字獨於古壁一題詩古中盤望蓮花峰中盤遙望蓮花峰日映山林氣色重老衲吟詩渾半偈翠輿臨發又從容再游盤山薊州城北黃崖前水甘土厚多平阡崇山特起矗霄漢栝柏夾路隂參天回鑾復嶂倍娟秀幽林邃谷時夤緣雲藏古寺行未到樹杪先有鐘聲傳數峰突兀勢陡絶上迫箕尾雙星躔峩峩石狀獸蹲立因風搖曳如空懸深潭清泠那可測知是百尺神龍淵鉢泉恍惚有海眼潮井呼吸通百川不然泛濫亦易挹何為萬古清涓涓神工融結天巧鑿更逞遠目窮髙巔漁陽古郡最阻厄屹為左輔雄幽燕即今交河遠置候此實堂奧非臨邊太平粗喜有端緒石根沙磧皆原田偶兹登陟聊駐斾用寄襟抱題斯篇復游盤山絶頂絶頂巉巗裏松烟向曉開片雲生衆壑虛籟落空臺寺古人行少林深鳥亂回千峰多秀色遠眺足徘徊甲申春謁陵回鑾路經盤山有僧智朴呈接駕詩即用原韻二首草載常輕步年華去莫從古松分遠近老衲自從容問及當時景猶疑隔嶺重山髙勞腳力來往遍雲峰鈴鐸鳴山下田疇雨露恩經聲連靜舍法語閉柴門隂跡安無意清思禮世尊春風來拂面依舊是乾坤御製文游盤山記連太行拱神京放碣石距滄溟走薊野枕長城是為盤山蓋冀州之天作俯臨衆壑如星拱北而莫敢與爭者也昔魏田疇隱居於此故名田盤或曰古有田盤先生自齊來棲止焉地僻而山秀樹密而谷深韓昌黎文所稱太行之陽有盤谷者無從考其非是而其為隱者之所盤旋則一也山亦有盤谷寺自唐寶積開堂代有名宿憨山拙菴後先輝映為是山佳話然吾儒木石居而鹿豕游者田疇之後無聞焉四顧梵宇精藍依山隱谷鏤峰磨石刻畫天真而乏栁州西山之文杜陵北征之作嗚呼是亦可慨也已乾隆七年秋因謁陵回鑾便往游之斥警蹕減儀從輕輿朝陟搴蘿扳磴曉嵐豁開泉白山青颯然林空鬱然松翠於是停蓋駐轡怡情縱目者久之既而行漏催吟興盡夕陽在山金吾整駕雖命省騶從而近御執事者汗雨揮而塵烟騰向誚隱者之絶少翻疑隱者之避而遠去耳乃知千乘萬騎不可以游山偶一過之山靈將毋笑其不韻也耶靜寄山莊十六景記塞外之山岡巒渾噩堂阜連延以雄峻勝塞內之山峰巖峭拔崜㠖崱屴以奇秀勝造物之靈有獨鍾南北之分鮮兼美也而惟田盤自太行而來塞垣依此以築故介在南北之間兼收雄秀之粹卓為造物奧區焉乾隆壬戌夤緣往一游自是山川之美不能恝置然朝往暮歸僕從侍御之臣不免於勞乃發內帑建山莊於山之陽買地繚垣據景搆舍髙因迥有僻以幽探藻繪不施亭臺間出園之內得景八園之外標舊蹟與諸寺復得景八合為山莊十六景而名之曰靜寄夫靜者山之體其寄於天地也恆得常焉人生而靜則靜亦人之體也而恆不得其常者則其寄蓋不如山也余之以是取名其亦所以自警也若夫山莊之號則法皇祖避暑山莊之例苐其去京師較避暑近十之五為幅員較避暑僅十之三尚朴素屛文繡適可而止容膝亦安守舊規而勉欽承讀是記者尚知吾繩武之意而所重固不在卷阿之游歌也歟盤山千尺雪記昨嵗巡幸江南觀民問俗之暇流覽江山勝概尋古跡之奇文物秀麗區也其悅性靈而發藻思者所在多有而獨愛吳之寒山千尺雪創於明隱士趙宦光今范氏搆園其地者境野以幽泉鳴而冷題其閣曰聽雪為之流連為之倚吟歸而肖其處於西苑之淑清院蓋就液池尾閭有明時所作假山喬木峭蒨噴薄之形似之矣而乏天然及秋而駐避暑山莊乃得飛流潄峽盈科不已者作室其側天然之趣足矣而尚未得松石古意今春來盤山游文皇所為晾甲石者匯萬山之水而歸於一壑潨潨之湍奏石面謖謖之籟響松顛時而隂雨忽晴衆溪怒勃則暴漲砰訇􅒂焉直下挾石以奔觸石以停鞳然鏗然激揚湱然雖千夫撞洪鐘有不足比其壯者爰相面勢結廬三間兹重游而其屋適成開虛窗俯流泉覺松濤石籟問答親人乃嘆寒山千尺雪固在是間而勞勞往返營營規寫者不幾為流水寒潭笑未能免俗哉率筆記之亦以存髙風之慕也御製詩盤山樂善堂集盤山山色翠空濛我欲登游霧半封寄語山靈還訂約他時擬上最髙峰登盤山口號己未千林落葉見山容翠嶂丹崕歷幾重漫憶當年曾訂約今朝果上最髙峰舊作望盤山有寄語山靈頻訂約他年擬上最髙峰之句登盤山天成寺江山一覽閣作兩峰天闢仙壺路到眼江山萬派分樹匝丹崕空外合泉鳴碧澗靜中聞緣階蘀走秋聲細䙚鼎香飄瑞靄紛今日身行圖畫裏六塵幻有等浮雲昔聞庚申昔聞盤山側有谷名虎里白額任縱橫居民皆遠徙有一雲水僧結菴山之屺夜坐悟無生曉起擔柴水忽然一虎至是僧瞋目視孽畜胡為來速去斯可矣虎果掉尾去如聽彼指使自此衆鄉民號之為佛子僧亦自謂神其實無他技無何虎復來咤之厲且訾逐逐行近前僧葸乃拜跪四鄰爭赴救虎去僧早死方知浪得名前畨幸偶爾有名無實人可以鑒諸此題天成寺江山一覽閣壬戌明發陟山巔天門闢曉烟翠華隨日轉緹騎帶雲旋野色供清眺松聲答響泉重登蘭若閣題句憶前年髙閣坐秋風江山一覽中低臨雲影白亂纈樹梢紅佛殿嵐初合僧房竹暗籠靜思延賞意不與侍臣同登盤山作金根遙指碧雲隈磴路林扉迤邐開石裏流泉聞不見烟中飛鳥去還來南臨薊野耕桑富北枕盧龍關塞恢詎比登封誇豫大每思山木育良材題李靖舞劒臺壯士今何在空餘舞劒臺名隨流水去客共白雲來松韻雄風謖川明匣水開幾多評古意清咏久邅徊盤谷寺恭依皇祖聖祖仁皇帝元韻時巡行夏令秋稔賴天恩式閲田盤處言瞻法海門璇題今尚煥叉腳古稱尊敬識當年意豐碑鎮厚坤雲罩寺作應接真無暇山川果有靈谷烟披亂絮瀑水瀉懸屏錦片千章紫蓮花萬朵青徐無最髙處極目偶延停經唐太宗晾甲石石名晾甲枕山陂遺蹟貞觀藉撫追若使當年無此役何須重建魏徴碑再題盤谷寺盤谷無定名太行亦有之是處兩山環不知名者誰我來正清秋萬樹丹黃姿間以蒼崕松尤比春林奇石磴溜鳴泉峭崿雲四垂佳景面面殊圖畫行行披依山闢新徑掃苔看古碑塵心一以灑不覺歸轡遲盤山懷古田疇不賣盧龍塞李靖空餘舞劒臺月鏡團圞誰掛得峰蓮崒嵂自飛來定光燈影猶飄忽茶子松精類詭詼只有開堂傳寶積求心何處一言該過賢渠莊望盤山癸亥馬上看山色猶記登臨美他年視今朝何以異乎此天成寺江山一覽閣疊舊韻甲子招提據嶺巔游轡破朝烟勝地常相憶危樓重少旋風幡標妙偈琴操咽寒泉安得長無事山中駐小年閣迥座延風田盤畫景中縱豫雙目遠愛彼片霞紅澗户人尋闢巖題蘚自籠山禽時送語道與昔年同登盤山偶咏翠岫丹楓萬景全盤山不到漫三年流隂逝水無須喻常住金身朵朵蓮溫暾朱鳥晃谽谺陽月風光罨幰紗恰似迂倪饒氣韻山衣無藉樹杈丫有水潺潺有石粼雲容峰態自相皴田疇不賣盧龍塞豈必今時無隱淪末二句用舊作遊盤山記意仰觀俯眺愜幽襟千仞岡頭足暢吟却倚層峰還自問每慙仁者樂山心盤山行宫即事清泉為帶樹為屛卜築棲雲幾架㕔捐俗儘堪稱别業對山偏喜敞虛庭蘚封絶壁留科斗松老靈根長伏苓雲罩鐘聲如半偈應教隔嵗一來聽天成寺撫觀乾隆七年遊盤山記因而有作虛窗四啓曉霞流人在層巖最上頭詩句偶拈今日暇風光宛似昔年秋泉淙澗底琴音寫峰倚天邊畫景收獨撫穹碑參結習轉教心恧重來游江山一覽閣中橘樹子二盆鬱翠垂金饒有佳致輒題以句纍纍金實突黃柑色映無生古佛龕橘月燕山吟橘樹春風一室小江南萬松寺三首磴道行行赴峰容面面殊來看後凋色得領小年娛謖籟林端瀉蟠虬壁罅扶三間白板閣萬里納徐無上方棲碧􅜤松徑破烟登堪與僧為侣何勞竹作朋濤聲將俗遠黛色得雲凝古蹟供詩料苔碑尚可徴木落見山容蔥蔥色獨濃有聲皆作鐵無我不成松寫霧衣應濕盤隂草尚茸苾芻無半偈讓爾占髙宗雲罩寺留題訝底層雲不蕩胸山靈為我闢雲封開窗四面延奇趣萬疊屛風削玉蓉髙入天風顑萬尋登臨信可散幽襟常時畫裏遙觀處獨據匡牀自在吟林霧溪嵐眼底浮風鈴語我少淹留非關勝處誇新句祗恐匆匆負此游登雲罩寺定光塔視下曾無地言髙只有天常時雲外影今日塔前禪步步烟霞路行行般若船問誰經到此尚有俗塵蠲望盤山雪色乙丑樹和雪色望難分未到盤山意巳欣絶壁白融疑過雨精藍紅露半披雲始知造物無形畫誰解當前大塊文笑我吟詩成爝火檀烟心事且閒焚命慎郡王寫盤山山色口占詩以贈吾叔詩才素所知於今學畫畫尤奇同來勝地寧無意為寫山容更咏之盤山行宫即事山靜室增古春初景巳和繁聲來亂澗秀色在喬柯隂雪素懸磴陽崕緑縟莎回鑾因道便偶此詠卷阿軒庭秀而野山水清且佳乍可令塵遠由來與道偕鶴鳴元圃外人度白雲涯學字娛幾暇何曾辨折叉當户多丹嶂周阿有碧苔於焉樂書史何必命樽罍髣佛讀韓序依稀辨李臺肯窮游覽興佇待奏章來雲罩晚鐘舂容曼衍續還停入夜披雲凑晚聽清切軒窗詩句好靜參棒喝夢魂醒空諸所有無諸幻月在青天水在瓶西子烟花非半偈去年盤山詩有雲罩鐘聲如半偈之句底須佳景說南屛春雲春雲作輕雪雪止雲亦開入夕春山佳山月照我懷鳴禽啅松巢流泉淙蘚階愛此景致幽稍坐虛明齊敲火煮石鐺點筆勒烟崕林泉興堪託翰墨意所諧匪云事遨遊多因便道來天成寺江山一覽閣作香界雲千疊丹梯路幾層巒扉才闢霧澗道尚餘氷初狹應祛俗中宏有上乘忽然天半坐疑是月中升萬里江山納三間軒閣虛直令憂可忘到此習全除嫩草初春破連林積素餘如來全體示而我亦如如雲半是壺中平臨衆壑空梵聲遙送雨幽籟鎮吟風佳趣何人領忘懷與物同去年題壁字烟荔亦䝉叢几席颯然清禪房稍暢情烟花空有色山鳥兩三聲翠嶂寺前繞春雲户外橫濡毫難得句萬景自天成萬松寺蘿磴烟巒幾曲盤上方遙在萬松端攀登盡處仍初地小閣春風二月寒置身應在翠雲鄉雲外層峰望渺茫我有閒愁吟不了天風謖謖為吹將誰道山容朝夕變招提松色四時同閒開屋北羲皇牖坐對淮南十八公林廬清曉散輕烟徙倚憑參龍樹禪春鳥一聲人寂靜不知昔日與今年是日未至雲罩寺寄題以詩寺在白雲端峰頭尚仰看非關難得到却慮不勝寒樹色連空暗鐘聲落澗殘不教餘興盡佳處且回鑾寸步不曾移十方遍滿時如何參色相除是絶思維泉響春前細山皴雪後奇三間白板閣故我獨留詩去嵗吟塔前不作塔前想今朝望山半已似山半往堪以悟離合何須别俯仰鐵索千尺垂有誰破雲上倚壁此冥搜天門一望悠不殊臨絶頂頓覺解繁憂雲路白為界松濤緑處流吟懷寄象外好待重來游偶憶盤山别業命筆寫之並題以句盤山太行脊千里走薊易峰巒特秀拔往往露奇石别業搆其間匪學烟霞客來往偶停驂一覽千巖碧孟夏雨未足輾轉愁無麥飛廉勢復扇熇蒸日若赤虛堂苦煩悶遣興無良策偶憶雲中居松泉在咫尺命筆規橅之肖勿求形跡幽籟奏柏竹爽氣生几席架壑白板閣更復堪響舄曠懷一為寄繁慮於焉釋遙想伊蒲輩禪悅正幽適題慎郡王田盤山色圖十六幀靜寄山莊别業搆田盤潤挹千峰翠陵谷因天成軒齊稍位置境惟幽絶塵心以靜堪寄披圖似重歷悅此烟霞意千相寺曾聞佛示蹟一夜千相成千相各殊别因之寺得名而我莞爾笑此語殊不經燈籠答露柱熾然無色聲萬松寺萬松松無萬無已云萬松颯沓韻金石猙獰拿虬龍白澗幾曲盤緑隂千古濃苾芻入三摩真參不空空天成寺兩峰五丁闢一寺雙林開坐我挹秀閣抒兹即景懷冷泉淙石齒疏林掛兔胎結習一以忘故知無去來少林寺精藍據層巔烟磴凡幾疊丁星綴紫茸爛漫紛紅葉北山鮮移文是山古為隱者藪今則為禪家窟矣西域饒梵篋少室本同名跋陀倘能接盤谷寺出楹幽霧寫搴幌繁雲噴我曾拾級登䝉茸破秋蔓愛此老筆遒更豁煩襟悶踽踽策杖人然疑覩李願雲罩寺常時望田盤雲在山頭起昨嵗登絶頂雲乃在足底由來萬仞髙只此一步是定光無說說不異天龍指古天香寺嶂葉緑交軒岫霧白封殿隔巖望初地金碧時隱見遙想佳䕃下春深鳥應囀何當半日閒一飽伊蒲膳中盤盤谷實有三中盤為最幽我曾坐松下幾度沿溪流契理在寸心曠觀足千秋長嘯萬壑空髣佛晤田疇東竺菴西方亦有竺東方亦有竺試問為異同兩三原是六真偈空水泥妙曲絲竹肉可惜門外漢不如屋裏宿雲淨寺山水智仁德松竹清和聖學遁久無人逃禪乃有柄梵宇何林立法體交光鏡坐對默忘言一川秋雲淨東甘澗入山既遠俗尋流復得源齒齒咽白石絲絲漾緑薠在隂鶴叫子猗庭竹育孫仲長今豈無可以樂衡門西甘澗澗水分東西地靈甘則同汲冷垂折竹潤枯燒老松無須調水符可作清齊供嗟彼栖遲客來思慰遐悰豫既憾隱者之絶少而乂慮隱者之不豫從也上方寺蘿徑回羊腸攀躋到上方鳥語奏笙筑嵐氣霑衣裳天樂悟根塵花雨紛幻常漢室仙人掌至今零露瀼雙峰寺衆峰何攢攢雙峰迥莫攀下臨衆壑空高入天風寒月影標靜常秋容變蒼丹鐘聲聞上方堪證六度檀金山寺造物無盡藏環中有獨得偶爾寄林泉誰云娛翰墨心與空宇閒身在孤松側維摩明示豫萬古田盤色如來影盤山千相寺石上有如來影像詩以詠之如來無物不如來無物不如本無物豈於石上獨留跡得毋此石非真佛無物非佛石豈獨非亘劫色相不長苔衣君不見古德跏趺背佛殿自謂能參言語斷此事瞞人那易瞞識者嗤為擔板漢去嵗盤山天成寺中橘樹子饒有佳致因圖之以歸幾餘展玩正值橘月漫成二章仍依舊韻何須伯仲較橙柑悟處應同彌勒龕留得盤山霜色在天成髙閣小窗南千户原輸三色柑春風偶憶普明龕舊句云橘月燕山吟橘樹春風一室小江南色香重演無生偈漫論名家鄭所南欽定盤山志卷首二欽定四庫全書欽定盤山志卷首三天章二靜寄山莊丁卯六御上陵回便道憩山莊山莊景已佳春日正載陽暖霧蒸浮嵐隱現環松岡萬變出頃刻妙筆誰能方蕭齊對嶢峰攬結資忀徉駐蹕憶前春倐忽經兩霜誠哉靜如寄紛矣幾偏忙習靜縱有懷勑幾安可忘天成寺尋徑入林閭花宫地最初澗餘春雪脆窗引竹風徐山靜我來慣天髙佛喜居兩年違相好五髻只如如名山結四鄰拱伏禮能仁松色遠逾秀泉聲春更新自能空世諦頓覺息凡塵小坐參今昔誰分主與賓江山一覽閣無路中間有路通豁然開朗眄長空句披月脅天心妙窗納千巖萬壑風橘樹迎人還鬱翠前年有天成寺橘樹之作杏花過雨乍殷紅誰云俯仰成陳迹恰似沙紋淺印鴻萬松寺精藍勝已奇喬木秀山姿名不受嬴汙幹曾聞偃為惟應風入耳誰得斧斯之點筆成吟處童童影未移崇椒蹕暫停憑檻攬山靈佛火閒中叩雲濤靜裏聽四時無改色萬古有曾青擬借吳剛斧盤根劚茯苓盤谷路轉萬松寺松勢殊未已行行歷嶔崎古寺中盤裏坐逸轉憶勞習靜復窮視此處得天倪因之悟物理登雲罩寺塔登臨值晴朗千里入指顧雲罩巳天半浮圖更髙處極目愜素懷拈鬚得新句瓊樓不勝寒坐客那忍去寄語舍利光記豫來兩度東竺庵策騎循羊腸盤紆歷嶕嶢卻望掛月峰聳入雲端遙陽阿泉已壯隂崕雪未消精舍枕林楚蔽虧古木喬遠聞疏鐘聲下見幡影飄攬結既云富僕御亦已勞此間泉石佳小憩山僧寮海棠開笑靨杏花剪絳綃未見天女散得毋谷神要問其意云何報我今花朝盤山花朝常年每愛度花朝卻每花朝愁裏度近喜薄雪灑原田舉趾春耕猶不誤駸駸六轡駕言回恰逢令節山中駐山中春事日已佳碧桃紅杏霏烟霧破萼含胎各殊致姹風嫣月均堪賦更值芳辰判半春底須彩勝張髙樹寄語山靈記此來此來差未相孤負月何處無明月明月山中好春宵淡沱時流光入懷抱雲容自卷舒山色增窈窕印波醒濳魚隔林隱宿鳥如挹玉壺寒不輸秋魄皓託好愜靜因澄觀切清皓少林寺是處由來初地盤山雖屢經駐蹕而少林寺則初到會心都契法源巖懸水出嵌隟路轉人度松門少林名自少室是一是二堪參忽坐壺中天半下臨萬壑千嵐俯仰似霑花雨布施非為福田是寺將廢圮因略為修飾之幽閴自彼無俗山林於我有緣古中盤塔院經行石磴紆灑然精舍出塵區雲容自在舒還卷山色何妨有若無只有天髙萬象低登臨拾級一攀躋僧人白足石橋畔三嘯還如過虎溪門外一峰積翠浮寺中門外一峰扁聖祖御賜也淙淙玉乳澗邊流常時怪底雲霞護四字標名聖蹟留試掐山花佛鉢澆偷閒聊爾坐僧寮開窗漫為山深慮山越深斯見越遙盤山夜雨傍晚山雲密中宵春雨寒聲偏清耳觀望巳慰心官谷口流應壯簷牙響未殘評量凡幾寸轉覺寐難安雨中自盤山移蹕白澗南峰雲接北峰雲郊墅微茫驛路分最愛牧之詩句好清明時節雨紛紛盤山十六景靜寄山莊人生而靜儒者之言也人生如寄達士之旨也山以靜為體其寄於天地與人之寄於山等觀山以觀我生其體不二故其寄也恆主乎靜秀木千章䕃疏峰四面羅經營成不日泮奐詠卷阿藻繪無須亟林泉豈在多肯堂遵祖儉是處闊較避暑山莊僅十之四而程則僅十之三色養奉慈和繞砌栽紅藥開畦灌玉禾萬緣歸靜寄隔嵗一相過太古雲嵐當山半隨高下為樓館殿室取唐庚山靜似太古顔之山中出雲頃刻萬態人知今之雲不同於昨豈知伊古以來無日無雲未嘗少異雲無古今山無古今萬事萬物無古今曷似之云乎窗納田盤萬景全宜人暮靄復朝烟臨虛標秀琴書潤因迥為髙坐卧便適可成圖添粉本偶然得句勒崕巔批黃稍暇無餘事靜讀鶴林玉露篇層巖飛翠入山逾深所見逾遠千巖萬壑烟鬟翠螺環列几案靜寄此間頗能盡攬兹山勝概山水有靈不當驚知巳於千古耶夏屋枕崇椒林霏互吞吐徐無無不佳是惟最佳所雲起樹中間泉分山四宇薈蔚鮮定容變幻乃爾許俯仰接諸天時時落花雨清虛玉宇山莊東少北傑閣圜搆是為上清碧虛玉帝之宇道家者言姑弗深考天在山中其有得於大易之旨歟地切清虛妥玉真嶤峰孤迥若為鄰行來禹步何常慣却是遊仙天半人鏡圓常照環山皆寺也其在山莊西繚垣之內者於古無名雖不足當鹿苑雁堂之巨麗而於此作佛事即是耆闍崛山户有白雲封庭餘古樹濃何須參寶積藉以繢山容瑞相標圓月禪心定毒龍招提隨望是互答六時鐘衆音松吹水石間鏘然成韻為環珮為琴筑為笙竽鐘磬泠泠盈耳至清飈一過或長風號空為驚濤為鸞鳯嘯漆園氏所謂天籟意其是歟伏流飛瀑渾無定此獨松間匯小池巳覺地琴清越矣更兼天籟始終之忘機徐聽韻盈耳得意間憑緑映眉正是八音繁會處髙山何必待鍾期四面芙蓉山中一盤一曲一澗一石各具奇勝而遠觀秀絶莫如諸峰就岑蔚處為亭四望霞表層湧疊出圍合若屛障李青蓮於九子匡廬皆有芙蓉之目信其工於體物芙蓉朵朵標銀漢恰似香罏日照明千古名山以人重田盤匡俗兩先生貞觀遺踪山以石為體有在南澗中者曰晾甲相傳因唐文皇征遼得名貞觀去今千餘年石不泐名不滅得失之圖可弗審諸巨石當其垠苔泉灑清泚遺蹟傳楷模在彼不在此天成寺自宫門西行越蓮花池循山澗北上三里許曰天成寺寺門有樓下瞰山麓如深巷屈曲澗泉苔石歷歷可數遠眺林巒攢簇天成圖畫或曰盤山圖經稱四正山四山回合天然城郭故舊有天城之名憶我初度遊上盤問津原自天成寺是時秋老變山容霜楓古柏紛丹翠坐我江山一覽閣成詩聊寄烟霞意雲罩萬松髙絶處慮不勝寒回六轡從兹結習鎮相縈頻年便道輒停蹕叶攀躋涉歷既經慣幽者畢探遼者至得愈多愈不忍置更虞奔走勞執事因之卜築擇佳勝雕斫不施敦簡易朝往暮歸樂無窮得路安能忘所自繄余惕若廟廊者豈宜耽適山林致田疇大隱倘可招勤政咨諏共圖治萬松寺山外石而中膚松生石罅或偃或欹或橫出或倒懸或屈曲夭矯或竦特直上負奇鬬異古秀不可名狀昔人遊盤山謂山之勝松為最良信蒼翠復清􅋯仙山别一區誰知圓覺佛也愛老成儒以石為胎古因風泛籟紆此間來亦屢興會幾畨殊舞劒臺萬松寺西一徑陡絶緣藤上北岡為李靖菴庵西為舞劒臺石盤陀髙聳平敞足展襟抱澗看玉室抽泉是霜鋒淬秋風騞然鳴想見英雄槩盤谷寺盤谷居盤之中羣峰屛繞山泉潨下匯流為一逆折而西又名青溝居人謂之上甘澗繚谷一盤一曲精舍三間五間翠雨飛時林靜白雲開處僧還暫遊宛探月窟到此可破天慳珍重韓愈李願曾否烟磴躋攀雲罩寺挂月峰巔浮圖矗峙天際曰舍利塔寺居其側雲滃然若擁若覆自下觀之或見雲不見寺而寺中或不復見山云山雲罩寺寺生雲形色誰能與判分恰似拈花便微笑說無說處不聞聞紫蓋峰一峰踞中臺圓峭離立單椒秀澤蔚如華蓋諸峰駢羅若拱而伏於形勢為特尊鼇柱千秋鎮太寧諸峰拱伏儼來庭疇人試問應難測華蓋垣中第幾星千相寺祐唐寺建自開元相傳有尊者挈杖遠至下有澄泉見千僧洗鉢因刻千像溪谷間東坡詩溪聲便是廣長舌山色豈非清淨身刻像大是鈍置何來龍象侣說法禮山神即景欣幽託隨緣悟靜因門迎松落落路轉石磷磷千相即非相誰容辨假真浮石舫山中雲氣鬱勃瀰漫浩浩如雪海峰巒出沒其中如烟檣乘風上甘澗東北峰頂有石如艨艟萬斛當雲起時幾欲駕飛濤凌溟渤矣孤撐不繫幾千秋雲海波瀾任拍浮學士小哉惟識畫將軍往者漫稱樓武陵舍處今溪口靈鷲飛來古渡頭放眼縱看天以外覆杯何異芥為舟盤山松奇秀不可勝紀偶寫虬枝以志一臠鼎味口占率題記得萬松寺當門阿那株偶然為放筆所喜不相殊秋日靜寄山莊戊辰夏山太濃春淺淡惟有秋山最可人小别田盤過嵗半白雲緑岫如相親岫態雲容還似舊流泉之畔松隂茂憑髙意趣合杳冥得妙心神忘去留心神意趣適所如山莊靜寄名實符太行之陽有盤谷瓊臺中天而懸居時時鐘磬下雲間疑有佺期相往還却笑苦求萬年藥不及樂此一日間天成寺每到盤山無不到坐來髙閣憶曾來窗含四面秋山翠座招萬壑松風哀欲落未落葉戀樹三點兩點雨濕苔我豈維摩無所著手接天花置講臺西甘澗此路乃初路探奇越得奇當秋坐精室尋古得殘碑石底幽泉潄松梢宿霧披人心欣創見我意也因遲東甘澗常時空向詩中詠題慎郡王盤山十六景圖內雖有東甘澗詩而其實未到今始遊云今日初從畫裏遊正喜軒窗無俗韻更當風物報髙秋西甘澗接東甘澗薜荔䝉茸澗路幽回首天成白雲外鐘聲遙自翠微流千相寺詭石盤危磴精藍倚繡屛衣衫生颯爽草木發幽馨雲榻當軒據松泉隔峽聽便教遘支遠無暇問金經東竺菴穿林破秋烟搴蘿濕曉露雲中峰態幻雨後溪聲怒靜室聊可憩賞心於此遇既欣筆研隨便令座席布雲罩在上方鐘聲時靜度分付舍利光待我重來晤望雲罩未至非虞髙處不勝寒身到何如望裏看一步未勞才舉目拈題已在白雲端雲淨寺精藍東竺東峭蒨倚青葱妙契得初到徐觀迥不同開窗延爽籟俯檻眄秋空尋勝勝無盡生涯那有窮靜寄山莊雜咏雲間尚戀翠峰聳瀑壯