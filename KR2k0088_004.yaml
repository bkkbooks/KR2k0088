body:
  text: 名勝二盤山不可上必盤而後上故昔有三盤之稱下盤水中盤石上盤松各就奇勝言之非為區别也晾甲石為下盤古中盤為中盤自來峰為上盤谷盤谷在盤山中央舊稱唐李願隱處韓愈送李願歸盤谷序太行之陽有盤谷盤谷之間泉甘而土肥草木叢茂居民鮮少或曰謂其環兩山之間故曰盤或曰是谷也宅幽而勢阻隱者之所盤旋友人李願居之願之言曰人之稱大丈夫者我知之矣利澤施於人名聲昭於時坐於廟朝進退百官而佐天子出令其在外則樹旗旄羅弓矢武夫前呵從者塞途供給之人各執其物夾道而疾馳喜有賞怒有刑才俊滿前道古今而譽盛德入耳而不煩曲眉豐頰清聲而便體秀外而惠中飄輕裾翳長袖粉白黛緑者列屋而間居妒寵而負恃爭姸而取憐大丈夫之遇知於天子用力於當世者之所為也吾非惡此而逃之是有命焉不可幸而致也窮居而野處升髙而望遠坐茂樹以終日濯清泉以自潔採於山美可茹釣於水鮮可食起居無時惟適之安與其有譽於前孰若無毁於其後與其有樂於身孰若無憂於其心車服不維刀鋸不加理亂不知黜陟不聞大丈夫不遇於時者之所為也我則行之伺候於公卿之門奔走於形勢之途足將進而趦趄口將言而囁嚅處穢汚而不羞觸刑辟而誅戮徼幸於萬一老死而後止者其於為人賢不肖何如也昌黎韓愈聞其言而壯之與之酒而為之歌曰盤之中維子之宫盤之土可以稼盤之泉可濯可沿盤之阻誰爭子所窈而深廓其有容繚而曲如往而復嗟盤之樂兮樂且無央虎豹遠迹兮蛟龍遁藏鬼神守護兮呵禁不祥飲且食兮壽而康無不足兮奚所望膏吾車兮秣吾馬從子於盤兮終吾生以徜徉謹按山海經北山經北次三經之首曰太行之山述征記云太行形大而原遠支脈所融結隨地異稱非一方可專者其第八陘在燕復東向而北折數百里入於海故畿輔諸山以大勢度之皆屬太行之陽而盤山為尤巨山之中有盤谷窈深繚曲宅幽勢阻悉如昌黎韓愈所稱世傳李願嘗隱於此夫名流遺迹圖志彼此互載不可勝計願舊隱基址雖不可諦考而山泉之澄泓甘冽可濯可沿氣和土沃頗宜稼穡猶曩昔也嘉遁之士濳光匿采樂志忘返其風流髙致尚可於巖壑間想見之安見在濟源者為是而在此者為非耶且杜牧去韓李至近而崖隩刻石已云不可復見明解縉為李氏裔題盤谷圖至云滄桑變遷之餘人亡而事益以遠若前日之盤谷不得而復有矣況迄今又數百年迹更茫昧所憑惟韓氏一序耳境既相合名乃不誣緣文考迹庶幾有當焉昔人遊記亦少異論自世之稱兹山者謂突起薊門無所附麗幾使韓氏太行之陽一語於盤遠不相屬而髙人遺迹遂無過而問者故辨之於此峪黑塔峪少林寺東北一里唐志間禪師濳修處內有華嚴庵青楊峪法藏寺南上一里內有青峰庵洪升青楊峪詩山行三四里徑轉幾百曲偶采黃精苗遂至青楊峪杏林環寺門麥田繞山足松石靜無人風來自相觸境幽淡忘歸年衰漸寡欲日與緇錫遊超然泯榮辱鋪黼峪即俗呼破釜峪也在山西南內有觀音庵田家峪在山西內有關帝廟白峪萬松寺西南八里智朴按白峪乃遼金古剎嘉靖中劉氏為别墅康熙二十年僧本旺贖歸建禪房數楹仍因其地名白峪寺盧家峪在山西北隅東有秀峰庵北有龍泉菴基南有玉石塘松樹峪自來峰東七里內有東竺庵洪升松樹峪詩盤山石結成松峪獨有土此中即沃壤開田作場圃黃犢曉耕雲緑蓑春帶雨遙聽布榖鳴杏花滿村塢瓌紫峪俗呼怪子峪在九華峰前塢白雲塢近松樹峪見王煐記梅子塢在蘿村東李鍇梅子塢記循蘿村而東自響雪瀨凡十三曲有荒塢焉塢窈而深紆而虛閴然無人無一切物塢之荒不知其幾何時矣而闢田種樹乃自嵗丙午始再越嵗構屋三椽於塢東於是乎塢中有庵菴一而巳又久之越僧來棲止之於是乎塢中有人人一而巳塢荒久豺虎與人爭窟穴溪之北又有塢塢亦無一切物臼一而巳丁已秋僧移庵於北塢於是乎東塢無菴而北塢有庵噫一塢耳入有入無何其變也北塢有人莫窮其年僧掘地得錢多𢎞治時𢎞治距今幾三百年可想見矣而東塢北塢裁五六年生滅乃爾固知彌劫以來月化日遷新新不住有如是夫噫是塢也自無入有今之菴是也自有入無又復不知幾何時也雖然佛有云因緣和合虛妄自生因緣别離虗妄名滅殊不知生滅去來本如來藏常住妙明妙真如性然則生滅有無之外又有所謂寂乎泊乎不動周圓者在乎姑為之記以志庵之始洞白猿洞懸空石迤上勢最險壁鑿石為數坎坎容足􅡑未及踵必布索牽挽乃可達上即天門開德靖白猿洞詩孤峰矗矗隱斜暉今古遊人到者稀自是老猿多異術洞門時見白雲飛桃園洞在將軍石畔深丈餘其門以瓦覆之常鑑桃園洞詩偶至桃園洞桃花放滿溪春風不教住流出釣魚磯華嚴洞少林寺西北上一里旁有靜室二朝陽洞在山南面觀音洞在古中盤東南廢文殊洞青溝前半里縱一丈橫三丈六尺東西兩山相夾如厦上刋文殊智地四字字徑二尺虞世瓔書石龕在西甘澗殿後形如圓室至元中王志謹修煉處宋宗元石龕詩靈境結奧區中有神仙宅寂處安丹爐幽栖不嫌窄白雲鎖洞門蒼蘚蒙石壁沖舉在何年斯人不可即尋求已云遙流連復何極野桃萬樹紅巖松四徑碧春雲如高人淡蕩依岝峉契真洞在千相寺後憨山大師遇隱者即此處也宋宗元契真洞詩昔日高人契本原會心欲辨巳忘言無奇特處真奇特勘破機關在入門石雨洞見袁宏道遊記袁宏道石雨洞詩山僧問亦不知名凹處惟將腹背行石骨數拳泉一縷遊人多少只聞聲守真洞在秀峰庵殿後鑿成深丈餘石佛洞在雙峰寺西淀鏡淀在山西周數里登自來峰望之澄瑩如鏡宋宗元鏡淀詩北上自來峰西望得幽徑一泓抱虛谷古淀匯明鏡銀沫濺還平金沙漾仍定微風乍起波清光自孤映白雲還暮山薄暝聞清磬悠然洗道心萬化涵虛靜窪百草窪在雙峰之麓見王衡記瀨響雪瀨在獬豸峰後見李鍇記泉盤泉響澗以下合萬竅之水勢益壯千百折乃出山故名洪升盤泉詩山行十餘里忽聞泉活活徹底漾金沙跳波濺銀沫纎鱗碧可數弱藻緑堪掇卷衣濯且沿洗心洞以豁此水萬古清其根出雲末李鍇盤泉詩巖壑無定姿絪緼變清旦勝因引紆步得趣成汗漫微暄解作近芳意甲坼先松邱鬱蓊蔚蘭阪虛蔥蒨熒熒和景鮮活活激響亂偶逐巖下雲遂及垂虹澗疊石紛厄塞飛流莽洄旋境遠神俱冥賞真理獨見近服任公訓熟與海鷗玩盥手弄鯈魚遊心同伴奐仙泉東甘澗東南石上有坎如碗深一尺八寸四時不涸王煐仙泉詩石竇墜雙星醴泉湛孤月莫更覔瓊漿一飲清神骨涓涓泉在天成寺後出翠屛石罅中承以深坎澄徹見底潄玉泉在青溝內今甃為井秩秩泉潄玉泉南半里在清涼石迤上自來泉在古中盤别是一天門內甘泉在古中盤院內普濟寺西南隅有泉同此名今甃為井香泉在香水寺殿後旱不涸潦不溢醴泉即靜安寺井鵝泉在靜安寺西嶺上有煉魔臺基井東征石井在先師臺下相傳唐太宗東征幸此命鑿井鑿至三丈餘始有水去山十里有報水村其井通體塊石世以為異上刋瀑泉二字聖水井在青峰庵東廂石几下龍泉井在龍泉寺門前路都門至盤山百八十里四十里至通州渡河二十里至燕郊又二十里至夏店又三十里至三河又二十里至段家嶺四十里入山過公樂經杜家吉素許家臺夾樹槐柳中為輦路以達於行宫東南二十里外即出入山海孔道也盤山北面最峭無路路在南面有三東則玉石莊入山循南澗至甘露庵後岐而為二西北上為青溝東由多寶佛塔過版鋪上舍利塔中則蓮花池入山望天成寺逾歡喜嶺至萬松寺東折由青溝上舍利塔西則自大嶺入山經雙峰寺歷法藏寺過將軍石上舍利塔凡路皆止於舍利塔者山之絶頂也向時諸路皆榛莽犖確不通輿馬今則日漸開闢石磴旋折險峻悉成坦途登陟者步步入勝矣橋投間橋俗名大石橋晾甲石北上半里怪石參錯若拒流怒激作鏜鞳聲松聲和之聲益厲青龍橋橫跨不受履兩山夾之若澗户仰視峭壁去天尺五鑿石而成上為古中盤生天橋傳稱雙峰寺南無考仙人橋萬松寺東南五十步有巨石數丈橫澗上水自下出又古中盤觀音洞右石亦有此名鄭纘祖仙人橋詩見説仙橋險苔深少人迹停笻一俯觀澗底千餘尺偏橋在下天成寺南溝青溝一名盤谷居盤之中羣峰圍繞水匯於一逆流而西自天成寺水口出山上有青溝禪院金馬石溝在先師臺山後燕子石溝在報國寺東五盆溝當澗中有五凹各丈餘能滀水故名在法藏寺主山後內有靜室無暗律師棲隱處澗甘澗有三青溝前為上甘澗其下隔一小山東為東甘澗西為西甘澗龍潭澗東為獬豸峰西為鷹兒嶺兩山相夾峭壁峻嶒其下即黑龍潭響澗自雲淨寺一帶水與磯石相角鳴聲徹書夜瀉至晾甲石下出山蔣溥響澗詩琤琮澗流響瑶瑟山花吐香弄初日簫韶一奏太古音白雲乍停彩虬出蕭然坐聽塵襟清但覺天籟洋洋盈此調欲譜無定曲耳根圓通妙音聲飛帛澗在天成寺西北隅六七月間澗水自空中注下如飛帛城口澗在少林寺東北半里許最險峭潭龍潭有三曰小潭曰舊潭曰黑龍潭舊潭當澗中滑不受履往來隔絶崇禎中淨業庵主僧欲命工鏨鑿搆橋以便遊履甫興工龍即涌水數丈霹靂隨之遂移下潭下潭亦有三勢相連屬四壁陡絶水極深昔遇旱居民嘗禱雨於此輒應洪升龍潭詩兩壁幾丈餘臨潭勢如削奔瀑垂若練跳波瀉成壑水碧杳深沉石青峭參錯淨可毛髮鑒怪疑鬼神鑿空天倒影深冷日濳光薄神物昔此蟠於今旱不涸智朴遊黑龍潭詩細路隱青蒼威紆千百折顧盼罕人蹤晴雲影揭揭偕行拙後先交互叫不徹空谷傳好聲響震青天裂倣佛連雲棧但於水聲缺倣佛玉川門但於松林蔑隂風寒颼飀怪石聳嵽嵲澄泓一鑑開冷光溜白雪所以神物濳九淵非妄説蔣福山龍潭亦有三相傳甘泉山龍讓地於唐曉方禪師即此智朴遊龍潭詩夾壁深如巷三潭委曲通神龍留古宅白日起腥風樹杪霞光亂山根落照紅回頭驚險絶躡足問漁翁池洗鉢池千相寺內昔人見千僧洗鉢於此近之而沒今甃為井井內刻洗鉢池數字蓮花池入山中道天池在洗心石下智朴天池記天池石池也在西甘澗迤北直上里許縱橫三丈餘塊石而成不假雕鑿其深不盈尺其水不涸其南面有小口方六七寸凡夏秋之交其水溢則自口而出活活有聲樵牧就之而浴蟲鳥就之而飲土人呼為石盆其上有磐周五丈許平如几筵曰洗心石遊人坐此心目灑然甘澗主僧福源者曾采藥至池畔稍東見一洞邃甚心異之輒入其門初極狹小中則宏敞清潔廓然無一物久之而出歸語同人復尋之不可得戊辰秋衛公庵主人吉軒向余道因攜吉軒至其處掬天池水盥潄坐洗心石上望嵐光秋色令人難著意想然所謂宏敞清潔者竟無從而見焉悵然而返時中秋後三日也黑龍池在報國寺前衛台瑺黑龍池詩小砌山根一掬清雪涵澗底自無聲竹爐活火尋常興汲向荒齋帶月烹紅龍池在少林寺東石壁上鑿龍形旁鐫紅龍池三隸字字徑二尺後有帶川隸三字字徑七寸前有大定七年四字又有正德十年盧雍題壁記遊謹按紅龍池不知何以名鑿石為龍塗以朱則鄙俗依託以實之也劉謙紅龍池詩因看朱鳯竹得玩紅龍池日暮忘歸去攀留我賦詩張我慈紅龍池詩紅龍一何小而樂蹄涔居勺水可神立洸洋翔太虛塘玉石塘在盧家峪南長數十里其地或稱石塘峪李鍇石塘峪詩孤策狎清曠蕭晨紆遠步坦懷足虛受延接生妙悟復嶺抱重岡奇搆見回互石豁白雲屯巖張流水住人迹閴云滅殘村寄深處敗垣立缺齒老屋飽撑柱臼冷肥􅖆穴場荒射干赴山田久汙萊依稀辨樵路緬彼巖棲人白骨委邱墓情專理豈敓火傳薪偶傅搴蓬啓長歎蒼蒼夕陽暮塔定光佛舍利塔未詳其始在挂月峰上相傳除夜有佛燈之異傅光宅重修佛舍利塔記盤山佛剎如棋布舍利塔獨據山之巔隆起雲霄間遠可以百里望見唐道和中智源禪師建藏佛舍利六十顆佛牙一具自建迄今千有餘嵗代有修者太康中惠源成化中本源嘉靖中圓成以次營葺並有碑記今上丙戌余奉命三關取道瞻禮塔之剝蝕蠧損實將頽焉土木之工嵗久漸趨壞漸難支持不早為計懼遂墮首事者與前後營葺者之成功且佛身舍利是在培支那衆生福田而使之光明無所依附風雨霜日得而薄之此事佛者過也為慨然久之既余謝病家居不得與此山相聞五年矣塔如何吾不知也辛卯春余來京師未逾月開禪師至自盤山問塔無恙則以裕師對師於丁亥秋有事修葺庚寅冬十月畢工為年四為月四十為日一千二百有奇亦已莊嚴煥麗而新之非復吾曩所見剝蝕蠧損實將頽焉者歎希有開禪師曰裕師多參諸方道行純篤向人泊然如秋霜冬月而歸者輻輳可怪也塔成須記以屬余余曰三寶中一切緣事不從情識生不從狹小心生不從邪暗因緣生從六波羅蜜從廣大心從善信因緣以此多義緣事得成如是觀者不背佛意作他觀者是業非福非佛意也吾知裕師於過去佛所種諸善根奇穎之見露於童年晚以念佛三昧躬化遠近此其成就一切法事不起於坐而自集者斯塔其小也某不慧不能記其大者記其小者也寶塔巍峩起一方之壯觀飛樓疊閣開千載之名藍傳緒心燈祝延聖壽大𢎞佛祖門庭髙步人天道路如斯利益回向檀那是為記萬厯二十一年癸巳十月張照重修盤山雲罩寺舍利塔碑記盤山距京師百八十里百尋而至頂頂為雲罩寺唐釋道宗禪栖之所也記云茶毗得舍利數千塔於寺之東南隅蓋靈迹至今存乾隆七年皇上恭謁山陵禮成還至山減騎從徹雉葆穿松緣泉躋於峰巔豁然開明目窮千里謂巖凹澗側諸精廬此寺殊勝命葺其垣墉新其棟宇大都因寺之舊而少整飾之舍利塔巳就圮因重加甃石衛護神物標靈兹山俾永千古既成庀工之臣礱石請記皇上以命臣照臣惟佛道窮三際亘十方人不能遊乎方之外而膠其識情封以自蔽乃以其言為河漢而無極疑為荒唐謬悠否則惕於禍福豔其靈奇蹈韓愈所嗤惟怪之欲聞是皆不可以為智也佛涅槃後西域諸國收其舍利起塔供養是其風俗使然教行中國以來禪德之有舍利者亦遵其制乃儒生齗齗如也謂舍利為無有此非珠非玉流光晶瑩入火不滅者現在目前安得曰無有也耶若謂崇奉之可獲福利則又惑也夫山有玉水有珠人之百骸皆地之屬其有舍利何足多異蓮之體絲絲皆通象之體節節是藥栴檀之體寸寸皆香物亦有殊乎物者何況於人楞嚴云神通本宿因何關法分别宿因既然又加之以不昧則如蚌之不見擉於漁師璞之不見剖於拙工韞養純固而輝光發越如珠如玉固其所也然而亦一物耳何與於道夫知舍利與珠玉同類則不特焚頂膜拜之徒之為愚而韓愈欲投諸水火者亦為少所見多所怪矣夫良珠美玉雖聖人亦必韞櫝而藏之然則今日之為釋道宗舍利起塔者後世亦可無惑也臣照既因扈蹕得覽山川諸奇兹復蒙恩命勒貞石謹序其事而記之乾隆八年六月望日奉敕恭撰並書智朴塔碑辨訛正德十一年內監苗旺碑文載塔始於通何年中祖師智源造內有戒珠六十粒太康八年惠源重修成化十三年本源又修又傅光宅碑載唐道和中智源禪師建藏佛舍利六十顆佛牙一具太康中惠源成化中本源嘉靖中圓成以次營葺按唐史紀年無道和亦無通何疑遼統和之訛也黃汝亨登上盤塔一宿詩多寶重雲護靈光落日看青蕪阡陌繞浩渺海潮寬煙井漁陽晚風沙鴈塞寒秋聲聞下界月色照空壇倦乞袈裟卧清分苜蓿餐荒碑明佛火興廢一憑欄無名氏舍利塔夕望詩孤峰迥出白雲上水接餘霞光蕩漾仰看塔影挂層霄居庸積翠明千嶂女牆如練亘山腰烽火臺依碧澗髙指點遺蹤增悵望令人猶憶霍嫖姚王熙登盤山舍利塔詩寶塔真同霄漢齊蒼茫一覽衆山低憑髙無限登臨興回首長空日又西長松如草石如苔化盡塵寰幾劫灰絶頂晨鐘聲到處邊鴻沙鳥一時回髙士竒舍利塔詩穿雲尋雁塔掃石憩山椒晴影臨邊塞天風下泬寥斷階苔半掩廢碣字全銷颯沓聞清籟鈴聲徹半霄阮旻錫定光佛塔詩寶塔孤峰頂上開一輪邪影落邊臺何人除夜山中宿同看千燈繞塔來龍震與野鶴道士登舍利塔詩穿走無數髙低松香林道士欣相從拄杖來登舍利塔看雲直接蓮花峰中盤下盤不見寺前嶺後嶺都聞鐘回頭卻問金彌勒誰教此地通人蹤王聰登舍利塔詩盤磴崎嶇行去險攀躋不敢步縱橫風搖萬壑松濤響雲變三盤雪雨晴疊嶺重巒環佛塔長林亂石接天城登臨東眺蒼蒼色遼海波光一抹平智朴禮舍利塔詩奇峰獨拔數百丈窣堵波髙跨其上白石青松列畫屛千峰萬峰屹相向我來朔風栗栗吹稽首拜手增惆悵塔中舍利何年置煙霞八面曾無恙放足空山寂寞鄉葉落花開别有長此情端的無人訴冷對浮屠看夕陽古佛舍利塔未詳其始在天成寺內其碑載遼天慶中重修內藏神龍親奉舍利三萬餘顆明僧如芳刺血書經七年為修塔計甫興工感白光燭天如玉橋竟日不散其塔十三級如芳僅發二級目覩舍利二千餘顆張元芳天成寺重修古佛舍利塔記薊之盤山海內知名乃一大觀也而天成寺校諸古剎尤擅竒麗寺有如來浮屠相傳為舍利寶塔淺識者或詆為幻不知宇宙之大何所不有余亦存而弗論論而弗議至我熹宗朝有禪師諱如芳字祕如宛平人以丙寅春來自都門挂錫於天成寺之靜舍見塔頽毁發願而鼎新之於是刺血濡毫寫經七載彚成六部蓋苦行而大有法力者也薊土善士信服有年修塔材需咄嗟立辦甫發一級則有鐵塔玉瓶貯舍利若干顆再發一級則有石函石盒貯諸佛異相往而觀者如堵比時放光則有白練亘天如玉虹不但環山瞻仰者詫以為奇即郡內得以快覩者亦詫以為奇始信宇宙之大何所不有若為禪師標異也經始於崇禎四年二月望日竣於六月望前何成功之速哉則以禪師為之倡也愈知宇宙間不經見之物不可輕詆而天地間不難竟之事不可重發蓋證果真則結聚奇功行到則孚合衆余烏知夫往古之舍利非即目前之禪師乎又烏知夫現在之禪師非即舍利之重光者乎即歷恆河沙劫世界不毁人心不毁舍利不毁持法闡宗者人心各抱一舍利也可矣信士其信之乎又奚疑崇禎四年辛未孟冬多寶佛塔在少林寺內髙二百尺至元中為道士所壞順治末僧仁鳯重修於寺東之龍首寶積禪師塔康熙壬寅大博禪師曾於上方塔院中見斷碣上有寶積塔字擬建塔承之會有事都門不果嗣覔之不可復得或云塔在韓佶村香光寺訛香光塔乃多寶佛塔也在寺東北隅今現存普化和尚塔在古佛塔西南相傳一日山水暴漲聞空中有人語曰珍重佛塔普化塔遂衝去基存又傳普化鎮州行化時有異僧告歸隱處云逢盤即住遇城即止化涅槃人聞空中木鐸聲自數百里響至天成而止於是建塔徹公和尚塔無年月在天成寺內相傳塔乃善蛇洞門昔人因傾圮欲遷他處甫發塔則巨蛇無數自內出遍滿寺中遂不敢動每當隆冬時其氣噴涌石面凝結成霜厚寸餘人爭取之可療眼疾戒不可飲飲則令人眩禪師塔及普同塔存毁一百餘座寨六王寨在法藏寺主山上最險峭一壁淩虛千峰居下廢基存智朴遊六王寨詩幽尋曲磴斷人行鬼斧雲根削不平野老競傳前代迹飛巖盡處女牆橫莊玉石莊在南麓為入山必經之路村蘿村在獬豸峰之隂李鍇蘿村雜咏雙塢人煙外蕭蕭松雪翻老農今日事古色數家村鵝鴨通前浦豺狼到小園何須不來往鄰里數相存半尺青溪水滄浪或在兹草香回蛺蝶沙迥宿鸕鷀白髮悔他日清流信此時虛舟吾意得飄蕩更何之一雨柴門路紛然掩碧莎淡懷隨老至小隱畏人多澤雉安微分醯雞有太和寄聲舊朋好莫復笑蹉跎嶢崅南山口參差晚稼陳誰知荷鋤者不是帶經人天地容歸老妻孥恕食貧秋風看近在紅稻一嘗新耳目都無事空山貢寂寥飛生時探鷇稚子日承蜩蒼莽情焉薄胚渾器不雕初非事髙尚於以永今朝報水村在山前里虎里在山側舊多虎故名亭懸石亭在懸空石上戚繼光建基存王煐遊記亦稱凌雲臺慧石亭見袁宏道遊記環翠亭見王衡遊記津津亭在大嶺明僧常增施茶處有石刻易飲處三字秀水項德楨書尹同臯津津亭偶成詩結構原非大因山得勝全峰巒牆下簇星月牖中連香爇千年柏茶烹萬壑泉風塵能領此俗吏亦翛然欽定盤山志卷四
