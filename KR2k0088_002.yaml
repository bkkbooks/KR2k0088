body:
  text: 圖下行宫內新增六景半天樓池上居農樂軒雨花室泠然閣小普陀附載十六景古中盤上方寺少林寺雲淨寺東竺庵東甘澗西甘澗蓮花峰雙峰寺法藏寺青峰寺天香寺感化寺先師臺水月菴白巖寺半天樓鑿石為梯千百級盤折而上林密壑陡不暇旁矚峰勢一轉豁然開張萬象森列有亭當轉處曰摩青稍南而東為半天樓樓巍聳無所蔽八窗洞開納皓氣而拂剛飈北面接檻外為平臺架空凌虛欄楯周繞宸遊樂其髙曠屢登此遐眺海水一杯齊州九點髣佛在目睫間而佛圖仙館林霏泉影之隱見於三盤山色中者又不足言蓋山本峻極而此地適踞山之巔日月先光雷雨在下皆屬真實境界彼中天化人之居幻象恍惚奚足與此等倫耶池上居太古雲嵐東垣之外林木菴藹循犖確仄徑行可半里當兩崖欲合未合處築甎甓為睥睨樓櫓之形刻其上曰披雲棧曰款煙扉由門入境忽開朗澄池清徹見底壘竒石作岸凡數匝每匝象月半輪外堅而下實故水冬夏不泄瞰池為池上居步廊繞出池左有亭曰涵碧其後泉從千澗落日夜濺濺鳴則琴峽亭在焉蓋山中諸水多噴湧巖竇或伏流沙際少含蓄渟泓之致靈沼天成協兹地勢荇藻交碧輕鯈吹沫於以見天趣暢宸襟與盤泉千尺雪各擅勝場不復相掩也農樂軒聖天子念民事之重遊豫所至輒咨詢疾苦俾得霑補助之仁盤之土可以稼而其俗淳朴務勤力田間童叟得時時望見顔色鼓舞踴躍豳風愛上之誼庶幾見之觀瀾亭之東有地衍沃澗泉夾流左右可灌溉命有司墾為方田用藝嘉穀築亭宇其間額其前軒曰農樂比於內苑觀稼之所籬落映帶溝塍彌望春風至而碧毯鋪秋日麗而黃雲湧可以譜升平豐稔之象不獨摹寫江村景色而已也雨花室山路西北上漸少平坦而谷深崖復佳境益多契乎睿賞爰加結構有簷宇在深林中老樹作英時隨風飄舞宛如曼陀羅之散空則雨花室也室隱處又有室焉茨以茅倚巖為垣壁明潔無滓是曰雲林石室步越庭院仰面諸髙峰青逼霄漢是為對山亭自此而西下半里許飛櫩翼然縱窄而橫廣樓閣之參差隱見於空碧中者可以坐攬是曰菴翠亭亭與室皆當幽絶處凡離合向背崇卑淺深之體制皆因地勢為之不拘常格而舉目移趾景色各殊洵乎人工之巧符乎天造矣泠然閣地籟之發於衆竅者調調刁刁吹萬不同若夫暖香襲於蘭坡涼聲被於鞠徑山中清景是處熙怡閣虛回受風尤多宜有泠然之目不僅援列子寓言也閣之下軒序翼如林蘿翳如石之起於庭者突如梯而上南望無所不見北出乃平步崖額護以欄楯作深碧色時卉蔓之如錦一徑迤邐斜去若尋仙源窅然無極數十百折乃可達攓雲亭亭在山絶頂常時煙雲隔斷以準望度之適與此地相直天然位置得御筆標題一一與面勢相稱形諸繪事固不足以舉其勝槩矣小普陀近東澗得岡阜髙敞地結亭曰極望澄鮮亭下北折曲徑如旋螺深入崖隩水流至此不復作澎湃勢縈紆洄洑匯為石潭潭之上有竹萬竿竹得水而悅作深翠色日色到地若碎金於此建宇以奉大士屋小而勢聳不設疏櫺刻木為四壁塗以丹雘名小普陀以水故名也大士以聲聞入而號觀自在觀之為義無量無邊以石潭而視落伽大海之水一勺耳而性月所印處處皆圓皈心者當作如是觀古中盤擅中臺紫蓋之勝而蓮花毗盧諸峰或枕或面以朝霞夕靄作供養者為古中盤唐髙僧寶積之所宴坐也今則紺宇琳宫鬱然相望聖祖愛其竒秀勒詩石上記稱舍利塔每放光明地多金沙雨過則現竒朩澄泉映帶左右為佛窟表異者不可悉數度危石穿松徑恍然不知身之從塵境來矣上方寺寺去平地幾二十里山髙而氣寒千百年來唯枯禪能居之老屋數椽無金碧之采今奉命增修頳牆外繚崇臺內峙煥然改觀焉路自東巖折而入其西僅細徑一線幽泉侵林怪石嚙屐俯臨壑中窅深無極仰面則嶕嶢峰千仞石壁如削削處皆直裂而上勢巉然若寶劒厲鍔紛插層雲間灌木盤根石罅槎丫萬狀天門開石刻在樹影中可望而見人罕能至其處其西為懸空石稍下則凌雲臺故址猶在昔荆浩畫山好作方折上方傍近諸峰多峭刻似荆畫蓋山勢至此一變矣少林寺嵩之少林為禪宗祖庭故名特著其在盤山者創造嵗月不可考而開士之草衣木食宣揚般若者世有其人中為學仙者所據旋復改正固知耆闍之窟吉祥之海非他氏所能爭矣地當盤谷之口爽塏明秀昔人所稱近蒙賜金翬革增麗山下望窣堵波與香臺蓮宇歷歷如繪而行徑必跨大澗盤層岡數里中屢上屢下乃抵寺門紅龍池旁竒石羅列名狀各殊俱足點染禪林景色云雲淨寺自山額北上而東折有大安年石幢故小剎也名淨業庵漸成叢林築基起平處數尋上為珠宫琳宇前後相次聖祖臨幸賜名雲淨今奉敕重修益加輪奐其外巒谷窈窕劍石駢立幾不能行馬到寺稍展豁而氣象深穩碧林丹樹間凛然疑貯太古之雪度經閣髙出木末梵唄一聲諸品俱靜山峙雲行烏從窺其色相耶東竺庵光路覺路遍滿一切豈必青鸞之舍始騰慧日耶盤山故佛窟此庵獨以東竺名可悟震旦金天因緣不二庵在松樹峪峪多土壤可樹藝結架無幾而以朴野勝編茅為亭倚巖石為牆庭中雜蒔卉木花香四時不絶亦地奧而氣聚使然宸遊自雲罩歸必駐蹕於此以憩侍從天語留題妙入禪悅法輪轉處當時有妙香寶華遍滿空界矣東甘澗有水夾小山而流相距止一里許在東者為東甘澗澗上築精舍御筆題其額中為小殿兩廡翼之廣庭中有石名蒲團周圓可趺坐古松髙不滿尋丈蔭周於庭若斗笠然就庭隅結樓松之頂可俯而摩也盤谷之間窅深嶄絶得平地僅如掌禪侣棲焉自逺望之梵宇之出層崖嵌壁者疑無路可達穿雲盤折而入則石房數楹纎塵不染令人有出世想宜昔日隱淪日夕於松聲澗響中而不知返也西甘澗峰勢回轉見幡影出樹杪清泉一道橫其前壘石為小橋以度則西甘澗之佛廬在焉其屋宇朴略猶之東也而異境天設各具標格人工結構固無所庸衲子數人終老樵汲不以語言文字説法相對移時穆然見太古淳朴之風蘇軾嘗以空山無人水流花開贊阿羅漢今安知顛崖仄廠間不更有一瓢一笠密傳心印如拔陀其人者惜白雲深阻無從見之耳蓮花峰峰自下而上分三巗崚嶒􅏭嶫勢欲摩天見於昔人逰記者數矣曰東臺正其方也曰削玉辨其色也曰九華肖其形也而形之竒秀如朵分瓣簇互映紛披不可以數紀聖祖有中臺遙望蓮花峰之句爰更名蓮花焉夫蓮卉植耳而佛氏道家者流往往托之以示靈幻而其亭亭淨植不夭不汚可逺觀而不可褻玩儒者以為有君子之容兹山在岑寂之境忽蒙睿賞肇錫嘉名其所取義蓋在此而不在彼矣雙峰寺雙峰於山為西偏蒼壁萬仭對峙如童角之丱寺適當其陽對舞劒臺嵐靄曉夕殊狀蔚然偉觀殿宇與山為髙下相傳鄂公尉遲敬德所監造也昔唐太宗以武功勘亂功成後廣建梵剎以資福田惻然有哀矜黎首之心詔語刋碣寺中今承平日久生聚豐樂深山黃馘再世不聞金鼓之聲擊壤含哺順帝之則撫兹往迹又不禁慨然興嘆已法藏寺由大嶺入山過雙峰寺石阪旋折於層巒疊巇間可按轡行阪盡得法藏寺薜荔為牆白雲盈塢近與雙峰青峰俱蒙發帑重葺規制益加宏整庭有喬松垂蔭遊者藉以憩息僧言此松為盤山第一不虛也倚法船石望六王寨一壁凌空諸峰如在肘腋頽垣廢壘約略可辨昔時蓋有屯兵於此者而記載不可考矣青峰寺山行可三四里率數武一旋折至幽絶處曰青楊峪峪有寺曰青峰近寺千巗圭立萬嶂螺分皆深翠色而庭宇適四面延納之因以得名寺直法藏之南里許其來已久易菴為寺則自聖祖御書匾額始俯瞰山趾麥田萬罫杏林繚繞花時映松檜林若霞采之晨敷光景炫目其稱勝地不虛爾天香寺旃檀樹下薝蔔林中世尊常以喻法性而巖凹澗側卉木馥郁之氣四時不絶亦諸天自然供養也天香之所繇名已無碑碣可考即其境地可與鷲嶺龍宫同稱香界矣自行宮西北二里許歷疏林淺渚背小峰為寺紅牆碧瓦差差翼翼麗于蘭樹其中殿室華整像設莊嚴蓋乾隆九年所移建奎章疊賜聿成寶地境雖未極幽敻而風景明秀鐘唄時作塵俗固不到此矣感化寺山之陽坡陀岡阜錯落若星羅棊置不可名數自玉石莊而東一望坦夷昔志稱田疇入山營幽險平敞地以居此固其躬耕處也感化為唐時名剎乾隆十年奉命重建於此璇題耀於重楣禪堂寮舍位置與昔構無别而加崇煥焉其外面勢軒豁塍畦沙渚映帶逺近諸髙峰堆蒼積翠為之屛枕夕陽密樹間隱見參差儼然畫幀入山者必繫馬寺門流連瞻望而後去昔栁栁州所稱曠如奧如者兹山殆兼而有之而繇曠歷奧乃窮勝概感化固山中諸剎眉目歟先師臺臺在盤山之正南一峰耳孤騫峭立崖勢外出作方稜凡數層層皆爭上讓下其斗絶處乃不可磴級遊人披槎丫蔚薈繞曲徑以上其頂寬敞平豁躡雲影慿剛飈蒼蒼茫茫漕河繞其前渤海湧其左燕山聳其右數百里外如觀掌果舊稱黃龍尊師焚修於此有塔在焉招提踞其上層境地荒寂至者亦罕臺上石形肖物不假雕鑿樵子每指之以示靈異云水月菴砂嶺為走平谷孔道迤北而東折則法藏青峰諸寺在焉舊號巉險明時始鏟鑿成路路旁石猶瑰詭大者如厦屋小者如罌缶俱作黝黑色嶺南盡處有泉仰出甃石為池如月半規泉上結屋從右門入為精舍以奉大士因以水月名泉味甘冽行人每解鞍瓢酌焉密樹隂翳禽蟬啼詬遙睇重巒屏施障展煙靄萬狀如置身清涼界中塵慮盡滌矣白巖寺田盤與他山相連接獨以石骨巉削為别故遊盤者東至白巖而止寺距宫門十里從深村野畝中紆回而入岡巒環抱轉入轉幽近寺絶不見寺密林一轉精藍忽現此山之最僻靜處也昔時修潔髙僧多退隱于此今雖無復舊觀而茅亭虛牖間諸峯髙聳空翠擈人庭前二柏樹銅枝虬幹亦數百年物也清磬聲中妙香微度猶可想見往日之清規云欽定盤山志卷二
