body:
  text: 欽定四庫全書欽定盤山志卷十藝文一卷阿之詠上繼𢋫揚今時侍從諸臣自慚謭陋不克以毫槧潤色鴻業時承命扈從於雞翹豹尾間捧讀宸章授簡屬和每什得二三爰登諸藝文之前以志榮遇若今昔名流選勝登髙斐然有作於諸門無可附屬者亦彚入此卷抒藻敷華染雲山之采洗苔剔蘚動幽遐之思斯亦休明和聲風雅逸響也恭和御製古中盤詩元韻康熙乙卯臣沈荃盤嶺岧嶤矗五峰上方深處白雲重一從御筆親題後萬壑千崖盡改容僧超正御筆親題第一峰翠華初駐靄重重盤山草朩承恩澤野衲欣逢識聖容恭和御製登盤山天成寺江山一覽閣元韻乾隆已未臣鄂爾泰纓巒疊巘天成境翠輦才臨氣象分四正盤山一名四正山莊嚴呈色相三盤山有三盤分上中下煙靄入聲聞叢霄路近塵寰小洞壑風來玉籟紛知有仙靈羣從在蒲團石名箬笠松名總如雲敬讀御製幸盤山寺閣詩回憶舊逰如夢如覺用抒鄙懷仍依元韻臣鄂爾泰草年希到田盤路天眼糢糊地角分忽捧奎章欣見見却從法界注聞聞煙迷孤巘橫尤出風攪空林靜不紛何日亭然峰頂上白雲滿袖瞰青雲恭和御製天成寺江山一覽閣作元韻乾隆乙丑臣安寧一徑入山渌岩巒次第登雪消添澗水春漲激殘氷仙館依三島佛燈照十乘蒼茫回首望身向九霄升古寺空山裏幽軒入太虛天風吹户牖雲葉護階除芳澗春流緩平林露浥餘自然成妙想斧鑿幾曾如象教示寰中凌霄闡寂空千身碎澗月萬偈振松風默默自成理悠悠誰與同皇心愜妙賞揮翰滿林叢軒檻納虛清泠泠出世情鳥聽布穀響松奏素琴聲妙境幽光滴天章逸氣橫侍臣應閣筆雅韻嘆渾成恭和御製敬題夀萱堂元韻乾隆巳已臣史貽直列檻憑虛儼禁園九重慈豫藹春溫臨忩自挹三盤秀繞砌常榮萬嵗萱天外雲光回玉案望中秋色入華軒娛親特擅溪山勝聚景當時詎足論臣汪由敦天闢名山敞御園堂開東嶺氣常溫夀峰髙擁千章柏瑞露長滋百葉萱石上松盤龍蜿蜿階前苔印鶴軒軒承歡兼備逰仙勝蓬島瑶池詎足論臣劉綸山莊選勝更開園節物深秋尚晏溫香界盤盤承翠輦慈雲片片護金萱鹿銜三秀頻回向鶴舞千春一翥軒聖孝無方能養志河陽賦景不須論臣介福塞垣回輦駐名園慈色和融帝色溫花滿宜秋呈瑞菊堂開愛日護靈萱青山獻夀迎丹幰紅樹生春映翠軒萬國歡心供孝養嵩呼華祝總堪論臣嵩夀堂成勝概領山園嵗奉慈顔愛日溫清曉問安趨玉戺佳秋延夀獻金萱元裳有鶴還依徑翠蓋多松亦蔭軒聖孝祗承文母聖宸逰至樂性天論臣胡寶瑔跨水分巗搆御園養堂定省慶天溫夀藤虬引連叢桂慈竹龍標接茂萱最喜承歡隨寶幄又欣視膳到瓊軒林泉佳景娛親處祗有蓬萊足比論臣奉寬塵空靈境闢仙園宜暖宜寒氣象溫頤養長年期夀鶴登臨幾度奉慈萱地饒泉石頻停輦棟煥雲霞更署軒定省維殷瞻聖孝承歡寧作豫逰論恭和御製山居元韻臣史貽直山莊佳妙本堪娛况值清秋景倍殊檻度微風雲淡宕峰含積翠錦漫糊煙霞遍領無如此結搆天成有是夫穆處定知多靜契幾間時聽鳥聲呼臣蔣溥田盤秋色奉慈娛避暑山莊較不殊紫瑪瑙寒尤崒嵂金芙蓉老未糢糊怡然靜寄真相得密爾來青若此夫何必聖燈明五夜萬松天際鶴相呼臣汪由敦名山到處足神娛况復深秋景特殊石偃髙低都皺瘦林分逺近不糢糊窈深繚曲誠工矣外骨中膚亦信夫不是仙真誰得到膏車秣馬肯相呼臣劉綸行來堪望住堪娛鎮日相看佳氣殊天仗晨開秋界畫聖燈夜徹雨糢糊盤之中樂難言也方以外居如此夫三宿臣慚裹芒屩山靈衛蹕有嵩呼臣介福田盤風物助宸娛秋暮煙嵐景更殊霜染楓林半紅紫雨開山色不糢糊海中蓬島曽尋否洞裹桃源始信夫極目蒼茫煙水際凌雲鸞鶴逺相呼臣嵩夀山莊目賞與心娛泃水髙秋景物殊雲淨總教峰嶻嶪霜清不使樹糢糊畫宗摩詰難皴此賦召相如欲寫夫最是書帷搴曉月萬松濤裏谷聲呼臣奉寬雲莊靜寄足清娛秋滿田盤萬景殊風外泉聲幽滴瀝雨餘山氣淡糢糊會心蘿石誠多矣寓賞煙霞有以夫獵返紆鑾成偶憩山靈底用競嵩呼恭和御製夜雨元韻臣史貽直淅瀝泉聲樹杪垂山中夜雨乍寒時秋添爽氣三宵迥樓罨雲峰萬景竒此際未妨黃菊老來年應喜緑疇滋民依在抱堯心切宵旰寧期中外知臣蔣溥行漏丁東雨腳垂每於止頓值隂時瑶階聽入三更永睿藻拈成一段竒盤谷樹深雲作勢小春天近物含滋繇來愷澤皇心布喜徹清宵只自知臣汪由敦濃雲匼匝傍峰垂密雨都宜入夜時錯落帳燈人稍靜微茫煙樹景添竒暗流澗曲泉聲壯淨洗霜痕石蘚滋秋麥早關宸慮逺從來稼穡最先知臣劉綸晚㸑煙低雲四垂缷􅋔應是雨來時化罏一與人心會詩劵羣推反筆竒御詩注云此次行圍皆於止頓日值雨故前有塞雨又逢止頓口山靈有意示神竒之句今駐蹕靜寄山莊又值夜雨信一竒也卷幔預期紅樹出扶笻兼想碧苔滋宵衣此際還占嵗不為山逰喜可知臣介福又聽山館雨垂垂正是鑾輿止頓時葉落自增千樹響雲深不辨萬峰竒菊畦蘂更明朝坼麥隴苖應隔嵗滋此際天顔真有喜勤民心向睿篇知臣嵩夀林巒靉靆碧雲垂又際鑾輿止頓時宫漏谷中傳正好秋霖􅐼外聽偏竒衣裝一路無霑濕菜圃千村更發滋聖主仁民頻念嵗宵分瞻望少人知臣胡寶瑔聲傳甍角馬鬃垂正是秋深種麥時幾日馳驅曾未遇一宵淅瀝始成竒逺含煙色楓林晚半洗霜華菊蕊滋待得茒簷驚喜後九重乙夜早先知臣奉寬羃䍥雲隂接地垂翠華才駐雨來時豈徒澗壑爭添溜合是山川解效竒破曉林光疑乍沐當秋土脈喜深滋涔涔一夜霑濡足益我來牟預可知恭和御製得概軒元韻臣史貽直秋軒勝概豈能名飛翠遙看擁繡楹雲氣偶來山自潤松聲微動韻偏清窗迎曉霽明嵐靄砌滿寒香綻菊英萬象靜涵塵不到從知幽趣愜皇情臣蔣溥雲軒髙置錫佳名勝概全收入翠楹山水有音吟處足智仁兼樂得來清桫羅界接聽風葉六枳籬開掇露英仙仗崆洞應並美連朝茂對愜幽情臣汪由敦冠嶺憑巗總擅名更於佳處敞軒楹得其要耳幽而邃概可知夫厚且清戶外雲容飛玉葉階前秋色燦金英特教神筆開生靣不負山靈助勝情臣劉綸名山到此竟難名勝概無邊入戶楹萬朵青芙空際出一條雪練上方清秋禽似客猶留語霜葉如花少落英指點化人宫在望早從象外鬯皇情臣介福自識名區不枉名環羅勝概入軒楹水流雙澗澄心靜山到三盤徹骨清紅葉影濃連碧嶂白藏秋老近元英青蓮喻法歸宸賞豈獨煙霞暢逺情臣嵩夀本自無名至有名平臨俯瞰得髙楹宜邱宜壑收羣象忘意忘言𬗟太清白月近傳林外唄青峰深護砌邉英為開福地時停蹕真諦參餘豁勝情臣胡寶瑔層軒勝概錫嘉名全攬竒觀入紫楹日日日華皆應瑞山山山色盡含清芝光的皪擎三秀泉樂琤琮奏六英不絆珠琲松棟麗幾間到此一娛情臣奉寬靈境由來未易名滿前溪壑拱軒楹參差樹映丹還碧上下禽和閙亦清曠覽豈惟收勝概靜觀端已擷精英萬峰羅列無邉境暮靄朝嵐總適情恭和御製新晴元韻臣史貽直霽後三盤景若何雲峰深處勝彌多紛來佳境真無數除却兹山豈有他絳葉千重明曉日飛泉百道㵼清波新晴是處堪圗畫石磴秋花剪素羅臣汪由敦新晴其奈驟寒何尚覺前林宿靄多雨淨天空渾似舊雲開山露了無他朝陽初炫飛殘葉澗瀑猶奔散去波氣候靜中憑領略風光總向几前羅臣劉綸三商延望快如何是處晴光雨後多一幕遮秋空復爾千山蓄眼豈知他塵清盤馬開長埒雲斂征鴻𢃄逺波更上諸天最髙頂川源指掌見紛羅臣嵩夀五更點滴雨無何曉霽雲莊秋靄多嶺欲浮青真宛爾浮青嶺名峰將挂月孰如他挂月峰為盤山之最髙者林酣逺近添霜葉澗漲東西總玉波好景從教發真賞又傳佳什為收羅臣胡寶瑔淡螺天色問因何為有清宵翠雨多峰説飛來奚所自石曾攻處不緣他林花二月輸紅葉池縠千源剪緑波最是新晴風景異一經睿藻盡駢羅臣奉寬乍霽雲嵐幻若何蒼屏較勝畫工多别開生靣情移境迥豁遐眸景愛他翠疊千尋含宿潤練飛百道注澄波會當振轡諸峰上一覽江山萬象羅恭和御製天成寺元韻臣史貽直天成佳搆古祇園金碧巍然勝迹存髙閣半開依石壁晴窗遙啓露雲根坐當午漏山逾寂風靜秋聲鳥自喧最是此時延睿賞丹楓微動錦新翻臣蔣溥翠屏千仞護雞園寶塔髙臨舍利存一澗門前流玉響雙崕簷外抱雲根層層石罅林相繞寂寂天光鳥不喧曾上香臺瞻御記優曇花擁墨花翻臣汪由敦精藍據勝儼名園蘚護遺碑迹尚存虎豹踞林摩石脊虬龍破壁走松根參差衆籟搖空落戛擊繁聲過雨喧自是天成好圗畫不須公案為重翻臣劉綸谷口精藍近御園空王法相儼猶存人天眼外開初地文字禪邉證宿根御製詩有猶喜闍黎不識字之句帝座自臨丹嶂迥仙源交滙碧淙喧遙披奎藻青冥上不藉藝窗柿葉翻臣介福祇林髙閣自成園秋老天光愜默存崕抱雙青開畫嶂泉飛一碧潄雲根坐聞清磬寒窗寂歸聽踈林夕鳥喧警蹕幾回留聖藻穹碑雲際誦瀾翻臣嵩夀祇樹髙髙閟獨園瑶鐫逰記大文存窗涵一澗雙峰影石擁千尋百尺根僧綻田衣秋自暖鳥隨齋磬午無喧翠華又喜今年蒞題遍香臺柿葉翻臣胡寶瑔鷲峰攢玉布金園清梵聲聲貝葉存石可點頭原有覺鵝能聽講豈無根天花散處離塵迹水月澄時滌世喧地是清涼嵐籟近初成琥珀聽松翻臣奉寬布金漫説古祇園法界天開勝迹存樓矗千尋懸嶺角徑盤一線轉雲根秋清巗巘蒼逾秀地迥鐘魚靜不喧最好鑾停憑眺處滿林紅葉正翩翻恭和御製雲淨寺元韻臣史貽直巗邉停綵仗登陟歷諸天雲淨間初地秋髙曠野田遙嵐晴滴翠曲澗碧藏煙山衲頻相祝宸逰奉萬年臣蔣溥東嶺依雙樹西風别一天偶停盤磴馬亦傍隱居田蘚徑聚寒蘀齋厨生午煙幸蒙宸藻灑紀實是今年臣汪由敦靈區開淨業香界儼諸天重演三車法還空八識田松泉參梵吹嵐靄接爐煙遍掃巗間石題詩待紀年臣劉綸不涉聲聞法能超色相天淨因宜結寺髙躅並懷田一磬歸林鳥三舂起市煙重探雲罩勝塔影卜豐年臣介福曲磴疑無路深山别有天欲知香作界笑解福為田峭壁明斜照踈林挂斷煙御題山有色逰豫慶年年臣嵩夀碧雲收邃壑紅日麗髙天玉趾臨香界金旌稅法田人來林有磬鳥下砌無煙聖藻初題處霑光記此年臣胡寶瑔髙崦自怡恱清幽一粟天唐文曾送李漢隱久推田今作禪中境長消空外煙妙香隨御筆應紀萬斯年臣奉寬雲淨囂塵迥花宫别一天層層回磴道歷歷俯村田澗古苔封石山深樹罥煙聞鐘遲靜憩不覺日如年恭和御製池上居元韻臣史貽直三盤佳搆擅清便水榭新成釣渚圓練淨波光澄皓月影涵秋爽徹遙天臨窗瀟灑來飛翠繞砌空明響瘦涓睿照定知多靜契此中真意淡溪淵池上亭臺幽且便纎塵不到象幾圎一泓碧藻間中趣萬軸牙籖靜裏天水檻半開鳴逺籟風簾微動映清涓皇情似鑑原澄徹蠡測誰能識邃淵臣蔣溥鑿沼於山度地便因方半畝更規圓一灣乍築洲中島四靣初開鏡裏天俯檻雲間光淨徹鈎簾雨細響清涓從知樂善江河沛只此觀心是止淵緑映書帷愜靜便宵分相印月同圎吳淞水剪玲瓏手濠濮魚逰淡蕩天聖澤自來勤下濟臣心何以效微涓東西甘澗應難亞映徹文窗玉一淵臣汪由敦泉脈緣山導引便開池隨地曲仍圓半江緑剪屏間畫一片清涵鏡裏天風過縠紋重瀲瀲雨跳珠點細涓涓吟情逺暢原無别樂水從知聖性淵虛白軒窗眺覽便空明交映月痕