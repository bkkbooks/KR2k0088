文字函臣鶴年澗水東流味亦甘秋深斜注碧蘇菴聲來靜地聞清籟色映遙天際蔚藍自古儒宗元並徹及今名宿又誰憨王言妙藴川中月一𣲖清光萬象涵臣胡寶瑔東甘澗道近西甘萬壑雲深鎖一菴忽覺山光搖紫緑旋看林際染紅藍鳥因悅性亦通慧人自齋心曾隱憨清磬出林潭影靜須知妙衆有皆函臣奉寬三盤處處水泉甘路轉東峰恰有菴絶少塵氛來淨地盡收煙景入精藍臨流自覺空凡想靣壁還應憶古憨傍澗幽花迎曉日秋光澄徹鏡中函臣國柱泉飛雲液湛清甘澗别東西認佛菴素練幾回盤淨碧煙螺萬疊映澄藍參來妙想心能活坐定枯禪山亦憨天意不忘修道者誰從大乘一開函恭和御製憩古中盤精舍元韻臣梁詩正滿塢雲寒宿暑收古中盤磴愜清逰葦搖白穗飛晴雪蟬咽青林接晚秋路入隂崕紺翠重野花秋好綴蒙茸松風吹斷髙人迹欲欵巗扉何處從丹梯步步踏稜層澗底泉聲靜沸騰一曲一盤清可檻出山塵土著何曾臣彭啓豐中盤上下景齊收歷磴捫蘿選勝逰小憩雲房凝靜籟半酣紅葉映清秋苔壁松峰翠幾重梯空鳥道鬱半茸遙看雲外仙輿度也許羣官著屐從下方遙望路層層鎮日惟看雲霧騰東澗回環萬松寺一泓澄徹記逰曾臣劉綸日髙黃繖曉霞收古寺中盤到上遊見説茲山惟骨勝十分青峭恰宜秋仙人臺館絳雲重鶴待修翎鹿換茸縱有虛窗隔煙霧東西澗道辨無從仰窺雲罩塔層層馬駴嵐光氣欲騰難得三盤成舊識扈遊私記兩年曾臣沈德潛佛髻螺青一桁收茶煙芋火奉清逰三盤勝地中盤好占斷穹崕紫蓋秋翕黛霏藍石氣重參差雲木倚丰茸分明黃鶴山樵畫此日誰人槖筆從芒鞋昔未踏髙層捧頌天章幽興騰四正山中好泉石白頭真喜夢遊曾臣鶴年景到中盤勝概收遐曕幸得侍宸逰松聲謖謖含雲潤秪覺春和未覺秋石骨崚嶒列翠重天花如雨落蒙茸參來上乘真何著愧仰金繩昧適從碧磴紅泉歷幾層芳茨灑翰墨光騰臣工捧却爭傳示佳句還驚得未曾臣胡寶瑔中盤小憩景全收放眼還通上下遊誰染煙嵐虛左幅一行題字雁橫秋側嶺橫峰洞壑重繡苔香草樹丰茸無多屋宇星辰近自有非煙四靣從石林泉窟自層層晴獻秋光御氣騰雖是武夷山九曲欲方仙谷更何曾臣奉寬輕嵐嫩靄望中收精舍停鑾喜再逰記得昨年秋景好今來好景又逢秋當窗巗岫列重重繞徑青青細草茸好是山靈能獻瑞翠華臨處白雲從寺在中盤最上層隔林深處鳥飛騰泉香石冷松蟠攫幾處丹梯陟未曾臣國柱石路煙霞次第收中盤精舍憩宸逰山從寺裏看逾好碧樹蒼崕畫幀秋路入仙山第幾重巗花澗草緑丰茸不驚車馬山童喜慣識旌麾谷鳥從萬樹風濤響翠層更無言説對摩騰禪關透處元無著妙諦拈來得未曾恭和御製石林精舍元韻臣沈德潛青蓮吐萼筍成林文石回環精舍深階下野猿常獻果窗邉孤鶴每聽琴蕭森古寺迎秋氣寂歷空齋見道心聖主幾餘靜無事間尋繭紙寫來禽欽定盤山志卷十
