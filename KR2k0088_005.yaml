body:
  text: 寺宇崕岫紆深精廬碁布或始創而嗣興或名同而地異昔所稱有菴七十二者猶得諸樵衲之見聞方今雲物輝煥佛龕仙宇多屬聖代布金之地檐宇像設具諸莊嚴隔雲鐘磬聲晨夕達於靈囿入山者亦得隨地憩息洒然淡其榮利之心豈必鷲嶺鷄山始稱法窟青城小有乃號洞天耶寺山中寺與菴多互稱故菴亦統於寺感化寺魏田疇隠處舊名寳積寺唐貞元中建太和咸通間道宗常實二沙門重修後道士居之改為上方元宫至遼乾統七年幽州主帥清河張某奏請易為感化寺明天順八年壬午僧寳峰徳聚又修之成化十一年甲午勅賜廣濟寺額國朝乾隆十年重建於舊基之西一里許賜勅修感化寺額大殿恭懸御書妙光演教匾榱題藻麗境地爽塏傍近宫壖靄延翠屬山中蘭若雖多此稱首刹矣南抃上方感化寺碑記西聖人教既一唱而東也應而和者其徒半天下是以城閭邑聚塔廟日興後數百年競相髙以奢麗有大苾芻衆樂諸阿蘭若巗居野處如鷲峰鹿苑者比比而是方之城邑則又過焉漁陽古郡之西北叢岫迤邐其勢雄氣秀曰田盤山岡巒倚疊富有名寺而感化者舊號元宫物無常名事窮則變會幽州主帥清河張公奏請之故因以是額易其前號獨亢爽清勝確乎不移既肘腋乎絶巘又襟袖於列刹故自往昔目為上方非諸信舍財而附益髙流擇地以来集則何以增崇垂逺至於是哉魏太和十九年無終縣民田氏兹焉營辦唐太和咸通間道宗常實二大師前季後昆繼踵而至故碑遺像文跡具存爾後人多住持處亦成就布金之地廣在山麓法堂佛宇敞乎下禪竇經龕出乎上松杪雲際髙低相望居然緇屬殆至三百自師資傳衣而後無城郭乞食之勞以其創始以來占籍斯廣埜有良田百餘頃園有甘栗萬餘株清泉茂林半在疆域斯為計乆之業又當形勝之境宜乎與法常住如山不騫是使居之則安不為爭者所奪奈何太康初鄰者侵競割據巗壑鬭諍堅固適在此時徒積訟源乆不能決先於薊之屬縣三河北鄉自乾亨前有莊一所闢土三十頃間蓺麥千畝皆原隰沃壤可謂上腴營佃距今積有年禩利資日用衆實賴之大安中燕地遣括天荒使者馳至按視厥土以豪民所首謂執契不明遂圍以官封曠為牧地吞我林麓既如彼廢我田壤又若此使庖舎缺蒸薪之供齋堂乏餅餌之給可歎香火而至於是寺僧法雲暨法逍次言及衆曰先世有所遺籍吾儕不能嗣守亦空門之不肖者也安忍坐受其弊拱黙而已相與詣闕陳訴歴官辯論一旦得直其誣兩者復為所有尋奉上命就委長吏辨封立表取舊為定自是樵爨耕穫之利隨用而足以小大協力始終一心而令釋氏家肥不減疇昔赫矣能事於前有光雖汶陽歸已侵之疆興平還既奪之地不是過也乾統六年冬老比丘崇簡與前薊州管内都綱提㸃寺事沙門士賢元悟上座僧士侃都知僧圓淨等以始末紀石為請會余有故不果頃又走書来速文勒至再三豈可無述夫藏用於形跡者莫妙於理智顯用於事為者莫大乎勢力佛之道理與智也宏之在人勢與力也若兹寺者像設攸在法相所寄智與形會理隨事集向内不資徒侣之力外不托王臣之勢則有所廢矣孰能興之今豪奪者止誣取者與使禪支律裔保有其業良以此也後之補處是者其念之乎乾統七年春正月元日王澤𢎞過感化寺詩山行兩後氣如秋廢寺殘僧亦勝游宻樹巃嵸羣鳥集層巒環抱一谿幽石橋半側人牽馬梵磬無聲客倚樓歎息契丹碑尚在白溝當日是紅溝董邦達感化寺詩山幽勢盤紆縁麓轉平敞緤馬正清秋意惬神彌爽巍巍祇陀林慧日炫金榜迦陵流清音梵唱互發響仰面受和風散歩得寛壤何當良宵来層巔指月朗天香寺舊名天香妙祥禪寺唐建延祐元年重修國朝乾隆九年重建於舊基之西北二里許御題勅建天香寺賜無上法味匾楊栁外曉風殘月淨瓶中白日青天聨寺枕巗依麓為棲禪勝地門外疎林淺渚行徑絶幽與感化並占平逺之勝查曦天香寺客夜偶成暮入天香寺蒼然山靄濃悠悠白沙澗黯黯紫㣲峰忽見僧廊月髙懸佛殿松相看清不寐吟斷下堂鐘董邦達天香寺詩清流界塵氛翠壁欹林朩法雲深黯黯縹緲罨佛屋薝蔔蔚一林心香幾地肅豈執鏡中象寧戀桑下宿意行緬千峰屢至樵徑熟悠然證静因妙取慊幽獨天成寺舊名福善寺一題天成法界當翠屏峰之陽俯瞰林壑天成圖畫因賜勅建天成寺額寺門有樓匾曰江山一覽大殿匾曰清浄妙因皆宸翰也御製遊盤山記勒碑於此詩篇摩厓凡四處彩碧之輝耀於邃谷寺西南有普化和尚塔基普化唐人寺疑唐建國朝康熙中僧雲聨重修有古佛舎利墖飛帛澗涓涓泉徹公塔山前有下天城原屬寺中果園有斷碑載大遼天城福善寺贖舊業栗園事又有斷石幢載叡孝天祐皇帝云云李及秀遊天城寺詩淙淙幽谷裏寳墖起崚嶒醒世風千鐸傳心夜一燈石屏連嶂合雪瀑亂泉崩鳥雀忘機智空階自陟登洪昇題天城寺詩雲抱墖形孤天垂壁面削兩山當寺門一水瀉厓脚梁洪天城寺詩環寺山如堵參天墖似峰上盤從此入髙衲未曾逢積翠煙中薄空香雨後濃還期登絶頂努力一支笻孫才衡至天城寺詩入山不數里舉首見天城峭壁衝人立遥泉伏澗鳴客停牽馬力僧訝打門聲聊得須臾坐芒鞵歩歩輕張朝琮天城寺詩籃輿逺探幽巗勝翠接長松架短橋亂叠懸厓雲鎖額遥噴飛瀑玉垂腰碑從何代埋青草塔自中峰上碧霄丘壑有懐慙未遂石蹊蘿磴暫相招李鍇天成寺詩束髪牽世網衰謝仍漂揺徃迷泥塗歩今迴塵外鑣遣此殷憂懐况值芳春朝靈區貢隈隩净域棲寂漻飛軒面空翠丹壁摩青霄肅肅山翟飛趯趯鼯鼠跳墖鈴語真唄松雪灑驚飈萬化無端倪無生自逍遥委形誠斯須揮手謝松喬薩哈岱天成寺次韻詩世界回看眼欲空上方有境許相通孤峰拔地非人境傑閣凌雲妙化工煙抹千林殷晚翠日斜半嶺掛秋紅古今勝跡神仙宅多在山僧指㸃中徳意過天成寺詩塔影穿幽壑晴嵐叠翠屏天成橋畔路曲折入浮青千相寺一名祐唐寺唐開元中建遼統和五年希悟大師重修相傳昔有尊者挈杖逺至求植足之所僧室東北隅巗下有澄泉忽見千僧洗鉢瞬息而泯後於谿谷磵石之面刋千佛像明正統中僧行明重葺國朝乾隆十年勅修大殿懸御書雨花福地匾寺後有揺動石又有洞曰契真憨山遇隠士處也李仲宣祐唐寺剏建講堂碑記夫幽燕之分列郡有四薊門為上地方千里籍冠百城紅稻青秔實魚鹽之沃壤襟河控嶽當旂㦸之奥區於古堞之外西北一舍有盤山者乃箕尾之巨鎮也深維地軸髙闢天門㬉碧凝霄寒青壓海珠樓璇室仰窅窱於崑丘寶洞瓊臺耀磅礴於衡嶽崆峒左倚太行右連懷珠之水派其陽削玉之峰峭其後嶺上時興於瑞霧谷中虚老於喬松竒樹珍禽異花靈草絶頂有龍池焉向旱歲而能興雷雨巗下有潮井焉依旦暮而不虧盈縮於名山之内最處其嘉此境舊有五寺祐唐者乃備其一自昔相傳有尊者挈杖逺至求植足之所僧室東北隅巗下有澄泉恍惚之間見千僧洗鉢瞬息而泯因兹構精舎晏坐矣厥後於谿谷磵石之面刻千佛之像而以顯其殊勝也雖雨漬苔斑睠儀相而猶在陽舒隂慘流善譽而不隳向此藍垣之北長松之下有大石焉重萬餘鈞或遇信敬者㣲觸而動迄今游閱之士冠盖相望四序不絶於阡陌也當昔全盛之時砌叠龍蟠簷排鳳翅晨鐘暮磬上聞兜率禪宗律學宛是祇園駢闐可𩔖於清涼赫奕遥同於白馬乃法侣輻輳之鄉也爰自大兵之後並已燼滅由謂物不可以久廢故亨利於徳人德人者即寺主大德乃當寺之景派也厥本惟裔其神不測苦隨念盡樂與人同化六趣之茫然歸十方之安穏享年臘末晚昌行業彌髙既多有續之聞宜示無窮之績寺主大徳俗姓瑯琊氏釋諱希悟鎮陽夏博人也爰自聚沙之歲禮當寺寺主在楚禪師授法焉剿除五盖慕别四生舎慾棹而誓泛慈舟棄毒藥而願食甘果年二十詣長興寺具尸羅由啟宏願延僧一十萬次第竟矣於是謂其友曰聞二儀舒慘四序推遷人生幾何歲不我與覽斯基址孰忍悽涼埜鹿羣麋晝夜而草眠香徑壊碑毁塔髙低而蔓掛藤蘿玉毫消盡於華鬘金磬罷聞於齋懴上漏下濕日就月將徐興再造之心爰起從新之務於是乎手披榛棘力用經營移怪石而截斷雲根伐灌木而摧折煙色應歴十二年化求財賮盖佛殿一座欒櫨娟妙丹雘鮮新塑佛中央圖像四壁保寧四年又建厨庫僧堂二座俾爨饈之有所作也賔旅之有所歸也乾亨二年加授紫衣載議門迎廣陌地處幽涼虞生肇之徒見臨顧講讚之所交闕乃於僧室之隂叠磷磷之石澮瑟瑟之泉髙廣數尋駢羅萬樹薙除沙礫俯就基扃而又請邑人醵緡賂四逺之最樂施者如介甲之歸巨浸也即乃市朩靈采石煙巗窮斤斧之功極磨礱之妙初心才啟大厦攸成式導昏衢彌光世徳其堂也保寧十年剏建帶雲川之渺渺總逺岫之峨峨東觀種玉之田西掞築金之闕蘭楹鏤彩桂柱凝丹月入秋忩風含夏户簷外之杉松郁鬱檻前之煙水潺湲所貴安苾芻僧置狻猊座髙談玉偈然慧炬而絶煩惱薪妙演金文揮智刄而剖無明㲉長依佛住永壓山門對延靈鷲之峰闡説瑜伽之㫖此乃邑人等心猶慕善志乃忘筌知浮生石火以難停覺幻質風煙而易滅各抽浄施共構良因即寺主希悟大徳激勸之所致也縁惠之所被也厥外井有甘泉地多腴壤閒栽珍果棋布蔬畦清風起兮綠幹香細雨霽兮紅葵茂載諒鴻基必葺白足咸来其供給之費恒不闕於祗贍者大徳寺主力辦也盖惟寺主大徳道洽空有識洞幽𡨕全資化導於多方以至圎成於能事所冀皇朝永安神業矣相國長調鼎鼐矣京尹之仁無秕稗矣郡牧之信及竹童矣一切含靈同沾利樂一切惑溺並向真如爰述懿徽俾雕翠琰其邑人姓號具列碑隂仲宣縻職之歲華構方成命修辭以序之序之伊何即為銘而記之銘曰峭壯靈峰剏興華宇式開講肆用陳法侣物置人多利圎三寶庶幾乎作善之祥傳名曠古統和五年歲次丁亥四月八日黃汝亨朝發盤山飯千像寺詩初日盤山爽氣侵薄雲輕騎上髙林石横曉岫千巗競泉落秋濤萬壑沈鳥道偶窮松下路僧家小隠澗邊隂胡麻飯罷尋諸佛亂㸃山容散紫金又遊千像寺見典座僧以唐人斷碑礪砧作此寄慨詩初日盤峰雨氣侵撥雲扶策上髙林石能揺動思根性峰帯華紋作珥簪千佛畨畨風滿座數僧莽莽土為音開元嘆息殘碑字冷郤探竒名隠心袁宏道宿千像寺柬鍾刺史詩詰曲﨑嶇路皺秀透瘦石飛巗繡鐵花螺子㸃雲額平生米南宫耽幽窮鬼迹石根搜古雲踏遍秋空碧豁眼見新巒長嘯落巾幘貪㸔不知晚憩石布茵席回首神僊吏青嶂逹門閾侍史朝焚香秋雲幾回白稜稜怪石供聊以施游客孫廷銓千像寺同李坦園相國王思齋學士作晴雪帯蒼巒松谿路幾盤磵鳴泉暗落巖立屋懸安一杖千峰翠雙林萬朩寒那能堪累月清福近仙壇李霨游千像寺詩俯臨絶谷仰㠝岏朩杪行来路幾盤亂石縱橫疑虎伏怪松詰曲學龍蟠飛梁澗溜泠泠雨重閣天風冽冽寒卻恐山靈嫌俗客忍抛嵐翠事征鞍李鍇春夜宿千相寺作和壁間韻三首唐家佑唐寺乃在田盤陲更事頻興替功能見設施繄誰山徧鑿維象法無闚心賞長林曲天開洗鉢池松門行跡少石磴見觚稜歲久沈殘碣巗深䕶一燈古人疑有託此教久相仍放眼千秋表危欄晚獨凭花宫疎磬夕雲亦宿閒堦塵眼真相刮春心黙已齋風煙留好夜詩句憶同儕自喜陶彭澤多時遂雅懐少林寺舊名法興寺至元壬午道士張志格等游盤山居於此易其名為棲雲觀至正中巢雲威禪師主之宣政院使脫公具奏賜額為北少林寺明成化已丑寶峰徳聚禪師重修嘉靖丁亥又修國朝康熙中僧本住再葺乾隆十年勅修大殿懸御書禪指直趣匾寺東有紅龍池多寶佛塔下有石曰菱角曰帳房曰蟒皆竒秀李鍇自少林寺至西静室詩老鸛欬宻林猛虎蹲伏莽黝黝亭午隂翏翏太空響曠懐無前期髙興肆獨徃化城周大千維摩室方丈布毛證鳥窠東隣有僧常樹棲晝夜不下妙諦飛龍象儻非水精域焉啟鴻荒想縱心以天游六鑿罷相攘薩哈岱少林寺次韻詩羣峰蒼翠鎖秋空古寺憑髙野望通下界萬家煙火接浮圖百級鬼神工雲沈逺壑泉流碧霜醉疎林葉染紅俯仰頓忘身世感數聲清磬夕陽中查曦少林寺道上望雲罩寺不至作見説盤峰頂﨑嶇不可行石邊停竹杖天際望仙楹濟勝苦無力尋僧空復情鶯花應笑客孤負玩山名宋宗元少林寺詩路入中盤鳥道通雲開天半削芙蓉松棚東折山當寺柏子西来日下舂到此都無塵世念何時得著去来蹤洞前花落諸峰静隔樹遥聞報曉鐘徳意至少林寺詩少林標寺額將謂到登封看取三盤路知非五乳峰蒼煙凝紫盖峭壁寫紅龍回首長廊下松風報晚鐘中盤寺在少林寺之北崕石髙寒紺宇相接不知何時剏建寶峰禪師修有中盤二字明楊忠裕書寺前題詠石刻最多寺西北有華嚴洞王澤𢎞過中盤寺詩盤山絶勝是中盤石磴﨑嶇欲到難千嶂煙雲迷日曉萬松冰雪䕶春寒峰依紫盖留仙跡泉汲紅龍供佛壇惆悵此生猶未隠浮名底事戀長安衛台瑺過中盤詩曀曀山氣昬躋險心頗憚回頭矚巗谷已凌山之半磔卓遞嶙峋起伏跡未斷有松皆竒絶無峰不可翫寓足筋力疲放眼雲竇亂短笻歴潭壑扶之勞雙腕初疑黛色濃忽覺雲形換努力過前山流連恐日晏宋宗元中盤寺詩中盤山與上盤通山寺盤空路幾重峭壁崚嶒擎紫盖幽泉噴薄走紅龍殿前隂合三珠樹門外雲横半嶺松便擬支笻凌絶頂華鐘飄徹最髙峰上方寺在嶕嶢峰東唐太和二年戊申僧道宗結茅於此瓦屋數楹鐘魚寥寂國朝乾隆十七年賜帑修建紅牆碧瓦炳煥巗谷佛殿中懸御書雲濤花雨匾石潤蒼苔皆佛性松揺晴籟有禪機聫寺東西列静室二址尚存又有喝斷石雲根石亦瑰瑋無名氏游上方寺詩名山初到似曽来古寺無僧徧綠苔頗訝石黥厄漢律豈知松刼遇秦灰澗中窺墖疑千丈雲際捫蘿欲萬廽好約華陽成小隠秋巗懸瀑聽輕雷黃汝亨自中盤到上方寺詩堆雲片片鬱千重複磴盤空鳥道通壘塊林間蹲虎豹菁葱天外削芙蓉細披蕪草迷煙屐衺倚危巗倩竹笻聞説上方鐘磬杳西飛又有白雲峰官無極上方寺詩不是羣峰列飛来雲幾支絳空龍半現虹日水全竒青豆懸天外朱花志路岐昔游先我得芳草卧唐碑鄭纘祖自西架至上方寺詩越壑攀厓信杖藜上方幽徑轉萋迷雲飄佛國山連寺樹遶靈巗水滿溪貝葉翻時留偈在柴關閉處有鶯啼憑空目斷空中錫日暮清詩未敢題李鍇上方寺詩獨隔層嵐迥今知細路深一時移耳目萬象變蕭森古拙居人服偏私造物心天門雙日月隨意自升沈風磴殘雲外虹梁瀑水西險愁巗石墮冷逼洞猨啼白日行如夢青天瞰欲低上方信幽絶消得昔人題雲净寺舊名净業菴萬厯中蔡来峰建崇禎中僧無暗重修至國朝其徒擴其基而新之康熙四十三年聖祖御筆改題雲浄寺乾隆十五年奉命重修叠䝉宸翰之賜舊志稱寺内有石幢刋本師惠凝和尚大安八年九月朔門人棲洞等建疑菴亦遼金時故址也洪昇浄業菴後夕望詩春山處處佳煙嵐晚逾妙白雲静不行青松立殘照澗水㵼千迴巖風號萬竅精舎倚峰巓逌然發長嘯又同石林上人宿浄業菴詩山寺疎鐘歇清宵寂不喧漸看明月影移過古松根地僻知僧儉天空見佛尊石牀趺坐久揮麈兩忘言髙士竒雲淨寺詩徃者度遥岑忽焉日將夕耽幽殊未窮茲来理輕策傑閣霄際穿疏櫺樹杪隔隠翳勢若藏攀躋境乃闢老僧畏送迎相顧始肅客能炊松火紅亦煑澗泉白攬衣席空階閒雲生咫尺下嶺望前旌迢迢踰紫陌鄭纉祖雲淨寺詩寺逼雲峰近忩開翠色迎看花多白蓼尋藥只黃精丈室逢僧話閒房罷磬聲客来塵境外頓令悟無生古中盤即正法禪院也在紫盖蓮花毘盧三峰之間相傳寶積住靜處國朝康熙中僧行乾重為開拓殿前有聖祖御製詩碑方丈懸御書門外一峰匾崕石勒皇上萬象迴薄四字擘窠大書及先後頒賜奎章乾隆十四年飭有司繕修因復舊題古中盤寺有天語軒五松堂墖院有精夀堂門前有談禪石後崕有静室名别是一天有龍王堂在其旁蔡士英正法禪院修造碑記古中盤者京之東五臺也千峰萬壑林朩鬱茂稱冀北之名勝者多道之余嘗慕而登焉見其四山相接叠翠層巒中有數峰陡絶者勢挿霄漢又其地多金沙雨過則星燦奪目更有舎利墖每除夕則光明徧山若列炬其中流泉瀑布儼若大江之怒濤焉誠巨觀也他如觀音洞談禪石虯松蒼柏龍池暎帶種種舊觀不一而足殆古之禪林歟大博禪師者蜀之達州人也生五六歲即知向佛十三而捨身西聖寺至二十五而精心參悟漸得指歸因受萬如和尚法歴五十餘年精進不懈嘗南北行脚參訪不一家順治十二年遂説法於津門之地藏菴嗣是而開堂十有八修叢林有五言佛法者莫不宗師之康熙元年游盤山喜其崇峰幽谷欲止錫焉值薊州僧官来儀願捨山場有大檀越建為叢林殿宇門廡輝煌並耀經堂齋室方丈庫藏靡不具備寺僧若干人參識本来鐘磬鈴鐸之聲不絶嗚呼可謂祇園之一勝矣夫天下之福地寶林不乏也并之開義汴之福廣蒲之西巗秦之浄念趙之無際隋之智門亦指不暇屈矣而要皆有山川之勝雲物之異為宗門衍法於無窮今之古中盤得大博禪師而傳之不朽者亦謂是歟余故樂得而記之康熙十四年乙夘魏裔介古中盤正法寺修建墖院碑記天下名山雖以五嶽為首而京都薊州之盤山其靈竒幽鬱又有出於耳目聞見之外匪人所能測者余嘗按圖索之而以為十洲三島不能過也辛丑之冬余以相視世祖章皇帝山陵便道至山下憩感化寺至晾甲石邊見浮圖在望澗水潺湲而山下石纍纍或尋或丈或方或圎不可以數計擬登陟其巓顧以王程期迫同事促令復命遂匆匆而去至今憶之未嘗不自恨縁之淺也夫山川靈竒幽鬱之氣不鍾於賢人君子則鍾於衲子羽客盖禪教之中其進修銳其志行苦徃徃有人若大博和尚者蜀地人也胡氏之子母葉氏㓜而慧悟厭棄塵氛遂皈依蓮邦栖遲淨土得法於龍池萬如和尚傳臨濟正宗顧以燕山皇居有大乗氣象結制於宏善等寺既而游盤山歎曰此山連峰叠嶂嵌空突兀谷澗委蛇果樹茂蔚其卓錫之勝地乎時則有薊州僧正司来儀慕其品行精嚴有古中盤精舎一區願布施和尚乃趺坐觀空萬念俱息擔土填塹甃石為路升座説法言簡意盡僧俗聞者莫不解脫遂感動諸善信等捐貲建大雄殿禪堂方丈茶房庫室僧寮塔院莊嚴宏麗與諸門人當機指示謂趙州庭前栢樹子信手拈来此事人人本有何不回光返照而汨汨於故紙乎嗣法門人了宗受其衣鉢直證心印盡斬葛藤觀其語錄所記覩面相呈更無餘事八字打開當陽獨露瓊花開苑長江水洗尤勸人學問以為久受勤苦乃可得成非其師之白日傳心青蓮喻法而能有如是髙足乎昔承世祖章皇帝命序楞嚴㑹解文辭鄙僿䝉剞劂經首今和尚得臨濟之正宗衍曺溪之家法大開妙義以曉僧俗使人不沈沒於聲色利欲而見其本来面目有益於國有利於民豈區區食粟飲水作一自了漢為煙霞之癯無補於世者哉余是以為之述其本末鐫之貞珉俾其後代法法相續心心相傳則鹿苑靈鷲去人不逺余羈縛塵縁未能超然物外言之汗顔俟婚嫁畢終遂尚平之願膏車秣馬登白筋蝦蟆背上與了宗禪師談教外别傳其有日乎盤石有靈斯志與清泉白石永矗立於空翠清虚之法界也已既為之序爰繫之銘銘曰巗岫鱗比雲水逍遥一條拄杖解卻弓弢淈泥揚波濜流止濤臨崕撒手過刄吹毛闡揚祖教龍象英豪登盤山塔海濶天髙康熙歲在丙辰十有五年三月阮旻錫古中盤游大博和尚墖院并示宗上人詩偶隨煙外鐘已到松間寺中峰紫盖尊羣山皆拱翠法師南方来重闢法雲地梵刹銀牓新勲戚金錢施一期大教興三歎影堂閟傳法老比丘已得無礙智面瑩爪甲長開關為客至顧我鈍根深不受箭鋒利盤山古道場法幢開寶積普化示風顛振鐸偶游戱到今已千年宗風誰繼嗣落日下秋山山間明月墜峰峰皆見月清光照無寐鄭纘祖古中盤贈了宗禪師詩偶尋紫盖峰人聲朩末度髙低但莽蒼寧辨向時路林麓豁然開已見岩前樹短壑架僧廊飛湍楹外赴大師髙說法石㸃花亦雨朅来叩宗風一語人天悟惜哉塵網牽何當棲杖屨世上刼千年山中香一炷又夜宿古中盤詩香刹中盤勝山峰紫盖名聽經雙鴿下繞墖幾僧行翠竹搖風亂黄花滴露清納涼應未睡髙枕卧松棚髙士竒正法禪院詩一徑入空林重巗秀色深暫来青嶂下聊暢白雲心澗影留仙蹕山光動睿吟今朝徧幽賞歸路日將沈丘壑茲多美流連空復情出山泉決決遷樹鳥嚶嚶暝色催歸騎樵歌引客程何如友麋鹿日日卧香蘅衛台瑺古中盤詩行行過中盤又抵中盤頂極目煙霧中雲峰忽已暝泉芔紛佳致萬株龍鱗挺攀蘿入寺門汲水試山茗落日聞鐘聲令人發深省超禪送佛藏和尚住古中盤詩幾年共話西山月一夕平分兩地秋試看古中盤石上龍松新發舊枝頭徳風古中盤望九華峰詩白雲深處古中盤羅列千峰作畫看望去九華峰頂上他年来此結精藍雲罩寺相傳為寶積卓錫地構宇則始自道宗舊名降龍菴萬厯三十年勅賜雲罩寺國朝康熙中僧通緒重脩舊貯皇藏千葉寶蓮佛殿牓曰盤山秀峰康熙十七年聖祖御筆也又有額曰雲峰法界乾隆八年勅修皇上御書金界長明住智慧山匾青山白雲常自在禪恱法喜悟無生聨寺東上即挂月峰峰頂舎利墖旁有餐氣巗後有金鷄嶺南下二里有將軍石桃園洞王道正重修雲罩寺碑記洪惟我國家定鼎燕京山川之形勝環錯如繡而其雄峙於東北者則首稱薊之盤山云盤山一名盤龍山峰巒之竒甲於京東苞靈孕秀突兀巑岏於鑠哉天壤間一大觀也山之巔有雲罩寺其来舊矣有墖曰舎利相傳為寶積禪師卓錫地中藏舎利子故名景物幽深叢林髙潔仙客禪宗多㑹於此每一登眺赤縣神州不復記憶置在何處穢土濁刼邈焉隔絶雖屬閻浮亦造物之所以别立清涼界也閱歲滋久荆棘漸生革故鼎新時如有待恭值今上皇帝乗龍御天薄海熙恬三陲寧謐仰承聖母慈聖宣文明肅貞夀皇太后慈命印施藏經畿輔内外梵宇招提悉加嚴飭於是出内帑積貯併各宫協賛金錢特命乾清宫常侍尚膳監大監吕公誠徃葺治之公復自蠲廩餼鳩工聚匠驩呼踊躍輻輳子来若驅鬼工役神力不日告成殿廡巍峨翬飛鳥革僧寮禪室井井改觀二六時中綿延香火晨鐘昬鼓瞻仰歸依猗歟盛哉真億萬刼無量功徳所謂上䕶皇輿中佑宫壼下福元元豈云小補巳耶嗟嗟吕公拮据賛相克成盛美功徳永永且與山川共垂不朽也事竣伐峰頭片珉屬余為記余於西方之教若淄澠蒼黄素不渉其涯涘顧性嗜禪静時亦繙閱諸釋典其言曰心生則法生法界惟心造是心也深入無間磅礴無方大地為纖㣲塵為鉅由是而斡天造協地靈天且弗違地於何有彼上乗諸法無罪福無禨祥今兹率作以奉莊嚴搰搰然將為致祥邀福計抑末也故法生於心心滅於法何以故心在無法法在無心故也吾亦一無心佛亦一無心天地亦一無心也此之謂不蘄祥而祥不蘄福而福即佛力非所及也羣力何與焉歸休乎比丘無庸屬我碑矣乃跏趺合掌而為之銘銘曰帝徳廣淵在宥萬方䖍恭慈侍聖善平康西極回向咸集梯航爰命中禁奕奕貂璫躬詣莊嚴開拓堂皇有美比丘杖錫飛揚敬爾威儀凜若秋霜願力普濟展也壇場浮屠髙峙如翕斯張亦既崇廣亦既騰驤中使莅止慈命普將載錫帑金載賜龍章鳩工庀具莫不精良相彼招提翼翼将将清風穆穆振鐸琳琅有衆覩觀體具用藏巍巍法象萬善津梁百千萬億福祚靈長萬厯三十一年癸夘二月上浣日沈荃雲罩寺伽藍殿碑記盤山屬薊州雲罩寺居其巓山峻而雲生滃然出巗岫間觸石潤礎瀰漫林谷從下視之不知寺之為雲雲之為寺故曰雲罩寺也寺不知始於何代有明萬厯間實鼎新之朱碧輝煌屹立天半游此寺者輒作武陵鷄犬想不復知有人間世矣歲月既遥廟貌非昔壬子三月吾友戴如兆與二三同志渉歴名跡見寺就頽落伽藍殿毁壤光甚慨然捐金整葺如故余聞而喜曰山谷之美古今共談伽藍工竣雲罩必有能繼之者俾寺見完宇即山復舊觀雲起則金碧藏輝雲収則嶙峋耀采盤峰真面目從此迥露人寰矣余嘗備兵通薊簿書鞅掌時時作宗少文卧游今珥筆中秘朝夕侍從名勝在咫尺曽不獲親臨其地然樂我友之能好事以為後人倡也序其略并勒之石云康熙十二年癸丑孟冬日王澤𢎞雲罩寺詩陡絶上盤雲罩寺一峰髙踞萬峰巓雷霆俯見山腰鬬日月横看樹杪懸佛蛻幾朝留古塔聖燈除夕聚諸天殘僧不解游人意指㸃龍旂說徃年髙士竒雲罩寺詩蘿磴雲中出花宫象外懸登臨空大漠呼吸逼青天締構神功健香燈寶地傳無生難可問小坐亦泠然衛台瑺上雲罩寺詩上盤三十里企石齊雲駕蒼煙暗諸峰朔風吹萬罅躑躅躧層阿鳥道亦在下景物同幽快天際臨風榭清光對閒晝松韻徹良夜陵谷變幻殊萬象望中訝借問南村居何如此精舎阮旻錫宿雲罩寺詩空擁雲關卧霜風到榻寒尋常山上月讓與衲僧看鄭纘祖雲罩寺翫月用髙青丘韻秋天一碧秋山藍更無霧靄兼煙嵐誰將金鏡空中麗恰值今宵髙處探三千玉户齊開徹雲鬟露濯垂䰐鬖白盡遥空㡬萬里光芒尚帶滄波涵銀河寂寞髙無象星宿斂藏休與參玉兔由来知不死寸刃欲決癡蟇貪我来直踞峰千仭霜華仰吸低巗嵌山鬼遁逃無影跡雛僧故指聲喃喃須臾射牖復排闥時暎藏經經底蟫祖院不知燈火息流輝倒照穿孤龕徘徊疇忍恝然睡杖策還登庵上庵光揺虎豹跨巨石影動棲鶻攀松楠安得乗風生翰羽澄波下看三龍潭年来索米長安市斗室卑栖偏坐南月明似籠欲窺鶴月去如繭方處蠶荏苒無能叙契濶每言及此心懐慚家中快見已難得山上乍逢尤所耽何幸一年遇兹夕卻從絶頂聞幽談杯傾妙理何須酒盤盡餘香空憶柑迴視諸天眠正熟扶桑鷄唱更已三露深浴出峰尤好百幅鮫綃煙半含客既為月頻推枕月應為客聊停驂只今相對若草草别後相憶嗟何堪况當多難屬此日勝㑹難再君須諳不見盧龍山後塞年年戌築愁丁男如此髙山如此月即欲不翫其誰甘願向月宫借月斧削除禍亂稱平戡還將月斧砍月桂更使清輝流屋覃天上人間同此樂我雖不飲情亦酣我雖不飲情亦酣婆娑短鬢何毿毿盤谷寺即青溝禪院國朝康熙十年僧智朴建十七年聖祖臨幸敕賜盤谷寺額因其地名盤谷相傳唐李愿隠居處也御製詩與皇上恭依元韻詩並勒碑建亭於寺之陽大殿懸御題定力周圓匾一聲清磬動耶静萬叠浮雲假也真聯歴歲天藻或刻碑隂或鑱崕石前有石門清涼石潄玉泉秩秩泉松坳後有杏花坂龍首巗中有秋月堂巢雲軒選佛堂童真殿丈室題曰金湯龍象曰一花現瑞俱載舊志宋犖青溝禪院碑記徃余讀公安袁中郎游盤山諸詩肖状怪竒刻削神眩巗谷林泉常在心目間恨不一徃游焉及来京師去盤山不二百里而曹司羈繫卒不能遂惟日夕退朝時時從馬上東望見白雲滃起為之盤桓竚立斯須慨然而已歲辛酉道出山下始得游目其勝袁公詩所稱山有畫意者誠非虗語爰為詩以紀之閱癸亥夏四月承乏通永盤山適在部内自幸續游之願庻幾一償新城王阮亭祭酒送余行有而今持節京東路恰與盤山作主人之句顧莅事以来又不得廢閣官事以為私游常抱怏怏如在郎署時甲子春㑹按地經山麓則益窮所未覯復為詩以紀之余初遊嘗寄詩拙菴和尚繼至乃訪拙菴於青溝青溝之名不見於紀載即袁公詩中亦不之及其初殆一虎穴也自拙菴来有僧隆寶以兹地獻迺始墾闢芟除構立堂宇門廡庖湢翼然一新諸上方感化古名刹率多廢落兹地以拙菴故頓成勝觀拙菴徐州人名智朴少曾過江參百愚斯大師於青浦之青龍隆福寺受記莂實洞宗第三十世辛亥北游愛盤山丘澗因止其地其人貌古而骨剛與之談超然無凝滯肆余再游訪之能為詩徃徃有佳句去年冬天子駐蹕是山曽幸青溝蘭若拙菴親聞玉音承命口占經御覽賜宸翰此尤希世之幸也余前嘗許作小文留山中㑹有濟南之役拙菴命其徒来責前諾因書數語以復嗟乎自兹以徃盤山之游知復何日而青溝佳壤拙菴雅尚益復眷眷縈我心目當十倍讀公安詩時矣康熙二十六年丁夘三月智朴丙寅季冬一日駕幸青溝應制詩冷静峰頭雲水香六龍車駕幸山堂百年勝覯惟今日塊雨條風祝我皇王澤𢎞詩青溝古路絶人煙老衲栖巗不計年與虎借居分半穴問龍乞水迸枯泉忘生始得無生法入世誰參出世禪悲我行藏成兩失從兹雲水任孤肩寒巗獨處十年餘昨歲誅茅始結廬挂樹猿應驚野客攀藤人只問禪居晚風香静旛猶動殘雪忩明榻半虛竟夕擁罏趺坐乆兩心無語對文殊王士正詩曺谿游萬里酌水問南能世界隨縁住人天最上乗翛然白足侣不作紫衣僧寄我新吟巻清涼五月冰時歸自五臺朱彛尊詩攜来一鉢自曹谿結屋青溝亂石西徧洗苔碑詮寺墖山花木葉恣留題謝家朩屐無完齒陶令籃輿怕朔風黄葉滿山来未得幽尋也待杏花紅孫岳頒詩青溝隠處惟孤雲曲澗盤阿斷衆聞獨坐嗒然忘色相紅黄紫綠總紛紜紅杏青松迥不侔慧觀早巳在峰頭孤標自出風塵外瞥眼繁華逐水流聞道盤山景最竒山居餌术更餐芝何縁著屐尋幽去白日清泉訪我師喻成龍詩飛錫響震蓮花峰澄潭如鏡安毒龍避俗逺在盤之谷萬壑千巗枕茅屋静夜天香遶法壇松風明月谿水寒有時鐘磬出林表曇鉢浮光金翅翻近復幽人時来徃與公結社推公長今夕何夕讀公詩况瞻標格真髙爽葉臣遇詩依栖雙樹晚鐘遲喜讀青溝白雪詞一室香雲人定後半忩明月夜来時湯休豈獨稱詩伯惠逺還宜作導師好句名山都占盡教人何處著思維陸沅詩薊門夙仰盤山勝名衲今兹住拙菴禪悦力能驅虎豹巗修心許架煙嵐搜殘碣石鐫新志賞賸清泉琢舊潭欲擬貫休仍自在一箋聊復寄幽曇魏坤詩田盤山樵乍相識昨日下山今上山要我同游不得去獨吟紅杏青松間宋至詩落日空山路髙僧特地尋泉聲清俗耳鳥語印禪心破衲殷勤補新詩自在吟結茅余有意早晚藉砭鍼張歴詩喬居此盤山如何反號拙諒彼機巧人不敢占虎穴惟拙渾忘機授記虎蹤滅巉巗未多開茅屋透寒雪自穿鳥道来竟與紅塵絶雲氣染衣裳松花滋味别而我願歸依師笑不肯説許國賔詩卻疑塵起亂紅飛幻裡㸔花意思㣲身與喬松争百尺翛然不著水田衣朱昆田詩千林紅綻三光杏十里青排五粒松他日相尋半山路畫圖約略記雲峰山厨夜火蒸黄獨埜菜春風長豆苗閒倚長松無一事静㸔日影過谿橋畢大生詩手闢青溝白石壇杏花松葉挂㯶單明年好借枯藤杖直踏中盤到上盤洪昇詩兩山忽斷處開士結精廬門對青溝狭池涵紫盖虛雲嵐逺明滅松石互盤紆側首尋幽洞荒榛虎舊居張朝琮詩結構精廬小猶存虎豹蹤青溝新闢土白足舊傳宗山擁談經座風移轉唄鐘塵襟此疎豁雙屐任從容東甘澗觀音菴不知何時建立國朝康熙中住僧重葺乾隆十四年勅修構重屋於殿之巽隅崇敞可逺眺賜東甘澗額御製詩摩厓三處門内有斗笠松松下蒲團石傍澗天井石童子石皆以形肖得名李鍇東甘澗詩東甘澗頭春有冰蒼寒之氣填空青夜深雪斷蒲團石時有老狐来聴經朱岷東甘澗詩路折尋東澗樵聲入午鐘泠泠巖下水靄靄寺前峰既坐蒲團石還吟斗笠松老僧偏愛客煑茗説降龍董邦達東甘澗詩初地泉聲裏翛然此重尋山花風磴晚僧磬石樓深坐乆忘塵役吟餘悟夙心留人更松翠長作一庭隂西甘澗淨土菴明僧常慧剏建國朝康熙中重修御製詩皆刻石上菴後石龕元道士王志謹修煉處也李鍇修禊西甘澗作髙花不受染水流故以渠空山暮春時物色隨巻舒老宿循自然遂與真意俱洗心不洗跡一切皆祓除我冀水心劔徒傷落日徂查曦西甘澗贈法天上人上人年七十餘善弹琴好吟咏詩寺枕千尋澗窻開四面山卻輸黃髪老長共白雲閒擊鉢吟詩句彈琴怡妙顔偶来塵世客心醉不思還董邦達西甘澗詩白雲結隣茅盖屋屋外飛流隠古木龎眉老衲罷談禪落日荒巗斸黃獨東竺菴在松樹峪舊名彌陀菴國朝康熙二十五年僧印祥建乾隆十年勅修大殿懸御書大尼渲光額請問庭前柏樹子莫瞞扇上犀牛兒聯殿左右結茅為亭依倚巗壁各極幽致駕屢臨幸御題三詩摹勒壁上菴南有燕剪石查曦東竺菴留贈聖林上人詩東竺菴何處山中路鬱盤人蹤千澗上佛刹萬峰端笑語諸天近松雲暮色寒苾芻邀茗飲禪悦極清歡董邦逹東竺菴詩盤山百里勢迴互石絫嶔﨑不知數百尋飛瀑走怒雷十載蒼藤挂寒霧空勞過客説峻竒不信巨靈矜刻露劃然此地變標格有土可耕圃可樹精廬結處得天然倚壁編茅垣壁具妙香㣲度貝葉翻法界真空寳華雨我來投宿薄暝時屈指十年游已屢未隨樵子拾橡栗猶向僧忩飽殘芋崕間宸藻日月明清景欲摹無好句山轝明發又髙峰雲朩蒼蒼頻返顧欽定盤山志卷五
