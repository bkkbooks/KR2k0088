  text: 欽定四庫全書欽定盤山志卷七
  hash: sha256:756e8c65e47f78af199bb071e8bbb3ef98dd3bf968243a5da941d78d2c1061f6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0088_WYG_007-1a, image: WYG0586/WYG0586-0167a.png}
body:
  text: 流寓盤之宜於隱固矣而漢唐以還鴻冥鳯逸之士寥寥無幾豈前此地處荒僻其人韜光葆真不欲顯迹人世故記傳多未之及耶聖主咨訪遺賢寄懷薖軸安知南山之南北山之北不有匿姓氏於漁樵耕牧中甘作盛世之逸民不令此山作終南捷徑者尚期物色及之一為鼓幽蘭之操也古時代無考田盤先生自齊來棲遲此山漢田疇字子泰陶詩作春無終縣人董卓遷漢帝於長安時幽州牧劉虞聞疇竒士署為從事遣問行在疇循間道至長安致命詔拜騎都尉疇以天子蒙塵不可荷佩榮寵辭不受得報還虞已為公孫瓚所狀疇謁虞墓哭泣返命瓚怒收疇疇不為屈瓚壯之疇得北歸率宗人入徐無山中從而徙者五千餘家疇為約束興學校期月道不拾遺建安十二年曹操討烏丸將其衆為鄉導論功封亭侯辭後拜議郎終不能奪其志曹操表論田疇云文雅優備忠武又著和於撫下慎於事上量時度理進退合義幽州始擾胡漢交萃蕩析離居靡所依懷疇率宗人避難於無終山北拒盧龍南守要害清靜隱約耕而後食人民化從咸供資奉及袁紹父子威力加於朔野逺結烏丸與為首尾前後召疇終不陷撓後臣奉命軍次易縣疇長馳自到陳討胡之勢猶廣武之建燕策薛公之度淮南又使部曲持臣露布出誘胡衆漢民或因亡來烏丸聞之震蕩王旅出塞途由山中九百餘里疇率兵五百啓導山谷遂滅烏丸蕩平塞表疇文武有效節義可嘉誠應寵賞以旌其美又令曰蓚令田疇志節髙尚遭值州里戎夏交亂引身深山研精味道百姓從之以成都邑袁賊之盛命召不屈慷慨守志以徼真主及孤奉詔征定河北遂服幽都將定胡寇時加禮命疇即受署陳建攻胡蹊路所由率齊山民一時向化開塞導道供承使役路近而便令虜不意斬踏頓於白狼遂長驅於柳城疇有力焉及軍入塞將圖其功表封亭侯食邑五百而疇懇惻前後辭賞出入三載歷年未賜此為成一人之髙甚違王典失之多矣宜從表封無久留吾過陳壽田疇傳云田疇字子泰右北平無終人也好讀書善擊劒初平元年義兵起董卓遷帝於長安幽州牧劉虞歎曰賊臣作亂朝廷播蕩四海俄然莫有固志身備宗室遺老不得自同於衆今欲奉使展效臣節安得不辱命之士乎衆議咸曰田疇雖年少多稱其竒疇時年二十二矣虞乃備禮請與相見大悅之遂署為從事具其車騎將行疇曰今道路阻絶寇虜縱橫稱官奉使為衆所指名願以私行期於得達而巳虞從之疇乃歸自選其家客與年少之勇壯募從者二十騎俱往虞自出祖而遣之既取道疇乃更上西關出塞傍北山直趣朔方循間徑去遂至長安致命詔拜騎都尉疇以為天子方蒙塵未安不可以荷佩榮寵固辭不受朝廷髙其義三府並辟皆不就得報馳還未至虞巳為公孫瓚所害疇至謁祭虞墓陳發章表哭泣而去瓚聞之大怒購求獲疇謂曰汝何自哭劉虞墓而不送章報於我也疇答曰漢室衰頽人懷異心唯劉公不失忠節章報所言於將軍未美恐非所樂聞故不進也今將軍方舉大事以求所欲既滅無罪之君又讐守義之臣誠行此事則燕趙之士將皆蹈東海而死耳豈忍有從將軍者乎瓚壯其對釋不誅也拘之軍下禁其故人莫得與通或説瓚曰田疇義士君弗能禮而又囚之恐失衆心瓚乃縱遣疇疇得北歸率舉宗族他附從數百人掃地而盟曰君仇不報吾不可以立於世遂入徐無山中營深險平敞地而居躬耕以養父母百姓歸之數年間至五千餘家疇謂父老曰諸君不以疇不肖遠來相就衆成都邑而莫相統一恐非久安之道願推擇其賢長者以為之主皆曰善因僉推疇疇曰今來在此非茍安而巳將圖大事復怨雪恥竊恐未得其志而輕薄之徒自相侵侮偷快一時無深計逺慮疇有愚計願與諸君共施之可乎皆曰可疇乃為約束相殺傷犯盜諍訟之法法重者至死其次抵罪二十餘條又制為婚姻嫁娶之禮興舉學校講授之業班行其衆衆皆便之至道不拾遺北邊翕然服其威信烏丸鮮卑並各遣驛使致貢遺疇悉撫納令不為寇袁紹數遣使招命又即授將軍印因安輯所統疇皆拒不當紹死其子尚又辟焉疇終不行疇嘗忿烏丸昔多賊殺其郡冠蓋有欲討之意而力未能建安十二年太祖北征烏丸未至先遣使辟疇又命田預喻指疇戒其門下趣治嚴門人謂曰昔袁公慕君禮命五至君義不屈今曹公使一來而君若恐弗及者何也疇笑而應之曰此非君所識也遂隨使者到軍署司空户曹掾引見咨議明日出令曰田子泰非吾所宜吏者即舉茂才拜為蓚令不之官隨軍次無終時方夏水雨而濱海汙下濘滯不通虜亦遮守蹊要軍不得進太祖患之以問疇疇曰此道秋夏每常有水淺不通車馬深不載舟船為難久矣舊北平郡治在平岡道出盧龍達於栁城自建武以來陷壞斷絶垂二百載而尚有微徑可從今虜將以大軍當由無終不得進而退懈弛無備若默回軍從盧龍口越白檀之險出空虛之地路近而便掩其不備踏頓之首可不戰而禽也太祖曰善乃引軍還而署大木表於水側路旁曰方今暑夏道路不通且候秋冬乃復進軍虜候騎見之誠以為大軍去也太祖命疇將其衆為鄉導上徐無山出盧龍歷平岡登白狼堆去栁城二百餘里虜乃驚覺單于身自臨陳太祖與交戰遂大斬獲追奔逐北至栁城軍還入塞論功行封封疇亭侯邑五百户疇自以始為居難率衆遁逃志義不立反以為利非本意也固讓太祖知其至心許而不奪後拜為議郎年四十六卒王嘉拾遺記云田疇北平人也劉虞為公孫瓚所害疇追慕無巳往虞墓設雞酒哭之音動林野翔鳥為之悽鳴走獸為之悲吟疇卧於草間忽有人通云劉幽州來欲與田子泰言疇神悟逺識知是虞之魂既進而拜疇泣不自止因相與進雞酒疇醉虞曰公孫瓚購子甚急宜竄伏避害疇對曰君臣之道生則盡其義今見君之靈願得同歸九泉骨且不朽安可逃乎虞曰子萬古之髙士也深慎爾儀奄然不見而疇醉亦醒古仙人辭夢入雲山宫闕幽鸑鷟同侣鴛鳯流桂月竟夜光不收世俗擾擾成囂湫醉飛星馭鞭金虬八仙浪迹追真遊龜玉筌蹄二十秋摩霄注壑須人求覔劒如或笑刻舟陽燧非無綺儔元鼎以來虛崑丘東井徒勞冠帶修松餐竹飲度蜃樓嵩頂坐嘯垂直鈎祗應慙愧劉幽州雷淵題古仙人辭云興定庚辰夏六月望豫與元好問趙郡李獻能同遊玉華谷又將厯嵩前諸剎因憩於少姨廟元周行廊廡得古仙人辭於壁間然其首章直屋漏雨為所漫剝殆不可辨乃磴木石而上拂拭泛滌迫視者久之始可完讀觀其體則柏梁事則終始二漢字畫在鍾王之間東井又元鼎所都幽州必賢宗子虞也夫眷眷不忘幽州者非吾田疇尚誰歟田復所事之讐卻曹瞞之賞衰俗波蕩中挺挺有烈丈夫風氣其死而不忘蓋無疑其能道此語亦無疑觀者不應以文體古今之變而疑仙語也噫仙山靈嶽宜有閎衍博大之真人往來乎其間而世人莫之識也豫三人者乃今見之夫豈偶然哉再拜留迹以附知音者末黃天全田疇論甚矣處亂世之難也身負濟世之具矣暴得大名不祥宜必擇主而事然仁者未必武而英雄或有邪心將沉晦以自全乎寇盜蜂起旦夕叵測伊欲身名俱全誠未易為策也子春弱齡應劉虞之辟獻表漢帝以羣雄惟虞為正耳反命而虞已斃於公孫瓚疇何以為心哉哭墓焚詔氣誼凜然瓚脅以威卒不為屈去而隱於徐無山既忠且智矣居數月徙而從者五千餘家彼固知田生之雄略良足以庇之也疇為約束興學校期月而道不拾遺鮮卑遣使問餽此豈可以聲音笑貌致之哉又數年烏丸張甚操討之不克疇為略教之竟殲烏丸而復誓不為操用賢於荀彧逺矣方孝孺田疇贊云古之觀人不於用舍考其所存以第髙下譬如龍駒垂首糞車豈以其賤斥之為駑齊侯千駟如南面王仲尼之嘆夷齊有光漢季分爭得國者操吾獨何為田疇是悼操雖據國犬鼠之雄殺后無君天下不容奚若田疇忠義蓋世委質劉虞身死靡二使受之命為漢大臣殺操復漢必不顧身嗚呼鄙夫惟利是就誰能為疇我與為友明李孔昭字光四薊州人崇禎癸未進士以天下將亂不赴廷對甲申聞都城變白衣冠哭田間者三嵗喪妻不再娶或勸之輒不答獨奉老母入盤山一子尚幼僮僕廬舍悉棄去躬自樵采往來水村山市間形蹤數變易無識者或晨炊乏母呵責輒伏地痛哭母為感動山中人觀者皆泣某中丞慕其名遣吏持書幣往迎遍走山中遇負薪者呼問若識李進士耶負薪者張目曰汝問阿誰吏具道其意負薪者遙指其處吏尋至室空矣訪之鄰叟笑曰若面失之向所見負薪者即是也吏再求卒不得戊戌春梁公玉立有薊門之役訪光四於州吏又登盤山叩老僧皆云光四無定居往來盤山僧寺為多梁公低回久之留一詩付山僧而去梁清標訪李光四不遇詩憶昔看花傍帝畿十年避弋羡鴻飛登山欲問桐江叟風雨冥冥冷釣磯宋犖桃花寺弔李處士詩幽絶招提境嘉名自昔云陽崖疏樹映大壑亂淙聞日暖催紅杏堂空養白雲鹿裘邈何許猿鶴尚思君國朝崔應魁永平人居栁河屯少遊心於醫人有疾醫藥不論直皆盡心焉晚嵗學道法名德茂下上盤山十八年以參究為事康熙戊辰秋示微疾遍告常所往來者期日訣别至朝衆問疾環坐談笑如平日久之乃曰萬事無常百年有限依我行之決不相誤索筆書偈而逝其偈曰來去赤條條不挂一絲毫本來無一物縱橫任逍遙李鍇字鐵君號眉山奉天鐵嶺人以門功當襲職病不就好佳山水晚卜築蘿村課耕穫以食地居豸峰之隂又自號豸青山人山人通敏工詩古文詞精力尤殫於經史著述甚富年七十卒生前自築壙於山居之旁永寧石氏號東村長白山人家素貴顯壯嵗折節讀書奉母孝母沒移居田盤作山居詩以見志與李鍇為世外交一廬山南一耕山北藤杖棕鞋相遇窮崕陡壑間無間風雪桐城方苞為作二山人傳載其迹甚詳方苞二山人傳豸青山人李鍇遼東鐵嶺人曾大父如梓明寧逺伯成梁兄子也萬厯已未鐵嶺城陷死其官入國朝三世皆盛貴伯叔父兄弟或嗣封爵都統禁軍或開府建鉞布列中外康熙四十一年父少司冦蒲陽公卒時西事方起議絶漠屯極邊山人既練自請興屯黑河踰年歸母卒再使南河賜七品冠帶乃盡以先世産業屬二昆移家潞河濳心經史凡六七年鄰里未得一識其面嘗遊盤山樂其土風買田豸峰下構草舍雜山氓以耕其尤貧者授之田而無所取疏材果實與衆共之其聲遠聞邦工每採山石過豸峰獨無擾焉暇時行遊四山必挈爐炭瓶罌樵蘇者遙望而知所在曰此李山人茶煙也白山石東村聞其風而慕之東村名永寧世饒於財祖都圖為聖祖親臣每議公事不撓於權貴山人少豪舉好聲色狗馬年三十始折節讀書會家事屯邅時伯兄既沒而諸弟皆幼獨出身當之家既落奉母居郭東墾墓田以養盎無斗儲遇無食者即罄之久之里中有竒邪咸懼其聞母兄沒移家盤山與眉山遊每嚴冬大雪攜手步西潭以杖扣氷相視愈怡見者咸詑而不知其何以然會功令禁內府人出居近畿復挈妻子入城僦屋授經自活乾隆元年舉孝廉方正詣有司力言弱足難為儀衆莫能奪也豸青舉博學宏詞及試亦被絀豸青之詩不丐於古而必求與之並東村則即事抒指翛然有真意或刻其山居五言律二十首遂不復為詩盡焚舊稿曰吾幼學難補雖殫心力所造適至是而止耳吾幸以悲憂窮蹙悔曩者之冥行今老矣可更以詹詹者擾吾心曲乎豸青中年後以急兄之急益窶艱老而無子自為生壙日典衣節食以養戚屬之窮孤又以所著睫巢集尚史稿未定矻矻不自休而東村長子及弟之子同舉甲科其僚友為營室廬少司馬德濟齋延教其兄子輔國公衆皆謂東村自是可安居東村曰吾終不以妻子故使豸青煢煢行當獨身留盤山俾有所資以待老也欽定盤山志卷七
